  /api/photos/shared/fromme/:
    get:
      operationId: api_photos_shared_fromme_list
      description: |
        Returns a paginated list of all photos shared **from** the current user (i.e., where the current user is the owner).
        Each item includes the recipient user and a summarized photo object.
      parameters:
        - name: page
          required: false
          in: query
          description: A page number within the paginated result set.
          schema:
            type: integer
        - name: page_size
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
      tags:
        - api
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Paginated list of users to whom the current user has shared photos.
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                  - results
                properties:
                  count:
                    type: integer
                    example: 123
                  next:
                    type: string
                    nullable: true
                    format: uri
                    example: http://api.example.org/accounts/?page=4
                  previous:
                    type: string
                    nullable: true
                    format: uri
                    example: http://api.example.org/accounts/?page=2
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - user_id
                        - user
                        - photo
                      properties:
                        user_id:
                          type: integer
                          readOnly: true
                        user:
                          $ref: '#/components/schemas/SimpleUser'
                        photo:
                          $ref: '#/components/schemas/PhotoSummary'

  /api/photos/shared/tome/:
    get:
      operationId: api_photos_shared_tome_list
      summary: List photos that have been shared to the current user
      description: |
        Returns a paginated list of photos for which the authenticated user is in the `shared_to` list.
      tags:
        - Photo
      security:
        - jwtAuth: []
        - basicAuth: []
      parameters:
        - name: page
          in: query
          description: Page number within the paginated result set
          required: false
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          description: Number of results to return per page
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: A paginated list of photos shared to the user
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                  - results
                properties:
                  count:
                    type: integer
                    description: Total number of matching photos
                  next:
                    type: string
                    format: uri
                    nullable: true
                    description: URL of the next page
                  previous:
                    type: string
                    format: uri
                    nullable: true
                    description: URL of the previous page
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/PhotoSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'


components:
  schemas:
    ErrorDetail:
      type: object
      properties:
        detail:
          type: string

    PaginatedAlbumAutoList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of albums
        next:
          type: string
          nullable: true
          format: uri
          description: URL to the next page of results
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to the previous page of results
        results:
          type: array
          items:
            $ref: "#/components/schemas/AlbumAuto"

    AlbumAuto:
      type: object
      required:
        - id
        - timestamp
        - created_on
        - favorited
        - photos
        - people
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the album
        title:
          type: string
          maxLength: 512
          nullable: true
          description: |
            Auto-generated title based on timestamp, location, and people in photos.
            Generated automatically if not provided during creation.
          default: "Untitled Album"
        favorited:
          type: boolean
          description: Whether the album has been marked as favorite
          default: false
        timestamp:
          type: string
          format: date-time
          description: Representative timestamp for the album
        created_on:
          type: string
          format: date-time
          readOnly: true
          description: When the album was created (set automatically)
        gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude coordinate for the album
        gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude coordinate for the album
        photos:
          type: array
          readOnly: true
          description: Photos included in this auto album
          items:
            $ref: "#/components/schemas/PhotoSimple"
        people:
          type: array
          readOnly: true
          description: |
            Unique people detected across all photos in the album.
            Computed from face recognition data.
          items:
            $ref: "#/components/schemas/Person"

    AlbumAutoCreate:
      type: object
      required:
        - timestamp
      properties:
        title:
          type: string
          maxLength: 512
          nullable: true
          description: Custom title for the album (auto-generated if not provided)
        timestamp:
          type: string
          format: date-time
          description: Primary timestamp for the album
        gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude coordinate
        gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude coordinate
        favorited:
          type: boolean
          description: Whether to mark album as favorite
          default: false

    PhotoSimple:
      type: object
      required:
        - image_hash
      properties:
        image_hash:
          type: string
          maxLength: 64
          description: Unique hash identifier for the photo
        square_thumbnail:
          type: string
          readOnly: true
          description: URL to the square thumbnail (method field)
        exif_timestamp:
          type: string
          format: date-time
          nullable: true
          description: Timestamp from photo EXIF data
        exif_gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude from EXIF GPS data
        exif_gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude from EXIF GPS data
        rating:
          type: integer
          description: User-assigned rating
        geolocation_json:
          nullable: true
          description: Processed geolocation data
        public:
          type: boolean
          description: Whether photo is publicly accessible
        video:
          type: boolean
          description: Whether this is a video file

    Person:
      type: object
      required:
        - id
        - name
        - face_url
        - face_photo_url
        - video
        - face_count
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier
        name:
          type: string
          maxLength: 128
          minLength: 1
          description: Person's name
        face_url:
          type: string
          readOnly: true
          description: URL to face thumbnail (computed from cover_face or first face)
        face_count:
          type: integer
          readOnly: true
          description: Number of photos person appears in
        face_photo_url:
          type: string
          readOnly: true
          description: Image hash of representative photo
        video:
          type: boolean
          readOnly: true
          description: Whether representative photo is a video
        newPersonName:
          type: string
          writeOnly: true
          maxLength: 100
          default: ""
          description: New name for person updates
        cover_photo:
          type: string
          writeOnly: true
          maxLength: 100
          default: ""
          description: Image hash for cover photo updates

    AlbumAutoUpdate:
      type: object
      required:
        - timestamp
      properties:
        title:
          type: string
          maxLength: 512
          nullable: true
          description: Album title
        timestamp:
          type: string
          format: date-time
          description: Representative timestamp for the album
        gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude coordinate
        gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude coordinate
        favorited:
          type: boolean
          description: Whether album is marked as favorite
          default: false

    AlbumAutoPartialUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 512
