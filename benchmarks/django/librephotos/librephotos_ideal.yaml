  /api/auth/token/blacklist/:
    post:
      summary: Blacklist (invalidate) a refresh token
      operationId: blacklistToken
      tags:
        - Auth
      description: |
        Takes a refresh token and adds it to the blacklist so it can no longer be used.
        Requires the `rest_framework_simplejwt.token_blacklist` app to be installed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBlacklist'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenBlacklist'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenBlacklist'
      responses:
        '205':
          description: Token successfully blacklisted (no content)
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/token/obtain/:
    post:
      summary: Obtain JWT access and refresh tokens
      operationId: obtainTokenPair
      tags:
        - Auth
      description: |
        Takes a username and password and returns a JWT access & refresh token pair.
        Also sets a cookie named `jwt` with the access token and adds
        `Access-Control-Allow-Credentials: true` in the response headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
      responses:
        '200':
          description: Access and refresh tokens returned
          headers:
            Set-Cookie:
              description: |
                A cookie named `jwt` containing the access token.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPairResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/token/refresh/:
    post:
      summary: Refresh JWT access token
      operationId: refreshToken
      tags:
        - Auth
      description: |
        Takes a refresh token and returns a new access token if the refresh token is valid.
        Also sets a cookie named `jwt` with the new access token and includes
        `Access-Control-Allow-Credentials: true` in the response headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: New access token returned
          headers:
            Set-Cookie:
              description: |
                A cookie named `jwt` containing the new access token.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

