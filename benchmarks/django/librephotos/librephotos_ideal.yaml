openapi: 3.1.0
info:
  title: API Documentation for API
  version: 1.0.0
paths:
  /api/albums/auto/:
    get:
      operationId: api_albums_auto_list
      summary: List auto-generated albums
      description: |
        Retrieve a paginated list of auto-generated albums for the authenticated user.
        Albums are automatically created based on photo metadata and contain grouped photos.
        Only albums with at least one photo are returned, ordered by timestamp (newest first).
      parameters:
        - name: page
          in: query
          required: false
          description: A page number within the paginated result set.
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          required: false
          description: Number of results to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
      tags:
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "200":
          description: Successfully retrieved auto albums
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAlbumAutoList"
        "401":
          description: Authentication required

    post:
      operationId: api_albums_auto_create
      summary: Create a new auto album
      description: |
        Create a new auto-generated album. The album title will be auto-generated
        if not provided. The created_on timestamp will be set automatically.
      tags:
        - albums
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumAutoCreate"
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "201":
          description: Auto album created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumAuto"
        "400":
          description: Invalid input data
        "401":
          description: Authentication required

  /api/albums/auto/delete_all/:
    post:
      operationId: api_albums_auto_delete_all
      summary: Delete all auto albums
      description: |
        Delete all auto-generated albums belonging to the authenticated user.
        This operation cannot be undone.
      tags:
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "200":
          description: All auto albums deleted successfully
          content:
            application/json:
              schema:
                type: string
                example: "success"
        "401":
          description: Authentication required

  /api/albums/auto/{id}/:
    get:
      operationId: api_albums_auto_retrieve
      summary: Retrieve an auto album
      description: Get details of a specific auto-generated album by ID.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying the album auto.
          required: true
      tags:
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "200":
          description: Successfully retrieved the album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumAuto"
        "401":
          description: Authentication required
        "404":
          description: Album not found

    put:
      operationId: api_albums_auto_update
      summary: Update an auto album
      description: |
        Update all fields of an auto album. Read-only fields like photos and people
        cannot be updated through this endpoint.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying the album auto.
          required: true
      tags:
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumAutoUpdate"
        required: true
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "200":
          description: Successfully updated the album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumAuto"
        "400":
          description: Invalid input data
        "401":
          description: Authentication required
        "404":
          description: Album not found

    patch:
      operationId: api_albums_auto_partial_update
      summary: Partially update an auto album
      description: |
        Update specific fields of an auto album. Only provided fields will be updated.
        Read-only fields like photos and people cannot be updated.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying the album auto.
          required: true
      tags:
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumAutoPartialUpdate"
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "200":
          description: Successfully updated the album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlbumAuto"
        "400":
          description: Invalid input data
        "401":
          description: Authentication required
        "404":
          description: Album not found

    delete:
      operationId: api_albums_auto_destroy
      summary: Delete an auto album
      description: Delete a specific auto-generated album by ID.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying the album auto.
          required: true
      tags:
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        "204":
          description: Album successfully deleted
        "401":
          description: Authentication required
        "404":
          description: Album not found

    /api/albums/auto/delete_all/:
    post:
      operationId: api_albums_auto_delete_all_create
      summary: Delete all auto albums
      description: |
        Delete all auto-generated albums belonging to the authenticated user.
        This operation cannot be undone.
      tags:
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      # No request body required - the endpoint deletes all albums for the current user
      responses:
        "200":
          description: All auto albums deleted successfully
          content:
            application/json:
              schema:
                type: string
                example: "success"
        "401":
          description: Authentication required

  /api/albums/auto/list/:
    get:
      operationId: api_albums_auto_list_list
      description: |-
        Retrieves a paginated list of auto-generated albums belonging to the authenticated user.
        Only returns albums that have at least one photo.
      parameters:
        - name: page
          required: false
          in: query
          description: A page number within the paginated result set.
          schema:
            type: integer
            minimum: 1
        - name: page_size
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
            minimum: 1
        - name: search
          required: false
          in: query
          description: A search term for filtering albums by title.
          schema:
            type: string
      tags:
        - api
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlbumAutoList'
          description: 'Successfully retrieved the list of auto albums'
        '401':
          description: 'Authentication credentials were not provided or are invalid'

  /api/albums/date/:
    get:
      operationId: api_albums_date_list
      description: Retrieves a paginated list of date-based albums belonging to the authenticated user.
      parameters:
        - name: page
          required: false
          in: query
          description: A page number within the paginated result set.
          schema:
            type: integer
            minimum: 1
        - name: page_size
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
            minimum: 1
      tags:
        - api
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlbumDateList'
          description: 'Successfully retrieved list of date-based albums'
        '401':
          description: 'Authentication credentials were not provided or are invalid'

    post:
      operationId: api_albums_date_create
      description: Creates a new date-based album.
      tags:
        - api
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbumDateCreate'
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDate'
          description: 'Date album successfully created'
        '400':
          description: 'Invalid request data'
        '401':
          description: 'Authentication credentials were not provided or are invalid'

  /api/albums/date/{id}/:
    get:
      operationId: api_albums_date_retrieve
      description: Returns the album details and its photos for a given date, with pagination support (default 100 photos per page).
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the date album to retrieve
        - in: query
          name: favorite
          schema:
            type: boolean
          required: false
          description: Filter photos by favorite status (shows photos with rating >= user's favorite_min_rating)
        - in: query
          name: hidden
          schema:
            type: boolean
          required: false
          description: Filter photos by hidden status
        - in: query
          name: in_trashcan
          schema:
            type: boolean
          required: false
          description: Filter photos by trashcan status
        - in: query
          name: last_modified
          schema:
            type: string
            format: date
          required: false
          description: Filter photos by last modified date (shows photos with exif_timestamp >= provided date)
        - in: query
          name: person
          schema:
            type: integer
          required: false
          description: Filter photos by person ID
        - in: query
          name: public
          schema:
            type: boolean
          required: false
          description: Filter to show only public photos
        - in: query
          name: username
          schema:
            type: string
          required: false
          description: Filter public photos by username (only used when public=true)
        - in: query
          name: video
          schema:
            type: boolean
          required: false
          description: Filter photos by video status
        - in: query
          name: photo
          schema:
            type: boolean
          required: false
          description: Filter to show only photos (non-videos)
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          required: false
          description: Page number for photo pagination
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
          required: false
          description: Page size for photo pagination (default 100)
      tags:
        - api
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    $ref: '#/components/schemas/AlbumDateWithPhotos'
          description: 'Successfully retrieved the date album and its photos'
        '401':
          description: 'Authentication credentials were not provided or are invalid'
        '404':
          description: 'Date album not found'

    put:
      operationId: api_albums_date_update
      description: Updates a date-based album.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the date album to update
      tags:
        - api
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbumDateUpdate'
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDate'
          description: 'Date album successfully updated'
        '400':
          description: 'Invalid request data'
        '401':
          description: 'Authentication credentials were not provided or are invalid'
        '404':
          description: 'Date album not found'

    patch:
      operationId: api_albums_date_partial_update
      description: Partially updates a date-based album.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the date album to partially update
      tags:
        - api
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAlbumDate'
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumDate'
          description: 'Date album successfully updated'
        '400':
          description: 'Invalid request data'
        '401':
          description: 'Authentication credentials were not provided or are invalid'
        '404':
          description: 'Date album not found'

    delete:
      operationId: api_albums_date_destroy
      description: Deletes a date-based album.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The ID of the date album to delete
      tags:
        - api
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '204':
          description: 'Date album successfully deleted'
        '401':
          description: 'Authentication credentials were not provided or are invalid'
        '404':
          description: 'Date album not found'


  /api/albums/date/list/:
    get:
      operationId: api_albums_date_list
      description: Gives you a list of days with the number of elements. This is not paginated and can be large.
      parameters:
        - name: favorite
          in: query
          schema:
            type: boolean
          description: Filter for favorite photos based on user's favorite_min_rating
          required: false
        - name: hidden
          in: query
          schema:
            type: boolean
          description: Filter for hidden (true) or non-hidden photos (false)
          required: false
        - name: in_trashcan
          in: query
          schema:
            type: boolean
          description: Filter for photos in trashcan (true) or not in trashcan (false)
          required: false
        - name: last_modified
          in: query
          schema:
            type: string
            format: date
          description: Filter for photos modified since this date
          required: false
        - name: person
          in: query
          schema:
            type: integer
          description: Filter by person ID
          required: false
        - name: public
          in: query
          schema:
            type: boolean
          description: Filter for public photos
          required: false
        - name: username
          in: query
          schema:
            type: string
          description: Filter by owner username (used with public=true)
          required: false
        - name: video
          in: query
          schema:
            type: boolean
          description: Filter for videos (true) or not
          required: false
        - name: photo
          in: query
          schema:
            type: boolean
          description: Filter for photos (not videos)
          required: false
        - name: search
          in: query
          schema:
            type: string
          description: Search term for captions, location, or person names
          required: false
      responses:
        '200':
          description: Successful response with album dates
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/IncompleteAlbumDate'
                required:
                  - results
      security:
        - jwtAuth: []
        - basicAuth: []
        - []  # Empty security requirement for public access with public=true
      tags:
        - albums

  /api/albums/person/:
    get:
      operationId: api_albums_person_list
      description: This endpoint is deprecated. Use /api/persons instead.
      parameters:
        - name: limit
          in: query
          required: false
          description: Number of results to return per page.
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          description: The initial index from which to return the results.
          schema:
            type: integer
      tags:
        - api
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      deprecated: true
      responses:
        '200':
          description: List of people with their associated photos
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/GroupedPersonPhotos'
                required:
                  - results
    post:
      operationId: api_albums_person_create
      description: This endpoint is deprecated. Use /api/persons instead.
      tags:
        - api
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupedPersonPhotos'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GroupedPersonPhotos'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GroupedPersonPhotos'
        required: true
      security:
        - jwtAuth: []
        - basicAuth: []
      deprecated: true
      responses:
        '201':
          description: Person successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupedPersonPhotos'
  
  /api/albums/person/{id}/:
    get:
      operationId: api_albums_person_retrieve
      description: This endpoint is deprecated. Use /api/persons instead.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          description: A unique integer value identifying this person.
          required: true
      tags:
        - api
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      deprecated: true
      responses:
        '200':
          description: Person details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    $ref: '#/components/schemas/GroupedPersonPhotos'
                required:
                  - results
    
    put:
      operationId: api_albums_person_update
      description: This endpoint is deprecated. Use /api/persons instead.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this person.
          required: true
      tags:
        - api
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupedPersonPhotos'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GroupedPersonPhotos'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GroupedPersonPhotos'
        required: true
      security:
        - jwtAuth: []
        - basicAuth: []
      deprecated: true
      responses:
        '200':
          description: Person successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupedPersonPhotos'
    
    patch:
      operationId: api_albums_person_partial_update
      description: This endpoint is deprecated. Use /api/persons instead.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this person.
          required: true
      tags:
        - api
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedGroupedPersonPhotos'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedGroupedPersonPhotos'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedGroupedPersonPhotos'
      security:
        - jwtAuth: []
        - basicAuth: []
      deprecated: true
      responses:
        '200':
          description: Person successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupedPersonPhotos'
    
    delete:
      operationId: api_albums_person_destroy
      description: This endpoint is deprecated. Use /api/persons instead.
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this person.
          required: true
      tags:
        - api
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      deprecated: true
      responses:
        '204':
          description: Person successfully deleted

  /api/albums/place/:
    get:
      operationId: api_albums_place_list
      description: List album places with photos count greater than 0 for the authenticated user
      parameters:
        - name: page
          in: query
          required: false
          description: A page number within the paginated result set.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          description: Number of results to return per page.
          schema:
            type: integer
            minimum: 1
            default: 10
      tags:
        - api
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: List of album places with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Total number of items matching the query
                  next:
                    type: string
                    nullable: true
                    format: uri
                    description: URL to the next page of results (if any)
                  previous:
                    type: string
                    nullable: true
                    format: uri
                    description: URL to the previous page of results (if any)
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/AlbumPlace'
                required:
                  - count
                  - next
                  - previous
                  - results
    post:
      operationId: api_albums_place_create
      description: Create a new album place
      tags:
        - api
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbumPlaceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AlbumPlaceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AlbumPlaceCreate'
        required: true
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '201':
          description: Album place successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumPlace'
  
  /api/albums/place/{id}/:
    get:
      operationId: api_albums_place_retrieve
      description: Retrieve details of a specific album place including its photos
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this album place.
          required: true
      tags:
        - api
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Album place details
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    $ref: '#/components/schemas/GroupedPlacePhotos'
                required:
                  - results
    
    put:
      operationId: api_albums_place_update
      description: Update an existing album place
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this album place.
          required: true
      tags:
        - api
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlbumPlaceCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AlbumPlaceCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AlbumPlaceCreate'
        required: true
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Album place successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumPlace'
    
    patch:
      operationId: api_albums_place_partial_update
      description: Partially update an existing album place
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this album place.
          required: true
      tags:
        - api
        - albums
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAlbumPlace'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAlbumPlace'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAlbumPlace'
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Album place successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumPlace'
    
    delete:
      operationId: api_albums_place_destroy
      description: Delete an album place
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          description: A unique integer value identifying this album place.
          required: true
      tags:
        - api
        - albums
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '204':
          description: Album place successfully deleted


  /api/albums/place/list/:
    get:
      operationId: api_albums_place_list_list
      description: Returns a paginated list of album places for the authenticated user
      parameters:
        - name: page
          required: false
          in: query
          description: A page number within the paginated result set.
          schema:
            type: integer
        - name: page_size
          required: false
          in: query
          description: Number of results to return per page.
          schema:
            type: integer
        - name: search
          required: false
          in: query
          description: A search term that filters by title.
          schema:
            type: string
      tags:
