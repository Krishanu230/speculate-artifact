    SzBulkDataStatus:
      type: string
      enum: [ NOT_STARTED, IN_PROGRESS, ABORTED, COMPLETED ]
      
    SzBulkDataAnalysisResponse:
      type: object
      description: "The response describing the analysis of bulk data records."
      allOf:
        - $ref: "#/components/schemas/SzBaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzBulkDataAnalysis"
          required:
            - data

    SzBulkDataAnalysis:
      type: object
      description: "Describes the analysis performed on a set of bulk data records."
      properties:
        status:
          $ref: "#/components/schemas/SzBulkDataStatus"
        characterEncoding:
          type: string
        mediaType:
          type: string
          nullable: true
        recordCount:
          type: integer
          format: int32
        recordsWithRecordIdCount:
          type: integer
          format: int32
        recordsWithDataSourceCount:
          type: integer
          format: int32
        analysisByDataSource:
          type: array
          items:
            $ref: "#/components/schemas/SzDataSourceRecordAnalysis"

    SzDataSourceRecordAnalysis:
      type: object
      description: "Provides statistics for records belonging to a specific data source within a bulk data set."
      properties:
        dataSource:
          type: string
          nullable: true
          description: "The data source code. This is null for records that had no data source specified."
        recordCount:
          type: integer
          format: int32
        recordsWithRecordIdCount:
          type: integer
          format: int32
      required:
        - recordCount
        - recordsWithRecordIdCount

    SzBulkLoadResponse:
      type: object
      description: "The response describing the result of loading bulk data."
      allOf:
        - $ref: "#/components/schemas/SzBaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzBulkLoadResult"
          required:
            - data

    SzBulkLoadResult:
      type: object
      description: "Describes the result from loading a set of bulk data records."
      allOf:
        - $ref: "#/components/schemas/SzBaseBulkLoadResult"
        - type: object
          properties:
            status:
              $ref: "#/components/schemas/SzBulkDataStatus"
            characterEncoding:
              type: string
            mediaType:
              type: string
            missingDataSourceCount:
              type: integer
              format: int32
            resultsByDataSource:
              type: array
              items:
                $ref: "#/components/schemas/SzDataSourceBulkLoadResult"

    SzDataSourceBulkLoadResult:
      type: object
      description: "Provides bulk data load statistics specific to a given data source."
      allOf:
        - $ref: "#/components/schemas/SzBaseBulkLoadResult"
        - type: object
          properties:
            dataSource:
              type: string
              nullable: true
          required:
            - dataSource

    SzBaseBulkLoadResult:
      type: object
      description: "Provides the base set of properties for describing the result of a bulk load operation."
      properties:
        recordCount:
          type: integer
          format: int32
        loadedRecordCount:
          type: integer
          format: int32
        incompleteRecordCount:
          type: integer
          format: int32
        failedRecordCount:
          type: integer
          format: int32
        topErrors:
          type: array
          items:
            $ref: "#/components/schemas/SzBulkLoadError"
      required:
        - recordCount
        - loadedRecordCount
        - incompleteRecordCount
        - failedRecordCount
        - topErrors
        
    SzBulkLoadError:
      type: object
      description: "Describes a specific error that occurred during a bulk load and how many times it occurred."
      properties:
        error:
          $ref: "#/components/schemas/SzError"
        occurrenceCount:
          type: integer
          format: int32
      required:
        - error
        - occurrenceCount

