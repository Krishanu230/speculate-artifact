  /bulk-data/analyze:
    post:
      tags:
        - "Bulk Data"
      summary: "Analyze a bulk data set of records."
      description: "Analyzes a bulk data file of records to provide statistics before loading. The data can be provided directly in the request body or as a 'data' part in a multipart/form-data request."
      operationId: "analyzeBulkRecords"
      parameters:
        - name: "progressPeriod"
          in: "query"
          required: false
          description: "For SSE connections, this is the suggested maximum time in milliseconds between progress events. This is ignored for standard HTTP requests."
          schema:
            type: integer
            format: int64
            default: 3000
      requestBody:
        description: "The bulk record data, which can be a JSON array, a JSON-Lines file, or a CSV file."
        required: true
        content:
          application/json:
            schema:
              type: string
              format: binary
          application/x-jsonlines:
            schema:
              type: string
              format: binary
          text/csv:
            schema:
              type: string
              format: binary
          text/plain:
            schema:
              type: string
              format: binary
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  format: binary
                  description: "The bulk data file to be analyzed."
      responses:
        '200':
          description: "Successful response containing the analysis of the bulk data."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzBulkDataAnalysisResponse'

  /bulk-data/load:
    post:
      tags:
        - "Bulk Data"
      summary: "Load the records in the provided bulk data set."
      description: "Provides a means to load a bulk data file of records. The records are encoded as JSON, JSON-Lines, or CSV. The data can be provided directly or as a multipart form."
      operationId: "loadBulkRecords"
      parameters:
        - name: "dataSource"
          in: "query"
          required: false
          description: "An optional overriding data source to assign to all records."
          schema:
            type: string
        - name: "mapDataSources"
          in: "query"
          required: false
          description: "A URL-encoded JSON object mapping inbound data source codes to target data source codes."
          schema:
            type: string
        - name: "mapDataSource"
          in: "query"
          required: false
          description: "A repeatable, colon-delimited string for mapping data sources (e.g., ':FROM_DS:TO_DS')."
          schema:
            type: array
            items:
              type: string
        - name: "loadId"
          in: "query"
          required: false
          description: "An optional load ID to associate with the loaded records."
          schema:
            type: string
        - name: "maxFailures"
          in: "query"
          required: false
          description: "The maximum number of failures before aborting the load. A value of 0 means no limit."
          schema:
            type: integer
            format: int32
            default: 0
        - name: "progressPeriod"
          in: "query"
          required: false
          description: "For SSE connections, the suggested time in milliseconds between progress events."
          schema:
            type: integer
            format: int64
            default: 3000
      requestBody:
        description: "The bulk record data, which can be a JSON array, a JSON-Lines file, or a CSV file."
        required: true
        content:
          application/json:
            schema:
              type: string
              format: binary
          application/x-jsonlines:
            schema:
              type: string
              format: binary
          text/csv:
            schema:
              type: string
              format: binary
          text/plain:
            schema:
              type: string
              format: binary
          multipart/form-data:
            schema:
              type: object
              properties:
                data:
                  type: string
                  format: binary
                  description: "The bulk data file to be loaded."
      responses:
        '200':
          description: "Successful response containing the statistics of the bulk load operation."
          content:
