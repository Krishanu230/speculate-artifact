components:
  schemas:
    SzBaseResponse:
      type: object
      description: "Represents the base information included in all responses, including meta-data and links."
      properties:
        meta:
          $ref: "#/components/schemas/SzMeta"
        links:
          $ref: "#/components/schemas/SzLinks"
      required:
        - meta
        - links

    SzErrorResponse:
      type: object
      description: "Describes an error response from the API, including one or more errors."
      allOf:
        - $ref: "#/components/schemas/SzBaseResponse"
        - type: object
          properties:
            errors:
              type: array
              description: "The list of errors that occurred."
              items:
                $ref: "#/components/schemas/SzError"
          required:
            - errors

    SzMeta:
      type: object
      description: "Provides meta-data about the response, including timing and versioning information."
      properties:
        server:
          type: string
          description: "The descriptive name of the server that produced the response."
        httpMethod:
          $ref: "#/components/schemas/SzHttpMethod"
        httpStatusCode:
          type: integer
          format: int32
          description: "The HTTP status code of the response."
        timestamp:
          type: string
          format: date-time
          description: "The timestamp of when the request was completed."
        version:
          type: string
          description: "The version number of the Senzing REST API server."
        restApiVersion:
          type: string
          description: "The version of the Senzing REST API specification that is implemented."
        nativeApiVersion:
          type: string
          description: "The version of the underlying native Senzing API."
        nativeApiBuildVersion:
          type: string
          description: "The build version for the underlying native Senzing API."
        nativeApiBuildNumber:
          type: string
          description: "The build number for the underlying native Senzing API."
        nativeApiBuildDate:
          type: string
          format: date-time
          description: "The build date for the underlying native Senzing API."
        configCompatibilityVersion:
          type: string
          description: "The configuration compatibility version for the underlying native Senzing API."
        timings:
          type: object
          nullable: true
          description: "A map of timing measurements for the operation, where keys describe the operation and values are the duration in milliseconds."
          additionalProperties:
            type: integer
            format: int64

    SzLinks:
      type: object
      description: "Provides links related to the response."
      properties:
        self:
          type: string
          format: uri
          description: "The URI for the original request."
          nullable: true
        openApiSpecification:
          type: string
          format: uri
          description: "A link to the OpenAPI specification for the API."
          nullable: true

    SzError:
      type: object
      description: "Describes a single error, possibly with an error code."
      properties:
        code:
          type: string
          nullable: true
          description: "The internal error code associated with the error."
        message:
          type: string
          description: "The message describing the error."

    SzHttpMethod:
      type: string
      description: "The HTTP method that was used for the operation."
      enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE

    SzOpenApiSpecResponse:
      type: object
      description: "A standard response object containing the OpenAPI specification in its 'data' property."
      allOf:
        - $ref: "#/components/schemas/SzBaseResponse"
        - type: object
          properties:
            data:
              type: object
              description: "The OpenAPI specification in JSON format."
              additionalProperties: {} # Allows for any valid OpenAPI structure

    SzOpenApiSpecResponseOrRawJson:
      description: "The response for this operation, which can either be a standard wrapper object (SzOpenApiSpecResponse) or the raw OpenAPI specification JSON itself."
      oneOf:
        - $ref: "#/components/schemas/SzOpenApiSpecResponse"
        - type: object
          description: "The raw OpenAPI specification in JSON format."
          additionalProperties: {} # Allows for any valid OpenAPI structure

    SzResponseWithRawData:
      type: object
      description: "A base response object that includes a 'rawData' field for the raw JSON response from the underlying native API."
      allOf:
        - $ref: "#/components/schemas/SzBaseResponse"
        - type: object
          properties:
            rawData:
              type: object
              nullable: true
              description: "The raw JSON response from the underlying native API. This will be a JSON string." # The code shows it's a string, even if the method signature is Object.
              additionalProperties: {}

    SzLicenseResponse:
      type: object
      description: "A response containing the Senzing license information."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzLicenseResponseData"
          required:
            - data

    SzLicenseResponseData:
      type: object
      description: "The data object for a license response, containing the license details."
      properties:
        license:
          $ref: "#/components/schemas/SzLicenseInfo"
      required:
        - license

    SzLicenseInfo:
      type: object
      description: "Describes the details of a Senzing product license."
      properties:
        customer:
          type: string
          description: "The customer information associated with the license."
        contract:
          type: string
          description: "The contract information associated with the license."
        licenseType:
          type: string
          description: "The description of the type of license."
        licenseLevel:
          type: string
          description: "The description of the license level."
        billing:
          type: string
          description: "The billing information associated with the license."
        issuanceDate:
          type: string
          format: date-time
          description: "The issuance date for the license."
        expirationDate:
          type: string
          format: date-time
          description: "The expiration date for the license."
        recordLimit:
          type: integer
          format: int64
          description: "The record limit associated with the license."

    SzVersionResponse:
        type: object
        description: "A response containing the Senzing version information."
        allOf:
          - $ref: "#/components/schemas/SzResponseWithRawData"
          - type: object
            properties:
              data:
                $ref: "#/components/schemas/SzVersionInfo"
            required:
              - data

    SzVersionInfo:
        type: object
        description: "Describes the version information for the API Server, REST API specification, and the native Senzing API."
        properties:
          apiServerVersion:
            type: string
            description: "The version of the REST API Server implementation."
          restApiVersion:
            type: string
            description: "The version of the REST API Specification that is implemented."
          nativeApiVersion:
            type: string
            description: "The version for the underlying runtime native Senzing API."
          nativeApiBuildVersion:
            type: string
            description: "The build version for the underlying runtime native Senzing API."
          nativeApiBuildNumber:
            type: string
            description: "The build number for the underlying runtime native Senzing API."
          nativeApiBuildDate:
            type: string
            format: date-time
            description: "The build date for the underlying runtime native Senzing API."
          configCompatibilityVersion:
            type: string
            description: "The configuration compatibility version for the underlying runtime native Senzing API."

    SzDataSourcesResponse:
        type: object
        description: "The response containing a set of configured data sources."
        allOf:
          - $ref: "#/components/schemas/SzResponseWithRawData"
          - type: object
            properties:
              data:
                $ref: "#/components/schemas/SzDataSourcesResponseData"
            required:
              - data

    SzDataSourcesResponseData:
      type: object
      description: "Provides a list of data source codes and a mapping to their detailed information."
      properties:
        dataSources:
          type: array
          description: "The list of all configured data source codes."
          items:
            type: string
          uniqueItems: true
        dataSourceDetails:
          type: object
          description: "A map of data source codes to their detailed SzDataSource information."
          additionalProperties:
            $ref: "#/components/schemas/SzDataSource"

    SzDataSource:
      type: object
      description: "Describes a configured data source, including its code and internal ID."
      properties:
        dataSourceCode:
          type: string
          description: "The unique code for the data source."
        dataSourceId:
          type: integer
          format: int32
          nullable: true
          description: "The internal numeric ID for the data source."
      required:
        - dataSourceCode

    SzDataSourceResponse:
      type: object
      description: "A response containing the details for a single data source."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzDataSourceResponseData"
          required:
            - data

    SzDataSourceResponseData:
      type: object
      description: "The data object for a single data source response."
      properties:
        dataSource:
          $ref: "#/components/schemas/SzDataSource"
      required:
        - dataSource

    SzDataSourceDescriptor:
      description: "Describes a data source to be created, either as a simple string code or as a full data source object."
      oneOf:
        - type: string
          description: "The data source code."
        - $ref: "#/components/schemas/SzDataSource"


    SzLoadRecordResponse:
      type: object
      description: "The response containing the record ID of the record that was loaded and optional resolution information."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzLoadRecordResponseData"
          required:
            - data

    SzLoadRecordResponseData:
      type: object
      description: "The data payload for a response from loading a record."
      properties:
        recordId:
          type: string
          nullable: true
          description: "The record ID of the record that was loaded."
        info:
          nullable: true
          $ref: "#/components/schemas/SzResolutionInfo"

    SzResolutionInfo:
      type: object
      description: "Provides information about the resolution of an entity, including affected and flagged entities."
      properties:
        dataSource:
          type: string
          nullable: true
          description: "The data source of the primary record that was the focus of the resolution."
        recordId:
          type: string
          nullable: true
          description: "The record ID of the primary record that was the focus of the resolution."
        affectedEntities:
          type: array
          description: "The set of entity IDs for entities that were affected by the resolution."
          items:
            type: integer
            format: int64
          uniqueItems: true
        flaggedEntities:
          type: array
          description: "A list of entities that were flagged as interesting or relevant during the resolution."
          items:
            $ref: "#/components/schemas/SzFlaggedEntity"

    SzFlaggedEntity:
      type: object
      description: "Describes an entity that was flagged as relevant during an entity resolution operation."
      properties:
        entityId:
          type: integer
          format: int64
          nullable: true
          description: "The entity ID of the flagged entity."
        degrees:
          type: integer
          format: int32
          nullable: true
          description: "The number of degrees of separation this entity is from the entity that was directly affected."
        flags:
          type: array
          description: "The set of flags that were triggered for this entity."
          items:
            type: string
          uniqueItems: true
        sampleRecords:
          type: array
          description: "A sample of records from the flagged entity."
          items:
            $ref: "#/components/schemas/SzFlaggedRecord"

    SzFlaggedRecord:
      type: object
      description: "Describes a sample record from a flagged entity, including the flags that were triggered."
      properties:
        dataSource:
          type: string
          nullable: true
          description: "The data source of the sample record."
        recordId:
          type: string
          nullable: true
          description: "The record ID of the sample record."
        flags:
          type: array
          description: "The set of flags that were triggered for this specific record."
          items:
            type: string
          uniqueItems: true
    
    SzDeleteRecordResponse:
      type: object
      description: "The response for a successful record deletion operation. May contain resolution info if requested."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzDeleteRecordResponseData"
          required:
            - data

    SzDeleteRecordResponseData:
      type: object
      description: "The data payload for a record deletion response, which may contain information about how the deletion affected other entities."
      properties:
        info:
          nullable: true
          $ref: "#/components/schemas/SzResolutionInfo"

    SzReevaluateResponse:
      type: object
      description: "The response for a successful record reevaluation operation. May contain resolution info if requested."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzReevaluateResponseData"
          required:
            - data

    SzReevaluateResponseData:
      type: object
      description: "The data payload for a record reevaluation response, which may contain information about how the reevaluation affected other entities."
      properties:
        info:
          nullable: true
          $ref: "#/components/schemas/SzResolutionInfo"

    SzRecordResponse:
      type: object
      description: "The response containing the data for a single entity record."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzRecordResponseData"
          required:
            - data

    SzRecordResponseData:
      type: object
      description: "The data payload for a response containing a single record."
      properties:
        record:
          $ref: "#/components/schemas/SzEntityRecord"
      required:
        - record

    SzEntityRecord:
      type: object
      description: "Describes a single record from a data source, including its features and raw data."
      properties:
        dataSource:
          type: string
          description: "The data source code for the record."
        recordId:
          type: string
          description: "The record ID for the record."
        featureReferences:
          type: array
          description: "The list of feature references for the entity features contributed by this record."
          items:
            $ref: "#/components/schemas/SzFeatureReference"
        lastSeenTimestamp:
          type: string
          format: date-time
          nullable: true
          description: "The timestamp that the record was most recently loaded or updated."
        addressData:
          type: array
          items:
            type: string
          description: "An array of addresses associated with the record, formatted for readability."
        characteristicData:
          type: array
          items:
            type: string
          description: "An array of characteristics associated with the record, formatted for readability."
        identifierData:
          type: array
          items:
            type: string
          description: "An array of identifiers associated with the record, formatted for readability."
        nameData:
          type: array
          items:
            type: string
          description: "An array of names associated with the record, formatted for readability."
        phoneData:
          type: array
          items:
            type: string
          description: "An array of phone numbers associated with the record, formatted for readability."
        relationshipData:
          type: array
          items:
            type: string
          description: "An array of relationship data items associated with the record."
        otherData:
          type: array
          items:
            type: string
          description: "An array of other data items associated with the record."
        originalSourceData:
          type: object
          nullable: true
          description: "The original source data that was used to load the record, as a JSON object."
          additionalProperties: true
          
    SzFeatureReference:
      type: object
      description: "Describes a record's reference to an entity feature."
      properties:
        internalId:
          type: integer
          format: int64
          nullable: true
          description: "The internal ID identifying the feature."
        usageType:
          type: string
          nullable: true
          description: "The usage type associated with the feature for this record (e.g., 'HOME', 'WORK')."

    SzRelationshipMode:
      type: string
      description: "Controls how related entities are returned."
      enum: [ NONE, PARTIAL, FULL ]
      default: PARTIAL
    SzDetailLevel:
      type: string
      description: "Specifies the level of detail for the entity data."
      enum: [ MINIMAL, BRIEF, SUMMARY, VERBOSE ]
      default: VERBOSE
    SzFeatureMode:
      type: string
      description: "Specifies how feature values for entities should be returned."
      enum: [ NONE, REPRESENTATIVE, WITH_DUPLICATES, ATTRIBUTED ]
      default: WITH_DUPLICATES
    SzRelationshipType:
      type: string
      description: "Describes how an entity is related to another."
      enum: [ POSSIBLE_MATCH, POSSIBLE_RELATION, DISCLOSED_RELATION ]

    SzEntityResponse:
      type: object
      description: "The response containing the data for a single resolved entity and its related entities."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzEntityData"
          required:
            - data

    SzEntityData:
      type: object
      description: "The data payload for a response containing a resolved entity and its network of related entities."
      properties:
        resolvedEntity:
          $ref: "#/components/schemas/SzResolvedEntity"
        relatedEntities:
          type: array
          items:
            $ref: "#/components/schemas/SzRelatedEntity"
      required:
        - resolvedEntity
        
    SzRelatedEntity:
      type: object
      description: "Describes an entity that is related to another entity, including how it is related."
      allOf:
        - $ref: "#/components/schemas/SzBaseRelatedEntity"
        - type: object
          properties:
            disclosed:
              type: boolean
              description: "True if the relationship is explicitly disclosed, otherwise false."
            ambiguous:
              type: boolean
              description: "True if the relationship is an ambiguous possible match, otherwise false."
            relationType:
              $ref: "#/components/schemas/SzRelationshipType"

    SzBaseRelatedEntity:
      type: object
      description: "Provides the common fields for a related or matched entity, including the match details."
      allOf:
        - $ref: "#/components/schemas/SzResolvedEntity"
        - type: object
          properties:
            matchLevel:
              type: integer
              format: int32
              nullable: true
              description: "The integer match level describing how the entity matched."
            matchKey:
              type: string
              nullable: true
              description: "The match key describing what features matched."
            resolutionRuleCode:
              type: string
              nullable: true
              description: "The code for the resolution rule that was triggered."

    SzResolvedEntity:
      type: object
      description: "Describes a resolved entity, composed of one or more records."
      properties:
        entityId:
          type: integer
          format: int64
          nullable: true
        entityName:
          type: string
          nullable: true
        bestName:
          type: string
          nullable: true
        records:
          type: array
          items:
            $ref: "#/components/schemas/SzMatchedRecord"
        recordSummaries:
          type: array
          items:
            $ref: "#/components/schemas/SzDataSourceRecordSummary"
        addressData:
          type: array
          items:
            type: string
        characteristicData:
          type: array
          items:
            type: string
        identifierData:
          type: array
          items:
            type: string
        nameData:
          type: array
          items:
            type: string
        phoneData:
          type: array
          items:
            type: string
        relationshipData:
          type: array
          items:
            type: string
        otherData:
          type: array
          items:
            type: string
        features:
          type: object
          description: "A map of feature types to a list of feature values for that type."
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/SzEntityFeature"
        partial:
          type: boolean
          description: "True if the entity data is only partially populated, otherwise false."
        lastSeenTimestamp:
          type: string
          format: date-time
          nullable: true

    SzMatchedRecord:
      type: object
      description: "Describes a record that is a constituent of a resolved entity, including how it matched."
      allOf:
        - $ref: "#/components/schemas/SzEntityRecord"
        - type: object
          properties:
            matchLevel:
              type: integer
              format: int32
              nullable: true
            matchKey:
              type: string
              nullable: true
            resolutionRuleCode:
              type: string
              nullable: true
              
    SzDataSourceRecordSummary:
      type: object
      description: "Provides a summary of how many records from a data source contribute to an entity."
      properties:
        dataSource:
          type: string
        recordCount:
          type: integer
          format: int32
        topRecordIds:
          type: array
          items:
            type: string

    SzEntityFeature:
      type: object
      description: "Describes a feature for an entity, including its primary value and any duplicate values."
      properties:
        primaryId:
          type: integer
          format: int64
          nullable: true
        primaryValue:
          type: string
          nullable: true
        usageType:
          type: string
          nullable: true
        duplicateValues:
          type: array
          items:
            type: string
          uniqueItems: true
        featureDetails:
          type: array
          items:
            $ref: "#/components/schemas/SzEntityFeatureDetail"

    SzEntityFeatureDetail:
      type: object
      description: "Describes the details of a specific feature value, including optional statistics."
      properties:
        internalId:
          type: integer
          format: int64
          nullable: true
        featureValue:
          type: string
        statistics:
          nullable: true
          $ref: "#/components/schemas/SzEntityFeatureStatistics"

    SzEntityFeatureStatistics:
      type: object
      description: "Describes the resolution statistics for a feature value."
      properties:
        usedForCandidates:
          type: boolean
          nullable: true
        usedForScoring:
          type: boolean
          nullable: true
        entityCount:
          type: integer
          format: int64
          nullable: true
        candidateCapReached:
          type: boolean
          nullable: true
        scoringCapReached:
          type: boolean
          nullable: true
        suppressed:
          type: boolean
          nullable: true

    SzAttributeSearchResultType:
      type: string
      description: "Describes how an entity matched the search criteria."
      enum: [ MATCH, POSSIBLE_MATCH, POSSIBLE_RELATION, NAME_ONLY_MATCH ]

    SzAttributeSearchResponse:
      type: object
      description: "The response for an entity search operation."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzAttributeSearchResponseData"
          required:
            - data

    SzAttributeSearchResponseData:
      type: object
      description: "The data payload for an entity search response."
      properties:
        searchResults:
          type: array
          items:
            $ref: "#/components/schemas/SzAttributeSearchResult"
      required:
        - searchResults

    SzAttributeSearchResult:
      type: object
      description: "Describes a single entity that matched the search criteria."
      allOf:
        - $ref: "#/components/schemas/SzBaseRelatedEntity"
        - type: object
          properties:
            resultType:
              $ref: "#/components/schemas/SzAttributeSearchResultType"
            bestNameScore:
              type: integer
              format: int32
              nullable: true
              description: "The best name score between the search criteria and this result."
            featureScores:
              type: object
              description: "A map of feature types to the scores for those features."
              additionalProperties:
                type: array
                items:
                  $ref: "#/components/schemas/SzSearchFeatureScore"
            relatedEntities:
              type: array
              description: "The entities related to this search result."
              items:
                $ref: "#/components/schemas/SzRelatedEntity"

    SzSearchFeatureScore:
      type: object
      description: "Describes the score between a feature from the search criteria and a feature from a candidate entity."
      properties:
        featureType:
          type: string
        inboundFeature:
          type: string
        candidateFeature:
          type: string
        score:
          type: integer
          format: int32
          nullable: true
        nameScoringDetails:
          nullable: true
          $ref: "#/components/schemas/SzNameScoring"
          
    SzNameScoring:
      type: object
      description: "Describes the detailed scoring between two name features."
      properties:
        fullNameScore:
          type: integer
          format: int32
          nullable: true
        surnameScore:
          type: integer
          format: int32
          nullable: true
        givenNameScore:
          type: integer
          format: int32
          nullable: true
        generationScore:
          type: integer
          format: int32
          nullable: true
        orgNameScore:
          type: integer
          format: int32
          nullable: true

    SzEntityIdentifier:
      description: "Identifies an entity, either by its numeric entity ID or by a record ID (which can be a string or a JSON object)."
      oneOf:
        - type: integer
          format: int64
        - $ref: "#/components/schemas/SzRecordId"
        - type: string
          description: "A string-encoded record ID, e.g., ':CUSTOMERS:12345'"

    SzEntityIdentifiers:
      description: "A flexible list of entity identifiers, which can be provided as a JSON array or a comma-separated string."
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/SzEntityIdentifier'
        - type: string
          description: "A comma-separated list of entity identifiers."

    SzEntityPathResponse:
      type: object
      description: "The response containing the path between two entities."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzEntityPathData"
          required:
            - data

    SzEntityPathData:
      type: object
      description: "The data payload for an entity path response, containing the path itself and the data for the entities on the path."
      properties:
        entityPath:
          $ref: "#/components/schemas/SzEntityPath"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/SzEntityData"
      required:
        - entityPath
        - entities

    SzEntityPath:
      type: object
      description: "Describes the path between two entities as a sequence of entity IDs."
      properties:
        startEntityId:
          type: integer
          format: int64
        endEntityId:
          type: integer
          format: int64
        entityIds:
          type: array
          items:
            type: integer
            format: int64
      required:
        - startEntityId
        - endEntityId
        - entityIds

    SzRecordId:
      type: object
      description: "Identifies a record by its data source code and record ID."
      properties:
        src:
          type: string
          description: "The data source code."
        id:
          type: string
          description: "The record ID within the data source."
      required:
        - src
        - id
    
    SzEntityNetworkResponse:
      type: object
      description: "The response containing the network of related entities."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzEntityNetworkData"
          required:
            - data

    SzEntityNetworkData:
      type: object
      description: "The data payload describing an entity network, containing the paths and the entities themselves."
      properties:
        entityPaths:
          type: array
          items:
            $ref: "#/components/schemas/SzEntityPath"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/SzEntityData"
      required:
        - entityPaths
        - entities

    SzMatchLevel:
      type: string
      enum: [ NO_MATCH, RESOLVED, POSSIBLY_SAME, POSSIBLY_RELATED, NAME_ONLY, DISCLOSED ]
    SzRelationDirection:
      type: string
      enum: [ OUTBOUND, INBOUND, BIDIRECTIONAL ]
    SzScoringBucket:
      type: string
      enum: [ NOT_SCORED, SAME, CLOSE, LIKELY, PLAUSIBLE, UNLIKELY, NO_CHANCE ]
    SzScoringFrequency:
      type: string
      enum: [ ALWAYS_ONE, ONE, FEW, MANY, VERY_MANY, NAME ]

    SzWhyEntityResponse:
      type: object
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzWhyEntityResponseData"

    SzWhyEntityResponseData:
      type: object
      properties:
        whyResults:
          type: array
          items:
            $ref: "#/components/schemas/SzWhyEntityResult"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/SzEntityData"
            
    SzWhyEntityResult:
      type: object
      properties:
        perspective:
          $ref: "#/components/schemas/SzWhyPerspective"
        matchInfo:
