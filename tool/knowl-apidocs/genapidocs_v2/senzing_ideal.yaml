    SzAttributeTypesResponseData:
      type: object
      description: "The data payload containing a list of attribute types."
      properties:
        attributeTypes:
          type: array
          items:
            $ref: "#/components/schemas/SzAttributeType"
      required:
        - attributeTypes

    SzAttributeType:
      type: object
      description: "Describes a configured attribute type."
      properties:
        attributeCode:
          type: string
        defaultValue:
          type: string
          nullable: true
        necessity:
          $ref: "#/components/schemas/SzAttributeNecessity"
        attributeClass:
          $ref: "#/components/schemas/SzAttributeClass"
        featureType:
          type: string
          nullable: true
