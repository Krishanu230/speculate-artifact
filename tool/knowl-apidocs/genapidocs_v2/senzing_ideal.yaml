paths:
  /:
    get:
      tags:
        - "Admin"
      summary: "Gets a root-level response from the server. This returns the same as the GET /heartbeat endpoint for now, but may change in the future to provide additional information."
      description: "The root operation can be used to ensure that the HTTP server is indeed running, but this operation does not call upon the underlying native Senzing API and therefore does not ensure the Senzing initialization or configuration is valid."
      operationId: "root"
      parameters: [] # Explicitly empty as confirmed by code
      responses:
        '200':
          description: "Successful response confirming the server is running."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: "#/components/schemas/SzBaseResponse"
        '500':
          description: "An unexpected server error occurred."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: "#/components/schemas/SzErrorResponse"

  /heartbeat:
    get:
      tags:
        - "Admin"
      summary: "Gets a heartbeat from the server to make sure it is up and running."
      description: "The heartbeat operation can be used to ensure that the HTTP server is indeed running. This operation does not call upon the underlying native Senzing API and therefore does not ensure the Senzing initialization or configuration is valid."
      operationId: "heartbeat"
      parameters: []
      responses:
        '200':
          description: "Successful heartbeat response, confirming the server is running."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: "#/components/schemas/SzBaseResponse"
        '500':
          description: "An unexpected server error occurred."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: "#/components/schemas/SzErrorResponse"

  /specifications/open-api:
    get:
      tags:
        - "Admin"
      summary: "Gets this Open API specification to describe the API."
      description: "This operation can be used to obtain the Open API specification in JSON format. The specification can either be the 'data' field of a standard response (i.e.: a response with a 'meta', 'links' and 'data' field) or as raw format where the root JSON document is the Open API specification JSON."
      operationId: "openApiSpecification"
      parameters:
        - name: "asRaw"
          in: "query"
          required: false
          description: "Set to `true` to return the raw OpenAPI specification JSON directly. If `false` (the default), returns a standard SzOpenApiSpecResponse object containing the specification."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the OpenAPI specification."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: "#/components/schemas/SzOpenApiSpecResponseOrRawJson"
  
  /license:
    get:
      tags:
        - "Admin"
      summary: "Get the license information."
      description: "This operation will obtain license information for the underlying native Senzing API."
      operationId: "license"
      parameters:
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the license information."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzLicenseResponse'

  /version:
    get:
      tags:
        - "Admin"
      summary: "Get the full version information."
      description: "This operation will obtain the full version information for the server. Much of the same information is available in the 'meta' segment of every JSON response."
      operationId: "version"
      parameters:
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the version information."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzVersionResponse'

  /data-sources:
    get:
      tags:
        - "Config"
      summary: "Get a list of configured data sources."
      description: "This operation will provide a list of data source codes as well as a list of detailed descriptions of each data source."
      operationId: "getDataSources"
      parameters:
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the list of configured data sources."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzDataSourcesResponse'

  /data-sources/{dataSourceCode}:
    get:
      tags:
        - "Config"
      summary: "Gets the details on the specified data source."
      description: "This operation provides details on a specific data source identified by the data source code in the requested path."
      operationId: "getDataSource"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          description: "The data source code identifying the data source."
          schema:
            type: string
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the details for the specified data source."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzDataSourceResponse'

  /data-sources:
    post:
      tags:
        - "Config"
      summary: "Adds one or more new data sources to the current default configuration and reinitializes with the newly modified configuration."
      description: "Obtains the current default configuration, adds the specified data sources, and sets the modified configuration as the new default configuration, returning the complete set of all configured data sources. New data sources can be specified via the 'dataSource' query parameter and/or the request body."
      operationId: "addDataSources"
      parameters:
        - name: "dataSource"
          in: "query"
          required: false
          description: "A data source code to be created. This parameter can be repeated for multiple data sources. The data source ID will be auto-generated."
          schema:
            type: array
            items:
              type: string
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
      requestBody:
        description: "The data source(s) to create. This can be provided as a single data source descriptor or an array of data source descriptors. A descriptor can be a simple string (data source code) or a full data source object (with code and optional ID)."
        required: false # The body is optional if the query parameter is used
        content:
          "application/json; charset=UTF-8":
            schema:
              oneOf:
                - $ref: "#/components/schemas/SzDataSourceDescriptor"
                - type: array
                  items:
                    $ref: "#/components/schemas/SzDataSourceDescriptor"
          "text/plain; charset=UTF-8": # To handle the unquoted string case
            schema:
              type: string
              description: "A single, unquoted data source code."
      responses:
        '200':
          description: "Successful response containing the complete list of all configured data sources after the additions."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzDataSourcesResponse'

  /data-sources/{dataSourceCode}/records:
    post:
      tags:
        - "Entity Data"
      summary: "Load a new record specified in a data source with either an auto-generated record ID or a RECORD_ID specified in the payload."
      description: "This operation loads a single record using the data source identified by the data source code in the request path. The provided record in the request body is described in JSON using the Senzing Generic Entity Specification. If the record data does not contain a RECORD_ID, one will be automatically generated and returned in the response."
      operationId: "addRecordWithReturnedRecordId"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          description: "The data source code for the record being loaded."
          schema:
            type: string
        - name: "loadId"
          in: "query"
          required: false
          description: "An optional load ID to associate with the loaded record."
          schema:
            type: string
        - name: "withInfo"
          in: "query"
          required: false
          description: "Set to `true` to include entity resolution information in the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. This is only returned if `withInfo` is also `true`. Defaults to `false`."
          schema:
            type: boolean
            default: false
      requestBody:
        description: "The record data as a JSON object, described by the Senzing Generic Entity Specification. The DATA_SOURCE field will be added or validated against the `dataSourceCode` path parameter."
        required: true
        content:
          "application/json":
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: "Successful response containing the record ID of the loaded record and optionally the resolution info."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzLoadRecordResponse'

  /data-sources/{dataSourceCode}/records/{recordId}:
    put:
      tags:
        - "Entity Data"
      summary: "Load a new record or replace a record in a data source with a specific record ID."
      description: "This operation loads a single record using the data source and record ID specified in the request path. If the record already exists, it is replaced. The provided record in the request body is described in JSON using the Senzing Generic Entity Specification."
      operationId: "addRecord"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          description: "The data source code for the record being loaded."
          schema:
            type: string
        - name: "recordId"
          in: "path"
          required: true
          description: "The record ID to assign to the record."
          schema:
            type: string
        - name: "loadId"
          in: "query"
          required: false
          description: "An optional load ID to associate with the loaded record."
          schema:
            type: string
        - name: "withInfo"
          in: "query"
          required: false
          description: "Set to `true` to include entity resolution information in the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. This is only returned if `withInfo` is also `true`. Defaults to `false`."
          schema:
            type: boolean
            default: false
      requestBody:
        description: "The record data as a JSON object, described by the Senzing Generic Entity Specification. The DATA_SOURCE and RECORD_ID fields will be added or validated against the path parameters."
        required: true
        content:
          "application/json":
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: "Successful response containing the record ID of the loaded record and optionally the resolution info."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzLoadRecordResponse'

  /data-sources/{dataSourceCode}/records/{recordId}:
    delete:
      tags:
        - "Entity Data"
      summary: "Delete a record given its data source and record ID."
      description: "This operation deletes a single record identified by the data source code and record ID in the request path. Resolution information about how the deletion affected other entities may be returned if 'withInfo' is set to true."
      operationId: "deleteRecord"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          description: "The data source code for the record being deleted."
          schema:
            type: string
        - name: "recordId"
          in: "path"
          required: true
          description: "The record ID of the record being deleted."
          schema:
            type: string
        - name: "loadId"
          in: "query"
          required: false
          description: "An optional load ID to associate with this deletion operation."
          schema:
            type: string
        - name: "withInfo"
          in: "query"
          required: false
          description: "Set to `true` to include entity resolution information in the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. This is only returned if `withInfo` is also `true`. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response, indicating the record was deleted. May optionally contain resolution info."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzDeleteRecordResponse'

  /data-sources/{dataSourceCode}/records/{recordId}/reevaluate:
    post:
      tags:
        - "Entity Data"
      summary: "Reevaluate a record identified by a data source and record ID."
      description: "This operation reevaluates a single record identified by the data source code and record ID in the request path. Resolution information about how the reevaluation affected other entities may be returned if 'withInfo' is set to true."
      operationId: "reevaluateRecord"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          description: "The data source code for the record being reevaluated."
          schema:
            type: string
        - name: "recordId"
          in: "path"
          required: true
          description: "The record ID of the record being reevaluated."
          schema:
            type: string
        - name: "withInfo"
          in: "query"
          required: false
          description: "Set to `true` to include entity resolution information in the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. This is only returned if `withInfo` is also `true`. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response, indicating the record was reevaluated. May optionally contain resolution info."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzReevaluateResponse'

  /data-sources/{dataSourceCode}/records/{recordId}:
    get:
      tags:
        - "Entity Data"
      summary: "Get an entity record by data source and record ID."
      description: "Gets details on a specific entity record identified by the data source code and record ID specified in the request path."
      operationId: "getRecord"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          description: "The data source code for the requested record."
          schema:
            type: string
        - name: "recordId"
          in: "path"
          required: true
          description: "The record ID for the requested record."
          schema:
            type: string
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the details for the specified record."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzRecordResponse'
  
  /data-sources/{dataSourceCode}/records/{recordId}/entity:
    get:
      tags:
        - "Entity Data"
      summary: "Get a resolved entity by data source and record ID."
      description: "Gets the details on a resolved entity that contains the record identified by the data source code and record ID in the specified request path."
      operationId: "getEntityByRecordId"
      parameters:
        - name: "dataSourceCode"
          in: "path"
          required: true
          schema:
            type: string
        - name: "recordId"
          in: "path"
          required: true
          schema:
            type: string
        - name: "withRaw"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRelated"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzRelationshipMode'
        - name: "forceMinimal"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "detailLevel"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzDetailLevel'
        - name: "featureMode"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzFeatureMode'
        - name: "withFeatureStats"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withInternalFeatures"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the resolved entity data."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzEntityResponse'

  /entities/{entityId}:
    get:
      tags:
        - "Entity Data"
      summary: "Get a resolved entity by entity ID."
      description: "Gets the details on a resolved entity that is identified by the entity ID specified in the request path. NOTE: Entity IDs are transient and may be recycled or repurposed as new records are loaded. An alternative way to identify an entity is by one of its constituent records."
      operationId: "getEntityByEntityId"
      parameters:
        - name: "entityId"
          in: "path"
          required: true
          description: "The unique numeric ID that identifies the entity being requested."
          schema:
            type: integer
            format: int64
        - name: "withRaw"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRelated"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzRelationshipMode'
        - name: "forceMinimal"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "detailLevel"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzDetailLevel'
        - name: "featureMode"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzFeatureMode'
        - name: "withFeatureStats"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withInternalFeatures"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the resolved entity data."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzEntityResponse'

  /entities:
    get:
      tags:
        - "Entity Data"
      summary: "Search for entities that would resolve to or relate to the provided entity features."
      description: "Finds all entities that would resolve or relate to the search candidate features specified by the 'attr' or 'attrs' query parameters. This uses deterministic entity resolution rules, not keyword search."
      operationId: "searchEntitiesByGet"
      parameters:
        - name: "attrs"
          in: "query"
          required: false
          description: "A URL-encoded JSON object describing the entity attributes to search for. If this is provided, the 'attr' parameter is ignored."
          schema:
            type: string
        - name: "attr"
          in: "query"
          required: false
          description: "A repeatable parameter for simple key:value searches (e.g., 'NAME_FULL:Joe Schmoe')."
          schema:
            type: array
            items:
              type: string
        - name: "includeOnly"
          in: "query"
          required: false
          description: "A repeatable parameter to indicate which result types should be included."
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SzAttributeSearchResultType'
        - name: "forceMinimal"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "detailLevel"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzDetailLevel'
        - name: "featureMode"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzFeatureMode'
        - name: "withFeatureStats"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withInternalFeatures"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRelationships"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the search results."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzAttributeSearchResponse'

  /search-entities:
    post:
      tags:
        - "Entity Data"
      summary: "Search for entities that would match or relate to the provided entity features."
      description: "Finds all entities that would resolve or relate to the search candidate features specified in the JSON request body. This is similar to 'GET /entities' but allows for sensitive search criteria to be sent in the request body instead of in the URL."
      operationId: "searchEntitiesByPost"
      parameters:
        - name: "includeOnly"
          in: "query"
          required: false
          description: "A repeatable parameter to indicate which result types should be included."
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SzAttributeSearchResultType'
        - name: "forceMinimal"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "detailLevel"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzDetailLevel'
        - name: "featureMode"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzFeatureMode'
        - name: "withFeatureStats"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withInternalFeatures"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRelationships"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        description: "A JSON object describing the entity attributes to search for, in the same format as an entity record."
        required: true
        content:
          "application/json; charset=UTF-8":
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: "Successful response containing the search results."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzAttributeSearchResponse'

  /reevaluate-entity:
    post:
      tags:
        - "Entity Data"
      summary: "Reevaluate an entity identified by its entity ID."
      description: "Reevaluates an entity identified by the entity ID specified via the 'entityId' query parameter. Resolution information about how the reevaluation affected other entities may be returned if 'withInfo' is set to true."
      operationId: "reevaluateEntity"
      parameters:
        - name: "entityId"
          in: "query"
          required: true
          description: "The entity ID of the entity to reevaluate."
          schema:
            type: integer
            format: int64
        - name: "withInfo"
          in: "query"
          required: false
          description: "Set to `true` to include entity resolution information in the response. Defaults to `false`."
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          description: "Set to `true` to include the raw JSON response from the underlying native API in the `rawData` field of the response. This is only returned if `withInfo` is also `true`. Defaults to `false`."
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response, indicating the entity was reevaluated. May optionally contain resolution info."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzReevaluateResponse'

  /entity-paths:
    get:
      tags:
        - "Entity Graph"
      summary: "Finds a path between two entities identified by entity ID or by data sources and record IDs of constituent records."
      description: "This operation finds the path between two entities and returns a description of that entity path and the entities on the path."
      operationId: "findEntityPath"
      parameters:
        - name: "from"
          in: "query"
          required: true
          description: "The identifier for the starting entity of the path. This can be a numeric entity ID or a string-encoded record identifier."
          schema:
            $ref: '#/components/schemas/SzEntityIdentifier'
        - name: "to"
          in: "query"
          required: true
          description: "The identifier for the ending entity of the path. This must be of the same type as the 'from' parameter."
          schema:
            $ref: '#/components/schemas/SzEntityIdentifier'
        - name: "maxDegrees"
          in: "query"
          required: false
          description: "The maximum number of degrees of separation for the path."
          schema:
            type: integer
            format: int32
            default: 3
            minimum: 1
        - name: "x"
          in: "query"
          required: false
          description: "A repeatable parameter identifying an entity to avoid in the path. This can be a numeric entity ID or a string-encoded record identifier."
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SzEntityIdentifier'
        - name: "avoidEntities"
          in: "query"
          required: false
          description: "A comma-separated or JSON array of entity identifiers to avoid in the path."
          schema:
            $ref: '#/components/schemas/SzEntityIdentifiers'
        - name: "forbidAvoided"
          in: "query"
          required: false
          description: "If true, strictly forbids the 'avoided' entities from the path. If false, they will be avoided if possible but may be included as a last resort."
          schema:
            type: boolean
            default: false
        - name: "s"
          in: "query"
          required: false
          description: "A repeatable parameter specifying a data source code. At least one of the entities in the path must have a record from one of the specified data sources."
          schema:
            type: array
            items:
              type: string
        - name: "forceMinimal"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "detailLevel"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzDetailLevel'
        - name: "featureMode"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzFeatureMode'
        - name: "withFeatureStats"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withInternalFeatures"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the entity path and the data for the entities on the path."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzEntityPathResponse'

  /entity-networks:
    get:
      tags:
        - "Entity Graph"
      summary: "Finds the entity network around one or more entities."
      description: "This operation finds the entity network around one or more specified entities. It attempts to find paths between them and can also 'build out' to find other nearby related entities."
      operationId: "findEntityNetwork"
      parameters:
        - name: "e"
          in: "query"
          required: false
          description: "A repeatable parameter identifying an entity to include in the network. This can be a numeric entity ID or a string-encoded record identifier."
          schema:
            type: array
            items:
              $ref: '#/components/schemas/SzEntityIdentifier'
        - name: "entities"
          in: "query"
          required: false
          description: "A comma-separated or JSON array of entity identifiers to include in the network. Merged with the 'e' parameter."
          schema:
            $ref: '#/components/schemas/SzEntityIdentifiers'
        - name: "maxDegrees"
          in: "query"
          required: false
          description: "The maximum number of degrees for finding paths between the specified entities."
          schema:
            type: integer
            format: int32
            default: 3
            minimum: 0
        - name: "buildOut"
          in: "query"
          required: false
          description: "The number of degrees to 'build out' from the found entities to discover other related entities."
          schema:
            type: integer
            format: int32
            default: 1
            minimum: 0
        - name: "maxEntities"
          in: "query"
          required: false
          description: "The maximum number of entities to return in the network."
          schema:
            type: integer
            format: int32
            default: 1000
            minimum: 0
        - name: "forceMinimal"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "detailLevel"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzDetailLevel'
        - name: "featureMode"
          in: "query"
          required: false
          schema:
            $ref: '#/components/schemas/SzFeatureMode'
        - name: "withFeatureStats"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withInternalFeatures"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
        - name: "withRaw"
          in: "query"
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: "Successful response containing the entity network."
          content:
            "application/json; charset=UTF-8":
              schema:
                $ref: '#/components/schemas/SzEntityNetworkResponse'

