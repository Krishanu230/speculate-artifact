        type: object
        description: "The response containing a single attribute type."
        allOf:
          - $ref: "#/components/schemas/SzResponseWithRawData"
          - type: object
            properties:
              data:
                $ref: "#/components/schemas/SzAttributeTypeResponseData"
            required:
              - data

