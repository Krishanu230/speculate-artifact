        type: object
        description: "The data payload containing a single attribute type."
        properties:
          attributeType:
            $ref: "#/components/schemas/SzAttributeType"
        required:
          - attributeType

    SzConfigResponse:
      type: object
      description: "A response containing a raw JSON configuration in its 'rawData' field."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"

    SzServerInfoResponse:
      type: object
      description: "A response containing the server info."
      allOf:
        - $ref: "#/components/schemas/SzBaseResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzServerInfo"
          required:
            - data

    SzServerInfo:
      type: object
      description: "Provides information about the server's features and current state."
      properties:
        concurrency:
          type: integer
          format: int32
          description: "The number of Senzing worker threads pooled for handling requests."
        activeConfigId:
          type: integer
          format: int64
          description: "The active configuration ID being used by the API server."
        dynamicConfig:
          type: boolean
          description: "Whether the server will automatically pick up the latest default configuration if it changes."
        readOnly:
          type: boolean
          description: "Whether the server was started in read-only mode."
        adminEnabled:
          type: boolean
          description: "Whether admin features (like modifying configuration) are enabled."
        webSocketsMessageMaxSize:
          type: integer
          format: int32
          description: "The maximum size for inbound text or binary messages when using Web Sockets."
        infoQueueConfigured:
          type: boolean
          description: "Whether an asynchronous INFO queue has been configured."
      required:
        - concurrency
        - activeConfigId
        - dynamicConfig
        - readOnly
        - adminEnabled
        - webSocketsMessageMaxSize
        - infoQueueConfigured