      enum: [ REQUIRED, SUFFICIENT, PREFERRED, OPTIONAL ]

    SzAttributeTypesResponse:
      type: object
      description: "The response containing a list of attribute types."
      allOf:
        - $ref: "#/components/schemas/SzResponseWithRawData"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SzAttributeTypesResponseData"
          required:
