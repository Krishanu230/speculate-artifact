openapi: 3.0.1
info:
  title: DataStax Management API for Apache Cassandra - Auth Operations
  description: API for managing user roles and authentication in Apache Cassandra.
  version: v0
servers:
  - url: /
paths:
  /api/v0/ops/auth/role:
    post:
      tags:
        - Auth
      summary: Creates a new user role
      operationId: createRole
      parameters:
        - name: username
          in: query
          required: true
          description: The name of the role to create.
          schema:
            type: string
        - name: is_superuser
          in: query
          required: false
          description: Whether the role has superuser privileges.
          schema:
            type: boolean
            default: false
        - name: can_login
          in: query
          required: false
          description: Whether the role is allowed to log in.
          schema:
            type: boolean
            default: true
        - name: password
          in: query
          required: true
          description: The password for the role.
          schema:
            type: string
      responses:
        "200":
          description: Role created successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        "400":
          description: Bad Request. The username or password was empty.
          content:
            text/plain:
              schema:
                type: string
                examples:
                  UsernameEmpty:
                    value: "Username is empty"
                  PasswordEmpty:
                    value: "Password is empty"
        "500":
          description: Internal Server Error
          content:
            text/plain:
              schema:
                type: string
                example: "Internal connection to Cassandra closed"
  /api/v0/probes/liveness:
    get:
      tags:
        - Probes
      summary: Indicates whether this service is running
      operationId: checkLiveness
      responses:
        '200':
          description: Service is running.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Service is not running or the PID file is unreadable.
  /api/v0/probes/readiness:
    get:
      tags:
        - Probes
      summary: Indicates whether the Cassandra service is ready to service requests
      operationId: checkReadiness
      responses:
        '200':
          description: Service is ready to handle requests.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Service is not ready to handle requests (e.g., cannot query system.local).
  /api/v0/probes/cluster:
    get:
      tags:
        - Probes
      summary: Indicates whether the Cassandra cluster is able to achieve the specified consistency
      operationId: checkClusterConsistency
      parameters:
        - name: consistency_level
          in: query
          description: The consistency level to check. Defaults to LOCAL_QUORUM.
          required: false
          schema:
            type: string
            default: LOCAL_QUORUM
        - name: rf_per_dc
          in: query
          description: The replication factor per data center. Defaults to 3.
          required: false
          schema:
            type: integer
            default: 3
      responses:
        '200':
          description: Cassandra is able to achieve the specified consistency.
        '500':
          description: Cassandra is unable to achieve the specified consistency.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
              example:
                "[-8842966077830801609, -7599446072150209635]":
                  - "2 replicas required, but only 1 nodes in the ring"
  /api/v0/ops/seeds/reload:
    post:
      tags:
        - Operations
      summary: Reload the seed node list from the seed provider
      operationId: seedReload
      responses:
        '200':
          description: List of new seeds after reload.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["127.0.0.1", "127.0.0.2"]
        '500':
          description: Internal Server Error.
  /api/v0/ops/executor/job:
    get:
      tags:
        - Operations
      summary: Returns Job details for the supplied Job ID
      operationId: getJobStatus
      parameters:
        - name: job_id
          in: query
          required: true
          description: The ID of the job to query.
          schema:
            type: string
      responses:
        '200':
          description: Job details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found.
        '500':
          description: Internal Server Error.
  /api/v0/ops/keyspace/cleanup:
    post:
      tags:
        - Keyspace Operations
      summary: Triggers the immediate cleanup of keys no longer belonging to a node
      description: By default, cleans all keyspaces. This operation is blocking and will return the executed job after finishing.
      operationId: cleanup
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        '200':
          description: Job ID for the keyspace cleanup process.
          content:
            text/plain:
              schema:
                type: string
                example: d69d1d95-9348-4460-95d2-ae342870fade
        '500':
          description: Internal Server Error.
  /api/v0/ops/keyspace/refresh:
    post:
      tags:
        - Keyspace Operations
      summary: Load newly placed SSTables to the system without restart
      operationId: refresh
      parameters:
        - name: keyspaceName
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: table
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: SSTables loaded successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Keyspace name or Table name not provided.
          content:
            text/plain:
              schema:
                type: string
                example: Must provide a keyspace name
        '500':
          description: Internal Server Error.
  /api/v0/ops/keyspace/create:
    post:
      tags:
        - Keyspace Operations
      summary: Create a new keyspace with the given name and replication settings
      operationId: createKeyspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrAlterKeyspaceRequest'
      responses:
        '200':
          description: Keyspace created successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Keyspace name or Replication Settings not provided.
          content:
            text/plain:
              schema:
                type: string
                example: "Keyspace creation failed. Non-empty 'keyspace_name' must be provided"
        '500':
          description: Internal Server Error.
  /api/v0/ops/keyspace/alter:
    post:
      tags:
        - Keyspace Operations
      summary: Alter the replication settings of an existing keyspace
      operationId: alterKeyspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrAlterKeyspaceRequest'
      responses:
        '200':
          description: Keyspace Replication Settings altered successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Keyspace name or Replication Settings not provided.
          content:
            text/plain:
              schema:
                type: string
                example: "Altering Keyspace failed. Non-empty 'keyspace_name' must be provided"
        '500':
          description: Internal Server Error.
  /api/v0/ops/keyspace:
    get:
      tags:
        - Keyspace Operations
      summary: List the keyspaces existing in the cluster
      operationId: listKeyspaces
      parameters:
        - name: keyspaceName
          in: query
          required: false
          description: Optional keyspace name to filter by.
          schema:
            type: string
      responses:
        '200':
          description: A list of keyspace names.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: ["system_schema", "system", "system_auth"]
        '500':
          description: Internal Server Error.
  /api/v0/ops/keyspace/replication:
    get:
      tags:
        - Keyspace Operations
      summary: Get the replication settings of an existing keyspace
      operationId: replication
      parameters:
        - name: keyspaceName
          in: query
          required: true
          description: The name of the keyspace.
          schema:
            type: string
      responses:
        '200':
          description: Keyspace Replication Settings.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
              example:
                class: "org.apache.cassandra.locator.SimpleStrategy"
                replication_factor: "2"
        '400':
          description: Keyspace name not provided.
          content:
            text/plain:
              schema:
                type: string
                example: "Get keyspace replication failed. Non-empty 'keyspaceName' must be provided"
        '404':
          description: Keyspace was not found.
          content:
            text/plain:
              schema:
                type: string
                example: "Get keyspace replication failed. Keyspace 'my_keyspace' does not exist."
        '500':
          description: Internal Server Error.
  /api/v0/lifecycle/start:
    post:
      tags:
        - Lifecycle
      summary: Starts the Cassandra/DSE node
      operationId: startNode
      parameters:
        - name: profile
          in: query
          required: false
          description: The configuration profile to use for starting the node.
          schema:
            type: string
        - name: replace_ip
          in: query
          required: false
          description: The IP address of the node to replace.
          schema:
            type: string
            format: ipv4
        - name: replace_consistency
          in: query
          required: false
          description: The consistency level for the replace operation (DSE only).
          schema:
            type: string
      responses:
        '201':
          description: Created. Cassandra started successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '202':
          description: Accepted. Cassandra is already running and can be connected to.
        '204':
          description: No Content. Cassandra is already running but cannot be connected to.
        '206':
          description: Partial Content. Cassandra process was not found, but a connection can be made (stale socket).
        '400':
          description: Bad Request. Invalid parameters provided (e.g., invalid IP format).
          content:
            text/plain:
              schema:
                type: string
                example: "Invalid replace IP passed: 0.0.0.0.0"
        '420':
          description: Method Failure. Cassandra could not start successfully.
          content:
            text/plain:
              schema:
                type: string
                example: "Error starting Cassandra"
        '500':
          description: Server Error. An unexpected error occurred while trying to start Cassandra.
  /api/v0/lifecycle/stop:
    post:
      tags:
        - Lifecycle
      summary: Stops the Cassandra/DSE node
      description: Keeps the node from restarting automatically until /start is called again.
      operationId: stopNode
      responses:
        '200':
          description: OK. Cassandra stopped successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Server Error. Cassandra could not be stopped successfully.
          content:
            text/plain:
              schema:
                type: string
                example: Killing Cassandra Failed
  /api/v0/lifecycle/configure:
    post:
      tags:
        - Lifecycle
      summary: Configure the node with a YAML or JSON payload
      description: "NOTE: This endpoint is hidden from automated spec generation. It accepts either 'application/yaml' or 'application/json'. Will fail if Cassandra is already started."
      operationId: configureNode
      parameters:
        - name: profile
          in: query
          required: true
          description: The name of the configuration profile to create.
          schema:
            type: string
      requestBody:
        description: A YAML or JSON configuration structure.
        required: true
        content:
          application/yaml:
            schema:
              $ref: '#/components/schemas/NodeConfiguration'
          application/json:
            schema:
              $ref: '#/components/schemas/NodeConfiguration'
      responses:
        '200':
          description: OK. Configuration applied successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Bad Request. The profile parameter is missing or the configuration is malformed.
          content:
            text/plain:
              schema:
                type: string
                example: "The profile query parameter is required"
        '406':
          description: Not Acceptable. The node is already running and cannot be configured.
          content:
            text/plain:
              schema:
                type: string
                example: "Cassandra is running, try /api/v0/lifecycle/stop first"
        '500':
          description: Server Error. An IO error occurred while writing configuration files.
  /api/v0/lifecycle/pid:
    get:
      tags:
        - Lifecycle
      summary: Gets the PID of the Cassandra/DSE process
      operationId: getPID
      responses:
        '200':
          description: OK. The Cassandra Process ID.
          content:
            text/plain:
              schema:
                type: string
                example: '12345'
        '204':
          description: No Content. The Cassandra process is not running.
        '500':
          description: Server Error. An error occurred while trying to find the PID.
  /api/v1/ops/node/decommission:
    post:
      tags:
        - V1 Node Operations
      summary: Decommission the node this API is connected to
      description: This invocation returns immediately and provides a job ID for tracking the decommission process.
      operationId: decommission_v1
      parameters:
        - name: force
          in: query
          required: false
          description: Use 'true' to decommission the node forcefully.
          schema:
            type: boolean
            default: false
      responses:
        '202':
          description: Accepted. The decommission job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: 34034d36-3c1e-4bdb-8a8f-f92291a64cb3
        '500':
          description: Internal Server Error.
  /api/v1/ops/node/rebuild:
    post:
      tags:
        - V1 Node Operations
      summary: Rebuild data on this node by streaming from other nodes
      description: This operation returns immediately with a job ID for tracking the rebuild process.
      operationId: rebuild_v1
      parameters:
        - name: src_dc
          in: query
          required: false
          description: The name of the datacenter to stream data from.
          schema:
            type: string
      responses:
        '202':
          description: Accepted. The rebuild job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: 34034d36-3c1e-4bdb-8a8f-f92291a64cb3
        '500':
          description: Internal Server Error.
  /api/v1/ops/node/schema/versions:
    get:
      tags:
        - V1 Node Operations
      summary: Get schema versions from all nodes in the cluster
      description: Provides a map of schema version UUIDs to the list of nodes that have that version. Useful for checking for schema agreement.
      operationId: getSchemaVersions
      responses:
        '200':
          description: A map of schema versions to host IPs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
              example:
                "2207c2a9-f598-3971-986b-2926e09e239d": ["10.244.1.4", "10.244.2.3"]
        '500':
          description: Internal Server Error.
  /api/v0/metadata/versions/release:
    get:
      tags:
        - Metadata
      summary: Returns the Cassandra release version
      operationId: getReleaseVersion
      responses:
        '200':
          description: Cassandra version string.
          content:
            text/plain:
              schema:
                type: string
                example: 4.0.1
        '500':
          description: Internal Server Error.
  /api/v0/metadata/endpoints:
    get:
      tags:
        - Metadata
      summary: "Returns this node's view of the endpoint states of nodes"
      description: "Provides a detailed status of all known endpoints in the cluster, including their liveness, load, rack/DC, and schema version. This is the API equivalent of running 'nodetool status'."
      operationId: "getEndpointStates"
      parameters: []
      responses:
        '200':
          description: "A successful response containing the status of all known endpoints in the cluster."
          content:
            application/json:
              schema:
                type: array
                description: "An array of objects, where each object represents the state of a single node in the cluster."
                items:
                  type: object
                  properties:
                    DC:
                      type: string
                      description: "The datacenter of the node."
                    ENDPOINT_IP:
                      type: string
                      description: "The IP address of the node."
                    HOST_ID:
                      type: string
                      description: "The unique host ID of the node."
                      format: uuid
                    IS_ALIVE:
                      type: string
                      description: "Indicates if the node is considered alive by the gossiper ('true' or 'false')."
                    LOAD:
                      type: string
                      description: "The amount of data on the node, represented as a string."
                    NATIVE_ADDRESS_AND_PORT:
                      type: string
                      description: "The native transport address and port for the node."
                    NET_VERSION:
                      type: string
                      description: "The network protocol version used by the node."
                    RACK:
                      type: string
                      description: "The rack of the node."
                    RELEASE_VERSION:
                      type: string
                      description: "The Cassandra release version of the node."
                    RPC_ADDRESS:
                      type: string
                      description: "The RPC address of the node."
                    RPC_READY:
                      type: string
                      description: "Indicates if the RPC server on the node is ready ('true' or 'false')."
                    SCHEMA:
                      type: string
                      description: "The schema version UUID of the node."
                    SSTABLE_VERSIONS:
                      type: string
                      description: "The SSTable versions present on the node."
                    STATUS:
                      type: string
                      description: "The node's status (e.g., NORMAL, JOINING) and its primary token."
                    STATUS_WITH_PORT:
                      type: string
                      description: "The node's status including the port."
                    TOKENS:
                      type: string
                      description: "A representation of the tokens owned by the node."
              example:
                - DC: "datacenter1"
                  ENDPOINT_IP: "172.17.0.2"
                  HOST_ID: "5d2318b0-cfec-4697-8ed2-014b5f434ae8"
                  IS_ALIVE: "true"
                  LOAD: "135527.0"
                  NATIVE_ADDRESS_AND_PORT: "172.17.0.2:9042"
                  NET_VERSION: "12"
                  RACK: "rack1"
                  RELEASE_VERSION: "4.0.1"
                  RPC_ADDRESS: "172.17.0.2"
                  RPC_READY: "true"
                  SCHEMA: "2207c2a9-f598-3971-986b-2926e09e239d"
                  SSTABLE_VERSIONS: "big-nb"
                  STATUS: "NORMAL,-2444908528344618126"
                  STATUS_WITH_PORT: "NORMAL,-2444908528344618126"
                  TOKENS: "<tokens>"
        '500':
          description: "Internal Server Error. Could not connect to the Cassandra process or an error occurred during the CQL call."
          content:
            text/plain:
              schema:
                type: string
                example: "Internal connection to Cassandra closed"
  /api/v0/metadata/localdc:
    get:
      tags:
        - Metadata
      summary: Returns the DataCenter the local node belongs to
      operationId: getLocalDataCenter
      responses:
        '200':
          description: The name of the local datacenter.
          content:
            text/plain:
              schema:
                type: string
                example: datacenter1
        '500':
          description: Internal Server Error.
  /api/v0/metadata/versions/features:
    get:
      tags:
        - Metadata
      summary: Returns the management-api feature set
      operationId: getFeatureSet
      responses:
        '200':
          description: An object containing version information and a list of available API features.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureSet'
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables/scrub:
    post:
      tags:
        - Table Operations
      summary: Scrub (rebuild sstables for) one or more tables
      operationId: scrub
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrubRequest'
      responses:
        '200':
          description: Table scrub successful.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables/sstables/upgrade:
    post:
      tags:
        - Table Operations
      summary: Rewrite sstables that are not on the current version
      operationId: upgradeSSTables
      parameters:
        - name: excludeCurrentVersion
          in: query
          schema:
            type: boolean
          description: Whether to exclude sstables already on the current version.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        '200':
          description: SSTable upgrade successful.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables/compact:
    post:
      tags:
        - Table Operations
      summary: Force a compaction on one or more tables
      operationId: compact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompactRequest'
      responses:
        '200':
          description: Table compaction successful.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Invalid table compaction request due to conflicting options.
          content:
            text/plain:
              schema:
                type: string
                example: "Invalid option combination: Can not use split-output here"
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables/garbagecollect:
    post:
      tags:
        - Table Operations
      summary: Remove deleted data from one or more tables
      operationId: garbageCollect
      parameters:
        - name: tombstoneOption
          in: query
          schema:
            type: string
            enum: [ROW, CELL]
          description: "Granularity of garbage collection. Defaults to ROW."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        '200':
          description: Table garbage collection successful.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Invalid tombstoneOption provided.
          content:
            text/plain:
              schema:
                type: string
                example: "tombstoneOption must be either ROW or CELL"
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables/flush:
    post:
      tags:
        - Table Operations
      summary: Flush one or more tables
      operationId: flush
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        '200':
          description: Table flush successful.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables:
    get:
      tags:
        - Table Operations
      summary: List the table names in the given keyspace
      operationId: listTables
      parameters:
        - name: keyspaceName
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A list of table names.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["table_1", "table_2"]
        '400':
          description: Keyspace name not provided.
          content:
            text/plain:
              schema:
                type: string
                example: "List tables failed. Non-empty 'keyspaceName' must be provided"
        '500':
          description: Internal Server Error.
  /api/v0/ops/tables/create:
    post:
      tags:
        - Table Operations
      summary: Create a new table in an existing keyspace
      operationId: createTable
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        '200':
          description: Table creation successful.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Table creation failed due to invalid request body.
          content:
            text/plain:
              schema:
                type: string
                example: "Table creation failed: 'table_name' must not be empty"
        '500':
          description: Internal Server Error.
  /api/v1/ops/keyspace/cleanup:
    post:
      tags:
        - V1 Keyspace Operations
      summary: Triggers the immediate cleanup of keys no longer belonging to a node
      description: By default, cleans all keyspaces. This operation is asynchronous and returns immediately with a job ID.
      operationId: cleanup_v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        '200':
          description: OK. Cleanup is not required for system keyspaces.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '202':
          description: Accepted. The cleanup job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: d69d1d95-9348-4460-95d2-ae342870fade
        '500':
          description: Internal Server Error.
  /api/v1/ops/tables/scrub:
    post:
      tags:
        - V1 Table Operations
      summary: Asynchronously scrub (rebuild sstables for) one or more tables
      operationId: scrub
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrubRequest'
      responses:
        '202':
          description: Accepted. The scrub job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: d69d1d95-9348-4460-95d2-ae342870fade
        '500':
          description: Internal Server Error.
  /api/v1/ops/tables/sstables/upgrade:
    post:
      tags:
        - V1 Table Operations
      summary: Asynchronously rewrite sstables that are not on the current version
      operationId: upgradeSSTables
      parameters:
        - name: excludeCurrentVersion
          in: query
          schema:
            type: boolean
          description: Whether to exclude sstables already on the current version.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyspaceRequest'
      responses:
        '202':
          description: Accepted. The SSTable upgrade job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: d69d1d95-9348-4460-95d2-ae342870fade
        '500':
          description: Internal Server Error.
  /api/v1/ops/tables/compact:
    post:
      tags:
        - V1 Table Operations
      summary: Asynchronously force a compaction on one or more tables
      operationId: compact
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompactRequest'
      responses:
        '202':
          description: Accepted. The compaction job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: d69d1d95-9348-4460-95d2-ae342870fade
        '400':
          description: Invalid table compaction request due to conflicting options.
          content:
            text/plain:
              schema:
                type: string
                example: "Invalid option combination: Can not use split-output here"
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/decommission:
    post:
      tags:
        - V0 Node Operations
      summary: Decommission the node this API is connected to
      operationId: decommission
      parameters:
        - name: force
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Cassandra node decommissioned successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/compaction:
    post:
      tags:
        - V0 Node Operations
      summary: Set the MB/s throughput cap for compaction
      operationId: setCompactionThroughput
      parameters:
        - name: value
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Compaction throughput set successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/assassinate:
    post:
      tags:
        - V0 Node Operations
      summary: Forcefully remove a dead node
      operationId: assassinate
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Node assassinated successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Address parameter was not provided.
          content:
            text/plain:
              schema:
                type: string
                example: Address must be provided
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/logging:
    post:
      tags:
        - V0 Node Operations
      summary: Set the log level for a component or class
      operationId: setLoggingLevel
      parameters:
        - name: target
          in: query
          schema:
            type: string
        - name: rawLevel
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Logging level set successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/drain:
    post:
      tags:
        - V0 Node Operations
      summary: Drain the node (flush all tables and stop accepting writes)
      operationId: drain
      responses:
        '200':
          description: Node drained successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/hints/truncate:
    post:
      tags:
        - V0 Node Operations
      summary: Truncate hints on the local node
      operationId: truncateHints
      parameters:
        - name: host
          in: query
          schema:
            type: string
          description: "Optional endpoint address. If omitted, all hints are truncated."
      responses:
        '200':
          description: Hints truncated successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/schema/reset:
    post:
      tags:
        - V0 Node Operations
      summary: Reset the node's local schema and resync
      operationId: resetLocalSchema
      responses:
        '200':
          description: Local schema reset successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/schema/reload:
    post:
      tags:
        - V0 Node Operations
      summary: Reload local node schema from system tables
      operationId: reloadLocalSchema
      responses:
        '200':
          description: Local schema reloaded successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/streaminfo:
    get:
      tags:
        - V0 Node Operations
      summary: Retrieve streaming status information
      operationId: getStreamInfo
      responses:
        '200':
          description: Streaming status information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamingInfo'
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/snapshots:
    get:
      tags:
        - V0 Node Operations
      summary: Retrieve snapshot details
      operationId: getSnapshotDetails
      parameters:
        - name: snapshotNames
          in: query
          schema:
            type: array
            items:
              type: string
        - name: keyspaces
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Snapshot details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotDetails'
        '500':
          description: Internal Server Error.
    post:
      tags:
        - V0 Node Operations
      summary: Take a snapshot
      operationId: takeSnapshot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TakeSnapshotRequest'
      responses:
        '200':
          description: Snapshot created successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Invalid snapshot request due to conflicting parameters.
          content:
            text/plain:
              schema:
                type: string
                example: "When specifying keyspace_tables, specifying keyspaces is not allowed"
        '500':
          description: Internal Server Error.
    delete:
      tags:
        - V0 Node Operations
      summary: Clear snapshots
      operationId: clearSnapshots
      parameters:
        - name: snapshotNames
          in: query
          schema:
            type: array
            items:
              type: string
        - name: keyspaces
          in: query
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Snapshots cleared successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/repair:
    post:
      tags:
        - V0 Node Operations
      summary: Execute a nodetool repair operation
      operationId: repair
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepairRequestV0'
      responses:
        '200':
          description: Nodetool repair executed successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '400':
          description: Repair request is missing the keyspace name.
          content:
            text/plain:
              schema:
                type: string
                example: keyspaceName must be specified
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/fullquerylogging:
    get:
      tags:
        - V0 Node Operations
      summary: Get whether full query logging is enabled
      operationId: isFullQueryLogEnabled
      responses:
        '200':
          description: Full query logging status.
          content:
            application/json:
              schema:
                type: boolean # The structure is complex and depends on BaseEntity
        '500':
          description: Internal Server Error.
    post:
      tags:
        - V0 Node Operations
      summary: Enable or disable full query logging
      operationId: setFullQuerylog
      parameters:
        - name: enabled
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Full query logging set successfully.
          content:
            text/plain:
              schema:
                type: string
                example: OK
        '500':
          description: Internal Server Error.
  /api/v0/ops/node/move:
    post:
      tags:
        - V0 Node Operations
      summary: Move node on the token ring to a new token
      operationId: move
      parameters:
        - name: newToken
          in: query
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted. The node move job was successfully scheduled.
          content:
            text/plain:
              schema:
                type: string
                example: d69d1d95-9348-4460-95d2-ae342870fade
        '400':
          description: The required newToken parameter was not provided.
          content:
            text/plain:
              schema:
                type: string
                example: newToken must be specified
        '500':
          description: Internal Server Error.

components:
  schemas:
    Role:
      type: object
      properties:
        name:
          type: string
          description: The name of the role.
        super:
          type: boolean
          description: Indicates if the role has superuser status.
        login:
          type: boolean
          description: Indicates if the role is allowed to log in.
        datacenters:
          type: string
          description: Associated datacenters.
        options:
          type: string
          description: Additional role options.
    StreamingInfo:
      type: object
      properties:
        entity:
          type: array
          items:
            type: object
            additionalProperties:
              type: array
              items:
                type: object
                additionalProperties:
                  type: string
    SnapshotDetails:
      type: object
      properties:
        entity:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
    TakeSnapshotRequest:
      type: object
      properties:
        snapshot_name:
          type: string
        keyspaces:
          type: array
          items:
            type: string
        table_name:
          type: string
        skip_flush:
          type: boolean
          default: false
        keyspace_tables:
          type: array
          items:
            type: string
    RepairRequestV1: # Renamed to avoid conflict with potential V2 spec
      type: object
      required:
        - keyspace_name
      properties:
        keyspace_name:
          type: string
        tables:
          type: array
          items:
            type: string
        full:
          type: boolean
          default: false
    Compaction:
      type: object
      properties:
        id:
          type: string
        keyspace:
          type: string
        columnfamily:
          type: string
        completed:
          type: integer
          format: int64
        total:
          type: integer
          format: int64
        taskType:
          type: string
        unit:
          type: string
        compactionId:
          type: string
        sstables:
          type: string
        targetDirectory:
          type: string
        operationType:
          type: string
        operationId:
          type: string
        description:
          type: string
    Table:
      type: object
      properties:
        name:
          type: string
        compaction:
          type: object
          additionalProperties:
            type: string
    Job:
      type: "object"
      description: "Represents the status and details of a long-running asynchronous operation."
      properties:
        id:
          type: "string"
          format: "uuid"
          description: "The unique identifier for the job."
          example: "d69d1d95-9348-4460-95d2-ae342870fade"
        type:
          type: "string"
          description: "The type of job being executed."
          example: "decommission"
        status:
          type: "string"
          description: "The current status of the job."
          enum:
            - WAITING
            - COMPLETED
            - ERROR
        submit_time:
          type: "integer"
          format: "int64"
          description: "The timestamp (in milliseconds since epoch) when the job was submitted."
          example: 1639687082845
        end_time:
          type: "integer"
          format: "int64"
          description: "The timestamp (in milliseconds since epoch) when the job finished. Null if not finished."
          nullable: true
          example: 1639687092982
        error:
          type: "string"
          description: "An error message if the job status is ERROR. Null otherwise."
          nullable: true
          example: "java.lang.RuntimeException: Operation failed"
    StatusChange:
      type: object
      properties:
        status:
          type: string
          description: The progress event type.
        change_time:
          type: string
          description: The timestamp (as a string) of the status change.
        message:
          type: string
          description: A descriptive message for the status change.
    KeyspaceRequest:
      type: object
      required:
        - keyspace_name
        - jobs
        - tables
      properties:
        keyspace_name:
          type: string
          description: The name of the keyspace. Use 'NON_LOCAL_STRATEGY' for all non-system keyspaces.
        jobs:
          type: integer
          description: Number of parallel jobs to run. Defaults to 1 if 0 is provided.
        tables:
          type: array
          items:
            type: string
          description: A list of tables to clean. If empty, all tables in the keyspace are cleaned.
    CreateOrAlterKeyspaceRequest:
      type: object
      required:
        - keyspace_name
        - replication_settings
      properties:
        keyspace_name:
          type: string
          description: The name of the keyspace to create or alter.
          minLength: 1
        replication_settings:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ReplicationSetting'
    ReplicationSetting:
      type: object
      required:
        - dc_name
        - replication_factor
      properties:
        dc_name:
          type: string
          description: The name of the data center. For SimpleStrategy, this is 'class'.
        replication_factor:
          type: integer
          description: The number of replicas for the data center.
    RepairRequestV0:
      type: object
      required:
        - keyspace_name
      properties:
        keyspace_name:
          type: string
          description: The keyspace to repair.
        tables:
          type: array
          items:
            type: string
          description: The specific tables to repair within the keyspace.
        full:
          type: boolean
          description: "Specifies whether to perform a full repair. Defaults to false."
          default: false
    FeatureSet:
      type: object
      properties:
        cassandra_version:
          type: string
        mgmt_version:
          type: string
        features:
          type: array
          items:
            type: string
            enum:
              - async_sstable_tasks
              - full_query_logging
              - rebuild
              - async_upgrade_sstable_task
              - async_compaction_task
              - async_scrub_task
              - async_move_task
              - async_gc_task
              - reload_internode_truststore
              - async_flush_task
    MediaType:
      type: object
      properties:
        type:
          type: string
        subtype:
          type: string
        parameters:
          type: object
          additionalProperties:
            type: string
        wildcardType:
          type: string
        wildcardSubtype:
          type: string
    Variant:
      type: object
      properties:
        language:
          type: string
        mediaType:
          $ref: '#/components/schemas/MediaType'
        encoding:
          type: string
        languageString:
          type: string
    ScrubRequest:
      type: object
      required:
        - disable_snapshot
        - skip_corrupted
        - check_data
        - reinsert_overflowed_ttl
        - jobs
        - keyspace_name
        - tables
      properties:
        disable_snapshot:
          type: boolean
        skip_corrupted:
          type: boolean
        check_data:
          type: boolean
        reinsert_overflowed_ttl:
          type: boolean
        jobs:
          type: integer
        keyspace_name:
          type: string
        tables:
          type: array
          items:
            type: string
    CompactRequest:
      type: object
      required:
        - split_output
        - user_defined
        - keyspace_name
      properties:
        split_output:
          type: boolean
        user_defined:
          type: boolean
        start_token:
          type: string
        end_token:
          type: string
        keyspace_name:
          type: string
        user_defined_files:
          type: array
          items:
            type: string
        tables:
          type: array
          items:
            type: string
    CreateTableRequest:
      type: object
      required:
        - keyspace_name
        - table_name
        - columns
      properties:
        keyspace_name:
          type: string
        table_name:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/Column'
        options:
          type: object
          additionalProperties: true
    Column:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          description: "The CQL data type (e.g., 'text', 'int', 'map<text, int>')."
        kind:
          type: string
          enum: [PARTITION_KEY, CLUSTERING_COLUMN, REGULAR, STATIC]
          default: REGULAR
        position:
          type: integer
          description: "The 0-based position for PARTITION_KEY and CLUSTERING_COLUMN kinds."
        order:
          type: string
          enum: [ASC, DESC]
          description: "The clustering order for CLUSTERING_COLUMN kind."
    NodeConfiguration:
      type: object
      description: "The root configuration object."
      required:
        - spec
      properties:
        spec:
          type: object
          required:
            - clusterName
            - config
          properties:
            clusterName:
              type: string
            config:
              type: object
              properties:
                cassandra-yaml:
                  type: object
                  additionalProperties: true
                  description: "Key-value pairs corresponding to settings in cassandra.yaml."
                node-topology:
                  type: object
                  properties:
                    dc:
                      type: string
                    rack:
                      type: string
                jvm-server-options:
                  type: object
                  properties:
                    max_heap_size:
                      type: string
                    heap_new_size:
                      type: string
                    "additional-jvm-opts":
                      type: array
                      items:
                        type: string  