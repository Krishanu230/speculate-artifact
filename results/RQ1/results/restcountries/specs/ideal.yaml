paths:
  /v1/all:
    get:
      summary: Get all countries (v1)
      description: Returns a list of all countries from the v1 dataset.
      operationId: getAllCountries_v1
      tags:
        - v1-country
      responses:
        '200':
          description: A list of all countries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country_v1'
  /v1:
    get:
      summary: Get all countries (v1, alias for /v1/all)
      description: Returns a list of all countries from the v1 dataset. This endpoint is an alias for `/v1/all`.
      operationId: getCountries_v1
      tags:
        - v1-country
      responses:
        '200':
          description: A list of all countries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country_v1'

    post:
      summary: Method Not Allowed (v1)
      description: This method is not allowed for this path and will always return a 405 error.
      operationId: doPOST_v1
      tags:
        - v1-country
      responses:
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/alpha/{alphacode}:
    get:
      summary: Get a country by its alpha code (v1)
      description: Search for a country by its ISO 3166-1 2-letter or 3-letter alpha code.
      operationId: getByAlpha_v1
      tags:
        - v1-country
      parameters:
        - name: alphacode
          in: path
          description: 2 or 3-letter country code
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 3
      responses:
        '200':
          description: The country object was found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country_v1'
        '400':
          description: Bad Request - The provided alpha code is invalid (e.g., length is not 2 or 3).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - The country with the specified alpha code was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/alpha:
    get:
      summary: Get a list of countries by alpha codes (v1)
      description: Search for countries by a semi-colon separated list of ISO 3166-1 2-letter or 3-letter alpha codes.
      operationId: getByAlphaList_v1
      tags:
        - v1-country
      parameters:
        - name: codes
          in: query
          description: A semi-colon separated list of 2 or 3-letter country codes (e.g., "co;no;ee").
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        '200':
          description: An array of country objects. The list can be empty if no countries are found for the given codes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country_v1'
        '400':
          description: Bad Request - The provided 'codes' parameter is malformed or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - No countries were found for the specified codes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error - An unexpected error occurred while processing the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/currency/{currency}:
    get:
      summary: Get countries by currency code (v1)
      description: Search for countries by ISO 4217 currency code.
      operationId: getByCurrency_v1
      tags:
        - v1-country
      parameters:
        - name: currency
          in: path
          description: 3-letter ISO 4217 currency code.
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 3
      responses:
        '200':
          description: An array of country objects that use the specified currency.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country_v1'
        '400':
          description: Bad Request - The provided currency code is invalid (e.g., length is not 3).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found - No countries were found for the specified currency code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error - An unexpected error occurred while processing the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/name/{name}:
    get:
      summary: Get countries by name (v1)
      description: Search for countries by name. Can be a partial name or the full native name.
      operationId: getByName_v1
      tags:
        - v1-country
      parameters:
        - name: name
          in: path
          description: The country's name (or partial name).
          required: true
          schema:
            type: string
        - name: fullText
          in: query
          description: If set to true, searches by the full country name.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: An array of country objects matching the search criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country_v1'
        '404':
          description: Not Found - No countries were found matching the name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error - An unexpected error occurred while processing the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
