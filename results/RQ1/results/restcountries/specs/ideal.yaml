  /contribute:
    post:
      summary: Submit a contribution
      description: Submits a contribution charge via the payment provider.
      operationId: contribute
      tags:
        - contribution
      requestBody:
        description: Contribution details, including amount and payment token.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Contribution'
      responses:
        '202':
          description: Accepted - The contribution has been accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Bad Request - The request body is missing or malformed, or the payment was declined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

