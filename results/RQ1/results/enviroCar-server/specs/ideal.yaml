    get:
      tags:
        - Measurements
      summary: Get a collection of measurements
      description: Retrieves a collection of measurements, with optional spatial, temporal, and pagination filters.
      operationId: getMeasurements
      parameters:
        - name: Range
          in: header
          required: false
          schema:
            type: string
        - name: bbox
          in: query
          description: |-
            A comma-separated list of four coordinates defining a bounding box
            in the format `minLon,minLat,maxLon,maxLat`.
            Example: `7.6,51.9,7.7,52.0`
          schema:
            type: string
            format: bbox
            pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
        - name: nearPoint
          in: query
          description: |-
            A comma-separated list of three values `lon,lat,distance` (in meters)
            defining a point and a radius to search within.
            Example: `7.6,51.9,1000`
          schema:
            type: string
            pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
        - name: after
          in: query
          description: The time instant to be applied with the `after` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: before
          in: query
          description: The time instant to be applied with the `before` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: begins
          in: query
          description: The time instant to be applied with the `begins` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: begunBy
          in: query
          description: The time instant to be applied with the `begunBy` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: contains
          in: query
          description: The time instant to be applied with the `contains` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: during
          in: query
          description: The time instant to be applied with the `during` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: endedBy
          in: query
          description: The time instant to be applied with the `endedBy` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: ends
          in: query
          description: The time instant to be applied with the `ends` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: equals
          in: query
          description: The time instant to be applied with the `equals` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: meets
          in: query
          description: The time instant to be applied with the `meets` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: metBy
          in: query
          description: The time instant to be applied with the `metBy` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: overlapped
          in: query
          description: The time instant to be applied with the `overlapped` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: overlaps
          in: query
          description: The time instant to be applied with the `overlaps` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          description: The maximum number of measurements to return.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: p
          in: query
          required: false
          schema:
            type: integer
            format: int32
        
      responses:
        '200':
          description: A GeoJSON FeatureCollection of measurements matching the query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Measurements'
        '400':
          description: Bad Request. An invalid filter parameter was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
    post:
      summary: "Add a new measurement to a user's collection"
      description: "Creates and stores a new measurement, associating it with the specified user. The measurement must be a valid GeoJSON Feature. The authenticated user must match the user in the path."
      tags:
        - Measurements
        - Users
      operationId: createMeasurementForUser
      security:
        - basicAuth: []
      requestBody:
        description: The measurement to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeasurementCreate'
      responses:
        '201':
          description: "Measurement created successfully. The Location header contains the URL of the new resource."
          headers:
            Location:
              description: The URI of the newly created measurement.
              schema:
                type: string
                format: uri
        '400':
          description: "Bad Request. The request body is malformed or invalid."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
        '401':
          description: "Unauthorized. Authentication is required and has failed or has not yet been provided."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
        '404':
          description: "Not Found. The specified sensor ID in the request body does not exist."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'


