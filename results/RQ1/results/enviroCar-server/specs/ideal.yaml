  /sensors:
    get:
      tags: [Sensors]
      summary: Get sensors
      description: >
        Returns a paginated list of sensors.  
        Supports filtering by `type` **and** by arbitrary key/value pairs that match
        sensor‐specific properties (e.g. `model=ELM327`).
      operationId: getSensors
      parameters:
        - name: type
          in: query
          description: Filter sensors by their type (e.g., 'obd-ii', 'mobile').
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of sensors to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer

        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
      responses:
        '200':
          description: Successful list of sensors
          headers:
            Content-Range:
              description: Pagination info (`items start-end/total`)
              schema: { type: string }
            Link:
              description: Pagination links (`first`, `prev`, `next`, `last`)
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sensors' }
        '206':
          description: Partial list (when `Range` header used)
          headers:
            Content-Range:
              description: Pagination info (`items start-end/total`)
              schema: { type: string }
            Link:
              description: Pagination links
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sensors' }
        '400':
          description: Invalid pagination or filter parameters
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exception' }

