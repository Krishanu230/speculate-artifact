  /termsOfUse:
    get:
      tags: [Legal]
      summary: List versions of the Terms-of-Use (ToU)
      operationId: getTermsOfUse
      description: >
        Returns every published Terms-of-Use document in chronological order
        (newest first).  The server automatically selects the best-matching
        language for the `contents` field based on the client’s
        **Accept-Language** header.
      responses:
        '200':
          description: A collection of Terms-of-Use instances.
          content:
            application/json:
              schema:
                type: object
                required: [termsOfUse]
                properties:
                  termsOfUse:
                    type: array
                    items:
                      $ref: '#/components/schemas/TermsOfUseInstance'
      parameters:
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of items to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
  /termsOfUse/{id}:
    get:
      tags: [Legal]
      summary: Get a specific Terms-of-Use instance
      operationId: getTermsOfUseInstance
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: The requested Terms-of-Use instance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TermsOfUseInstance'
        '404':
          description: No Terms-of-Use instance with the given ID exists.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Exception'}

  /privacyStatements:
    get:
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Maximum number of items to return.
        - name: l
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Same as 'limit' (short form).
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Page number to retrieve.
        - name: p
          in: query
          required: false
          schema:
            type: integer
            format: int32
          description: Same as 'page' (short form).
        - name: Range
          in: header
          required: false
          schema:
            type: string
          description: Use "items=begin-end" for range-based pagination.
      tags: [Legal]
      summary: List versions of the Privacy Statement
      operationId: getPrivacyStatements
      description: Same behaviour as **GET /termsOfUse**, but for privacy policy.
      responses:
        '200':
          description: A collection of Privacy-Statement instances.
          content:
            application/json:
              schema:
                type: object
                required: [privacyStatements]
                properties:
                  privacyStatements:
                    type: array
                    items:
                      $ref: '#/components/schemas/PrivacyStatement'
  
