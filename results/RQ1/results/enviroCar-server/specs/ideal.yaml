          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statistic'

  /privacyStatements/{id}:
    get:
      tags: [Legal]
      summary: Get a specific Privacy-Statement instance
      operationId: getPrivacyStatement
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: The requested Privacy-Statement instance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyStatement'
        '404':
          description: No Privacy-Statement with the given ID exists.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Exception'}

  /resetPassword:
    post:
      tags: [General]
      summary: Request a password-reset code
      description: |
        Sends a verification e-mail/SMS to the given user.  
        Body must contain only the **target user** – no code yet.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '204':
          description: No Content – reset code dispatched

    put:
      tags: [General]
      summary: Confirm password reset
      description: |
        Verifies the **code** and actually resets the password for the
        supplied user.
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetVerification'
      responses:
        '204':
          description: No Content – password was reset

  /statistics:
    get:
      tags: [Statistics]
      summary: Get global statistics
      description: Aggregate min/avg/max values of every phenomenon across **all** data that the caller is allowed to see.
      operationId: getStatistics
      responses:
        '200':
          description: Aggregate statistics for every phenomenon.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Statistics' }

  /statistics/{phen}:
    parameters:
      - name: phen
        in: path
        required: true
        description: The phenomenon name (e.g. `CO_CONC`).
        schema: { type: string }
    get:
      tags: [Statistics]
      summary: Get global statistic for one phenomenon
      operationId: getStatistic
      responses:
        '200':
          description: The statistic object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Statistic' }

components:
  schemas:
    BaseEntity:
      type: object
      description: Base properties for entities that have creation and modification timestamps.
      properties:
        created:
          type: string
          format: date-time
          description: The timestamp of the entity's creation.
          readOnly: true
          nullable: true
        modified:
          type: string
          format: date-time
          description: The timestamp of the entity's last modification.
          readOnly: true
          nullable: true
    
    Counts:
      type: object
      description: A collection of entity counts for the entire database.
      required:
        - activities
        - announcements
        - badges
        - fuelings
        - groups
        - measurements
        - phenomenons
        - privacyStatements
        - sensors
        - statistics
        - termsOfUse
        - tracks
        - users
        - userstatistic
      properties:
        activities:
          type: integer
          format: int64
        announcements:
          type: integer
          format: int64
        badges:
          type: integer
          format: int64
        fuelings:
          type: integer
          format: int64
        groups:
          type: integer
          format: int64
        measurements:
          type: integer
          format: int64
        phenomenons:
          type: integer
          format: int64
        privacyStatements:
          type: integer
          format: int64
        sensors:
          type: integer
          format: int64
        statistics:
          type: integer
          format: int64
        termsOfUse:
          type: integer
          format: int64
        tracks:
          type: integer
          format: int64
        users:
          type: integer
          format: int64
        userstatistic:
          type: integer
          format: int64
    Root:
      type: object
      description: The root document of the API, providing entry points to other resources and entity counts.
      required:
        - api-docs
        - schemas
        - privacyStatements
        - termsOfUse
        - counts
      properties:
        users:
          type: string
          format: uri
        groups:
          type: string
          format: uri
        tracks:
          type: string
          format: uri
        sensors:
          type: string
          format: uri
        phenomenons:
          type: string
          format: uri
        measurements:
          type: string
          format: uri
        statistics:
          type: string
          format: uri
        announcements:
          type: string
          format: uri
        badges:
          type: string
          format: uri
        "api-docs":
          type: string
          format: uri
        schemas:
          type: string
          format: uri
        privacyStatements:
          type: string
          format: uri
        termsOfUse:
          type: string
          format: uri
        counts:
          $ref: '#/components/schemas/Counts'

    Announcement:
      type: object
      description: A system-wide announcement, potentially with language-specific content.
      properties:
        created:
          type: string
          format: date-time
          description: The timestamp of the creation of the announcement.
          nullable: true
        modified:
          type: string
          format: date-time
          description: The timestamp of the last modification of the announcement.
          nullable: true
        id:
          type: string
          description: The unique identifier of the announcement.
          nullable: true
        versions:
          type: string
          description: A string indicating the versions this announcement applies to.
          nullable: true
        category:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        content:
          type: object
          description: A map of language codes (e.g., 'en', 'de') to the announcement's textual content.
          additionalProperties:
            type: string
          nullable: true
    Announcements:
      type: object
      description: A paginated collection of announcements.
      required:
        - announcements
      properties:
        announcements:
          type: array
          items:
            $ref: '#/components/schemas/Announcement'

    Geometry:
      type: object
      description: A GeoJSON Geometry object.
      properties:
        type:
          type: string
          enum: [Point, MultiPoint, LineString, MultiLineString, Polygon, MultiPolygon, GeometryCollection]
        coordinates:
          type: array
      required:
        - type
        - coordinates

    TrackModify:
      type: object
      description: A set of track properties and/or measurements that can be modified.
      minProperties: 1
      properties:
        properties:
          type: object
          description: A container for modifiable track metadata.
          properties:
            name:
              type: string
              description: A new name for the track.
            description:
              type: string
              description: A new description for the track.
            status:
              $ref: '#/components/schemas/TrackStatus'
            sensor:
              type: string
              description: The ID of an existing sensor to associate with this track.
            appVersion:
              type: string
              description: The version of the application that recorded the track.
            obdDevice:
               type: string
               description: The name or identifier of the OBD device used.
            touVersion:
               type: string
               description: The version of the Terms of Use accepted by the user at the time of recording.
            measurementProfile:
               type: string
               description: An identifier for the measurement profile used.
            length:
              type: number
              format: double
        features:
          type: array
          description: A new set of measurements to associate with the track. If provided, this will replace existing measurements.
          items:
            $ref: '#/components/schemas/MeasurementCreate'
        type:
            type: string
            description: GeoJSON object type
            enum:
              - FeatureCollection
    Point:
      type: object
      description: A GeoJSON Point geometry.
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          items:
            type: number
            format: double
          minItems: 2
          maxItems: 3
      required:
        - type
        - coordinates

    Badge:
      type: object
      description: Represents an achievement or milestone a user can earn.
      properties:
        name:
          type: string
          description: The programmatic name of the badge.
          nullable: true
        displayName:
          type: object
          description: A map of language codes to a human-readable name for the badge.
          additionalProperties:
            type: string
          nullable: true
        description:
          type: object
          description: A map of language codes to a human-readable description of the badge.
          additionalProperties:
            type: string
          nullable: true
    Badges:
      type: object
      description: A paginated collection of badges.
      required:
        - badges
      properties:
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'    
          
    Groups:
      type: object
      description: A paginated collection of groups.
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'

    GroupCreate:
      type: object
      description: The properties required to create a new group.
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: The unique name for the new group.
        description:
          type: string
          description: A description for the new group.  

    Group:
      type: object
      description: Represents a user-created group.
      properties:
        name:
          type: string
          description: The unique name of the group.
          nullable: true
        description:
          type: string
          description: A description of the group.
          nullable: true
        owner:
          $ref: '#/components/schemas/User'
          nullable: true
        created:
          type: string
          format: date-time
          description: The timestamp of the group's creation.
          nullable: true
        modified:
          type: string
          format: date-time
          description: The timestamp of the group's last modification.
          nullable: true

    GroupModify:
      type: object
      description: The properties of a group that can be modified.
      properties:
        name:
          type: string
          description: A new unique name for the group.
        description:
          type: string
          description: A new description for the group.

    Gender:
      type: string
      description: The gender of the user.
      enum: [m, f]  

    Users:
      type: object
      description: A paginated collection of users.
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'     
    
    UserCreate:
      type: object
      description: The properties required to create a new user.
      required:
        - name
        - mail
        - token
        - acceptedTermsOfUse
        - acceptedPrivacyStatement
      properties:
        name:
          type: string
          description: The desired username. Must be at least 4 characters long and can contain letters, numbers, hyphens, and underscores.
          pattern: '^[_A-Za-z0-9-]{4,}$'
        mail:
          type: string
          format: email
          description: The user's email address.
        token:
          type: string
          format: password
          description: The user's desired password.
          writeOnly: true
        acceptedTermsOfUse:
          type: boolean
          description: Must be `true` to indicate acceptance of the Terms of Use.
          enum: [true]
        acceptedPrivacyStatement:
          type: boolean
          description: Must be `true` to indicate acceptance of the Privacy Statement.
          enum: [true]
        firstName:
          type: string
        lastName:
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        dayOfBirth:
          type: string
          format: date
        aboutMe:
          type: string
        country:
          type: string
        location:
          $ref: '#/components/schemas/Point'
        language:
          type: string
    
    User:
      type: object
      description: Represents a user of the platform.
      properties:
        name:
          type: string
          description: The unique username.
          nullable: true
        mail:
          type: string
          format: email
          description: The user's email address.
          nullable: true
        created:
          type: string
          format: date-time
          description: The timestamp of the user's account creation.
          nullable: true
        modified:
          type: string
          format: date-time
          description: The timestamp of the user's last profile modification.
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        gender:
          $ref: '#/components/schemas/Gender'
          nullable: true
        dayOfBirth:
          type: string
          format: date
          description: The user's day of birth.
          nullable: true
        aboutMe:
          type: string
          description: A short biography provided by the user.
          nullable: true
        country:
          type: string
          nullable: true
        location:
          $ref: '#/components/schemas/Point'
          nullable: true
        language:
          type: string
          description: The user's preferred language code (e.g., 'en', 'de').
          nullable: true
        badges:
          type: array
          items:
            type: string
          description: A list of badges the user has earned.
          nullable: true
        acceptedTermsOfUseVersion:
          type: string
          description: The version of the Terms of Use the user has accepted.
          nullable: true
        acceptedPrivacyStatementVersion:
          type: string
          description: The version of the Privacy Statement the user has accepted.
          nullable: true

    UserReference:
      type: object
      description: A reference to a user, identified by their unique name.
      required:
        - name
      properties:
        name:
          type: string
          description: The unique name of the user to be added as a member.       

    TrackStatus:
      type: string
      enum: [finished, ongoing]

    Sensor:
      type: object
      description: |-
        Represents the device that generated a measurement or track.
        This can be a physical OBD-II dongle or a virtual sensor like the enviroCar Android app.
      properties:
        type:
          type: string
          description: The type of the sensor (e.g., 'obd-ii', 'mobile').
        properties:
          type: object
          description: >-
            A collection of key-value pairs describing the sensor. Includes
            server-generated read-only properties and user-defined properties.
          properties:
            id:
              type: string
              description: The unique identifier of the sensor.
              readOnly: true
            created:
              type: string
              format: date-time
              description: The time the sensor was created, in ISO 8601 format.
              readOnly: true
            modified:
              type: string
              format: date-time
              description: The time the sensor was last modified, in ISO 8601 format.
              readOnly: true
          additionalProperties: true
      required:
        - type
        - properties
        
    SensorCreate:
      type: object
      description: The sensor to be created.
      properties:
        type:
          type: string
          description: The type of the sensor (e.g., 'obd-ii', 'mobile').
        properties:
          type: object
          description: >-
            An open-ended collection of key-value pairs describing the sensor's properties,
            such as model, manufacturer, or firmware version. The 'id' property is not allowed here.
          additionalProperties: true
      required:
        - type

    TermsOfUse:
      type: object
      description: Paginated collection of all terms-of-use versions.
      required: [versions]
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/TermsOfUseInstance'

    TermsOfUseInstance:
      type: object
      description: One concrete Terms-of-Use document.
      required: [id, issuedDate, contents]
      properties:
        id:            {type: string, description: Stable identifier}
        issuedDate:    {type: string, format: date, description: Publication date}
        contents:      {type: string, description: The text in the preferred language}
        created:       {type: string, format: date-time, nullable: true}
        modified:      {type: string, format: date-time, nullable: true}

    PrivacyStatement:
      allOf:
        - $ref: '#/components/schemas/TermsOfUseInstance'
      description: One concrete Privacy-Statement document.

    PrivacyStatements:
      type: object
      description: Paginated collection of privacy-statement versions.
      required: [versions]
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/PrivacyStatement'

    Sensors:
      type: object
      required: [sensors]
      properties:
        sensors:
          type: array
          items: { $ref: '#/components/schemas/Sensor' }

    Measurement:
      allOf:
          - $ref: '#/components/schemas/BaseEntity'
      type: object
      description: A GeoJSON Feature representing a single measurement point.
      required: [type, properties]
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          $ref: '#/components/schemas/Point'
          nullable: true
        properties:
          type: object
          properties:
            id:
              type: string
            time:
              type: string
              format: date-time
            phenomenons:
              type: object
              description: A map where each key is a phenomenon name and the value is an object containing the measured 'value' and 'unit'.
              additionalProperties:
                $ref: '#/components/schemas/Phenomenon_value'
            # ------- NEW optional fields emitted by the server -------
            sensor:
              $ref: '#/components/schemas/Sensor'
              nullable: true
            user:
              $ref: '#/components/schemas/User'
              nullable: true
            track:
              type: string        # identifier only
              nullable: true

    Measurements:
        type: object
        description: A GeoJSON FeatureCollection of measurements.
        required: [type, features]
        properties:
          type:
            type: string
            enum: [FeatureCollection]
          features:
            type: array
            items:
              $ref: '#/components/schemas/Measurement'
    

    Phenomenon_create_value:
      type: object
      description: The measured value for a phenomenon.
      required:
        - value
      properties:
        value:
          description: The measured value, which can be a number, boolean, or string.
          oneOf:
            - type: number
            - type: boolean
            - type: string
                
    MeasurementCreate:
      type: object
      description: A GeoJSON Feature representing a new measurement to be created.
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          $ref: '#/components/schemas/Point'
        properties:
          type: object
          properties:
            time:
              type: string
              format: date-time
            sensor:
              type: string
              description: The ID of the sensor that produced this measurement.
            phenomenons:
              type: object
              description: A map of phenomenon names to their measured values.
              additionalProperties:
                $ref: '#/components/schemas/Phenomenon_create_value'
        required:
          - type
          - geometry
          - properties

    Statistic:
      type: object
      description: A statistical summary for a particular phenomenon.
      required:
        - phenomenon
        - min
        - max
        - avg
        - measurements
        - tracks
        - users
        - sensors
      properties:
        phenomenon:
          $ref: '#/components/schemas/Phenomenon'
        min:
          type: number
          format: double
          description: The minimum value recorded for the phenomenon.
        max:
          type: number
          format: double
          description: The maximum value recorded for the phenomenon.
        avg:
          type: number
          format: double
          description: The mean (average) value recorded for the phenomenon.
        measurements:
          type: integer
          format: int64
          description: The total number of measurements included in this statistic.
        tracks:
          type: integer
          format: int64
          description: The total number of unique tracks included in this statistic.
        users:
          type: integer
          format: int64
          description: The total number of unique users included in this statistic.
        sensors:
          type: integer
          format: int64
          description: The total number of unique sensors included in this statistic.

    Statistics:
      type: object
      description: A collection of statistical summaries.
      properties:
        statistics:
          type: array
          items:
            $ref: '#/components/schemas/Statistic'
      required:
        - statistics
   
    Activity:
      type: object
      description: Represents a single event that occurred on the platform.
      additionalProperties: false 
      properties:
        time:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/ActivityType'
        user:
          $ref: '#/components/schemas/User'
        group:
          $ref: '#/components/schemas/Group'
        other:
          $ref: '#/components/schemas/User'
          description: The other user involved in a user-to-user activity (e.g., the friend in a FRIENDED_USER activity).
        track:
          $ref: '#/components/schemas/Track'

    Activities:
      type: object
      required:
        - activities
      additionalProperties: false 
      properties:
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'

    ActivityType:
      type: string
      enum:
        - CHANGED_PROFILE
        - CREATED_GROUP
        - CHANGED_GROUP
        - JOINED_GROUP
        - LEFT_GROUP
        - DELETED_GROUP
        - FRIENDED_USER
        - UNFRIENDED_USER
        - CREATED_TRACK
        
    Track:
      allOf:
        - $ref: '#/components/schemas/BaseEntity' # Inherits created, modified
      type: object
      description: A track, represented as a GeoJSON FeatureCollection.
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        properties:
          type: object
          properties:
            id:
              type: string
              description: The unique identifier of the track.
              readOnly: true
            name:
              type: string
              description: A user-defined name for the track.
            description:
              type: string
              description: A user-defined description of the track.
            user:
              $ref: '#/components/schemas/User' # Will define User schema later
            sensor:
              $ref: '#/components/schemas/Sensor'
            status:
              $ref: '#/components/schemas/TrackStatus'
            length:
              type: number
              format: double
              description: The calculated length of the track in meters.
              readOnly: true
            begin:
              type: string
              format: date-time
              description: The timestamp of the first measurement in the track.
              readOnly: true
            end:
              type: string
              format: date-time
              description: The timestamp of the last measurement in the track.
              readOnly: true
            appVersion:
              type: string
              description: The version of the application that recorded the track.
            obdDevice:
               type: string
               description: The name or identifier of the OBD device used.
            touVersion:
               type: string
               description: The version of the Terms of Use accepted by the user at the time of recording.
            measurementProfile:
               type: string
               description: An identifier for the measurement profile used.
        features:
          type: array
          description: An array of measurement features that make up the track.
          items:
            $ref: '#/components/schemas/Measurement' # Will define full Measurement schema later
      required:
        - type
        - properties
        - features

    Tracks:
      type: object
      description: A collection of tracks.
      required:
        - tracks
      properties:
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'

    UserModify:
      type: object
      description: A set of user properties that can be modified. All properties are optional.
      properties:
        name:
          type: string
          description: A new unique username.
        mail:
          type: string
          format: email
          description: A new email address for the user.
        token:
          type: string
          description: The user's password.
        aboutMe:
          type: string
        country:
          type: string
        dayOfBirth:
          type: string
          format: date
        firstName:
          type: string
        lastName:
          type: string
        language:
          type: string
        acceptedTermsOfUse:
          type: boolean
        acceptedPrivacyStatement:
          type: boolean
        acceptedTermsOfUseVersion:
          type: string
        acceptedPrivacyStatementVersion:
          type: string
        location:
          $ref: '#/components/schemas/Geometry'
        gender:
          $ref: '#/components/schemas/Gender'
        url:
          type: string
          format: uri

    Exception:
      type: object
      description: A standard error response object.
      required:
        - statusCode
        - reasonPhrase
      properties:
        statusCode:
          type: integer
          description: The HTTP status code.
          example: 400
        reasonPhrase:
          type: string
          description: The reason phrase for the HTTP status code.
          example: "Bad Request"
        message:
          type: string
          description: A human-readable error message.
          nullable: true
        details:
          type: object
          description: An optional object providing more specific details about the error.
          nullable: true
        stackTrace:
          $ref: '#/components/schemas/StackTrace'
          nullable: true

    StackTraceElement:
      type: string
      example: "org.envirocar.server.rest.resources.AnnouncementsResource.announcements(AnnouncementsResource.java:35)"

    DimensionedNumber:
      type: object
      description: A number with a unit of measurement.
      properties:
        value:
          type: number
          description: The numerical value.
        unit:
          type: string
          description: The unit of measurement.
      required:
        - value
        - unit
        
    Fueling:
      type: object
      properties:
        id:               { type: string }
        fuelType:         { type: string }
        comment:          { type: string }
        car:              { $ref: '#/components/schemas/Sensor' }
        user:             { $ref: '#/components/schemas/User' }
        cost:             { $ref: '#/components/schemas/DimensionedNumber' }
        mileage:          { $ref: '#/components/schemas/DimensionedNumber' }
        volume:           { $ref: '#/components/schemas/DimensionedNumber' }
        time:             { type: string, format: date-time }
        missedFuelStop:   { type: boolean }
        partialFueling:   { type: boolean }
        created:          { type: string, format: date-time }
        modified:         { type: string, format: date-time }

    Fuelings:
      type: object
      required: [fuelings]
      properties:
        fuelings:
          type: array
          items: { $ref: '#/components/schemas/Fueling' }

    FuelingCreate:
      allOf:
        - $ref: '#/components/schemas/Fueling'
        - type: object
          required: [fuelType, car, cost, mileage, volume, time]
          
    PasswordResetRequest:
      description: “Please send me a reset code.”
      type: object
      required: [user]
      properties:
        user:
          type: object
          required:
            - name
            - mail
          properties:
            name:
              type: string
              description: The username of the account.
            mail:
              type: string
              format: email
              description: The email address associated with the account.

    PasswordResetVerification:
      type: object
      description: The payload to finalize a password reset.
      required:
        - user
        - code
      properties:
        user:
          type: object
          required:
            - name
            - token
          properties:
            name:
              type: string
              description: The username of the account.
            token:
              type: string
              format: password
              writeOnly: true
              description: The new password for the account.
        code:
          type: string
          description: The verification code received via email.


    TrackCreate:
      type: object
      description: A track, represented as a GeoJSON FeatureCollection. The track's measurements are the Features in the 'features' array.
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        properties:
          type: object
          properties:
            name:
              type: string
              description: A user-defined name for the track.
            description:
              type: string
              description: A user-defined description of the track.
            sensor:
              type: string
              description: The ID of an existing sensor to associate with this track.
            status:
              $ref: '#/components/schemas/TrackStatus'
            appVersion:
              type: string
              description: The version of the application that recorded the track.
            obdDevice:
               type: string
               description: The name or identifier of the OBD device used.
            touVersion:
               type: string
               description: The version of the Terms of Use accepted by the user at the time of recording.
            measurementProfile:
               type: string
               description: An identifier for the measurement profile used.
            length:
                      type: number
                      format: double
                      description: precomputed length of the track
          required:
            - sensor
        features:
          type: array
          description: An array of measurement features that make up the track.
          items:
            $ref: '#/components/schemas/MeasurementCreate'
      required:
        - type
        - properties
        - features
    
    Phenomenon:
      allOf:
        - $ref: '#/components/schemas/BaseEntity' # inherits 'created' and 'modified'
      type: object
      properties:
        name:
          type: string
        unit:
          type: string
      required:
        - name
        - unit

    # The schema for the 'phenomenons' object in a request body
    Phenomenon_create:
      type: object
      description: The phenomenon to be created.
      properties:
        name:
          type: string
          description: The unique name for the new phenomenon.
        unit:
          type: string
          description: The unit of measurement for the new phenomenon.
      required:
        - name
        - unit
        - value

    Phenomenons:
      type: object
      description: A collection of phenomenon resources.
      properties:
        phenomenons:
          type: array
          items:
            $ref: '#/components/schemas/Phenomenon'
      required:
        - phenomenons

    StackTrace:
      type: object
      properties:
        type:
          type: string
          description: The fully qualified name of the Java exception class.
        message:
          type: string
          description: The message associated with the exception, if any.
          nullable: true
        at:
          type: array
          description: An array of stack trace elements.
          items:
            $ref: '#/components/schemas/StackTraceElement'
        suppressed:
          type: array
          description: An array of suppressed exceptions.
          items:
            $ref: '#/components/schemas/StackTrace'
          nullable: true
        causedBy:
          $ref: '#/components/schemas/StackTrace'
          nullable: true
        circularReference:
          description: Indicates a circular reference was detected in the exception chain.
          $ref: '#/components/schemas/StackTrace'
          nullable: true