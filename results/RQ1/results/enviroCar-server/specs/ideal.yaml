  /users:
    get:
      tags: [ Users ]
      summary: List users
      description: Retrieve a paginated list of user profiles.
      operationId: getUsers
      parameters:
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of users to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
      responses:
        '200':
          description: Complete user list (or first page if Range used).
