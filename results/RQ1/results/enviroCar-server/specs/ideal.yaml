      responses:
        '200':
          description: OK – an array wrapper object containing friend profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '403':
          description: Caller is not allowed to see the friend list.
        '404':
          description: The **username** does not exist.

    post:
      tags: [Users, Friends]
      summary: Send a friend request
      description: |
        Creates an *outgoing* friend request from the authenticated caller
        to **{username}**.  
        The body must supply the *target* user name (`UserReference`),
        **and it MUST NOT equal the caller’s own name** – the code throws
        `BadRequestException` otherwise.
      operationId: addFriend
      security: [{ basicAuth: [] }]
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserReference'
      responses:
        '204':
          description: Request queued (no body).
        '400':
          description: Body is missing or references the caller himself / herself.
        '401':
          description: Caller is unauthenticated.
        '403':
          description: Caller is not allowed to befriend the target user.
        '404':
          description: Target user not found.

  /users/{username}/friends/{friendUsername}:
    delete:
      tags: [Users, Friends]
      summary: Remove a friend (un-friend)
      operationId: deleteFriend
      security: [{ basicAuth: [] }]
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
        - name: friendUsername
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Friendship removed.
        '401':
          description: Caller unauthenticated.
        '403':
          description: Caller not permitted to unfriend.
        '404':
          description: Relationship does not exist.

  /users/{username}/friends/incomingRequests:
    get:
      tags: [Users, Friends]
      summary: List incoming friend requests
      operationId: getIncomingFriendRequests
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Users that **{username}** still has to accept or decline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '403': { description: Not allowed }
        '404': { description: User not found }

  /users/{username}/friends/outgoingRequests:
    get:
      tags: [Users, Friends]
      summary: List outgoing friend requests
      operationId: getOutgoingFriendRequests
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Users to whom **{username}** has sent a request that is still pending.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '403': { description: Not allowed }
        '404': { description: User not found }

  /users/{username}/friends/declineRequest:
    post:
      tags: [Users, Friends]
      summary: Decline an incoming friend request
      operationId: declineFriendRequest
      security: [{ basicAuth: [] }]
      parameters:
        - name: username
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserReference'
      responses:
        '204':
          description: Request declined (or relationship removed if it already existed).
        '401': { description: Unauthenticated }
        '404': { description: Requesting user not found }

  /users/{username}/fuelings:
    parameters:
      - name: username
        in: path
        required: true
        description: The user that owns the fuel-log entries.
        schema: { type: string }
    get:
      tags: [Users, Fuelings]
      summary: List a user’s fuelings
      description: Paginated list of fuel stops recorded by **{username}**.
      operationId: getUserFuelings
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user.
          schema:
            type: string
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of fuelings to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
        - name: after
          in: query
          description: The time instant to be applied with the `after` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: before
          in: query
          description: The time instant to be applied with the `before` operator. Must be a single ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: begins
          in: query
          schema: { type: string, format: date-time }
        - name: begunBy
          in: query
          schema: { type: string, format: date-time }
        - name: contains
          in: query
          schema: { type: string, format: date-time }
        - name: during
          in: query
          schema: { type: string, format: date-time }
        - name: endedBy
          in: query
          schema: { type: string, format: date-time }
        - name: ends
          in: query
          schema: { type: string, format: date-time }
        - name: equals
          in: query
          schema: { type: string, format: date-time }
        - name: meets
          in: query
          schema: { type: string, format: date-time }
        - name: metBy
          in: query
          schema: { type: string, format: date-time }
        - name: overlapped
          in: query
          schema: { type: string, format: date-time }
        - name: overlaps
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Full list (or first page when `Range` omitted).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Fuelings' }
        '206':
          description: Partial list when `Range` header supplied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Fuelings' }

    post:
      tags: [Users, Fuelings]
      summary: Create a fueling entry
      operationId: createFueling
      security: [{ basicAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FuelingCreate' }
      responses:
        '201':
          description: Created – `Location` contains `/users/{username}/fuelings/{id}`.
          headers:
            Location:
              description: Canonical URL of the new fueling entry.
              schema: { type: string, format: uri }
        '400':
          description: Validation error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exception' }
        '401':
          description: Authentication required.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exception' }

  /users/{username}/fuelings/{id}:
    parameters:
      - name: username
        in: path
        required: true
        schema: { type: string }
      - name: id
        in: path
        required: true
        description: Fueling identifier.
        schema: { type: string }
    get:
      tags: [Users, Fuelings]
      summary: Get a single fueling
      operationId: getFueling
      responses:
        '200':
          description: The fueling entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Fueling' }

    delete:
      tags: [Users, Fuelings]
      summary: Delete a fueling
      operationId: deleteFueling
      security: [{ basicAuth: [] }]
      responses:
        '204':
          description: No Content – entry deleted.


  /users/{username}/groups:
    parameters:
        - name: username
          in: path
          required: true
          description: The name of the user who will own the group.
          schema:
            type: string
    get:
      tags: [ Users, Groups ]
      summary: Get the groups of a specific user
      description: Paginated list of groups that the given user belongs to.
      operationId: getGroupsOfUser
      parameters:
        - name: q
          in: query
          description: A search term to filter groups by name or description.
          schema:
            type: string
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of groups to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
      responses:
        '200':
          description: List of the user’s groups
          headers:
            Content-Range: { $ref: '#/components/headers/Content-Range' }
            Link:          { $ref: '#/components/headers/Link' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Groups' }
        '206':
          description: Partial list (pagination)
          headers:
            Content-Range: { $ref: '#/components/headers/Content-Range' }
            Link:          { $ref: '#/components/headers/Link' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Groups' }
    post:
      tags:
        - Users
        - Groups
      summary: Create a group for a user
      description: Creates a new group owned by the specified user.
      operationId: createUserGroup
      security:
        - basicAuth: []
      requestBody:
        description: The details of the group to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '201':
          description: Group created successfully. The Location header contains the URL of the new group.
          headers:
            Location:
              description: The URL of the newly created group.
              schema:
                type: string
                format: uri

  /users/{username}/groups/{group}:
    get:
      tags:
        - Users
        - Groups
      summary: Get a specific group of a user
      description: Retrieves the details of a specific group that belongs to a user.
      operationId: getUserGroup
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user.
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: The name of the group to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: The requested group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
    put:
      tags:
        - Users
        - Groups
      summary: Modify a group
      description: Modifies the properties of a group. The user must be the owner of the group.
      operationId: modifyUserGroup
      security:
        - basicAuth: []
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user who owns the group.
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: The name of the group to modify.
          schema:
            type: string
      requestBody:
        description: The properties of the group to modify.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupModify'
      responses:
        '204':
          description: Group modified successfully.
        '303':
          description: See Other. Returned if the group's name was changed, redirecting to the new URL.
          headers:
            Location:
              description: The new URL of the group.
              schema:
                type: string
                format: uri

    delete:
      tags:
        - Users
        - Groups
      summary: Delete a group
      description: Deletes a group. The user must be the owner of the group.
      operationId: deleteUserGroup
      security:
        - basicAuth: []
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user who owns the group.
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: The name of the group to delete.
          schema:
            type: string
      responses:
        '204':
          description: Group deleted successfully.

  /users/{username}/groups/{group}/activities:
    get:
      tags:
        - Users
        - Groups
      summary: Get group activities
      description: Retrieves the activity stream for a specific group.
      operationId: getUserGroupActivities
      parameters:
        - name: group
          in: path
          required: true
          description: The name of the user who will own the group.
          schema:
            type: string
        - name: username
          in: path
          required: true
          description: The name of the user.
          schema:
            type: string
        - name: type
          in: query
          description: Filter activities by a specific type.
          schema:
            type: string
            enum:
              - CHANGED_PROFILE
              - CREATED_GROUP
              - CHANGED_GROUP
              - JOINED_GROUP
              - LEFT_GROUP
              - DELETED_GROUP
              - FRIENDED_USER
              - UNFRIENDED_USER
              - CREATED_TRACK
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of activities to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
      responses:
        '200':
          description: A list of activities for the group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activities'

  /users/{username}/groups/{group}/activities/{id}:
    get:
      tags:
        - Users
        - Groups
      summary: Get a specific group activity
      description: Retrieves a single activity by its ID from a group's activity stream.
      operationId: getUserGroupActivityById
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user.
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: The name of the group.
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: The ID of the activity to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: The requested activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'

  /users/{username}/groups/{group}/members:
    get:
      tags:
        - Users
        - Groups
      summary: Get group members
      description: Retrieves a list of all members of a specific group.
      operationId: getGroupMembersForUser
      parameters:
          - name: username
            in: path
            required: true
            schema:
              type: string
            description: The username of the user.
          - name: group
            in: path
            required: true
            schema:
              type: string
            description: The name of the group.
          - name: Range
            in: header
            required: false
            schema:
              type: string
            description: Used for range-based pagination (e.g. "items=0-99").
          - name: page
            in: query
            required: false
            schema:
              type: integer
              format: int32
              default: 1
            description: The (1-based) page number, for page-based pagination.
          - name: limit
            in: query
            required: false
            schema:
              type: integer
              format: int32
              default: 100
            description: Maximum number of items to retrieve per page.
          - name: p
            in: query
            required: false
            schema:
              type: integer
              format: int32
              default: 1
            description: Alias for "page".
          - name: l
            in: query
            required: false
            schema:
              type: integer
              format: int32
              default: 100
            description: Alias for "limit".
        
      responses:
        '200':
          description: A list of users who are members of the group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'

    post:
      tags:
        - Users
        - Groups
      summary: Add a member to a group
      description: Adds a user as a member to a group. The authenticated user is the one being added.
      operationId: addGroupMemberForUser
      security:
        - basicAuth: []
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user context (must match the authenticated user being added).
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: The name of the group to join.
          schema:
            type: string
      requestBody:
        description: The name of the user to add as a member. The name in the body must match the authenticated user.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserReference'
      responses:
        '204':
          description: Member added successfully.

  /users/{username}/groups/{group}/members/{member}:
    delete:
      tags:
        - Users
        - Groups
      summary: Remove a member from a group
      description: Removes a user from a group. The authenticated user must be the user being removed.
      operationId: removeGroupMemberForUser
      security:
        - basicAuth: []
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user context.
          schema:
            type: string
        - name: group
          in: path
          required: true
          description: The name of the group to leave.
          schema:
            type: string
        - name: member
          in: path
          required: true
          description: The name of the member to remove (must match the authenticated user).
          schema:
            type: string
      responses:
        '204':
          description: Member removed successfully.

