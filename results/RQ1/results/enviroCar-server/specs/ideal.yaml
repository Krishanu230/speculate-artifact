paths:
  /:
    get:
      tags:
        - General
      summary: Get the root index.
      description: Get the root index.
      operationId: getRoot
      responses:
        '200':
          description: The root document of the API, providing entry points to other resources and entity counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Root'
  
  /api-docs:
    get:
      tags:
        - General
      summary: Get the OpenAPI specification of this service.
      description: Get the OpenAPI specification of this service.
      operationId: getApiDocs
      responses:
        '200':
          description: The OpenAPI 3.0 specification for this service. The server URL is dynamically added.
          content:
            application/json:
              schema:
                type: object
                description: A valid OpenAPI 3.0 specification document.
            text/yaml:
              schema:
                type: object
                description: A valid OpenAPI 3.0 specification document.
        '307':
          description: Temporary redirect to the HTML user interface for the API documentation. This is triggered when the client's Accept header prefers 'text/html'.
          headers:
            Location:
              schema:
                type: string
                format: uri
  /api-docs/{file}:
    get:
      tags:
        - General
      summary: Get a static asset for the API documentation UI.
      description: Serves static files like CSS, JavaScript, and images required for the API's interactive documentation UI.
      operationId: getApiDocsFile
      parameters:
        - name: file
          in: path
          required: true
          description: The name of the static file to retrieve (e.g., 'index.html', 'swagger-ui.css').
          schema:
            type: string
      responses:
        '200':
          description: OK. The requested static asset is returned. The Content-Type header will vary based on the file's extension (e.g., text/html, text/css, image/png).
          content:
            '*/*': 
              schema:
                type: string
                format: binary
        '303':
          description: See Other. Returned if the 'file' path parameter is empty, redirecting the client to the 'index.html' file.
          headers:
            Location:
              description: The target URL for the redirect.
              schema:
                type: string
                format: uri
        '404':
          description: Not Found. The requested file does not exist on the server.

  /announcements:
    get:
      tags:
        - Announcements
      summary: Get the list of announcements.
      description: Get a paginated list of all available announcements.
      operationId: getAnnouncements
      parameters:
        - name: limit
          in: query
          description: The number of entities per page.
          schema:
            type: integer
            default: 100
            minimum: 1
        - name: page
          in: query
          description: The page of entities to request.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: Range
          in: header
          description: An alternative to 'limit' and 'page' for pagination, using a range of items (e.g., 'items=0-99').
          schema:
            type: string
            pattern: "^items=\\d+-\\d+$"
      responses:
        '200':
          description: A successful response returning a list of announcements.
          headers:
            Content-Range:
              description: Indicates the range of items returned and the total number of items.
              schema:
                type: string
            Link:
              description: Contains links for pagination (first, prev, next, last).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcements'
        '206':
          description: Partial Content. A successful response returning a partial list of announcements as specified by the Range header.
          headers:
            Content-Range:
              description: Indicates the range of items returned and the total number of items.
              schema:
                type: string
            Link:
              description: Contains links for pagination (first, prev, next, last).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcements'
        '400':
          description: Bad Request. The request was malformed, e.g., due to invalid pagination parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception' # Assuming we create a standard exception schema
  /badges:
    get:
      tags:
        - Badges
      summary: Get the list of badges.
      description: Get a paginated list of all available achievement badges.
      operationId: getBadges
      parameters:
        - name: Range
          in: header
          required: false
          description: 'Optional HTTP Range header in the format "items=start-end" to request a specific range of badge items.

            '
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: 'Optional query parameter. If set, overrides the default maximum number  of items per page (default 100).

            '
          schema:
            type: integer
            format: int32
        - name: l
          in: query
          required: false
          description: 'Synonym for "limit". If both "limit" and "l" are set, the first  recognized parameter by the server is used.

            '
          schema:
            type: integer
            format: int32
        - name: page
          in: query
          required: false
          description: 'Optional query parameter. If set, determines which page of items to return  (default 1).

            '
          schema:
            type: integer
            format: int32
        - name: p
          in: query
          required: false
          description: 'Synonym for "page". If both "page" and "p" are set, the first  recognized parameter by the server is used.

            '
          schema:
            type: integer
            format: int32
        
      responses:
        '200':
          description: A successful response returning a list of badges.
          headers:
            Content-Range:
              description: Indicates the range of items returned and the total number of items.
              schema:
                type: string
            Link:
              description: Contains links for pagination (first, prev, next, last).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Badges'
        '206':
          description: Partial Content. A successful response returning a partial list of badges as specified by the Range header.
          headers:
            Content-Range:
              description: Indicates the range of items returned and the total number of items.
              schema:
                type: string
            Link:
              description: Contains links for pagination (first, prev, next, last).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Badges'
        '400':
          description: Bad Request. The request was malformed, e.g., due to invalid pagination parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
  /announcements/{id}:
    get:
      tags:
        - Announcements
      summary: Get a specific announcement by its ID.
      description: Retrieves a single announcement entity identified by its unique ID.
      operationId: getAnnouncementById
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the announcement.
          schema:
            type: string
      responses:
        '200':
          description: The requested announcement was found and is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '404':
          description: The announcement with the specified ID was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
  /confirm/{code}:
      get:
        tags:
          - General # User confirmation is a general administrative task
        summary: Confirm a user account.
        description: Confirms a user's account using a special confirmation code, typically received via email. On success, it redirects the user to the application's login page.
        operationId: confirmUser
        parameters:
          - name: code
            in: path
            required: true
            description: The confirmation code for the user account.
            schema:
              type: string
        responses:
          '303':
            description: See Other. The user account was successfully confirmed. The user is redirected to the login page of the web application.
            headers:
              Location:
                description: The target URL for the redirect, pointing to the application's login page with the username pre-filled.
                schema:
                  type: string
                  format: uri
          '400':
            description: Bad Request. The request was malformed.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Exception'
          '404':
            description: Not Found. The provided confirmation code is invalid or has expired and could not be found.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Exception'
          '500':
            description: Internal Server Error. An unexpected error occurred, for example, due to a problem with URL encoding.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Exception'

  /groups:
    get:
      tags:
        - Groups
      summary: Get the groups.
      description: Get a paginated list of groups. Can be optionally filtered by a search term.
      operationId: getGroups
      parameters:
        - name: q
          in: query
          description: A search term to filter groups by name or description.
          schema:
            type: string
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of groups to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
      responses:
        '200':
          description: A successful response returning a list of groups.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Groups'
        '206':
          description: Partial Content. A successful response returning a partial list of groups as specified by the Range header.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Groups'
        '400':
          description: Bad Request. The request was malformed, e.g., due to invalid pagination parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
    post:
      tags:
        - Groups
      summary: Create a new group.
      description: Creates a new group owned by the authenticated user.
      operationId: createGroup
      security:
        - basicAuth: [] # Implied by @Authenticated
      requestBody:
        description: The group to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '201':
          description: Created. The group was successfully created.
          headers:
            Location:
              description: The URL of the newly created group.
              schema:
                type: string
                format: uri
        '400':
          description: Bad Request. The provided group data is invalid or fails validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
        '401':
          description: Unauthorized. Authentication is required to create a group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
        '409':
          description: Conflict. A group with the specified name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
  
  /groups/{groupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        description: The unique name of the group.
        schema:
          type: string
    get:
      tags:
        - Groups
      summary: Get a specific group by its ID.
      description: Retrieves a single group entity identified by its unique ID (which is its name).
      operationId: getGroupById
      responses:
        '200':
          description: The requested group was found and is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          description: The group with the specified ID was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exception'
    put:
      tags:
        - Groups
      summary: Modify a group.
      description: >-
        Updates the properties of an existing group.
        If the group's name (which is its ID) is changed, this operation
        will respond with a 303 See Other to the new resource URL.
        Otherwise, it will respond with a 204 No Content.
      operationId: modifyGroup
      security:
        - basicAuth: []
      requestBody:
        description: The group properties to modify.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupModify'
      responses:
        '204':
          description: No Content. The group was successfully updated without changing its name.
        '303':
          description: See Other. The group was successfully updated and its name (ID) was changed. The client is redirected to the new URL for the group.
          headers:
            Location:
              description: The new URL of the group.
              schema:
                type: string
                format: uri
    delete:
      tags:
        - Groups
      summary: Delete a group.
      description: Deletes an existing group. This operation requires the user to be the owner of the group or an administrator.
      operationId: deleteGroup
      security:
        - basicAuth: []
      responses:
        '204':
          description: No Content. The group was successfully deleted.

  /groups/{groupId}/members:
    get:
      tags:
        - Groups
      summary: Get the members of a group.
      description: Retrieves a paginated list of users who are members of the specified group.
      operationId: getGroupMembers
      parameters:
        - name: group
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: p
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: l
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: Range
          in: header
          required: false
          schema:
            type: string
        
      responses:
        '200':
          description: A successful response returning a list of members.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
        '206':
          description: Partial Content. A successful response returning a partial list of members as specified by the Range header.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Users'
    post:
      tags:
        - Groups
      summary: Add a member to a group.
      description: Adds a specified user as a member to the specified group. The authenticated user must be the user being added.
      operationId: addGroupMember
      security:
        - basicAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: The unique name of the group.
          schema:
            type: string
      requestBody:
        description: A reference to the user to be added.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserReference'
      responses:
        '204':
          description: No Content. The user was successfully added to the group.

  /groups/{groupId}/members/{memberId}:
    parameters:
      - name: groupId
        in: path
        required: true
        description: The unique name of the group.
        schema:
          type: string
      - name: memberId
        in: path
        required: true
        description: The unique name of the user who is a member.
        schema:
          type: string
    delete:
      tags:
        - Groups
      summary: Remove a member from a group.
      description: Removes a user from their membership in a specified group. This does not delete the user itself.
      operationId: removeGroupMember
      security:
        - basicAuth: []
      responses:
        '204':
          description: No Content. The user was successfully removed from the group.

  /groups/{groupId}/activities:
    get:
      tags:
        - Groups
        - Activities
      summary: Get activities for a group.
      description: Retrieves a paginated list of activities related to a specific group.
      operationId: getGroupActivities
      parameters:
        - name: username
          in: path
          required: true
          description: The name of the user.
          schema:
            type: string
        - name: type
          in: query
          description: Filter activities by a specific type.
          schema:
            type: string
            enum:
              - CHANGED_PROFILE
              - CREATED_GROUP
              - CHANGED_GROUP
              - JOINED_GROUP
              - LEFT_GROUP
              - DELETED_GROUP
              - FRIENDED_USER
              - UNFRIENDED_USER
              - CREATED_TRACK
        - name: Range
          in: header
          description: Specifies the range of items to return, e.g., `items=0-99`. Takes precedence over query parameter pagination.
          schema:
            type: string
            pattern: '^items=\d+-\d+$'
        - name: limit
          in: query
          description: The maximum number of activities to return. Alias 'l' is also supported.
          schema:
            type: integer
            default: 100
        - name: page
          in: query
          description: The page number of the result set to return. Alias 'p' is also supported.
          schema:
            type: integer
            default: 1
        - name: l
          in: query
          description: Alias for the 'limit' parameter.
          schema:
            type: integer
        - name: p
          in: query
          description: Alias for the 'page' parameter.
          schema:
            type: integer
      responses:
        '200':
          description: A list of activities for the group.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activities'
        '206':
          description: A partial list of activities for the group.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activities'

  /groups/{groupId}/activities/{activityId}:
    get:
      tags:
        - Groups
        - Activities
      summary: Get a specific activity for a group.
      description: Retrieves a single activity by its ID, in the context of a specific group.
      operationId: getGroupActivityById
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The requested activity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'

  /measurements:
    get:
      tags:
        - Measurements
      summary: Get the list of measurements.
      description: Get a paginated list of all available measurements, with options for spatial and temporal filtering.
      operationId: getMeasurements
      parameters:
          - name: bbox
            in: query
            description: >-
              A bounding box in the format `minx,miny,maxx,maxy` to filter the results
              spatially.
            required: false
            schema:
              type: string
          - name: nearPoint
            in: query
            description: >-
              A point and a distance in the format `x,y,distance` to filter the results
              spatially.
            required: false
            schema:
              type: string
          - name: limit
            in: query
            description: The number of results to return.
            required: false
            schema:
              type: integer
              default: 100
          - name: page
            in: query
            description: The page of results to return.
            required: false
            schema:
              type: integer
              default: 1
          - name: after
            in: query
            description: 'Temporal filter to retrieve measurements after a specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: before
            in: query
            description: 'Temporal filter to retrieve measurements before a specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: begins
            in: query
            description: 'Temporal filter to retrieve measurements where the track begins at the specified instant or within the interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: begunBy
            in: query
            description: 'Temporal filter to retrieve measurements where the track is begun by the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: contains
            in: query
            description: 'Temporal filter to retrieve measurements where the track contains the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: during
            in: query
            description: 'Temporal filter to retrieve measurements during a specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: endedBy
            in: query
            description: 'Temporal filter to retrieve measurements where the track is ended by the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: ends
            in: query
            description: 'Temporal filter to retrieve measurements where the track ends at the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: equals
            in: query
            description: 'Temporal filter to retrieve measurements where the track time equals the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: meets
            in: query
            description: 'Temporal filter to retrieve measurements where the track meets the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: metBy
            in: query
            description: 'Temporal filter to retrieve measurements where the track is met by the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: overlapped
            in: query
            description: 'Temporal filter to retrieve measurements where the track is overlapped by the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: overlaps
            in: query
            description: 'Temporal filter to retrieve measurements where the track overlaps the specified instant or interval. The format is `YYYY-MM-DDTHH:MM:SSZ` or a comma-separated interval `YYYY-MM-DDTHH:MM:SSZ,YYYY-MM-DDTHH:MM:SSZ`.'
            required: false
            schema:
              type: string
          - name: Range
            in: header
            description: The range of items to return, e.g., items=0-100.
            required: false
            schema:
              type: string
          - name: p
            in: query
            required: false
            schema:
              type: integer
              format: int32
          - name: l
            in: query
            required: false
            schema:
              type: integer
              format: int32
      responses:
        '200':
          description: A successful response returning a list of measurements.
          headers:
            Content-Range:
              $ref: '#/components/headers/Content-Range'
            Link:
              $ref: '#/components/headers/Link'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Measurements'
    post:
      tags:
        - Measurements
      summary: Create a new measurement.
      description: Creates a new measurement, typically not associated with a specific track.
      operationId: createMeasurement
      security:
        - basicAuth: []
      requestBody:
        description: The measurement to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeasurementCreate'
      responses:
        '201':
          description: Created. The measurement was successfully created.
          headers:
            Location:
              $ref: '#/components/headers/Location'

  /measurements/{measurementId}:
    parameters:
      - name: measurementId
        in: path
        required: true
