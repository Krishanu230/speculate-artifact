                  description: A list of photo image_hashes to update.
      security:
        - jwtAuth: [] # Added for consistency
        - basicAuth: []
      responses:
        '200':
          description: Successfully updated trashcan status. The response contains lists of photos that were updated and those that were not.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - updated
                  - not_updated
                properties:
                  status:
                    type: boolean
                    example: true
                  results:
                    type: array
                    description: "DEPRECATED: This is a duplicate of the 'updated' field."
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
                  updated:
                    type: array
                    description: A list of photos whose trashcan status was successfully changed.
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
                  not_updated:
                    type: array
                    description: A list of photos whose trashcan status was not changed.
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
        '401':
