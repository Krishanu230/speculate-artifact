          type: string
          nullable: true
          format: uri
          description: 'URL to the next page of results (if available)'
        previous:
          type: string
          nullable: true
          format: uri
          description: 'URL to the previous page of results (if available)'
        results:
          type: array
          items:
            $ref: '#/components/schemas/AlbumThingList'
          description: 'List of album things for the current page'

    AlbumThingList:
      type: object
      properties:
