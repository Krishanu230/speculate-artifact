    PaginatedLongRunningJobList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of jobs
        next:
          type: string
          format: uri
          nullable: true
          description: URL of next page
        previous:
          type: string
          format: uri
          nullable: true
          description: URL of previous page
        results:
          type: array
          items:
            $ref: '#/components/schemas/LongRunningJob'

    # Correct schema for POST request
    JobCreateRequest:
      type: object
      required:
        - job_id
        - job_type
      properties:
        job_id: { type: string, format: uuid, maxLength: 36 }
        job_type: { $ref: '#/components/schemas/JobTypeEnum' }
        finished: { type: boolean, default: false }
        failed: { type: boolean, default: false }
        queued_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        progress_current: { type: integer, minimum: 0, default: 0 }
        progress_target: { type: integer, minimum: 0, default: 0 }
    
    # Correct schema for PUT request
    JobUpdateRequest:
      type: object
      required:
        - job_id
        - job_type
        - finished
        - failed
        - progress_current
        - progress_target
      properties:
        job_id: { type: string, format: uuid, maxLength: 36 }
        job_type: { $ref: '#/components/schemas/JobTypeEnum' }
        finished: { type: boolean }
        failed: { type: boolean }
        queued_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        progress_current: { type: integer, minimum: 0 }
        progress_target: { type: integer, minimum: 0 }

    LongRunningJob:
      type: object
      # Taking the required list from Schema 1, which is correct based on the model
      required:
        - id
        - job_id
        - started_by
        - job_type
        - job_type_str
        - queued_at
        - finished
        - failed
        - progress_current
        - progress_target
      properties:
        # Taking all the more detailed properties from Schema 2
        id:
          type: integer
          readOnly: true
        job_id:
          type: string
          format: uuid
          maxLength: 36
        queued_at:
          type: string
          format: date-time
        finished:
          type: boolean
        finished_at:
          type: string
          format: date-time
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        failed:
          type: boolean
        job_type_str:
          type: string
          readOnly: true
        job_type:
          $ref: '#/components/schemas/JobTypeEnum' # Better documentation
        started_by:
          $ref: '#/components/schemas/SimpleUser'
          readOnly: true
        progress_current:
          type: integer
          minimum: 0 # More precise
        progress_target:
          type: integer
          minimum: 0 # More precise
    PatchedLongRunningJob:
      type: object
      description: Partial fields for updating a job
      properties:
        queued_at:
          type: string
          format: date-time
        finished:
          type: boolean
        finished_at:
          type: string
          format: date-time
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        failed:
          type: boolean
        job_type:
          $ref: '#/components/schemas/JobTypeEnum'
        progress_current:
          type: integer
          minimum: 0
        progress_target:
          type: integer
          minimum: 0

    JobTypeEnum:
      type: integer
      enum:
        - 1  # Scan Photos
        - 2  # Generate Event Albums
        - 3  # Regenerate Event Titles
        - 4  # Train Faces
        - 5  # Delete Missing Photos
        - 6  # Calculate Clip Embeddings
        - 7  # Scan Faces
        - 8  # Find Similar Faces
        - 9  # Download Selected Photos
        - 10 # Download Models
        - 11 # Add Geolocation
        - 12 # Generate Tags
        - 13 # Generate Face Embeddings
        - 14 # Scan Missing Photos

    LabelFacesRequest:
      type: object
      required:
        - person_name
        - face_ids
      properties:
        person_name:
          type: string
          description: The name of the person to assign; use `"Unknown - Other"` to clear
          minLength: 1
          maxLength: 128
        face_ids:
          type: array
          description: List of face primary-key IDs to label
          items:
            type: integer

    LabelFacesResponse:
      type: object
      required:
        - status
