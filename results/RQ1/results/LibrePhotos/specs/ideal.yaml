          format: double
          nullable: true
        exif_timestamp:
          type: string
          format: date-time
          nullable: true
        search_captions:
          type: string
          nullable: true
        search_location:
          type: string
          nullable: true
        geolocation_json:
          type: object
          nullable: true
        exif_json:
          type: object
          nullable: true
        rating:
          type: integer
        hidden:
