  /api/photosedit/share:
    post:
      operationId: api_photosedit_share_create # DRF Convention
      summary: Share or unshare photos with a user
      description: >-
        Sets or removes a share relationship between a list of photos and a target user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - val_shared
                - target_user_id
                - image_hashes
              properties:
                val_shared:
                  type: boolean
                  description: Set to `true` to share the photos, `false` to unshare them.
                target_user_id:
                  type: integer
                  description: The ID of the user to share the photos with.
                image_hashes:
                  type: array
                  items:
                    type: string
                  description: A list of photo image_hashes to share or unshare.
      security:
        - jwtAuth: [] # Added for consistency
        - basicAuth: []
        # sessionAuth is also valid based on baseline spec
      responses:
        '200':
          description: The share or unshare operation was successful.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - count
                properties:
                  status:
                    type: boolean
                    description: Always `true` for a successful operation.
                    example: true
                  count:
                    type: integer
                    description: The number of share relationships that were created or deleted.
        '401':
          description: Authentication required.
        '404':
          description: Not Found. The target user or one of the photos does not exist.

