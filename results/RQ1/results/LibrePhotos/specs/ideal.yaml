    FaceRecognitionModelEnum:
      type: string
      enum:
        - HOG
        - CNN

    DeleteFacesRequest:
      type: object
      required:
        - face_ids
      properties:
        face_ids:
          type: array
          description: List of face primary-key IDs to delete
          items:
            type: integer

    DeleteFacesResponse:
      type: object
      required:
        - status
        - results
        - not_deleted
        - deleted
      properties:
        status:
          type: boolean
          description: True if the operation completed
        results:
          type: array
          items:
            type: string
          description: URLs of faces successfully marked deleted
        not_deleted:
          type: array
          items:
            type: string
          description: URLs of faces not owned by the user (not deleted)
        deleted:
          type: array
          items:
            type: string
          description: Duplicate of `results` for backward compatibility

    DeleteMissingPhotosResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: boolean
          description: True if scheduling was initiated
        job_id:
          type: string
          format: uuid
          nullable: true
          description: Identifier of the deletion job when `status` is true

    DirectoryEntry:
      type: object
      description: >
        A single node in the directory tree.  
        Contains metadata about a file or directory.  
        (Adjust properties below to match `path_to_dict` output.)
      properties:
        name:
          type: string
          description: File or directory name
        path:
          type: string
          description: Full path
        is_dir:
          type: boolean
          description: True if this entry is a directory
        children:
          type: array
          description: Nested entries (only for directories)
          items:
            $ref: '#/components/schemas/DirectoryEntry'
      required:
        - name
        - path
        - is_dir

    ExistsResponse:
      type: object
      required:
