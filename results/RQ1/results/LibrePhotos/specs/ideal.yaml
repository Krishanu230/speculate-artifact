  /api/services/:
    get:
      parameters: []
      security:
      - sessionAuth: []
      - basicAuth: []
      responses:
        '200':
          description: Successful response containing a mapping of service names to port numbers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: object
                    additionalProperties:
                      type: integer
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according to the Accept headers.
      summary: List all available services.
  /api/services/{id}/:
    get:
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the service to retrieve
        schema:
          type: string
          pattern: '[^/.]+'
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Successful retrieval of the service's health status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  service_name:
                    type: string
                  healthy:
                    type: boolean
                required:
                - service_name
                - healthy
        '404':
          description: Not Found - Service with the given identifier does not exist.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this object.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according to the Accept headers.
      summary: Retrieve the health status of a specific service.
  /api/services/{id}/start/:
    post:
      parameters:
      - name: id
        in: path
        required: true
        description: Service identifier
        schema:
          type: string
          pattern: '[^/.]+'
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Service started successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
        '500':
          description: Failed to start service.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
        '400':
          description: Bad Request - Bad input, validation error.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to create the object.
        '405':
          description: Method Not Allowed - POST method not allowed on the endpoint.
        '406':
          description: Not Acceptable - Requested content type is not acceptable.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      summary: Start a specific service.
  /api/services/{id}/stop/:
    post:
      parameters:
