  # PATHS
  /api/photosedit/generateim2txt:
    post:
      operationId: api_photosedit_generateim2txt_create # DRF Convention
      summary: Generate caption for a photo
      description: Triggers the backend to generate a new caption for a single photo using the configured im2txt model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image_hash
              properties:
                image_hash:
                  type: string
                  description: The image_hash of the photo to generate a caption for.
      security:
        - jwtAuth: [] # Added for consistency
        - basicAuth: []
      responses:
        '200':
          description: The result of the caption generation attempt.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: boolean
                    description: True if the caption was generated successfully, false otherwise.
        '400':
          description: Bad Request, for example, if the user does not own the photo.
          content:
            application/json:
              schema:
                type: object
                required: [status, message]
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "you are not the owner of this photo"
        '401':
          description: Authentication required.
        '404':
          description: Not Found. The photo with the specified hash does not exist.

  /api/photosedit/makepublic:
    post:
      operationId: api_photosedit_makepublic_create # DRF Convention
      summary: Set public status for photos
      description: Sets the public or private status for a list of photos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - val_public
                - image_hashes
              properties:
                val_public:
                  type: boolean
                  description: Set to `true` to make photos public, `false` to make them private.
                image_hashes:
                  type: array
                  items:
                    type: string
                  description: A list of photo image_hashes to update.
      security:
        - jwtAuth: [] # Added for consistency
        - basicAuth: []
      responses:
        '200':
          description: Successfully updated public status. The response contains lists of photos that were updated and those that were not.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - updated
                  - not_updated
                properties:
                  status:
                    type: boolean
                    example: true
                  results:
                    type: array
                    description: "DEPRECATED: This is a duplicate of the 'updated' field."
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
                  updated:
                    type: array
                    description: A list of photos whose public status was successfully changed.
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
                  not_updated:
                    type: array
                    description: A list of photos whose public status was not changed.
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
        '401':
          description: Authentication required.

  /api/photosedit/savecaption:
    post:
      operationId: api_photosedit_savecaption_create # DRF Convention
      summary: Save a photo caption
      description: Saves or updates a user-provided caption for a single photo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image_hash
                - caption
              properties:
                image_hash:
                  type: string
                  description: The image_hash of the photo to update.
                caption:
                  type: string
                  description: The new user-provided caption.
      security:
        - jwtAuth: [] # Added for consistency
        - basicAuth: []
      responses:
        '200':
          description: The result of the save attempt.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: boolean
                    description: True if the caption was saved successfully, false otherwise.
        '400':
          description: Bad Request, for example, if the user does not own the photo.
          content:
            application/json:
              schema:
                type: object
                required: [status, message]
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "you are not the owner of this photo"
        '401':
          description: Authentication required.
        '404':
          description: Not Found. The photo with the specified hash does not exist.

  /api/photosedit/setdeleted:
