              schema:
                $ref: '#/components/schemas/PaginatedAlbumUserListList' # Reusing schema from a previous step
        '400':
          description: Bad Request (e.g., user or album not found, or you are not the owner).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: boolean, example: false }
                  message: { type: string }
        '401':
          description: Authentication required.

  /api/wordcloud:
    get:
      operationId: api_wordcloud_retrieve
      summary: Retrieve word cloud data
      description: Returns a list of the most frequent terms for captions, people, and locations from the user's library, suitable for creating word clouds.
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Word cloud data for captions, people, and locations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordCloudResponse'
        '401':
          description: Authentication required.

  /media/{path}/{fname}:
    get:
      operationId: media_retrieve
      summary: Retrieve a media file
      description: >-
        Serves a media file (e.g., thumbnail, avatar, original photo). Access control is handled internally
        based on the photo's public status, ownership, or sharing status.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
            enum: [thumbnails_big, square_thumbnails, small_square_thumbnails, avatars, photos, faces, embedded_media, zip]
        - name: fname
          in: path
          required: true
          schema:
            type: string
          description: The filename, which is usually based on the photo's image_hash.
      security: [] # Publicly accessible, with internal auth logic
      responses:
        '200':
          description: The requested media file.
          content:
            '*/*': # Wildcard for any media type (image/jpeg, video/mp4, etc.)
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized. A valid JWT in a cookie may be required for non-public media.
        '403':
          description: Forbidden. You do not have permission to access this media.
        '404':
          description: Not Found. The requested media file does not exist.



components:
  schemas:
    ErrorDetail:
      type: object
      properties:
        detail:
          type: string

    PaginatedAlbumAutoListSummary:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of albums.
        next:
          type: string
          nullable: true
          format: uri
          description: URL to the next page of results.
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to the previous page of results.
        results:
          type: array
          items:
            $ref: '#/components/schemas/AlbumAutoList' # CORRECTED: Using the new summary schema for items

    # NEW Schema for one item in the list response
    AlbumAutoList:
      type: object
      required:
        - id
        - title
        - timestamp
        - photos
        - photo_count
        - favorited
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the album.
        title:
          type: string
          maxLength: 512
          nullable: true
          description: The title of the album.
        timestamp:
          type: string
          format: date-time
          description: The representative timestamp for the album.
        photos: # CORRECTED: This is now an object, not an array
          description: >-
            A representation of the album's cover photo. Note: Despite the plural name, this field contains a single photo object.
          $ref: '#/components/schemas/PhotoHash'
        photo_count: # ADDED: This field was missing
          type: integer
          description: The total number of photos in this album.
        favorited:
          type: boolean
          description: Whether the album has been marked as a favorite.

    # NEW schema for the nested cover photo object
    PhotoHash:
      type: object
      required:
        - image_hash
      properties:
        image_hash:
          type: string
          description: The unique hash identifier for the photo.
        video:
          type: boolean
          description: True if the cover photo is a video, false if it is a photo.
    
    PaginatedAlbumAutoList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of albums
        next:
          type: string
          nullable: true
          format: uri
          description: URL to the next page of results
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to the previous page of results
        results:
          type: array
          items:
            $ref: "#/components/schemas/AlbumAuto"

    AlbumAuto:
      type: object
      required:
        - id
        - timestamp
        - created_on
        - favorited
        - photos
        - people
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the album
        title:
          type: string
          maxLength: 512
          nullable: true
          description: |
            Auto-generated title based on timestamp, location, and people in photos.
            Generated automatically if not provided during creation.
          default: "Untitled Album"
        favorited:
          type: boolean
          description: Whether the album has been marked as favorite
          default: false
        timestamp:
          type: string
          format: date-time
          description: Representative timestamp for the album
        created_on:
          type: string
          format: date-time
          readOnly: true
          description: When the album was created (set automatically)
        gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude coordinate for the album
        gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude coordinate for the album
        photos:
          type: array
          readOnly: true
          description: Photos included in this auto album
          items:
            $ref: "#/components/schemas/PhotoSimple"
        people:
          type: array
          readOnly: true
          description: |
            Unique people detected across all photos in the album.
            Computed from face recognition data.
          items:
            $ref: "#/components/schemas/Person"

    

    AlbumAutoCreate:
      type: object
      required:
        - timestamp
        - photos
      properties:
        title: { type: string, maxLength: 512, nullable: true }
        timestamp: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lon: { type: number, format: double, nullable: true }
        favorited: { type: boolean, default: false }
        photos:
          type: array
          description: "An array of photo objects, identified by their image_hash."
          items:
            $ref: "#/components/schemas/PhotoInput"
      
    PhotoInput:
      type: object
      required:
        - image_hash
      properties:
        image_hash: { type: string, maxLength: 64 }

    PhotoSimple:
      type: object
      required:
        - image_hash
        - rating
        - public
        - video
      properties:
        image_hash:
          type: string
          maxLength: 64
          description: Unique hash identifier for the photo
        square_thumbnail:
          type: string
          readOnly: true
          description: URL to the square thumbnail (method field)
        exif_timestamp:
          type: string
          format: date-time
          nullable: true
          description: Timestamp from photo EXIF data
        exif_gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude from EXIF GPS data
        exif_gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude from EXIF GPS data
        rating:
          type: integer
          description: User-assigned rating
        geolocation_json:
          nullable: true
          description: Processed geolocation data
        public:
          type: boolean
          description: Whether photo is publicly accessible
        video:
          type: boolean
          description: Whether this is a video file

    Person:
      type: object
      required:
        - id
        - name
        - face_count
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier
        name:
          type: string
          maxLength: 128
          minLength: 1
          description: Person's name
        face_url:
          type: string
          readOnly: true
          description: URL to face thumbnail (computed from cover_face or first face)
        face_count:
          type: integer
          readOnly: true
          description: Number of photos person appears in
        face_photo_url:
          type: string
          readOnly: true
          description: Image hash of representative photo
        video:
          type: boolean
          readOnly: true
          description: Whether representative photo is a video
        
    
    
    # Request body schemas
    AlbumAutoWrite: # New consolidated schema for POST/PUT
      type: object
      required:
        - timestamp
      properties:
        title:
          type: string
          maxLength: 512
          nullable: true
          description: Custom title for the album. If null, a title will be generated automatically.
        timestamp:
          type: string
          format: date-time
          description: The primary timestamp for the album.
        gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude coordinate for the album's location.
        gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude coordinate for the album's location.
        favorited:
          type: boolean
          description: Set to true to mark the album as a favorite.
          default: false
      
    AlbumAutoUpdate:
      type: object
      required:
        - title
        - timestamp
        - favorited
        - photos
      properties:
        title: { type: string, maxLength: 512, nullable: true }
        timestamp: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lon: { type: number, format: double, nullable: true }
        favorited: { type: boolean }
        photos:
          type: array
          items:
            $ref: "#/components/schemas/PhotoInput"
    
    AlbumAutoPartialUpdate:
      type: object
      properties:
        title: { type: string, maxLength: 512, nullable: true }
        timestamp: { type: string, format: date-time }
        gps_lat: { type: number, format: double, nullable: true }
        gps_lon: { type: number, format: double, nullable: true }
        favorited: { type: boolean }
        photos:
          type: array
          items:
            $ref: "#/components/schemas/PhotoInput"

    PaginatedAlbumDateList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          description: Total number of date albums matching the query
        next:
          type: string
          nullable: true
          format: uri
          description: URL to the next page of results (null if this is the last page)
        previous:
          type: string
          nullable: true
          format: uri
          description: URL to the previous page of results (null if this is the first page)
        results:
          type: array
          description: List of date albums for the current page
          items:
            $ref: '#/components/schemas/AlbumDate'
    
    AlbumDate:
      type: object
      required:
        - id
        - incomplete
      properties:
        id:
          type: string
          description: Unique identifier for the date album
        date:
          type: string
          format: date
          nullable: true
          description: The date of the album (ISO format)
        location:
          type: string
          description: The primary location of the album's photos
        incomplete:
          type: boolean
          description: Whether the album is incomplete (always false as per implementation)
        numberOfItems:
          type: integer
          description: Number of photos in the album
        items:
          type: array
