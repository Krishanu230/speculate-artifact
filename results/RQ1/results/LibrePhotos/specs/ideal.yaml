      # Request Body Schema for PATCH
    PatchedAlbumThing:
      type: object
      properties:
        title:
          type: string
          maxLength: 512
        thing_type:
          type: string
          maxLength: 512
          nullable: true
        favorited:
          type: boolean
        added_photos:
          type: array
          items: { type: string }
          description: A list of image_hashes to add to the album.
        removed_photos:
          type: array
          items: { type: string }
          description: A list of image_hashes to remove from the album.

    PhotoSuperSimple:
      type: object
      properties:
