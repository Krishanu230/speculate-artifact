    Photo:
      type: object
      properties:
        image_hash: { type: string, maxLength: 64 }
        image_path: { type: array, items: { type: string }, readOnly: true }
        # Read-Only Method Fields
        square_thumbnail_url: { type: string, format: uri, readOnly: true }
        big_thumbnail_url: { type: string, format: uri, readOnly: true }
        small_square_thumbnail_url: { type: string, format: uri, readOnly: true }
        similar_photos: { type: array, items: { type: object }, readOnly: true }
        captions_json: { type: object, readOnly: true }
        people: { type: array, items: { type: object }, readOnly: true }
        shared_to: { type: array, items: { type: integer }, readOnly: true }
        owner: { $ref: '#/components/schemas/SimpleUser', readOnly: true }
        embedded_media: { type: array, items: { type: object }, readOnly: true }
        # Writable Fields (also present in response)
        exif_gps_lat: { type: number, format: double, nullable: true }
        exif_gps_lon: { type: number, format: double, nullable: true }
        exif_timestamp: { type: string, format: date-time, nullable: true }
        search_captions: { type: string, nullable: true }
        search_location: { type: string, nullable: true }
        geolocation_json: { type: object, nullable: true }
        exif_json: { type: object, nullable: true }
        rating: { type: integer, default: 0 }
        hidden: { type: boolean, default: false }
        public: { type: boolean, default: false }
        removed: { type: boolean, default: false }
        in_trashcan: { type: boolean, default: false }
        video: { type: boolean, default: false }
        size: { type: integer, format: int64 }
        height: { type: integer }
        width: { type: integer }
        focal_length: { type: number, format: double, nullable: true }
        fstop: { type: number, format: double, nullable: true }
        iso: { type: integer, nullable: true }
        shutter_speed: { type: string, nullable: true }
        lens: { type: string, nullable: true }
        camera: { type: string, nullable: true }
        focalLength35Equivalent: { type: integer, nullable: true }
        digitalZoomRatio: { type: number, format: double, nullable: true }
        subjectDistance: { type: number, format: double, nullable: true }

    PhotoWriteBase:
      type: object
      properties:
        exif_gps_lat:
          type: number
          format: double
          nullable: true
          description: Latitude from EXIF data.
        exif_gps_lon:
          type: number
          format: double
          nullable: true
          description: Longitude from EXIF data.
        exif_timestamp:
          type: string
          format: date-time
          nullable: true
          description: Timestamp from EXIF data.
        search_captions:
          type: string
          nullable: true
          description: A searchable text field generated from captions and other metadata.
        search_location:
          type: string
          nullable: true
          description: A searchable text field for the photo's location.
        geolocation_json:
          type: object
          nullable: true
          description: Raw GeoJSON data for the location.
        exif_json:
          type: object
          nullable: true
          description: All raw EXIF data in a JSON object.
        rating:
          type: integer
          description: User-assigned rating from 0 upwards.
        hidden:
          type: boolean
          description: Whether the photo is hidden from the main view.
        public:
          type: boolean
          description: Whether the photo is publicly accessible.
        removed:
          type: boolean
          description: Marks the photo as removed.
        in_trashcan:
          type: boolean
          description: Marks the photo as being in the trashcan.
        video:
          type: boolean
          description: Indicates if the item is a video.
        size:
          type: integer
          format: int64
          description: File size in bytes.
        height:
          type: integer
          description: Image height in pixels.
        width:
          type: integer
          description: Image width in pixels.
        focal_length:
          type: number
          format: double
          nullable: true
          description: Lens focal length.
        fstop:
          type: number
          format: double
          nullable: true
          description: Aperture value.
        iso:
          type: integer
          nullable: true
          description: ISO speed rating.
        shutter_speed:
          type: string
          nullable: true
          description: Shutter speed (e.g., '1/250').
        lens:
          type: string
          nullable: true
          description: Name or model of the lens used.
        camera:
          type: string
          nullable: true
          description: Name or model of the camera used.
        focalLength35Equivalent:
          type: integer
          nullable: true
          description: 35mm equivalent focal length.
        digitalZoomRatio:
          type: number
          format: double
          nullable: true
          description: Digital zoom ratio applied.
        subjectDistance:
          type: number
          format: double
          nullable: true
          description: Distance to the subject.

     # Schema for POST request
    PhotoCreateRequest:
      allOf:
        - $ref: '#/components/schemas/PhotoWriteBase'
        - type: object
          required: [image_hash]
          properties:
            image_hash: { type: string, maxLength: 64 }

      # Schema for PUT request
    PhotoUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/PhotoWriteBase'
        - type: object
          # For a strict PUT, all non-nullable, non-default fields would be required.
          # In this model, all writable fields are either nullable or have a default value.
          required:
            - rating
            - hidden
            - public
            - removed
            - in_trashcan
            - video
            - size
            - height
            - width

    # Schema for PATCH request
    PhotoPartialUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/PhotoWriteBase'

