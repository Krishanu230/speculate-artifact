          type: string
          maxLength: 64
          description: Hash identifier for the photo
        rating:
          type: integer
          description: User rating of the photo
        hidden:
          type: boolean
          description: Whether this photo is hidden
        exif_timestamp:
          type: string
          format: date-time
          nullable: true
          description: Timestamp from the photo's EXIF data
        public:
          type: boolean
          description: Whether this photo is publicly accessible
        video:
          type: boolean
          description: Whether this item is a video
      required:
        - image_hash
        - rating
        - hidden
        - public
        - video

