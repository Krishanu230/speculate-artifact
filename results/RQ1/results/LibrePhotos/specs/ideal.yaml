        next:
          type: string
          format: uri
          nullable: true
          description: URL of next page
        previous:
          type: string
          format: uri
          nullable: true
          description: URL of previous page
        results:
          type: array
          items:
            $ref: '#/components/schemas/GroupedPhotos'

    PhotoDetail:
      type: object
      properties:
        exif_gps_lat: { type: number, format: double, nullable: true }
        exif_gps_lon: { type: number, format: double, nullable: true }
        exif_timestamp: { type: string, format: date-time, nullable: true }
        search_captions: { type: string, nullable: true }
        search_location: { type: string, nullable: true }
        captions_json:
          type: object
          properties:
            im2txt: { type: string }
            places365: { type: object }
        big_thumbnail_url: { type: string, format: uri }
        square_thumbnail_url: { type: string, format: uri }
        small_square_thumbnail_url: { type: string, format: uri }
        geolocation_json: { type: object, nullable: true }
        exif_json: { type: object, nullable: true }
        people:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              type: { type: string }
              probability: { type: number, format: float }
              location: { type: object }
              face_url: { type: string, format: uri }
              face_id: { type: integer }
        image_hash: { type: string }
        image_path: { type: array, items: { type: string } }
        rating: { type: integer }
        hidden: { type: boolean }
        public: { type: boolean }
        removed: { type: boolean }
        in_trashcan: { type: boolean }
        shared_to:
          type: array
          items:
            type: integer
          description: A list of user IDs this photo is shared with.
        similar_photos:
          type: array
          items:
            type: object
            properties:
              image_hash: { type: string }
              type: { type: string, enum: [image, video] }
        video: { type: boolean }
        owner:
          $ref: '#/components/schemas/SimpleUser'
        size: { type: integer }
        height: { type: integer }
        width: { type: integer }
        focal_length: { type: number, format: float, nullable: true }
        fstop: { type: number, format: float, nullable: true }
        iso: { type: integer, nullable: true }
        shutter_speed: { type: string, nullable: true }
        lens: { type: string, nullable: true }
        camera: { type: string, nullable: true }
        focalLength35Equivalent: { type: integer, nullable: true }
        digitalZoomRatio: { type: number, format: float, nullable: true }
        subjectDistance: { type: number, format: float, nullable: true }
        embedded_media:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string, enum: [image, video] }

    PredefinedRule:
      type: object
      description: Describes a single predefined rule for extracting a date and time from a photo.
      required:
        - id
        - name
        - rule_type
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        rule_type:
          type: string
          readOnly: true
          enum: [user_defined, exif, path, filesystem]
        is_default:
          type: boolean
          readOnly: true
        exif_tag:
          type: string
          readOnly: true
        transform_tz:
          type: integer
          readOnly: true
        source_tz:
          type: string
          readOnly: true
        report_tz:
          type: string
          readOnly: true
        predefined_regexp:
          type: string
          readOnly: true
        file_property:
          type: string
          readOnly: true
          enum: [mtime, ctime]

    QueueStatus:
      type: object
      required:
        - status
        - queue_can_accept_job
        - job_detail
      properties:
        status:
          type: boolean
          description: Always `true` for a successful check.
        queue_can_accept_job:
          type: boolean
          description: true if no job is currently running, otherwise `false`.
        job_detail:
          nullable: true
          oneOf:
            - $ref: '#/components/schemas/LongRunningJob'

    ServerStats:
      type: object
      properties:
        cpu_info:
          type: object
          additionalProperties: true
        image_tag:
          type: string
        available_ram_in_mb:
          type: integer
        gpu_name:
          type: string
        gpu_memory_in_mb: # CORRECTED
          oneOf:
            - type: integer
            - type: string
          description: Total GPU memory in MB, or empty string if not available.
        total_storage_in_mb:
          type: integer
        used_storage_in_mb:
          type: integer
        free_storage_in_mb:
          type: integer
        number_of_users:
          type: integer
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserStats'

    UserStats:
      type: object
      properties:
        date_joined:
          type: string # CORRECTED
          description: "Date when the user joined in DD-MM-YYYY format."
        total_file_size_in_mb:
          type: integer
        number_of_photos:
          type: integer
        number_of_videos:
          type: integer
        number_of_captions:
          type: integer
        number_of_generated_captions:
          type: integer
        album:
          $ref: '#/components/schemas/AggregateStats'
        person:
          $ref: '#/components/schemas/AggregateStats' # Person stats are only photo based
        number_of_clusters:
          type: integer
        places:
          $ref: '#/components/schemas/AggregateStats'
        things:
          $ref: '#/components/schemas/AggregateStats'
        events:
          $ref: '#/components/schemas/AggregateStats'
        number_of_favorites:
          type: integer
        number_of_hidden:
          type: integer
        number_of_public:
          type: integer

    AggregateStats:
      type: object
      description: A set of aggregate statistics for a collection of items.
      properties:
        count:
          type: integer
        min:
          type: integer
          nullable: true
        max:
          type: integer
          nullable: true
        mean:
          type: number
          format: float
          nullable: true
        median:
          type: number
          format: float
          nullable: true
        # Video stats are optional as they don't apply to all aggregates (e.g., people)
        min_videos:
          type: integer
          nullable: true
        max_videos:
          type: integer
          nullable: true
        mean_videos:
          type: number
          format: float
          nullable: true
        median_videos:
          type: number
          format: float
          nullable: true

    SiteSettings:
      type: object
      required:
        - allow_registration
        - allow_upload
        - skip_patterns
        - heavyweight_process
        - map_api_provider
        - map_api_key
        - captioning_model
        - llm_model
      properties:
        allow_registration: { type: boolean }
        allow_upload: { type: boolean }
        skip_patterns: { type: array, items: { type: string } }
        heavyweight_process: { type: integer }
        map_api_provider: { type: string }
        map_api_key: { type: string }
        captioning_model: { type: string }
        llm_model: { type: string }

    # Schema for POST request body
    SiteSettingsUpdate:
      type: object
      properties:
        allow_registration:
          type: boolean
          description: Allow new users to register.
        allow_upload:
          type: boolean
          description: Allow users to upload photos.
        skip_patterns:
          type: array
          items: { type: string }
          description: A list of regex patterns. Directories matching these will be skipped during scans.
        map_api_provider:
          type: string
        map_api_key:
          type: string
        captioning_model:
          type: string
        llm_model:
          type: string

    SocialGraph:
      type: object
      required: [nodes, links]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        links:
          type: array
          items:
            $ref: '#/components/schemas/GraphLink'

    GraphNode:
      type: object
      required: [id, x, y]
      properties:
        id:
          type: string
          description: The name of the person, used as the node ID.
        x:
          type: number
          format: double
          description: The calculated x-coordinate for graph visualization.
        y:
          type: number
          format: double
          description: The calculated y-coordinate for graph visualization.

    GraphLink:
      type: object
      required: [source, target]
      properties:
        source:
          type: string
          description: The ID (name) of the source person node.
        target:
          type: string
          description: The ID (name) of the target person node.

    UserStatsSummary:
      type: object
      properties:
        num_photos: { type: integer }
        num_missing_photos: { type: integer }
        num_faces: { type: integer }
        num_people: { type: integer }
        num_unknown_faces: { type: integer }
        num_labeled_faces: { type: integer }
        num_inferred_faces: { type: integer }
        num_albumauto: { type: integer }
        num_albumdate: { type: integer }
        num_albumuser: { type: integer }

    StorageStats:
      type: object
      required: [total_storage, used_storage, free_storage]
      properties:
        total_storage:
          type: integer
          format: int64
          description: Total disk space in bytes.
        used_storage:
          type: integer
          format: int64
          description: Used disk space in bytes.
        free_storage:
          type: integer
          format: int64
          description: Free disk space in bytes.

    PublicUser:
      type: object
      required: [id, username, public_photo_count, public_photo_samples]
      properties:
        id: { type: integer }
        avatar_url: { type: string, format: uri, nullable: true }
        username: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        public_photo_count: { type: integer }
        public_photo_samples:
          type: array
          items:
            $ref: '#/components/schemas/PhotoSuperSimple'

    # Schema for new user signup request body
    UserSignup:
      type: object
      required: [username, password, email, first_name, last_name]
      properties:
        username: { type: string }
        password: { type: string, format: password, minLength: 3, writeOnly: true }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        is_superuser: { type: boolean, default: false }

    # Schema for new user signup response
    UserSignupResponse:
      type: object
      required: [username, email, first_name, last_name]
      properties:
        # Omits password, includes other fields
        username: { type: string }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        is_superuser: { type: boolean }


    ShareAlbumRequest:
      type: object
      required: [shared, target_user_id, album_id]
      properties:
        shared:
          type: boolean
          description: true to share, `false` to unshare.
        target_user_id:
          type: integer
          description: The ID of the user to share with.
        album_id:
          type: integer
          description: The ID of the album to share.

    WordCloudResponse:
      type: object
      required: [captions, people, locations]
      properties:
        captions:
          type: array
          items: { $ref: '#/components/schemas/WordCloudItem' }
        people:
          type: array
          items: { $ref: '#/components/schemas/WordCloudItem' }
        locations:
          type: array
          items: { $ref: '#/components/schemas/WordCloudItem' }

    WordCloudItem:
      type: object
      required: [label, y]
      properties:
        label:
          type: string
          description: The word or term.
        y:
          type: number
          format: float
          description: The weight of the term (log of its frequency).

    

  responses:
    Unauthorized:
      description: Authentication credentials were missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'
    
    Forbidden:
      description: Authentication credentials missing/invalid or user not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorDetail'

  
    
