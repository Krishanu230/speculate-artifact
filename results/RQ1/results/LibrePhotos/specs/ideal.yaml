                    - $ref: '#/components/schemas/PublicUser'
    post:
      operationId: api_user_create
      summary: Create a new user (Signup)
      description: >-
        Creates a new user account. This is publicly available if registration is allowed on the site.
        The first user created will automatically become a superuser.
      security: [] # AllowAny (with custom permission logic)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSignup' }
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSignupResponse' }
        '400':
          description: Invalid data, e.g., username already exists.

  /api/user/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      operationId: api_user_retrieve
      summary: Retrieve a user
      description: >-
        Retrieves user details. Unauthenticated requests will see a limited public profile.
        Authenticated requests will see the full user profile.
      security: [] # AllowAny
      responses:
        '200':
          description: User details.
          content:
            application/json:
              schema:
                oneOf: # CORRECT: Baseline was right to use oneOf
                  - $ref: '#/components/schemas/DeleteUser'
                  - $ref: '#/components/schemas/PublicUser'
        '404':
          description: Not Found.

    put:
      tags:
        - user
      summary: Update a user
      description: Fully updates a user's profile. Requires admin privileges or for the user to be updating their own profile.
      operationId: api_user_update
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: Bad Request (e.g., invalid data).
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden (permission denied).
        '404':
          description: Not Found.
    patch:
      tags:
        - user
      summary: Partially update a user
      description: Partially updates a user's profile. Requires admin privileges or for the user to be updating their own profile.
      operationId: api_user_partial_update
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPartialUpdateRequest'
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: Bad Request (e.g., invalid data).
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden (permission denied).
        '404':
          description: Not Found.

      
    
    delete:
      operationId: api_user_destroy
      summary: Delete a user
      description: Deletes a user. Requires admin privileges.
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '204':
          description: User deleted successfully.
        '403':
          description: Forbidden. User does not have admin privileges.
  
