  # PATHS
  /api/photosedit/delete:
    delete:
      operationId: api_photosedit_delete_destroy # DRF Convention
      summary: Permanently delete photos from trash
      description: >-
        Permanently deletes a list of photos that are currently in the user's trashcan.
        This action is irreversible. Photos not in the trash or not owned by the user will be ignored.
      requestBody: # ADDED
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image_hashes
              properties:
                image_hashes:
                  type: array
                  items:
                    type: string
                  description: A list of photo image_hashes to permanently delete.
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: Response indicating which photos were successfully deleted and which were not.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - results
                  - not_deleted
                  - deleted
                properties:
                  status:
                    type: boolean
                    description: Always true for this response.
                  results:
                    type: array
                    items: { type: string }
                    description: "List of successfully deleted photo hashes. (Redundant, same as 'deleted')"
                  not_deleted:
                    type: array
                    items: { type: string }
                    description: List of photo hashes that were not deleted (e.g., not in trash or not owned by the user).
                  deleted:
                    type: array
                    items: { type: string }
                    description: List of successfully deleted photo hashes.
        '401':
          description: Authentication required.

  /api/photosedit/duplicate/delete:
    delete:
      operationId: api_photosedit_duplicate_delete_destroy # DRF Convention
      summary: Delete a duplicate photo file
      description: >-
        Deletes a specific file path associated with a photo, which is useful for removing duplicate files
        while keeping the main photo entry.
      requestBody: # ADDED
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image_hash
                - path
              properties:
                image_hash:
                  type: string
                  description: The image_hash of the photo that has the duplicate file.
                path:
                  type: string
                  description: The full file path of the duplicate file to be deleted.
      security:
        - jwtAuth: []
        - basicAuth: []
      responses:
        '200':
          description: The duplicate file was successfully deleted. No response body is returned.
        '400':
          description: Bad Request. The provided path was invalid or could not be deleted.
        '404':
          description: Not Found. No photo with the given `image_hash` exists.
        '401':
          description: Authentication required.

  /api/photosedit/favorite:
    post:
      operationId: api_photosedit_favorite_create # DRF Convention
      summary: Set or unset favorite status for photos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - favorite
                - image_hashes
              properties:
                favorite:
                  type: boolean
                  description: Set to `true` to mark photos as favorite, `false` to un-favorite them.
                image_hashes:
                  type: array
                  items:
                    type: string
                  description: A list of photo image_hashes to update.
      security:
        - jwtAuth: [] # Added for consistency
        - basicAuth: []
      responses:
        '200':
          description: Successfully updated favorite status. The response contains lists of photos that were updated and those that were not (e.g., already had the target status).
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - updated
                  - not_updated
                properties:
                  status:
                    type: boolean
                    example: true
                  results:
                    type: array
                    description: "DEPRECATED: This is a duplicate of the 'updated' field."
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
                  updated:
                    type: array
                    description: A list of photos whose favorite status was successfully changed.
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
                  not_updated:
                    type: array
                    description: A list of photos whose favorite status was not changed.
                    items:
                      $ref: '#/components/schemas/PhotoDetail'
        '401':
          description: Authentication required.

