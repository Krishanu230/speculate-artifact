          items:
            $ref: '#/components/schemas/PersonFaceList'
        updated:
          type: array
          description: Faces successfully updated
          items:
            $ref: '#/components/schemas/PersonFaceList'
        not_updated:
          type: array
          description: Faces that could not be updated (not owned by the user)
          items:
            $ref: '#/components/schemas/PersonFaceList'

    SunburstNode:
      type: object
      required:
