          type: integer
          readOnly: true
          description: 'Unique identifier for the album thing'
        cover_photos:
          type: array
          items:
            $ref: '#/components/schemas/PhotoHashList'
          readOnly: true
          description: 'Collection of cover photos for this album thing'
        title:
          type: string
          maxLength: 512
          description: 'Title of the album thing'
        photo_count:
          type: integer
          readOnly: true
          description: 'Number of photos in this album thing'
        thing_type:
          type: string
          nullable: true
          maxLength: 512
          description: 'Type of thing this album represents'
