          type: integer
          description: 'Total number of album users that match the query'
        next:
          type: string
          nullable: true
          format: uri
          description: 'URL to the next page of results (if available)'
        previous:
          type: string
          nullable: true
          format: uri
          description: 'URL to the previous page of results (if available)'
        results:
          type: array
          items:
            $ref: '#/components/schemas/AlbumUser'
          description: 'List of album users for the current page'
    
    # Used for full output responses
    AlbumUser:
      type: object
      properties:
