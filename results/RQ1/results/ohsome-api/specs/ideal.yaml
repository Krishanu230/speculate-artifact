        - $ref: '#/components/parameters/keys'
        - $ref: '#/components/parameters/values'
        - $ref: '#/components/parameters/showMetadata'
        - $ref: '#/components/parameters/timeout'
      responses:
        '200':
          $ref: '#/components/responses/SuccessGroupByResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Elements Perimeter
      summary: Get element perimeter density grouped by tag (POST)
      operationId: perimeterDensityGroupByTag_post
      requestBody:
        $ref: '#/components/requestBodies/GroupByTagRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessGroupByResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /elements/perimeter/ratio:
    get:
      tags:
        - Elements Perimeter
      summary: Get the ratio of element perimeter between two filters
      description: Calculates the ratio of the total perimeter of elements matching `filter2` to the total perimeter of elements matching `filter`.
      operationId: perimeterRatio
      parameters:
        - $ref: '#/components/parameters/timeSnapshot'
        - $ref: '#/components/parameters/bpolys'
        - $ref: '#/components/parameters/bboxes'
        - name: format
          in: query
          required: false
          description: Response format; one of "json", "csv", or "geojson".
          schema:
            type: string
            enum:
              - json
              - csv
              - geojson
        - $ref: '#/components/parameters/bcircles'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/filter2'
        - $ref: '#/components/parameters/showMetadata'
        - $ref: '#/components/parameters/timeout'
      responses:
        '200':
          $ref: '#/components/responses/SuccessRatioResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Elements Perimeter
      summary: Get the ratio of element perimeter between two filters (POST)
      operationId: perimeterRatio_post
      requestBody:
        $ref: '#/components/requestBodies/RatioRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessRatioResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /elements/perimeter/ratio/groupBy/boundary:
    get:
      tags:
        - Elements Perimeter
      summary: Get the perimeter ratio grouped by boundary
      description: Calculates the perimeter ratio between two filters, grouped by the individual geometries provided in the boundary parameter.
      operationId: perimeterRatioGroupByBoundary
      parameters:
        - $ref: '#/components/parameters/timeSnapshot'
        - $ref: '#/components/parameters/bpolys'
        - $ref: '#/components/parameters/bboxes'
        - $ref: '#/components/parameters/bcircles'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/filter2'
        - $ref: '#/components/parameters/showMetadata'
        - $ref: '#/components/parameters/timeout'
        - $ref: '#/components/parameters/format'
      responses:
        '200':
          $ref: '#/components/responses/SuccessRatioGroupByBoundaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Elements Perimeter
      summary: Get the perimeter ratio grouped by boundary (POST)
      operationId: perimeterRatioGroupByBoundary_post
      requestBody:
        $ref: '#/components/requestBodies/RatioRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessRatioGroupByBoundaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  parameters:
    timeInterval:
      name: time
      in: query
      required: true
      description: Two ISO-8601 conformant timestamps defining a time interval, separated by a comma.
      schema:
        type: string
        example: 2016-01-01,2017-01-01
    timeSnapshot:
      name: time
      in: query
      required: false
      description: One or more comma-separated ISO-8601 conformant timestamps. If not provided, the latest available timestamp in the database is used.
      schema:
        type: string
        example: 2018-01-01T12:00:00Z,2019-01-01T12:00:00Z
    bpolys:
      name: bpolys
      in: query
      description: One or more polygonal geometries that define the area of interest. Can be provided as a pipe-separated list of coordinate pairs or as a GeoJSON Geometry object.
      schema:
        type: string
        example: 8.6756,49.4184,8.6756,49.4208,8.678,49.4208,8.678,49.4184,8.6756,49.4184
    bboxes:
      name: bboxes
      in: query
      description: One or more rectangular bounding boxes that define the area of interest, separated by pipes (`|`).
      schema:
        type: string
        example: 7.0,49.0,7.1,49.1|8.5,50.0,8.6,50.1
    bcircles:
      name: bcircles
      in: query
      description: One or more circular areas of interest, separated by pipes (`|`). Each circle is defined by `lon,lat,radius` where radius is in meters.
      schema:
        type: string
        example: 8.6822,49.4042,1000
    filter:
      name: filter
      in: query
      description: A filter expression to select OSM entities. Cannot be used together with `types`, `keys`, or `values`.
      schema:
        type: string
        example: building=yes and type:way
    filter2:
      name: filter2
      in: query
      description: A second filter, used in /ratio endpoints. The result will be the ratio of elements matching `filter2` to elements matching `filter`.
      schema:
        type: string
        example: building=house
    types:
      name: types
      in: query
      description: A comma-separated list of OSM entity types (`node`, `way`, `relation`) or simple feature geometry types (`point`, `line`, `polygon`).
      schema:
        type: string
        example: way,relation
    keys:
      name: keys
      in: query
      description: A comma-separated list of OSM tag keys to filter by.
      schema:
        type: string
        example: highway
    values:
      name: values
      in: query
      description: A comma-separated list of OSM tag values to filter by. Must be used in conjunction with `keys`.
      schema:
        type: string
        example: residential,primary
    propertiesContributions:
      name: properties
      in: query
      description: A comma-separated list to select which properties to include in the output features.
      schema:
        type: string
        enum:
          - tags
          - metadata
          - contributionTypes
        example: tags,metadata
    propertiesElements:
      name: properties
      in: query
      description: A comma-separated list to select which properties to include in the output features.
      schema:
        type: string
        enum:
          - tags
          - metadata
        example: tags,metadata
    clipGeometry:
      name: clipGeometry
      in: query
      description: Whether to clip the geometries of the output features to the specified boundary.
      schema:
        type: boolean
        default: true
    contributionType:
      name: contributionType
      in: query
      description: Filter by type of contribution. Can be a comma-separated list of 'creation', 'deletion', 'tagChange', 'geometryChange'.
      schema:
        type: string
    groupByKey:
      name: groupByKey
      in: query
      required: true
      description: The OSM key to group results by.
      schema:
        type: string
        example: building
    groupByKeys:
      name: groupByKeys
      in: query
      required: true
      description: A comma-separated list of OSM keys to group results by.
      schema:
        type: string
        example: highway,building
    groupByValues:
      name: groupByValues
      in: query
      description: A comma-separated list of OSM values to include in the grouping. Used with `groupByKey`.
      schema:
        type: string
        example: yes,house,apartments
    format:
      name: format
      in: query
      description: Output format. Only applicable for `groupBy/boundary` endpoints.
      schema:
        type: string
        enum:
          - json
          - geojson
          - csv
        default: json
    showMetadata:
      name: showMetadata
      in: query
      description: Whether to include a metadata object in the response.
      schema:
        type: boolean
        default: false
    timeout:
      name: timeout
      in: query
      description: Overrides the default request timeout in seconds.
      schema:
        type: number
  requestBodies:
    ContributionsExtractionRequest:
      description: Parameters for a contributions request. Useful for large `bpolys` values.
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              time:
                $ref: '#/components/parameters/timeInterval/schema'
              bpolys:
                $ref: '#/components/parameters/bpolys/schema'
              bboxes:
                $ref: '#/components/parameters/bboxes/schema'
              bcircles:
                $ref: '#/components/parameters/bcircles/schema'
              filter:
                $ref: '#/components/parameters/filter/schema'
              types:
                $ref: '#/components/parameters/types/schema'
              keys:
                $ref: '#/components/parameters/keys/schema'
              values:
                $ref: '#/components/parameters/values/schema'
              properties:
                $ref: '#/components/parameters/propertiesContributions/schema'
              clipGeometry:
                $ref: '#/components/parameters/clipGeometry/schema'
              showMetadata:
                $ref: '#/components/parameters/showMetadata/schema'
              timeout:
                $ref: '#/components/parameters/timeout/schema'
              format:
                  type: string
                  enum:
                    - geojson
                    - json
                    - csv
            required:
              - time
    FullHistoryExtractionRequest:
      description: Parameters for a full history elements request. Useful for large `bpolys` values.
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              time:
                $ref: '#/components/parameters/timeInterval/schema'
              bpolys:
                $ref: '#/components/parameters/bpolys/schema'
              bboxes:
                $ref: '#/components/parameters/bboxes/schema'
              bcircles:
                $ref: '#/components/parameters/bcircles/schema'
              filter:
                $ref: '#/components/parameters/filter/schema'
              types:
                $ref: '#/components/parameters/types/schema'
              keys:
                $ref: '#/components/parameters/keys/schema'
              values:
                $ref: '#/components/parameters/values/schema'
              properties:
                $ref: '#/components/parameters/propertiesElements/schema'
              clipGeometry:
                $ref: '#/components/parameters/clipGeometry/schema'
              showMetadata:
                $ref: '#/components/parameters/showMetadata/schema'
              timeout:
                $ref: '#/components/parameters/timeout/schema'
              format:
                  type: string
                  enum:
                    - geojson
                    - json
                    - csv
            required:
              - time
    ElementsExtractionRequest:
      description: Parameters for an elements request. Useful for large `bpolys` values.
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              time:
                $ref: '#/components/parameters/timeSnapshot/schema'
              bpolys:
                $ref: '#/components/parameters/bpolys/schema'
              bboxes:
                $ref: '#/components/parameters/bboxes/schema'
              bcircles:
                $ref: '#/components/parameters/bcircles/schema'
              filter:
                $ref: '#/components/parameters/filter/schema'
              types:
                $ref: '#/components/parameters/types/schema'
              keys:
                $ref: '#/components/parameters/keys/schema'
              values:
                $ref: '#/components/parameters/values/schema'
              properties:
                $ref: '#/components/parameters/propertiesElements/schema'
              clipGeometry:
                $ref: '#/components/parameters/clipGeometry/schema'
              showMetadata:
                $ref: '#/components/parameters/showMetadata/schema'
              timeout:
                $ref: '#/components/parameters/timeout/schema'
              format:
                  type: string
                  enum:
                    - geojson
                    - json
                    - csv
    AggregationRequest:
      description: Parameters for an aggregation request.
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/AggregationRequestParameters'
    GroupByTagRequest:
      description: Parameters for a groupBy/tag aggregation request.
      content:
        application/x-www-form-urlencoded:
          schema:
            allOf:
              - $ref: '#/components/schemas/AggregationRequestParameters'
              - type: object
                properties:
                  groupByKey:
                    $ref: '#/components/parameters/groupByKey/schema'
                  groupByValues:
                    $ref: '#/components/parameters/groupByValues/schema'
                required:
                  - groupByKey
    GroupByKeyRequest:
      description: Parameters for a groupBy/key aggregation request.
      content:
        application/x-www-form-urlencoded:
          schema:
            allOf:
              - $ref: '#/components/schemas/AggregationRequestParameters'
              - type: object
                properties:
                  groupByKeys:
                    $ref: '#/components/parameters/groupByKeys/schema'
                required:
                  - groupByKeys
    RatioRequest:
      content:
        application/x-www-form-urlencoded:
          schema:
            allOf:
              - $ref: '#/components/schemas/AggregationRequestParameters'
              - type: object
                properties:
                  filter2:
                    $ref: '#/components/parameters/filter2/schema'
  responses:
    SuccessContributionsExtractionResponse:
      description: A GeoJSON FeatureCollection containing the requested OSM contributions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContributionsExtractionResponse'
    SuccessElementsExtractionResponse:
      description: A GeoJSON FeatureCollection containing the requested OSM data snapshots.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ElementsExtractionResponse'
    SuccessFullHistoryResponse:
      description: A GeoJSON FeatureCollection containing the full history of the requested OSM elements.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FullHistoryExtractionResponse'
    SuccessAggregationResponse:
      description: A successful aggregation response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DefaultAggregationResponse'
        text/csv:
          schema:
            type: string
            description: CSV formatted aggregation results.
    SuccessGroupByResponse:
      description: A successful groupBy aggregation response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GroupByResponse'
        text/csv:
          schema:
            type: string
            description: CSV formatted aggregation results.
    RatioResponse:
      type: object
      properties:
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        ratioResult:
          type: array
          items:
            $ref: '#/components/schemas/RatioResult'
    RatioGroupByBoundaryResponse:
      type: object
      properties:
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        groupByBoundaryResult:
          type: array
          items:
            $ref: '#/components/schemas/RatioGroupByResult'
        type:
          type: string
        features:
          type: array
          items:
            type: object
    ElementsResult:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
    GroupByResult:
      type: object
      properties:
        groupByObject:
          oneOf:
            - type: string
            - type: array
              items: {}
        result:
          type: array
          items:
            $ref: '#/components/schemas/ElementsResult'
    RatioResult:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          description: Value corresponding to the initial filter parameters.
        value2:
          type: number
          description: Value corresponding to the second (filter2) parameters.
        ratio:
          type: number
          description: Ratio of value2 / value.
    RatioGroupByResult:
      type: object
      properties:
        groupByObject:
          oneOf:
            - type: string
            - type: array
              items: {}
        ratioResult:
          type: array
          items:
            $ref: '#/components/schemas/RatioResult'
    SuccessRatioResponse:
      description: A successful ratio aggregation response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RatioResponse'
        text/csv:
          schema:
            type: string
    SuccessRatioGroupByBoundaryResponse:
      description: A successful ratio groupBy boundary response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RatioGroupByBoundaryResponse'
        text/csv:
          schema:
            type: string
    BadRequest:
      description: |
        Bad Request. The request was malformed or contained invalid parameters. Examples include:
        - `time` parameter is missing or invalid for the endpoint.
        - More than one boundary parameter (`bpolys`, `bboxes`, `bcircles`) is provided.
        - `filter` is used alongside `keys`, `values`, or `types`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal Server Error. An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Service Unavailable. The cluster backend is currently not able to process the request. Please try again later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    ContributionsExtractionResponse:
      type: object
      required:
        - type
        - attribution
        - apiVersion
        - features
      properties:
        type:
          type: string
          description: The GeoJSON type of the object.
          example: FeatureCollection
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
          description: The version of the ohsome API.
          example: 1.6.0
        metadata:
          $ref: '#/components/schemas/Metadata'
        features:
          type: array
          description: A list of GeoJSON features, where each feature represents one OSM contribution.
          items:
            $ref: '#/components/schemas/ContributionFeature'
    ElementsExtractionResponse:
      type: object
      required:
        - type
        - attribution
        - apiVersion
        - features
      properties:
        type:
          type: string
          description: The GeoJSON type of the object.
          example: FeatureCollection
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
          description: The version of the ohsome API.
          example: 1.6.0
        metadata:
          $ref: '#/components/schemas/Metadata'
        features:
          type: array
          description: A list of GeoJSON features, where each feature represents one OSM object at a given snapshot time.
          items:
            $ref: '#/components/schemas/ElementFeature'
    FullHistoryExtractionResponse:
      type: object
      required:
        - type
        - attribution
        - apiVersion
        - features
      properties:
        type:
          type: string
          description: The GeoJSON type of the object.
          example: FeatureCollection
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
          description: The version of the ohsome API.
          example: 1.6.0
        metadata:
          $ref: '#/components/schemas/Metadata'
        features:
          type: array
          description: A list of GeoJSON features, where each feature represents one version of an OSM object.
          items:
            $ref: '#/components/schemas/FullHistoryFeature'
    Attribution:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: URL to the copyright and license information.
        text:
          type: string
          description: Copyright information about the used data.
    Metadata:
      type: object
      nullable: true
      properties:
        executionTime:
          type: integer
          format: int64
          description: Time in milliseconds the server needed to execute the request.
        description:
          type: string
          description: A human-readable description of the result.
        requestUrl:
          type: string
          format: uri
          description: The request URL that generated this response.
    ContributionFeature:
      type: object
      properties:
        type:
          type: string
          example: Feature
        geometry:
          type: object
          nullable: true
          description: The GeoJSON geometry of the object. This will be `null` for deletion contributions.
        properties:
          $ref: '#/components/schemas/ContributionFeatureProperties'
    ElementFeature:
      type: object
      properties:
        type:
          type: string
          example: Feature
        geometry:
          type: object
          nullable: true
          description: The GeoJSON geometry of the object.
        properties:
          $ref: '#/components/schemas/ElementFeatureProperties'
    ContributionFeatureProperties:
      type: object
      description: Properties of the contribution feature.
      properties:
        '@osmId':
          type: string
          description: The unique identifier of the OSM entity, prefixed with its type.
          example: way/24167384
        '@timestamp':
          type: string
          format: date-time
          description: The timestamp of the contribution event.
        '@contributionChangesetId':
          type: integer
          description: The changeset ID in which this contribution occurred.
          example: 38479901
        '@version':
          type: integer
          description: The version number of the OSM entity after the contribution. Included if `properties=metadata`.
          example: 2
        '@osmType':
          type: string
          description: The type of the OSM entity. Included if `properties=metadata`.
          example: way
        '@changesetId':
          type: integer
          description: The changeset ID of the OSM entity itself. Included if `properties=metadata`.
          example: 38479901
        '@creation':
          type: boolean
          description: Indicates if the contribution was a creation event. Included if `properties=contributionTypes`.
        '@deletion':
          type: boolean
          description: Indicates if the contribution was a deletion event. Included if `properties=contributionTypes`.
        '@tagChange':
          type: boolean
          description: Indicates if the contribution involved a tag change. Included if `properties=contributionTypes`.
        '@geometryChange':
          type: boolean
          description: Indicates if the contribution involved a geometry change. Included if `properties=contributionTypes`.
      additionalProperties:
        description: If `properties=tags` is requested, the OSM tags of the entity will be included here as key-value pairs.
        type: string
    ElementFeatureProperties:
      type: object
      description: Properties of the element feature.
      properties:
        '@osmId':
          type: string
          description: The unique identifier of the OSM entity, prefixed with its type.
          example: way/24167384
        '@snapshotTimestamp':
          type: string
          format: date-time
          description: The timestamp of the data snapshot this feature belongs to.
        '@lastEdit':
          type: string
          format: date-time
          description: The timestamp when this version of the entity was created. Included if `properties=metadata`.
        '@version':
          type: integer
          description: The version number of the OSM entity. Included if `properties=metadata`.
          example: 2
        '@osmType':
          type: string
          description: The type of the OSM entity. Included if `properties=metadata`.
          example: way
        '@changesetId':
          type: integer
          description: The changeset ID in which this version of the entity was created. Included if `properties=metadata`.
          example: 38479901
      additionalProperties:
        description: If `properties=tags` is requested, the OSM tags of the entity will be included here as key-value pairs.
        type: string
    FullHistoryFeature:
      type: object
      properties:
        type:
          type: string
          example: Feature
        geometry:
          type: object
          nullable: true
          description: The GeoJSON geometry of the object version.
        properties:
          $ref: '#/components/schemas/FullHistoryFeatureProperties'
    FullHistoryFeatureProperties:
      type: object
      description: Properties of the full history feature.
      properties:
        '@osmId':
          type: string
          description: The unique identifier of the OSM entity, prefixed with its type.
          example: way/24167384
        '@validFrom':
          type: string
          format: date-time
          description: The timestamp marking the beginning of this version's validity.
        '@validTo':
          type: string
          format: date-time
          description: The timestamp marking the end of this version's validity.
        '@version':
          type: integer
          description: The version number of the OSM entity. Included if `properties=metadata`.
          example: 2
        '@osmType':
          type: string
          description: The type of the OSM entity. Included if `properties=metadata`.
          example: way
        '@changesetId':
          type: integer
          description: The changeset ID in which this version of the entity was created. Included if `properties=metadata`.
          example: 38479901
      additionalProperties:
        description: If `properties=tags` is requested, the OSM tags of the entity will be included here as key-value pairs.
        type: string
    AggregationRequestParameters:
      type: object
      properties:
        time:
          $ref: '#/components/parameters/timeInterval/schema'
        bpolys:
          $ref: '#/components/parameters/bpolys/schema'
        bboxes:
          $ref: '#/components/parameters/bboxes/schema'
        bcircles:
          $ref: '#/components/parameters/bcircles/schema'
        filter:
          $ref: '#/components/parameters/filter/schema'
        types:
          $ref: '#/components/parameters/types/schema'
        keys:
          $ref: '#/components/parameters/keys/schema'
        values:
          $ref: '#/components/parameters/values/schema'
        contributionType:
          $ref: '#/components/parameters/contributionType/schema'
        showMetadata:
          $ref: '#/components/parameters/showMetadata/schema'
        timeout:
          $ref: '#/components/parameters/timeout/schema'
        format:
                  type: string
                  enum:
                    - geojson
                    - json
                    - csv
                  default: json
                  description: Response format ('geojson', 'json', or 'csv')
      required:
        - time
    DefaultAggregationResponse:
      type: object
      properties:
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
          example: 1.6.0
        metadata:
          $ref: '#/components/schemas/Metadata'
        result:
          type: array
          items:
            $ref: '#/components/schemas/ContributionsResult'
    GroupByResponse:
      type: object
      properties:
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
          example: 1.6.0
        metadata:
          $ref: '#/components/schemas/Metadata'
        groupByResult:
          type: array
          items:
            $ref: '#/components/schemas/GroupByResult'
        type:
          type: string
          description: The GeoJSON type. Present only when format=geojson.
          example: FeatureCollection
        features:
          type: array
          description: An array of GeoJSON features. Present only when format=geojson.
          items:
            type: object
    RatioResponse:
      type: object
      properties:
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        ratioResult:
          type: array
          items:
            $ref: '#/components/schemas/RatioResult'
    RatioGroupByBoundaryResponse:
      type: object
      properties:
        attribution:
          $ref: '#/components/schemas/Attribution'
        apiVersion:
          type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
        groupByBoundaryResult:
          type: array
          items:
            $ref: '#/components/schemas/RatioGroupByResult'
        type:
          type: string
        features:
          type: array
          items:
            type: object
    ContributionsResult:
      type: object
      properties:
        fromTimestamp:
          type: string
          format: date-time
        toTimestamp:
          type: string
          format: date-time
        value:
          type: number
    ElementsResult:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
    RatioResult:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        value:
