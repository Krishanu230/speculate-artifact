          example: way
        result:
          type: array
          items:
            $ref: '#/components/schemas/ContributionsResult'
    ExtractRegion:
      type: object
      description: Object holding the spatial and temporal extent of the data extract.
      properties:
        spatialExtent:
          type: object
          description: A GeoJSON object representing the spatial extent of this extract region.
          example:
            type: Polygon
            coordinates:
              - - - 8.6
                  - 49.3
                - - 8.7
                  - 49.3
                - - 8.7
                  - 49.4
                - - 8.6
                  - 49.4
                - - 8.6
                  - 49.3
        temporalExtent:
          $ref: '#/components/schemas/TemporalExtent'
