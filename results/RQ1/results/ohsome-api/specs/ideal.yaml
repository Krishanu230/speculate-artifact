    RatioGroupByResult:
      type: object
      properties:
        groupByObject:
          oneOf:
            - type: string
            - type: array
              items: {}
        ratioResult:
          type: array
          items:
            $ref: '#/components/schemas/RatioResult'
    GroupByResult:
      type: object
      properties:
        groupByObject:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
