openapi: 3.0.3
info:
  title: ohsome API - Data Extraction
  description: |-
    This API provides access to OpenStreetMap (OSM) history data through two main resource types:

    - **Contributions**: Events of object creation, modification, or deletion.
    - **Elements**: Snapshots of OSM objects as they existed at specific moments in time.

    The data is returned as a GeoJSON FeatureCollection. The API supports complex spatial and temporal filtering and allows customization of the output geometry and properties.

    - All endpoints support both `GET` and `POST` requests. For `POST` requests, parameters should be sent in the body with a content type of `application/x-www-form-urlencoded`.
    - At least one boundary parameter (`bpolys`, `bboxes`, or `bcircles`) must be provided.
  version: 1.6.0
  contact:
    name: HeiGIT - Heidelberg Institute for Geoinformation Technology
    url: https://heigit.org/
    email: ohsome@heigit.org
  license:
    name: 'Data: © OpenStreetMap contributors | Database: ODbL 1.0'
    url: https://www.openstreetmap.org/copyright
servers:
  - url: https://api.ohsome.org/v1
    description: ohsome API Production Server
tags:
  - name: Contributions Extraction
    description: Endpoints for extracting OSM contribution data as GeoJSON.
  - name: Elements Extraction
    description: Endpoints for extracting OSM data snapshots as GeoJSON.
paths:
  /metadata:
    get:
      tags:
        - Metadata
      summary: Get metadata of the OSHDB data
      description: Returns metadata about the underlying OSHDB data extract, including its spatial and temporal coverage. This endpoint does not accept any parameters.
      operationId: getMetadata
      responses:
        '200':
          description: A successful response containing the OSHDB metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataResponse'
        '400':
          description: Bad Request. This error is returned if any query parameters are unexpectedly provided to the endpoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /contributions/geometry:
    get:
      tags:
        - Contributions Extraction
      summary: Get contributions with raw object geometry
      description: |-
        Returns all contributions within the given time range and spatial boundaries.
        Each feature in the response will have the full, detailed geometry of the respective OSM object at the time of the contribution.
      operationId: contributionsGeometry
      parameters:
        - $ref: '#/components/parameters/timeInterval'
        - $ref: '#/components/parameters/bpolys'
        - $ref: '#/components/parameters/bboxes'
        - name: format
          in: query
          required: false
          description: Response format; one of "json", "csv", or "geojson".
          schema:
            type: string
            enum:
              - json
              - csv
              - geojson
        - $ref: '#/components/parameters/bcircles'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/types'
        - $ref: '#/components/parameters/keys'
        - $ref: '#/components/parameters/values'
        - $ref: '#/components/parameters/propertiesContributions'
        - $ref: '#/components/parameters/clipGeometry'
        - $ref: '#/components/parameters/showMetadata'
        - $ref: '#/components/parameters/timeout'
      responses:
        '200':
          $ref: '#/components/responses/SuccessContributionsExtractionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
        - Contributions Extraction
      summary: Get contributions with raw object geometry (POST)
      description: |-
        Returns all contributions within the given time range and spatial boundaries.
        Each feature in the response will have the full, detailed geometry of the respective OSM object at the time of the contribution.
        This method is useful for passing large `bpolys` GeoJSON objects that may exceed URL length limits.
      operationId: contributionsGeometry_post
      requestBody:
        $ref: '#/components/requestBodies/ContributionsExtractionRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessContributionsExtractionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
