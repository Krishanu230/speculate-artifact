          type: integer
          description: The replication sequence number of the data extract.
    TemporalExtent:
      type: object
      description: The temporal extent of the data extract.
      properties:
        fromTimestamp:
          type: string
          format: date-time
          description: The earliest timestamp available in the data extract.
        toTimestamp:
          type: string
          format: date-time
          description: The latest timestamp available in the data extract.
    Error:
