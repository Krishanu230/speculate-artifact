        projectID:
          type: string
        uri:
          type: string

    Document:
      type: object
      properties:
        id:
          type: string
        documentType:
          type: string
        title:
          type: string
        description:
          type: string
        url:
          type: string
        datePublished:
          type: string
          format: date-time
        dateModified:
          type: string
          format: date-time
        format:
          type: string
        language:
          type: string

    Item:
      type: object
      properties:
        id:
          type: string
