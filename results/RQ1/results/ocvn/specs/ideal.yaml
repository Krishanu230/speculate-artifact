  /api/ocds/package/all:
    get:
      tags:
        - "OCDS"
      summary: "Returns all available release packages"
      description: "Returns all available release packages, filtered by the given criteria. Each package contains OCDS package metadata and a single release object."
      operationId: "ocdsPackages_GET"
      parameters:
        - name: "pageNumber"
          in: "query"
          description: "The page number to be displayed (0-indexed). Defaults to 0."
          schema:
            type: "integer"
            format: "int32"
            minimum: 0
            default: 0
        - name: "pageSize"
          in: "query"
          description: "Number of items per page. Defaults to 300, with a maximum
            of 1000."
          schema:
            type: "integer"
            format: "int32"
            minimum: 1
            maximum: 1000
            default: 300
        # Parameters from DefaultFilterPagingRequest
        - name: "bidTypeId"
          in: "query"
          description: "Filter by tender item classification ID (tender.items.classification._id).
            Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "notBidTypeId"
          in: "query"
          description: "Exclude tenders with the given item classification IDs."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "procuringEntityId"
          in: "query"
          description: "Filter by procuring entity ID. Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "notProcuringEntityId"
          in: "query"
          description: "Exclude tenders with the given procuring entity IDs."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "supplierId"
          in: "query"
          description: "Filter by supplier ID. Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "bidSelectionMethod"
          in: "query"
          description: "Filter by tender procurement method details. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "notBidSelectionMethod"
          in: "query"
          description: "Exclude tenders with the given procurement method details."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "contrMethod"
          in: "query"
          description: "Filter by tender.contrMethod.id. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "planningLoc"
          in: "query"
          description: "Filter by planning budget location ID (planning.budget.projectLocation._id).
            Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "tenderLoc"
          in: "query"
          description: "Filter by tender item delivery location ID (tender.items.deliveryLocation._id).
            Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "procurementMethod"
          in: "query"
          description: "Filter by tender procurement method. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "minTenderValue"
          in: "query"
          description: "Filter by a minimum tender value amount."
          schema:
            type: "number"
        - name: "maxTenderValue"
          in: "query"
          description: "Filter by a maximum tender value amount."
          schema:
            type: "number"
        - name: "minAwardValue"
          in: "query"
          description: "Filter by a minimum award value amount."
          schema:
            type: "number"
        - name: "maxAwardValue"
          in: "query"
          description: "Filter by a maximum award value amount."
          schema:
            type: "number"
        - name: "procuringEntityCityId"
          in: "query"
          description: "Filter by procuring entity's city postal code. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "electronicSubmission"
          in: "query"
          description: "Filter for tenders with electronic submission."
          schema:
            type: "boolean"
        - name: "procuringEntityDepartmentId"
          in: "query"
          description: "Filter by procuring entity's department ID. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
            uniqueItems: true
        - name: "procuringEntityGroupId"
          in: "query"
          description: "Filter by procuring entity's group ID. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
            uniqueItems: true
        - name: "flagged"
          in: "query"
          description: "Filter for releases that have been flagged by at least one
            indicator."
          schema:
            type: "boolean"
        # Parameters from YearFilterPagingRequest
        - name: "year"
          in: "query"
          description: "Filter by the year of the award date. Accepts a comma-separated
            list of years."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
              minimum: 1900
              maximum: 2200
            uniqueItems: true
        - name: "month"
          in: "query"
          description: "Filter by the month of the award date (1-12). Only applies
            when a single year is specified."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
              minimum: 1
              maximum: 12
            uniqueItems: true
        - name: "monthly"
          in: "query"
          description: "If true, groups the results by month within each year."
          schema:
            type: "boolean"
            default: false
      responses:
        '200':
          description: "A list of release packages matching the filter criteria."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: '#/components/schemas/ReleasePackage'
