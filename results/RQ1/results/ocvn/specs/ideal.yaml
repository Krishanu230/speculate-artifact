            schema:
              type: "object"
              properties:
                # Parameters from GenericPagingRequest
                "pageNumber":
                  type: "integer"
                  format: "int32"
                  minimum: 0
                  default: 0
                "pageSize":
                  type: "integer"
                  format: "int32"
                  minimum: 1
                  maximum: 1000
                  default: 300
                # Parameters from DefaultFilterPagingRequest
                "bidTypeId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notBidTypeId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "procuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notProcuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "supplierId":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "bidSelectionMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "notBidSelectionMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "contrMethod":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "planningLoc":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "tenderLoc":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "procurementMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "minTenderValue":
                  type: "number"
                "maxTenderValue":
                  type: "number"
                "minAwardValue":
                  type: "number"
                "maxAwardValue":
                  type: "number"
                "procuringEntityCityId":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "electronicSubmission":
                  type: "boolean"
                "procuringEntityDepartmentId":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                  uniqueItems: true
                "procuringEntityGroupId":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                  uniqueItems: true
                "flagged":
                  type: "boolean"
                # Parameters from YearFilterPagingRequest
                "year":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                    minimum: 1900
                    maximum: 2200
                  uniqueItems: true
                "month":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                    minimum: 1
                    maximum: 12
                  uniqueItems: true
                "monthly":
                  type: "boolean"
                  default: false

      responses:
        '200':
          description: "Successfully calculated and returned the average award periods."
          content:
            application/json:
              schema:
                # Response schema is identical to the GET request
                $ref: "#/paths/~1api~1averageAwardPeriod/get/responses/200/content/application~1json/schema"

