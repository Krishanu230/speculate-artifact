  /userDashboards/search/getDefaultDashboardForCurrentUser:
    get:
      tags:
        - "User Dashboards"
      summary: "Get the default dashboard for the current user"
      description: "Retrieves the single dashboard marked as the default for the currently authenticated user. Requires the 'ROLE_PROCURING_ENTITY' role."
      operationId: "getDefaultDashboardForCurrentUser_GET"
      responses:
        '200':
          description: "The default user dashboard resource, or an empty response if none is set."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDashboardResource'
        '401':
          description: "Unauthorized."
        '403':
          description: "Forbidden."
    post:
      # POST is supported but functions identically to GET
      tags: [ "User Dashboards" ]
      summary: "Get the default dashboard for the current user"
      operationId: "getDefaultDashboardForCurrentUser_POST"
      responses:
        '200':
          $ref: '#/paths/~1userDashboards~1search~1getDefaultDashboardForCurrentUser/get/responses/200'
        '401':
          $ref: '#/paths/~1userDashboards~1search~1getDefaultDashboardForCurrentUser/get/responses/401'
        '403':
          $ref: '#/paths/~1userDashboards~1search~1getDefaultDashboardForCurrentUser/get/responses/403'

  /userDashboards/getCurrentAuthenticatedUserDetails:
    get:
      tags:
        - "User Dashboards"
      summary: "Get the details of the current user"
      description: "Retrieves the full 'Person' object for the currently authenticated user."
      operationId: "getCurrentAuthenticatedUserDetails_GET"
      responses:
        '200':
          description: "The current user's details, or an empty response if not authenticated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Person'
        '401':
          description: "Unauthorized."
    post:
      # POST is supported but functions identically to GET
      tags: [ "User Dashboards" ]
      summary: "Get the details of the current user"
      operationId: "getCurrentAuthenticatedUserDetails_POST"
      responses:
        '200':
          $ref: '#/paths/~1userDashboards~1getCurrentAuthenticatedUserDetails/get/responses/200'
        '401':
          $ref: '#/paths/~1userDashboards~1getCurrentAuthenticatedUserDetails/get/responses/401'

  /userDashboards/search/getDashboardsForCurrentUser:
    get:
      tags:
        - "User Dashboards"
      summary: "Get all dashboards for the current user"
      description: "Retrieves a paginated list of all dashboards associated with the currently authenticated user. Requires the 'ROLE_PROCURING_ENTITY' role."
      operationId: "getDashboardsForCurrentUser_GET"
      parameters:
        - name: "page"
          in: "query"
          description: "The page number to retrieve (0-indexed)."
          schema:
            type: "integer"
        - name: "size"
          in: "query"
          description: "The number of items per page."
          schema:
            type: "integer"
        - name: "sort"
          in: "query"
          description: "Sorting criteria in the format: property,(asc|desc). Default sort order is ascending. Multiple sort criteria are supported."
          schema:
            type: "string"
      responses:
        '200':
          description: "A paginated list of user dashboard resources."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUserDashboardResources'
        '401':
          description: "Unauthorized."
        '403':
          description: "Forbidden."
    post:
      # POST is supported but functions identically to GET
      tags: [ "User Dashboards" ]
      summary: "Get all dashboards for the current user"
      operationId: "getDashboardsForCurrentUser_POST"
      parameters:
        - $ref: '#/paths/~1userDashboards~1search~1getDashboardsForCurrentUser/get/parameters/0'
        - $ref: '#/paths/~1userDashboards~1search~1getDashboardsForCurrentUser/get/parameters/1'
        - $ref: '#/paths/~1userDashboards~1search~1getDashboardsForCurrentUser/get/parameters/2'
      responses:
        '200':
          $ref: '#/paths/~1userDashboards~1search~1getDashboardsForCurrentUser/get/responses/200'
        '401':
          $ref: '#/paths/~1userDashboards~1search~1getDashboardsForCurrentUser/get/responses/401'
        '403':
          $ref: '#/paths/~1userDashboards~1search~1getDashboardsForCurrentUser/get/responses/403'

  /userDashboards/saveDashboardForCurrentUser:
    post:
      tags:
        - "User Dashboards"
      summary: "Save a new dashboard for the current user"
      description: "Saves a new dashboard and associates it with the currently authenticated user. Requires the 'ROLE_PROCURING_ENTITY' role."
      operationId: "saveDashboardForCurrentUser_POST"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDashboard'
      responses:
        '200':
          description: "Dashboard saved successfully."
        '401':
          description: "Unauthorized."
        '403':
          description: "Forbidden."

  /userDashboards/saveDashboard:
    post:
      tags:
        - "User Dashboards"
      summary: "Save a new dashboard (Admin)"
      description: "Saves a new dashboard. This endpoint does not automatically associate the dashboard with the current user. Requires the 'ROLE_ADMIN' role."
      operationId: "saveDashboard_POST"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDashboard'
      responses:
        '200':
          description: "Dashboard saved successfully."
        '401':
          description: "Unauthorized."
        '403':
          description: "Forbidden."


components:
  schemas:
    ReleaseFlags:
      type: "object"
      description: "Represents the list of all possible red flags at the Release level."
      properties:
        i038:
          $ref: '#/components/schemas/Flag'
        i003:
          $ref: '#/components/schemas/Flag'
        i007:
          $ref: '#/components/schemas/Flag'
        i004:
          $ref: '#/components/schemas/Flag'
        i077:
          $ref: '#/components/schemas/Flag'
        i019:
          $ref: '#/components/schemas/Flag'
        i180:
          $ref: '#/components/schemas/Flag'
        i002:
          $ref: '#/components/schemas/Flag'
        i085:
          $ref: '#/components/schemas/Flag'
        i171:
          $ref: '#/components/schemas/Flag'
        flaggedStats:
          type: "array"
          items:
            $ref: '#/components/schemas/FlagTypeCount'
        eligibleStats:
          type: "array"
          items:
            $ref: '#/components/schemas/FlagTypeCount'
        totalFlagged:
          type: "integer"
          description: "Total number of indicators flagged for a release."

    Flag:
      type: "object"
      properties:
        types:
          type: "array"
          items:
            type: "string"
            enum: ["RIGGING", "FRAUD", "COLLUSION"]
        value:
          type: "boolean"
        rationale:
          type: "string"

    FlagTypeCount:
      type: "object"
      properties:
        type:
          type: "string"
          enum: ["RIGGING", "FRAUD", "COLLUSION"]
        count:
          type: "integer"

    Classification:
      type: "object"
      description: "An OCDS classification object, used here to represent a bid type."
      properties:
        scheme:
          type: "string"
          description: "The classification scheme or codelist from which this classification is drawn."
        id:
          type: "string"
          description: "The classification code drawn from the selected scheme."
        description:
          type: "string"
          description: "A textual description or title for the code."
        uri:
          type: "string"
          description: "A URI to identify the code in the scheme."
    City:
      type: "object"
      properties:
        id:
          type: "integer"
          description: "The unique identifier for the city."
        name:
          type: "string"
          description: "The name of the city."
    ContrMethod:
      type: "object"
      properties:
        id:
          type: "string"
          description: "The unique identifier for the contract method."
        details:
          type: "string"
          description: "The detailed description of the contract method."
    VNLocation:
      type: "object"
      description: "An OCDS location object, with a GeoJsonPoint geometry."
      properties:
        id:
          type: "string"
          description: "The unique identifier for the location."
        description:
          type: "string"
          description: "A name or description of this location."
        uri:
          type: "string"
          description: "A URI to a further description of the location."
        geometry:
          $ref: '#/components/schemas/GeoJsonPoint'
        gazetteer:
          $ref: '#/components/schemas/Gazetteer'
          
    GeoJsonPoint:
      type: "object"
      description: "A GeoJSON Point object representing a single geographic coordinate."
      properties:
        type:
          type: "string"
          description: "The GeoJSON type, which is 'Point'."
          enum: [ "Point" ]
        coordinates:
          type: "array"
          description: "An array containing the longitude and latitude of the point."
          items:
            type: "number"
            format: "double"
          minItems: 2
          maxItems: 2
          example: [ 105.804817, 21.028511 ]
        x:
          type: "number"
          format: "double"
          description: "The longitude value (equivalent to coordinates[0])."
        y:
          type: "number"
          format: "double"
          description: "The latitude value (equivalent to coordinates[1])."

    Gazetteer:
      type: "object"
      description: "Information from a gazetteer, a directory of geographic information."
      properties:
        scheme:
          type: "string"
          description: "The entry of the selected gazetteer in the gazetteers codelist."
        identifiers:
          type: "array"
          description: "An array of one or more codes drawn from the gazetteer."
          items:
            type: "string"
    OrgDepartment:
      type: "object"
      properties:
        id:
          type: "integer"
          description: "The unique identifier for the department."
        name:
          type: "string"
          description: "The name of the department."
    OrgGroup:
      type: "object"
      properties:
        id:
          type: "integer"
          description: "The unique identifier for the group."
        name:
          type: "string"
          description: "The name of the group."
    Organization:
      type: "object"
      properties:
        id:
          type: "string"
        roles:
          type: "array"
          items:
            type: "string"
            enum: [ "procuringEntity", "buyer", "supplier" ]
        identifier:
          $ref: '#/components/schemas/Identifier'
        additionalIdentifiers:
          type: "array"
          items:
            $ref: '#/components/schemas/Identifier'
        name:
          type: "string"
        address:
          $ref: '#/components/schemas/Address'
        contactPoint:
          $ref: '#/components/schemas/ContactPoint'

    Identifier:
      type: "object"
      properties:
        scheme:
          type: "string"
        id:
          type: "string"
        legalName:
          type: "string"
        uri:
          type: "string"

    Address:
      type: "object"
      properties:
        streetAddress:
          type: "string"
        locality:
          type: "string"
        region:
          type: "string"
        postalCode:
          type: "string"
        countryName:
          type: "string"

    ContactPoint:
      type: "object"
      properties:
        name:
          type: "string"
        email:
          type: "string"
        telephone:
          type: "string"
        faxNumber:
          type: "string"
        url:
          type: "string"
    ReleasePackage:
      type: object
      description: "Schema for an Open Contracting Release Package."
      properties:
        uri:
          type: string
          description: "The unique URI of this package."
        publishedDate:
          type: string
          format: date-time
          description: "The date that this package was published."
        releases:
          type: array
          items:
            $ref: '#/components/schemas/Release'
        publisher:
          $ref: '#/components/schemas/Publisher'
        license:
          type: string
          description: "A link to the license that applies to the data in this package."
        publicationPolicy:
          type: string
          description: "A link to a document describing the publisher's publication policy."

    Release:
      type: object
      description: "Schema for an Open Contracting Release."
      properties:
        id:
          type: string
          description: "A unique identifier for this release within the package."
        ocid:
          type: string
          description: "A globally unique identifier for this Open Contracting Process."
        date:
          type: string
          format: date-time
          description: "The date this information is released."
        tag:
          type: array
          items:
            type: string
            enum: [ "planning", "tender", "tenderAmendment", "tenderUpdate", "tenderCancellation", "award", "awardUpdate", "awardCancellation", "contract", "contractUpdate", "contractAmendment", "implementation", "implementationUpdate", "contractTermination", "bid", "compiled" ]
        initiationType:
          type: string
          enum: [ "tender" ]
        planning:
          $ref: '#/components/schemas/Planning'
        tender:
          $ref: '#/components/schemas/Tender'
        bids:
          $ref: '#/components/schemas/Bids'
        buyer:
          $ref: '#/components/schemas/Organization'
        awards:
          type: array
          items:
            $ref: '#/components/schemas/Award'
        contracts:
          type: array
          items:
            $ref: '#/components/schemas/Contract'
        language:
          type: string
          default: "en"

    Publisher:
      type: object
      description: "Information to uniquely identify the publisher of this package."
      properties:
        name:
          type: string
        scheme:
          type: string
        uid:
          type: string
        uri:
          type: string

    # Core OCDS Components
    Planning:
      type: object
      description: "Information from the planning phase of the contracting process."
      properties:
        budget:
          $ref: '#/components/schemas/Budget'
        rationale:
          type: string
          description: "The rationale for the procurement provided in free text."
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'

    Tender:
      type: object
      description: "Data regarding the tender process."
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [ "planned", "active", "cancelled", "unsuccessful", "complete" ]
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        minValue:
          $ref: '#/components/schemas/Amount'
        value:
          $ref: '#/components/schemas/Amount'
        procurementMethod:
          type: string
          enum: [ "open", "selective", "limited" ]
        procurementMethodRationale:
          type: string
        awardCriteria:
          type: string
        awardCriteriaDetails:
          type: string
        submissionMethod:
          type: array
          items:
            type: string
            enum: [ "electronicAuction", "electronicSubmission", "written", "inPerson" ]
        submissionMethodDetails:
          type: string
        tenderPeriod:
          $ref: '#/components/schemas/Period'
        enquiryPeriod:
          $ref: '#/components/schemas/Period'
