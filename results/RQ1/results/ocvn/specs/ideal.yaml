  /api/frequentSuppliersTimeInterval:
    get:
      tags:
        - "Frequent Suppliers"
      summary: "Frequent suppliers of a procuring entity within a given time interval"
      description: "Returns a list of suppliers who have been frequently awarded contracts
        by the same procuring entity within rolling time intervals. The size of the
        time interval and the frequency threshold ('maxAwards') are configurable."
      operationId: "frequentSuppliersTimeInterval"
      parameters:
        - name: "intervalDays"
          in: "query"
          description: "The number of days to use for the time interval windows."
          required: false
          schema:
            type: "integer"
            format: "int32"
            default: 365
        - name: "maxAwards"
          in: "query"
          description: "The threshold for the number of awards. Suppliers who received
            more than this number of awards in an interval will be returned."
          required: false
          schema:
            type: "integer"
            format: "int32"
            default: 3
        - name: "now"
          in: "query"
          description: "A reference date to calculate the intervals from, in ISO 8601
            format (e.g., YYYY-MM-DD). Defaults to the current date if not provided."
          required: false
          schema:
            type: "string"
            format: "date-time"
      responses:
        '200':
          description: "A list of frequent supplier relationships."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
                  properties:
                    identifier:
                      type: "object"
                      properties:
                        procuringEntityId:
                          type: "string"
                          description: "The ID of the procuring entity."
                        supplierId:
                          type: "string"
                          description: "The ID of the supplier."
                        timeInterval:
                          type: "integer"
                          description: "The calculated time interval index (e.g.,
                            0 for the most recent interval, 1 for the one before,
                            etc.)."
                    count:
                      type: "integer"
                      description: "The number of awards this supplier received from
                        this procuring entity in this time interval."
    post:
      # POST spec mirrors the GET spec
      tags:
        - "Frequent Suppliers"
      summary: "Frequent suppliers of a procuring entity within a given time interval"
      description: "Returns a list of suppliers who have been frequently awarded contracts
        by the same procuring entity within rolling time intervals. The size of the
