          description: "Filter by the month of the award date (1-12). Only applies
            when a single year is specified."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
              minimum: 1
              maximum: 12
            uniqueItems: true
        - name: "monthly"
          in: "query"
          description: "If true, groups the results by month within each year."
          schema:
            type: "boolean"
            default: false 
        # ... and all 24 other parameters from YearFilterPagingRequest ...
      responses:
        '200':
          description: "A list of the top ten largest suppliers with their statistics."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: '#/components/schemas/TopTenSupplier'
    post:
      tags:
        - "Suppliers"
        - "Awards"
      summary: "Top ten largest suppliers by award value"
      operationId: "topTenLargestSuppliers_POST"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: "object"
              properties:
                "pageNumber":
                  type: "integer"
                  format: "int32"
                  minimum: 0
                  default: 0
                "pageSize":
                  type: "integer"
                  format: "int32"
                  minimum: 1
                  maximum: 1000
                  default: 300
                # Parameters from DefaultFilterPagingRequest
                "bidTypeId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notBidTypeId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "procuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notProcuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "supplierId":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "bidSelectionMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "notBidSelectionMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "contrMethod":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "planningLoc":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "tenderLoc":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "procurementMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "minTenderValue":
                  type: "number"
                "maxTenderValue":
                  type: "number"
                "minAwardValue":
                  type: "number"
                "maxAwardValue":
                  type: "number"
                "procuringEntityCityId":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "electronicSubmission":
                  type: "boolean"
                "procuringEntityDepartmentId":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                  uniqueItems: true
                "procuringEntityGroupId":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                  uniqueItems: true
                "flagged":
                  type: "boolean"
                # Parameters from YearFilterPagingRequest
                "year":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                    minimum: 1900
                    maximum: 2200
                  uniqueItems: true
                "month":
                  type: "array"
                  items:
                    type: "integer"
                    format: "int32"
                    minimum: 1
                    maximum: 12
                  uniqueItems: true
                "monthly":
                  type: "boolean"
                  default: false               
                # All 25 parameters from YearFilterPagingRequest are applicable here.
      responses:
        '200':
          description: "A list of the top ten largest suppliers with their statistics."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: '#/components/schemas/TopTenSupplier'


  /api/translations/{language}:
    get:
      tags:
        - "Translations"
      summary: "Get all translations for a given language"
      description: "Returns a single JSON object containing a map of translation keys to their translated values for the specified language."
      operationId: "translations_GET"
      parameters:
        - name: "language"
          in: "path"
          required: true
          description: "The language code for which to retrieve translations (e.g., 'en_US', 'vi_VN')."
          schema:
            type: "string"
      responses:
        '200':
          description: "A map of translation keys to translated string values."
          content:
            application/json:
              schema:
                type: "object"
                additionalProperties:
                  type: "string"
                example:
                  charts:bidPeriod:title: "Bid Timeline"
                  charts:bidPeriod:traces:award: "Award Period"
                  charts:bidPeriod:traces:tender: "Tender Period"
    post:
      tags:
        - "Translations"
      summary: "Get all translations for a given language"
      description: "Returns a single JSON object containing a map of translation keys to their translated values for the specified language. Note: Using POST for retrieval is unconventional but supported by this endpoint."
      operationId: "translations_POST"
      parameters:
        - name: "language"
          in: "path"
          required: true
          description: "The language code for which to retrieve translations (e.g., 'en_US', 'vi_VN')."
          schema:
            type: "string"
      responses:
        '200':
          description: "A map of translation keys to translated string values."
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1translations~1{language}/get/responses/200/content/application~1json/schema'

