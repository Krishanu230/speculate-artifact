                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "procuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notProcuringEntityId":
                  type: "array"
                  items:
