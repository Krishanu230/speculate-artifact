  /api/ocds/procurementActivityExcelChart:
    get:
      tags:
        - "Excel Export"
      summary: "Exports 'Procurement activity by year' dashboard in Excel format"
      description: "Generates and downloads an Excel file containing a chart that visualizes the number of bid plans, tenders, and awards over time, grouped by year or month."
      operationId: "procurementActivityExcelChart_GET"
      parameters:
        # This endpoint uses LangYearFilterPagingRequest, accepting all 26 parameters.
        # This includes the 25 from YearFilterPagingRequest plus the new 'language' parameter.
        - name: "language"
          in: "query"
          description: "The language for the generated Excel file's text, in ll_CC format."
          required: true
          schema:
            type: "string"
            pattern: '^[a-z]{2}_[A-Z]{2}$'
            example: "en_US"
        - name: "pageNumber"
          in: "query"
          description: "The page number to be displayed (0-indexed). Defaults to 0."
          schema:
            type: "integer"
            format: "int32"
            minimum: 0
            default: 0
        - name: "pageSize"
          in: "query"
          description: "Number of items per page. Defaults to 300, with a maximum
            of 1000."
          schema:
            type: "integer"
            format: "int32"
            minimum: 1
            maximum: 1000
            default: 300
        # Parameters from DefaultFilterPagingRequest
        - name: "bidTypeId"
          in: "query"
          description: "Filter by tender item classification ID (tender.items.classification._id).
            Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "notBidTypeId"
          in: "query"
          description: "Exclude tenders with the given item classification IDs."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "procuringEntityId"
          in: "query"
          description: "Filter by procuring entity ID. Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "notProcuringEntityId"
          in: "query"
          description: "Exclude tenders with the given procuring entity IDs."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "supplierId"
          in: "query"
          description: "Filter by supplier ID. Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "bidSelectionMethod"
          in: "query"
          description: "Filter by tender procurement method details. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "notBidSelectionMethod"
          in: "query"
          description: "Exclude tenders with the given procurement method details."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "contrMethod"
          in: "query"
          description: "Filter by tender.contrMethod.id. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
              pattern: '^[a-zA-Z0-9]*$'
            uniqueItems: true
        - name: "planningLoc"
          in: "query"
          description: "Filter by planning budget location ID (planning.budget.projectLocation._id).
            Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "tenderLoc"
          in: "query"
          description: "Filter by tender item delivery location ID (tender.items.deliveryLocation._id).
            Accepts a comma-separated list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "procurementMethod"
          in: "query"
          description: "Filter by tender procurement method. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "minTenderValue"
          in: "query"
          description: "Filter by a minimum tender value amount."
          schema:
            type: "number"
        - name: "maxTenderValue"
          in: "query"
          description: "Filter by a maximum tender value amount."
          schema:
            type: "number"
        - name: "minAwardValue"
          in: "query"
          description: "Filter by a minimum award value amount."
          schema:
            type: "number"
        - name: "maxAwardValue"
          in: "query"
          description: "Filter by a maximum award value amount."
          schema:
            type: "number"
        - name: "procuringEntityCityId"
          in: "query"
          description: "Filter by procuring entity's city postal code. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "string"
            uniqueItems: true
        - name: "electronicSubmission"
          in: "query"
          description: "Filter for tenders with electronic submission."
          schema:
            type: "boolean"
        - name: "procuringEntityDepartmentId"
          in: "query"
          description: "Filter by procuring entity's department ID. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
            uniqueItems: true
        - name: "procuringEntityGroupId"
          in: "query"
          description: "Filter by procuring entity's group ID. Accepts a comma-separated
            list."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
            uniqueItems: true
        - name: "flagged"
          in: "query"
          description: "Filter for releases that have been flagged by at least one
            indicator."
          schema:
            type: "boolean"
        # Parameters from YearFilterPagingRequest
        - name: "year"
          in: "query"
          description: "Filter by the year of the award date. Accepts a comma-separated
            list of years."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
              minimum: 1900
              maximum: 2200
            uniqueItems: true
        - name: "month"
          in: "query"
          description: "Filter by the month of the award date (1-12). Only applies
            when a single year is specified."
          schema:
            type: "array"
            items:
              type: "integer"
              format: "int32"
              minimum: 1
              maximum: 12
            uniqueItems: true
        - name: "monthly"
          in: "query"
          description: "If true, groups the results by month within each year."
          schema:
            type: "boolean"
            default: false
      responses:
        '200':
          description: "An Excel file containing a chart of procurement activities."
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: "string"
                format: "binary"
    post:
      tags:
        - "Excel Export"
      summary: "Exports 'Procurement activity by year' dashboard in Excel format"
      operationId: "procurementActivityExcelChart_POST"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: "object"
              properties:
                language:
                  type: "string"
                  pattern: '^[a-z]{2}_[A-Z]{2}$'
                  description: "The language for the generated Excel file's text, in ll_CC format."
                "pageNumber":
                  type: "integer"
                  format: "int32"
                  minimum: 0
                  default: 0
                "pageSize":
                  type: "integer"
                  format: "int32"
                  minimum: 1
                  maximum: 1000
                  default: 300
                # Parameters from DefaultFilterPagingRequest
                "bidTypeId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notBidTypeId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "procuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "notProcuringEntityId":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "supplierId":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "bidSelectionMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "notBidSelectionMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "contrMethod":
                  type: "array"
                  items:
                    type: "string"
                    pattern: '^[a-zA-Z0-9]*$'
                  uniqueItems: true
                "planningLoc":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "tenderLoc":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "procurementMethod":
                  type: "array"
                  items:
                    type: "string"
                  uniqueItems: true
                "minTenderValue":
