components:
  schemas:
    AutoclassifyStatusEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 255
      type: integer
      description: |-
        * `0` - pending
        * `1` - crossreferenced
        * `2` - autoclassified
        * `3` - skipped
        * `255` - failed
    BackfillRecord:
      type: object
      properties:
        context: {}
        status:
          type: integer
        total_actions_triggered:
          type: integer
        total_backfills_failed:
          type: integer
        total_backfills_successful:
          type: integer
        total_backfills_in_progress:
          type: integer
      required:
      - context
      - status
      - total_actions_triggered
      - total_backfills_failed
      - total_backfills_in_progress
      - total_backfills_successful
    FailureClassification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    FailureCount:
      type: object
      properties:
        date:
          type: string
          format: date
        test_runs:
          type: integer
        failure_count:
          type: integer
      required:
      - date
      - failure_count
      - test_runs
    Failures:
      type: object
      properties:
        bug_id:
          type: integer
          maximum: 4294967295
          minimum: 0
          format: int64
        bug_count:
          type: integer
      required:
      - bug_count
      - bug_id
    FailuresByBug:
      type: object
      properties:
        push_time:
          type: string
        platform:
          type: string
        revision:
          type: string
        test_suite:
          type: string
        tree:
          type: string
        build_type:
          type: string
        job_id:
          type: integer
          readOnly: true
        bug_id:
          type: integer
          maximum: 4294967295
          minimum: 0
          format: int64
        machine_name:
          type: string
        lines:
          type: array
          items:
            type: string
      required:
      - bug_id
      - build_type
      - job_id
      - lines
      - machine_name
      - platform
      - push_time
      - revision
      - test_suite
      - tree
    FilesBugzillaMap:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: string
          maxLength: 60
        component:
          type: string
          maxLength: 60
      required:
      - component
      - id
      - product
    GroupName:
      type: object
      properties:
        group_name:
          type: string
        job_type_name:
          type: string
        group_status:
          type: string
        failure_classification:
          type: string
