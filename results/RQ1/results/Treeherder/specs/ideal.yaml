        "200":
          content:
            application/json:
              example:
                - bugs:
                    all_others:
                      - id: 54321
                        summary: Module not found error in file.js
                    open_recent:
                      - id: 12345
                        summary: Intermittent failure in /path/to/file.js
                  counter: 1
                  failure_new_in_rev: false
                  line_number: 42
                  path_end: "/path/to/file.js"
                  search: "Error: Cannot find module"
                  search_terms:
                    - module
                    - Error
              schema:
                items:
                  properties:
                    bugs:
                      properties:
                        all_others:
                          description: List of other bugs related to the search terms
                          items:
                            additionalProperties: true
                            type: object
                          type: array
                        open_recent:
                          description:
                            List of recent open bugs related to the search
                            terms
                          items:
                            additionalProperties: true
                            type: object
                          type: array
                      type: object
                    counter:
                      description: The number of times the error line appears
                      type: integer
                    failure_new_in_rev:
                      description: Indicates if the failure is new in the revision
                      type: boolean
                    line_number:
                      description: The line number of the error in the log
                      type: integer
                    path_end:
                      description: The end of the path from the error line, if any
                      type: string
                    search:
                      description: The cleaned error line from the job's log
                      type: string
                    search_terms:
                      description: List of search terms derived from the error line
                      items:
                        type: string
                      type: array
                  type: object
                type: array
          description: A list of bug suggestions for the job
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view this object.
        "404":
          content:
            application/json:
              schema:
                example:
                  detail: "No job with id: 1234"
                properties:
                  detail:
                    description: A message detailing the error
                    type: string
                type: object
          description: No job with the given ID was found
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Gets a set of bug suggestions for a specific job
