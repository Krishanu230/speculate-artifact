  "/api/performance/alertsummary/":
    get:
      parameters:
        - name: id
          in: query
          description: "A unique integer value identifying this performance alert summary. Providing this parameter may add extra profiling URL data to the response for the specific summary."
          required: false
          schema:
            type: integer
        - name: status
          in: query
          description: "Filter by the numerical status code of the alert summary. The available statuses are: 0 (Untriaged), 1 (Downstream), 2 (Reassigned), 3 (Invalid), 4 (Improvement), 5 (Investigating), 6 (Won't fix), 7 (Fixed), 8 (Backed out)."
          required: false
          schema:
            type: integer
            enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
        - name: framework
          in: query
          description: "Filter by the ID of the performance framework."
          required: false
          schema:
            type: integer
        - name: repository
          in: query
          description: "Filter by the ID of the repository."
          required: false
          schema:
            type: integer
        - name: alerts__series_signature
          in: query
          description: "Filter summaries that contain an alert with the specified series signature ID."
          required: false
          schema:
            type: integer
        - name: filter_text
          in: query
          description: "A general text search filter. It matches against a concatenation of fields including suite, test, platform, bug number, and revision hash."
          required: false
          schema:
            type: string
        - name: hide_improvements
          in: query
          description: "If set to true, this will filter out summaries that are purely improvements, showing only summaries that contain at least one regression."
          required: false
          schema:
            type: boolean
        - name: hide_related_and_invalid
          in: query
          description: "If set to true, this will exclude summaries with a status of 'Downstream', 'Reassigned', or 'Invalid'."
          required: false
          schema:
            type: boolean
        - name: with_assignee
          in: query
          description: "Filter summaries by the username of the assignee."
          required: false
          schema:
            type: string
        - name: timerange
          in: query
          description: "Filter summaries to those created within the specified number of seconds from the current time."
          required: false
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: "Number of results to return per page."
          required: false
          schema:
            type: integer
        - name: page
          in: query
          description: "A page number within the paginated result set."
          required: false
          schema:
            type: integer
        - name: ordering
          in: query
          description: "Which field to use when ordering the results. You can prepend the field name with a '-' for descending order. E.g., '-created'."
          required: false
          schema:
            type: string
            example: "-created,-id"
      security: []
      
      responses:
        '200':
          description: A paginated list of performance alert summaries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: The total number of alert summaries matching the query.
                  next:
                    type: string
                    format: uri
                    nullable: true
                    description: The URL for the next page of results.
                  previous:
                    type: string
                    format: uri
                    nullable: true
                    description: The URL for the previous page of results.
                  results:
                    type: array
                    description: The list of performance alert summaries for the current page.
                    items:
                      # This is the exact same schema we derived for the detail view,
                      # as they both use the same serializer.
                      $ref: '#/components/schemas/PerformanceAlertSummaryDetail'
                required:
                  - count
                  - next
                  - previous
                  - results
                description: A list of performance alert summaries returned successfully
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
      summary: Retrieve a list of performance alert summaries
    post:
      parameters: []
