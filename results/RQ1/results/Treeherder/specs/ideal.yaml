  "/api/performance/summary/":
    get:
      parameters:
        - description: The start date for querying performance data
          in: query
          name: startday
          required: false
          schema:
            format: date-time
            type: string
        - description: The end date for querying performance data
          in: query
          name: endday
          required: false
          schema:
            format: date-time
            type: string
        - description: The specific revision to filter performance data
          in: query
          name: revision
          required: false
          schema:
            type: string
        - description: The repository name to filter performance data
          in: query
          name: repository
          required: true
          schema:
            type: string
        - description: List of framework ids to filter performance data
          in: query
          name: framework
          required: false
          schema:
            items:
              type: integer
            type: array
        - description: The time interval in seconds to filter recent performance data
          in: query
          name: interval
          required: false
          schema:
            type: integer
        - description: The parent signature to filter performance data
          in: query
          name: parent_signature
          required: false
          schema:
            type: string
        - description: The signature hash or id to filter performance data
          in: query
          name: signature
          required: false
          schema:
            type: string
        - description: Flag to include or exclude subtests in the performance data
          in: query
          name: no_subtests
          required: false
          schema:
            type: boolean
        - description: Flag to include all data points for each signature
          in: query
          name: all_data
          required: false
          schema:
            type: boolean
        - description: Flag to include replicate values in the performance data
          in: query
          name: replicates
          required: false
          schema:
            type: boolean
        - description: Flag to exclude data points resulted from retriggers
          in: query
          name: no_retriggers
          required: false
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    application:
                      description: Application associated with the performance data.
                      type: string
                    data:
                      description: List of performance datum associated with the signature.
                      items:
                        properties:
                          id:
                            description: The unique identifier for the performance datum.
                            type: integer
                          job_id:
                            description: The ID of the job associated with the performance datum.
                            type: integer
                          push_id:
                            description: The ID of the push associated with the performance datum.
                            type: integer
                          push_timestamp:
                            description: The timestamp when the performance datum was pushed.
                            format: date-time
                            type: string
                          revision:
                            description: The revision associated with the push.
                            type: string
                          value:
                            description: The performance value recorded.
                            type: number
                      type: array
                    framework_id:
                      description: Identifier for the performance framework.
                      type: integer
                    has_subtests:
                      description: Indicates if the signature has subtests.
                      type: boolean
                    job_ids:
                      description: List of job IDs associated with the performance data.
                      items:
                        type: integer
                      type: array
                    lower_is_better:
                      description: Indicates if lower values are better.
                      type: boolean
                    measurement_unit:
                      description: Unit of measurement for the performance data.
                      type: string
                    name:
                      description: Computed name for the performance signature.
                      type: string
                    parent_signature:
                      description: Identifier for the parent signature.
                      type: integer
                    platform:
                      description: Platform associated with the performance data.
                      type: string
                    repository_id:
                      description: Identifier for the repository.
                      type: integer
                    repository_name:
                      description: Name of the repository associated with the performance data.
                      type: string
                    signature_hash:
                      description: Hash representing the signature.
                      type: string
                    signature_id:
                      description: Unique identifier for the performance signature.
                      type: integer
                    suite:
                      description: Suite name associated with the performance data.
                      type: string
                    tags:
                      description: Tags associated with the performance data.
                      type: string
                    test:
                      description: Test name associated with the performance data.
                      type: string
                    values:
                      description: List of performance values.
                      items:
                        format: float
                        type: number
                      type: array
                  required:
                    - application
                    - data
                    - framework_id
                    - has_subtests
                    - job_ids
                    - lower_is_better
                    - measurement_unit
                    - name
                    - parent_signature
                    - platform
                    - repository_id
                    - repository_name
                    - signature_hash
                    - signature_id
                    - suite
                    - tags
                    - test
                    - values
                  type: object
                type: array
          description: Successful response with performance summary data.
        "400":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: "Required: revision, startday and endday or interval."
                    type: string
                type: object
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
      summary: Retrieve a summary of performance data based on various query parameters.
