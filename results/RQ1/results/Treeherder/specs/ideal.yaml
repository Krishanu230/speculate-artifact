          type: integer
          description: The database ID of the issue tracker (e.g., Bugzilla).
        notes:
          type: string
          nullable: true
          description: User-provided notes for this summary.
        revision:
          type: string
          description: The 40-character revision hash of the main push.
        push_timestamp:
          type: integer
          format: int64
          description: The Unix timestamp (in seconds) of the main push.
        prev_push_revision:
          type: string
          description: The 40-character revision hash of the previous push.
