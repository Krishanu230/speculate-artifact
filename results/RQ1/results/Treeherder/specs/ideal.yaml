          type: integer
          description: The unique ID for this alert summary.
        push_id:
          type: integer
          description: The database ID of the main push associated with this summary.
        prev_push_id:
          type: integer
          description: The database ID of the previous push used for comparison.
        created:
          type: string
          format: date-time
          description: The ISO 8601 timestamp when this summary was created.
        first_triaged:
          type: string
          format: date-time
          nullable: true
          description: The ISO 8601 timestamp when this summary was first triaged by a user.
        triage_due_date:
          type: string
          format: date-time
          nullable: true
          description: The calculated due date for triaging this summary.
