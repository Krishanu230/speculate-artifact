                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  - 6
                  - 7
                  - 8
                  example: 5
                bug_number:
                  type: integer
                  nullable: true
                  description: The associated bug number from the issue tracker.
                  example: 123456
                
                issue_tracker:
                  type: integer
                  description: The primary key of the issue tracker to be associated with this summary.
                  example: 1
                notes:
                  type: string
                  nullable: true
                  description: User-provided notes for the alert summary.
                  example: Investigating the spike, seems related to new hardware.
                assignee_username:
                  type: string
                  nullable: true
                  description: The username of the user to assign this alert summary to.
                  example: sheriff-bot
                performance_tags:
                  type: array
                  items:
                    type: string
                  description: A list of tag names to associate with the alert summary.
                  example:
                  - regression
                  - p1
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: The performance alert summary was successfully updated. The updated object is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceAlertSummaryDetail'
        '400':
          description: Bad Request. The request body contains invalid data. The response body will contain details about the validation errors.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
                example:
                  bug_number:
                  - A valid integer is required.
                  assignee_username:
                  - Object with username "invalid-user" does not exist.
        '401':
          description: Unauthorized. Authentication credentials were not provided.
        '403':
          description: Forbidden. The user does not have permission to perform this action (requires staff status).
        '404':
          description: Not Found. A performance alert summary with the specified ID does not exist.
      summary: Update a performance alert summary
    
    
    patch:
      parameters:
      - name: "id"
        in: "path"
        required: true
        description: "Unique identifier of the performance alert summary"
        schema:
          type: "integer"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: "object"
              properties:
                status:
                  type: "integer"
                  description: "Status of the alert summary"
                  enum:
                  - 0
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  - 6
                  - 7
                  - 8
                bug_number:
                  type: "integer"
                  nullable: true
                  description: "Bug number associated with the alert"
                issue_tracker:
                  type: "integer"
                  description: "Issue tracker ID"
                notes:
                  type: "string"
                  nullable: true
                  description: "Notes for the alert summary"
                assignee_username:
                  type: "string"
                  nullable: true
                  description: "Username of the assignee"
                performance_tags:
                  type: "array"
                  items:
                    type: "string"
                  description: "Performance tags associated with the alert"
      security:
        - SessionAuth: []
        - BasicAuth: []

      responses:
        '200':
          description: The performance alert summary was successfully updated. The full, updated object is returned.
          content:
            application/json:
              schema:
                # We can reuse the same correct schema component for GET, PUT, and PATCH
                $ref: '#/components/schemas/PerformanceAlertSummaryDetail'
        "400":
          description:
            Bad Request - Bad input, validation error, or partial update
            not allowed.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to edit this object.
        "404":
          description: Not Found - Object to be updated does not exist.
      summary: Update the status of a PerformanceAlertSummary instance
