  /api/project/{project}/push/health_usage/:
    get:
      parameters:
      - name: project
        in: path
        required: true
        description: 'The name of the project. Note: This parameter is required in the URL path but is ignored by this specific endpoint.'
        schema:
          type: string
          pattern: ^[\w-]{0,50}$
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: Successfully retrieved push health usage data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  usage:
                    type: array
                    description: A list of usage statistics for recent pushes.
                    items:
                      type: object
                      properties:
                        push:
                          type: object
                          description: Details of the push.
                          properties:
                            id:
                              type: integer
                              description: The unique identifier for the push.
                            revision:
                              type: string
                              description: The revision hash of the push.
                              example: c4a3b2d1e0f9
                            author:
                              type: string
                              description: The author of the push.
                              example: user@example.com
                            revisions:
                              type: array
                              description: A list of commit objects associated with the push (up to 20).
                              items:
                                type: object
                                properties:
                                  revision:
                                    type: string
                                  author:
                                    type: string
                                  comments:
                                    type: string
                            revision_count:
                              type: integer
                              description: The total number of revisions in the push.
                            push_timestamp:
                              type: number
                              format: double
                              description: The Unix timestamp of when the push occurred.
                            repository_id:
                              type: integer
                              description: The ID of the repository the push belongs to.
                        peak:
                          type: object
                          description: The peak number of items needing investigation and when it occurred.
                          properties:
                            needInvestigation:
                              type: integer
                              description: The peak number of items needing investigation.
                            time:
                              type: integer
                              format: int64
                              description: The Unix timestamp (in seconds) of when the peak occurred.
                        latest:
                          type: object
                          description: The latest number of items needing investigation and when it occurred.
                          properties:
                            needInvestigation:
                              type: integer
                              description: The latest number of items needing investigation.
                            time:
                              type: integer
                              format: int64
                              description: The Unix timestamp (in seconds) of the latest data point.
                        retriggers:
                          type: integer
                          description: The number of times jobs were retriggered for this push.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this data.
        '500':
          description: Internal Server Error - A server error occurred, possibly while fetching data from an external service.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: A server error occurred.
      summary: Retrieve push health usage statistics.
  
  
  "/api/project/{project}/push/{pk}/status/":
    get:
      parameters:
        - description: The name of the project to which the push belongs.
