                  job_id:
                    type: integer
                    description: The ID of the associated job.
                  failure_classification_id:
                    type: integer
                    description: The ID of the failure classification.
                  created:
                    type: string
                    format: date-time
                    description: The timestamp when the note was created.
                  who:
                    type: string
                    description: The user who created the note or "autoclassifier" if created automatically.
                  text:
                    type: string
                    description: The text comment from the user.
                required:
                  - id
                  - job_id
                  - failure_classification_id
                  - created
                  - who
                  - text
                type: object
          description: Successful retrieval of the note
        "404":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: "No note with id: {id}"
                    type: string
                type: object
          description: Not Found - Object with the given identifier does not exist.
      security:
        - BasicAuth: []
        - SessionAuth: []
      summary: Retrieve a specific note by its ID
  "/api/project/{project}/note/push_notes/":
    get:
      parameters:
        - description: Repository of the revision
          in: path
          name: project
          required: true
          schema:
            type: string
        - description:
            The SHA of the revision for which to get classifications and
            job details
          in: query
          name: revision
          required: true
          schema:
            type: string
            maxLength: 40

      responses:
        '200':
          description: A list of notes, with job details, for the specified push revision.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobNoteDetailSerializerResponse'
        "400":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: The revision parameter is mandatory for this endpoint
                    type: string
                type: object
          description:
            Bad Request - The revision parameter is mandatory for this
            endpoint
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "404":
          content:
            application/json:
              schema:
                example: No push with the given revision in the specified project
                type: string
          description:
            Not Found - No push with the given revision in the specified
            project
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Get all classifications for a push revision with some job details
  /api/project/{project}/push/:
    get:
      parameters:
      - name: project
        in: path
        required: true
        description: Project name
        schema:
          type: string
          pattern: ^[\w-]{0,50}$
          maxLength: 50
      - name: all_repos
        in: query
        required: false
        description: Include pushes from all repositories
        schema:
          type: boolean
          default: false
      - name: fromchange
        in: query
        required: false
        description: Filter pushes from change revision (prefix allowed)
        schema:
          type: string
      - name: tochange
        in: query
        required: false
        description: Filter pushes up to change revision (prefix allowed)
        schema:
          type: string
      - name: startdate
        in: query
        required: false
        description: Start date in YYYY-MM-DD
        schema:
          type: string
          format: date
      - name: enddate
        in: query
        required: false
        description: End date in YYYY-MM-DD
        schema:
          type: string
          format: date
      - name: revision
        in: query
        required: false
        description: Filter by push revision (prefix allowed)
        schema:
          type: string
      - name: commit_revision
        in: query
        required: false
        description: Filter by commit revision
        schema:
          type: string
      - name: push_timestamp__lt
        in: query
        required: false
        description: Filter pushes with push timestamp less than
        schema:
          type: number
          format: double
      - name: push_timestamp__lte
        in: query
        required: false
        description: Filter pushes with push timestamp less than or equal
        schema:
          type: number
          format: double
      - name: push_timestamp__gt
        in: query
        required: false
        description: Filter pushes with push timestamp greater than
        schema:
          type: number
          format: double
      - name: push_timestamp__gte
        in: query
        required: false
        description: Filter pushes with push timestamp greater than or equal
        schema:
          type: number
          format: double
      - name: id
        in: query
        required: false
        description: Filter pushes by a specific push ID.
        schema:
          type: integer
      - name: id__lt
        in: query
        required: false
        description: Filter pushes with id less than
        schema:
          type: integer
          format: int32
      - name: id__lte
        in: query
        required: false
        description: Filter pushes with id less than or equal
        schema:
          type: integer
          format: int32
      - name: id__gt
        in: query
        required: false
        description: Filter pushes with id greater than
        schema:
          type: integer
          format: int32
      - name: id__gte
        in: query
        required: false
        description: Filter pushes with id greater than or equal
        schema:
          type: integer
          format: int32
      - name: id__in
        in: query
        required: false
        description: Filter pushes by a comma-separated list of ids
        style: form
        explode: false
        schema:
          type: array
          items:
            type: integer
            format: int32
      - name: author
        in: query
        required: false
        description: Filter pushes by author; prefix with '-' to exclude
        schema:
          type: string
      - name: hide_reviewbot_pushes
        in: query
        required: false
        description: Exclude pushes authored by reviewbot
        schema:
          type: string
          enum:
          - 'true'
      - name: count
        in: query
        required: false
        description: Number of pushes to return (max 1000)
        schema:
          type: integer
          format: int32
          default: 10
          maximum: 1000
      security:
      - BasicAuth: []
      - SessionAuth: []
      responses:
        '200':
          description: A list of push records matching the filter criteria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    description: Metadata about the request and results.
                    properties:
                      fromchange:
                        type: string
                        description: The 'from' revision hash if provided in the query.
                      tochange:
                        type: string
                        description: The 'to' revision hash if provided in the query.
                      startdate:
                        type: string
                        format: date
                        description: The start date if provided in the query (e.g., '2023-01-01').
                      enddate:
                        type: string
                        format: date
                        description: The end date if provided in the query (e.g., '2023-01-31').
                      revision:
                        type: string
                        description: The specific revision hash if provided in the query.
                      commit_revision:
                        type: string
                        description: The specific commit revision hash if provided in the query.
                      count:
                        type: integer
                        description: The number of push records returned in this response.
                      repository:
                        type: string
                        description: The name of the repository queried, or 'all'.
                      filter_params:
                        type: object
                        description: A copy of the query parameters used for filtering.
                        additionalProperties:
                          type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: The unique identifier for the push.
                          readOnly: true
                        revision:
                          type: string
                          maxLength: 40
                          description: The tip revision of the push.
                        author:
                          type: string
                          maxLength: 150
                          description: The author of the push.
                        revisions:
                          type: array
                          description: A list of commits included in this push (up to the first 20).
                          items:
                            type: object
                            properties:
                              result_set_id:
                                type: integer
                                description: The ID of the push this commit belongs to.
                                readOnly: true
                              repository_id:
                                type: integer
                                description: The ID of the repository this commit belongs to.
                                readOnly: true
                              revision:
                                type: string
                                description: The revision hash of the commit.
                              author:
                                type: string
                                description: The author of the commit.
                              comments:
                                type: string
                                description: The commit message.
                        revision_count:
                          type: integer
                          description: The total number of commits in the push.
                          readOnly: true
                        push_timestamp:
                          type: integer
                          format: int64
                          description: The Unix timestamp of when the push occurred.
                          readOnly: true
                        repository_id:
                          type: integer
                          description: The ID of the repository the push belongs to.
                          readOnly: true
        '400':
          description: Bad Request - Invalid query parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        '404':
          description: Not Found - Project with the specified name does not exist.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according to the Accept headers.
      summary: List push records for a project with optional filtering.
  
  "/api/project/{project}/push/{id}/":
    get:
      summary: Retrieve a specific push record.
      parameters:
        - name: project
          in: path
          description: The name of the project.
          required: true
          schema:
            type: string
            maxLength: 50
            pattern: '^[\w-]{1,50}$'
        - name: id
          in: path
          description: The ID of the push record.
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Successful retrieval of the push record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSerializerResponse"
        "400":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: Invalid input parameters.
                    type: string
                type: object
          description: Bad Request - Invalid query parameters.
        "404":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: "No push with id: {id}"
                    type: string
                type: object
          description: Not Found - Object with the given identifier does not exist.

      security:
        - BasicAuth: []
        - SessionAuth: []

  "/api/project/{project}/push/decisiontask/":
    get:
      parameters:
        - description: The name of the project.
          in: path
          name: project
          required: true
          schema:
            type: string
        - description: Comma-separated list of push IDs to retrieve decision tasks for.
          in: query
          name: push_ids
          required: false
          schema:
            pattern: "^\\d+(,\\d+)*$"
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  properties:
                    id:
                      description: The TaskCluster task id of the decision task.
                      example: task-id
                      type: string
                    run:
                      description: The run id of the decision task.
                      example: run-id
                      type: string
                  type: object
                type: object
          description: A list of decision task ids for the pushes.
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "404":
          content:
            application/json:
              schema:
                description:
                  A message indicating that no decision tasks were found
                  for the provided push ids.
                example: "No decision tasks found for pushes: [push_ids]"
                type: string
          description: Not Found - No decision tasks found for the given push ids.
        "500":
          description:
            Internal Server Error - An error occurred on the server while
            processing the request.
      summary: Return the decision task ids for the pushes.
  "/api/project/{project}/push/group_results/":
    get:
      parameters:
        - description: The name of the project.
          in: path
          name: project
          required: true
          schema:
            type: string
        - description: The revision of the push to get the test groups for.
          in: query
          name: revision
          required: true
          schema:
            type: string
            maxLength: 40
            minLength: 40
      responses:
        "200":
          content:
            application/json:
              examples:
                group_results:
                  summary: Example of a successful response with group results.
                  value:
                    task_id_1:
                      group_name_1: true
                      group_name_2: false
                    task_id_2:
                      group_name_1: true
                      group_name_3: false
              schema:
                additionalProperties:
                  additionalProperties:
                    type: boolean
                  type: object
                type: object
          description:
            A successful response providing the results of all the test
            groups for the specified push.
        "400":
          content:
            application/json:
              examples:
                bad_request:
                  summary:
                    Example of a response when invalid query parameters are
                    provided.
                  value:
                    detail: Invalid timestamp specified for {param}
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "404":
          content:
            application/json:
              examples:
                not_found:
                  summary: Example of a response when no push is found.
                  value:
                    detail: "No push with revision: {revision}"
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: No push with the specified revision in the project.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Return the results of all the test groups for this push.
  "/api/project/{project}/push/health/":
    get:
      parameters:
        - description:
            The name of the project for which the push health data is to
            be retrieved.
          in: path
          name: project
          required: true
          schema:
            type: string
        - description: The revision of the push to retrieve health data for.
          in: query
          name: revision
          required: true
          schema:
            type: string
            maxLength: 40
            minLength: 40
      responses:
        '200':
          description: A detailed health assessment of the push.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revision:
                    type: string
                    description: The 40-character revision hash of the push.
                    example: c3f6e3e5c9c7c8c6b6e4b3f2e1d0a9b8c7d6e5f4
                  id:
                    type: integer
                    description: The unique ID of the push.
                    example: 12345
                  result:
                    type: string
                    description: The overall calculated health result for the push.
                    enum:
                    - pass
                    - fail
                    - indeterminate
                    - unknown
                    example: fail
                  jobs:
                    type: object
                    description: A dictionary of jobs related to test failures, grouped by job type name. The value is a list of jobs, each represented as a dictionary.
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 98765
                          result:
                            type: string
                            example: testfailed
                          state:
                            type: string
                            example: completed
                          start_time:
                            type: string
                            format: date-time
                          end_time:
                            type: string
                            format: date-time
                          job_type_name:
                            type: string
                            example: test-linux1804-64/opt-qr-e10s
                          job_type_symbol:
                            type: string
                            example: T
                          platform:
                            type: string
                            example: linux
                          task_id:
                            type: string
                            example: Abc123xyz
                          run_id:
                            type: string
                            example: '0'
                  metrics:
                    type: object
                    description: Detailed metrics for different aspects of the push health.
                    properties:
                      commitHistory:
                        type: object
                        properties:
                          name:
                            type: string
                            example: Commit History
                          result:
                            type: string
                            example: none
                          details:
                            type: object
                            nullable: true
                            description: Details about the push's parent commit. Only available for Mercurial (hg) repositories.
                            properties:
                              parentSha:
                                type: string
                                nullable: true
                                example: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
                              exactMatch:
                                type: boolean
                              parentPushRevision:
                                type: string
                                nullable: true
                              parentRepository:
                                type: object
                                nullable: true
                                description: Details of the parent repository.
                                properties:
                                  id:
                                    type: integer
                                  name:
                                    type: string
                                  dvcs_type:
                                    type: string
                                  url:
                                    type: string
                              id:
                                type: integer
                                nullable: true
                                description: The ID of the parent push, if found in Treeherder.
                              jobCounts:
                                type: object
                                nullable: true
                                description: A summary of job statuses for the parent push.
                                additionalProperties:
                                  type: integer
                              revisions:
                                type: array
                                description: List of commits in the current push.
                                items:
                                  type: object
                                  properties:
                                    result_set_id:
                                      type: integer
                                    repository_id:
                                      type: integer
                                    revision:
                                      type: string
                                    author:
                                      type: string
                                    comments:
                                      type: string
                              revisionCount:
                                type: integer
                              currentPush:
                                type: object
                                description: Serialized details of the current push.
                                properties:
                                  id:
                                    type: integer
                                  revision:
                                    type: string
                                  author:
                                    type: string
                                  revisions:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        result_set_id:
                                          type: integer
                                        repository_id:
                                          type: integer
                                        revision:
                                          type: string
                                        author:
                                          type: string
                                        comments:
                                          type: string
                                  revision_count:
                                    type: integer
                                  push_timestamp:
                                    type: number
                                    format: double
                                  repository_id:
                                    type: integer
                      linting:
                        type: object
                        properties:
                          name:
                            type: string
                            example: Linting
                          result:
                            type: string
                            example: pass
                          details:
                            type: array
                            description: List of failing linting jobs.
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                result:
                                  type: string
                                state:
                                  type: string
                                job_type_name:
                                  type: string
                                job_type_symbol:
                                  type: string
                                platform:
                                  type: string
                                task_id:
                                  type: string
                                run_id:
                                  type: string
                      tests:
                        type: object
                        properties:
                          name:
                            type: string
                            example: Tests
                          result:
                            type: string
                            example: fail
                          details:
                            type: object
                            properties:
                              needInvestigation:
                                type: array
                                description: List of test failures that are new or not confidently classified as intermittent.
                                items:
                                  type: object
                                  properties:
                                    testName:
                                      type: string
                                    action:
                                      type: string
                                    jobName:
                                      type: string
                                    jobSymbol:
                                      type: string
                                    jobGroup:
                                      type: string
                                    jobGroupSymbol:
                                      type: string
                                    platform:
                                      type: string
                                    config:
                                      type: string
                                    key:
                                      type: string
                                    jobKey:
                                      type: string
                                    suggestedClassification:
                                      type: string
                                    confidence:
                                      type: number
                                    tier:
                                      type: integer
                                    totalFailures:
                                      type: integer
                                    totalJobs:
                                      type: integer
                                    failedInParent:
                                      type: boolean
                                    isClassifiedIntermittent:
                                      type: boolean
                                    isInvestigated:
                                      type: boolean
                                    investigatedTestId:
                                      type: integer
                                      nullable: true
                              knownIssues:
                                type: array
                                description: List of test failures that are classified as known intermittent issues.
                                items:
                                  type: object
                                  properties:
                                    testName:
                                      type: string
                                    action:
                                      type: string
                                    jobName:
                                      type: string
                                    jobSymbol:
                                      type: string
                                    jobGroup:
                                      type: string
                                    jobGroupSymbol:
                                      type: string
                                    platform:
                                      type: string
                                    config:
                                      type: string
                                    key:
                                      type: string
                                    jobKey:
                                      type: string
                                    suggestedClassification:
                                      type: string
                                    confidence:
                                      type: number
                                    tier:
                                      type: integer
                                    totalFailures:
                                      type: integer
                                    totalJobs:
                                      type: integer
                                    failedInParent:
                                      type: boolean
                                    isClassifiedIntermittent:
                                      type: boolean
                                    isInvestigated:
                                      type: boolean
                                    investigatedTestId:
                                      type: integer
                                      nullable: true
                      builds:
                        type: object
                        properties:
                          name:
                            type: string
                            example: Builds
                          result:
                            type: string
                            example: pass
                          details:
                            type: array
                            description: List of failing build jobs.
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                result:
                                  type: string
                                state:
                                  type: string
                                job_type_name:
                                  type: string
                                job_type_symbol:
                                  type: string
                                platform:
                                  type: string
                                task_id:
                                  type: string
                                run_id:
                                  type: string
                  status:
                    type: object
                    description: A summary of job statuses for the push, where keys are status names and values are the counts.
                    additionalProperties:
                      type: integer
                    example:
                      completed: 150
                      pending: 5
                      running: 10
                      success: 140
                      testfailed: 8
                      busted: 2
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view this object.
        "404":
          description: Not Found - No push with the specified revision.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Return a calculated assessment of the health of this push.
  "/api/project/{project}/push/health_summary/":
    get:
      parameters:
        - description:
            The name of the project for which the health summary is being
            requested.
          in: path
          name: project
          required: true
          schema:
            type: string
        - description:
            The revision(s) for which the health summary is being requested,
            comma-separated if multiple.
          in: query
          name: revision
          required: false
          schema:
            type: string
        - description: The author for which the health summary is being requested.
          in: query
          name: author
          required: false
          schema:
            type: string
        - description: The number of results to return. Defaults to 10 if not specified.
          in: query
          name: count
          required: false
          schema:
            type: integer
        - description: A flag to include all repositories in the health summary.
          in: query
          name: all_repos
          required: false
          schema:
            type: boolean
        - description: A flag to include commit history in the health summary.
          in: query
          name: with_history
          required: false
          schema:
            type: boolean
        - description: A flag to include in-progress tests in the health summary.
          in: query
          name: with_in_progress_tests
          required: false
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    buildFailureCount:
                      description: The count of build failures.
                      type: integer
                    buildInProgressCount:
                      description: The count of builds that are in progress.
                      type: integer
                    history:
                      description:
                        A list of commit history for the push if 'with_history'
                        is provided.
                      items:
                        properties:
                          author:
                            description: The author of the push.
                            readOnly: true
                            type: string
                            writeOnly: false
                          id:
                            description: Unique identifier for the push.
                            readOnly: true
                            type: integer
                            writeOnly: false
                          push_timestamp:
                            description: The timestamp of the push.
                            readOnly: true
                            type: integer
                            writeOnly: false
                          repository_id:
                            description:
                              The identifier of the repository associated
                              with the push.
                            readOnly: true
                            type: integer
                            writeOnly: false
                          revision:
                            description: The revision hash of the push.
                            readOnly: true
                            type: string
                            writeOnly: false
                          revision_count:
                            description:
                              The count of revisions associated with the
                              push.
                            readOnly: true
                            type: integer
                            writeOnly: false
                          revisions:
                            description:
                              A list of the latest commits associated with
                              the push.
                            items:
                              properties:
                                author:
                                  description: The author of the commit.
                                  readOnly: true
                                  type: string
                                  writeOnly: false
                                comments:
                                  description: The comments associated with the commit.
                                  readOnly: true
