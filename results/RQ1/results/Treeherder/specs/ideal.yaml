          required: true
          schema:
            type: string
        - description: List of parent signature hashes to filter by
          in: query
          name: parent_signature
          required: false
          schema:
            items:
              type: string
            type: array
        - description: Include or exclude subtests (default is to include)
          in: query
          name: subtests
          required: false
          schema:
            type: boolean
        - description: List of signature IDs to filter by
          in: query
          name: id
          required: false
          schema:
            items:
              type: integer
            type: array
        - description: List of signature hashes to filter by
          in: query
          name: signature
          required: false
          schema:
            items:
              type: string
            type: array
        - description: List of framework IDs to filter by
          in: query
          name: framework
          required: false
          schema:
            items:
              type: string
            type: array
        - description:
            Time interval in seconds from now to filter the last updated
            signatures
          in: query
          name: interval
          required: false
          schema:
            type: integer
        - description: Start date to filter the last updated signatures
          in: query
          name: start_date
          required: false
          schema:
            format: date-time
            type: string
        - description: End date to filter the last updated signatures
          in: query
          name: end_date
          required: false
          schema:
            format: date-time
            type: string
        - description: Platform to filter the signatures by
          in: query
          name: platform
          required: false
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  properties:
                    application:
                      description:
                        The application associated with the performance
                        signature.
                      example: Firefox
                      type: string
                    extra_options:
                      description:
                        A list of extra options associated with the performance
                        signature.
                      example:
                        - option1
                        - option2
                      items:
                        type: string
                      type: array
                    framework_id:
                      description:
                        The identifier of the framework associated with
                        the performance signature.
                      example: 1
                      type: integer
                    has_subtests:
                      description:
                        Indicates whether the performance signature has
                        subtests.
                      example: true
                      type: boolean
                    id:
                      description: The unique identifier of the performance signature.
                      example: 123
                      type: integer
                    lower_is_better:
                      description:
                        Indicates whether a lower value is better for the
                        performance signature.
                      example: false
                      type: boolean
                    machine_platform:
                      description:
                        The platform of the machine where the performance
                        test ran.
                      example: Windows 10
                      type: string
                    measurement_unit:
                      description: The unit of measurement for the performance signature.
                      example: ms
                      type: string
                    option_collection_hash:
                      description:
                        The hash of the option collection associated with
                        the performance signature.
                      example: def456
                      type: string
                    parent_signature:
                      description: The hash of the parent performance signature.
                      example: parent_hash
                      type: string
                    should_alert:
                      description:
                        Indicates whether an alert should be triggered
                        for the performance signature.
                      example: true
                      type: boolean
                    signature_hash:
                      description: The hash of the performance signature.
                      example: abc123
                      type: string
                    suite:
                      description: The suite to which the performance signature belongs.
                      example: performance_suite
                      type: string
                    tags:
                      description:
                        A list of tags associated with the performance
                        signature.
                      example:
                        - tag1
                        - tag2
                      items:
                        type: string
                      type: array
                    test:
                      description:
                        The name of the test associated with the performance
                        signature.
                      example: test_name
                      type: string
                  type: object
                type: object
          description: A successful response returns a map of performance signatures.
        "400":
          content:
            application/json:
              schema:
                properties:
                  message:
                    example: Provide either interval only -or- start (and end) date
                    type: string
                type: object
          description:
            Bad Request - Invalid query parameters or invalid id values
            (must be integer).
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Retrieve a list of performance signatures for a given project
  "/api/project/{project}/performance/data/":
    get:
      parameters:
        - description: The name of the project to retrieve performance data for.
          in: path
          name: project
          required: true
          schema:
            type: string
        - description: A list of signature hashes to filter the performance data.
          in: query
          name: signatures
          required: false
          schema:
            items:
              type: string
            type: array
        - description: List of signature IDs to filter the performance data.
          in: query
          name: signature_id
          required: false
          schema:
            items:
              type: integer
            type: array
        - description: List of push IDs to filter the performance data.
          in: query
          name: push_id
          required: false
          schema:
            items:
              type: integer
            type: array
        - description:
            A list of job IDs to filter the performance data. All IDs must
            be integers.
          in: query
          name: job_id
          required: false
          schema:
            items:
              type: integer
            type: array
        - description: A list of frameworks to filter the performance data.
          in: query
          name: framework
          required: false
          schema:
            items:
              type: string
            type: array
        - description:
            An interval in seconds to filter the performance data. Provide
            either interval only -or- start (and end) date.
          in: query
          name: interval
          required: false
          schema:
            type: integer
        - description:
            The start date to filter the performance data. Expected in a
            format that can be parsed by Django's date parsing. Cannot be used with
            'interval'.
          in: query
          name: start_date
          required: false
          schema:
            format: date-time
            type: string
        - description:
            The end date to filter the performance data. Expected in a format
            that can be parsed by Django's date parsing. Cannot be used with 'interval'.
          in: query
          name: end_date
          required: false
          schema:
            format: date-time
            type: string
        - description:
            A boolean value to exclude retriggered jobs from the performance
            data.
          in: query
          name: no_retriggers
          required: false
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  items:
                    properties:
                      id:
                        description: The ID of the performance datum
                        type: integer
                      job_id:
                        description:
                          The ID of the job associated with the performance
                          datum
                        type: integer
                      push_id:
                        description:
                          The ID of the push associated with the performance
                          datum
                        type: integer
                      push_timestamp:
                        description: The timestamp of the push as an integer
                        type: integer
                      revision:
                        description: The revision hash of the push
                        type: string
                      signature_id:
                        description:
                          The ID of the signature associated with the performance
                          datum
                        type: integer
                      value:
                        description: The rounded value of the performance datum
                        format: float
                        type: number
                    type: object
                  type: array
                type: object
          description:
            A successful response containing performance data for the specified
            project
        "400":
          content:
            application/json:
              schema:
                properties:
                  message:
                    oneOf:
                      - example: Job id(s) must be specified as integers
                      - example: Provide either interval only -or- start (and end) date
                    type: string
                type: object
          description:
            Bad Request - Invalid query parameters or conflicting parameters
            provided
      summary: Retrieve performance test result data for a specific project
  "/api/project/{project}/performance/platforms/":
    get:
      parameters:
        - description: The name of the project for which to retrieve performance platforms.
          in: path
          name: project
          required: true
          schema:
            type: string
        - description:
            The time interval in seconds from the current time to filter
            the performance data.
          in: query
          name: interval
          required: false
          schema:
            type: integer
        - description: A list of framework identifiers to filter the performance data.
          in: query
          name: framework
          required: false
          schema:
            items:
              type: string
            type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: A list of distinct platform names that have performance data have performance data
  "/api/optioncollectionhash/":
    get:
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    option_collection_hash:
                      description: The hash representing the option collection.
                      example: hash123
                      type: string
                    options:
                      items:
                        properties:
                          name:
                            description: The name of the option.
                            example: opt1
                            type: string
                        type: object
                      type: array
                  type: object
                type: array
          description:
            A successful response returns a list of option collection hashes
            with their options.
      summary: Retrieve a list of option collection hashes with their associated options
  "/api/machineplatforms/":
    get:
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/MachinePlatformSerializerResponse"
                type: array
          description: A list of machine platforms
      summary: List all machine platforms
  "/api/performance/validity-dashboard/":
    get:
      parameters:
        - description: The ID of the framework to filter the performance data by.
          in: query
          name: framework
          required: false
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/TestSuiteHealthSerializerResponse"
                type: array
          description: A successful response containing the test suite health data
        "400":
          content:
            application/json:
              schema:
                properties:
                  framework:
                    description:
                      Details of the invalid parameters in the framework
                      field
                    items:
                      type: string
                    type: array
                type: object
          description: Bad Request - Invalid query parameters.
      summary:
        Retrieve a list of test suite health data based on the provided framework
        parameter
  "/api/changelog/":
    get:
      parameters:
        - description:
            The start date for filtering the changelog entries. Entries on
            or after this date will be included. If not provided, defaults to 15 days
            before the current date.
          in: query
          name: startdate
          required: false
          schema:
            type: string
        - description:
            The end date for filtering the changelog entries. Entries on
            or before this date will be included.
          in: query
          name: enddate
          required: false
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ChangelogSerializerResponse"
                type: array
          description: A JSON array of changelog entries
      summary: Retrieve a list of changelog entries
