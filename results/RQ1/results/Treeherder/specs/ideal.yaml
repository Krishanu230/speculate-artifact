          type: array
          description: A list of performance alerts that are directly part of this summary.
          items:
            $ref: '#/components/schemas/PerformanceAlertDetail'
        related_alerts:
          type: array
          description: A list of performance alerts that have been reassigned or marked as downstream to this summary.
          items:
            $ref: '#/components/schemas/PerformanceAlertDetail'
        status:
          type: integer
          description: The current status of the alert summary.
          enum: [0, 1, 2, 3, 4, 5, 6, 7, 8]
        bug_number:
          type: integer
          nullable: true
          description: The associated Bugzilla bug number, if any.
        bug_due_date:
          type: string
          format: date-time
          nullable: true
          description: The calculated due date for fixing the associated bug.
        bug_updated:
          type: string
          format: date-time
          nullable: true
          description: The ISO 8601 timestamp when the bug number was last changed.
