      security:
      - cookieAuth: []
      - basicAuth: []
      # In the /api/jobs/ endpoint definition:
      responses:
        '200':
          description: A paginated list of jobs. Each job is represented as an array of values, with the order of values described by the `job_property_names` array.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: The total number of jobs matching the query.
                    example: 1500
                  next:
                    type: string
                    format: uri
                    nullable: true
                    description: The URL for the next page of results.
                    example: "/api/jobs/?page=2"
                  previous:
                    type: string
                    format: uri
                    nullable: true
                    description: The URL for the previous page of results.
                    example: null
                  results:
                    type: array
                    description: A list of jobs, where each job is an array of its property values.
                    items:
                      type: array
                      description: "An array of job property values. The meaning of each position in this array is defined by the `job_property_names` field."
                      items: {} # Represents mixed types (string, integer, etc.)
                      example:
                        - 101                             # failure_classification_id
                        - 87654321                        # id
                        - "mochitest-plain"               # job_group_name
                        - "M(p)"                          # job_group_symbol
                        - "test-linux1804-64/opt-mochitest-plain-1" # job_type_name
                        - "M(p)1"                         # job_type_symbol
                        - "2023-05-21T15:30:45.123Z"      # last_modified
                        - "linux-18.04-x64"               # platform
                        - 12345                           # push_id
                        - "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2" # push_revision
                        - "success"                       # result
                        - "test-linux1804-64/opt-mochitest-plain-1" # signature
                        - "completed"                     # state
                        - 1                               # tier
                        - "AbcDefG123hIjKlMnOpQ"          # task_id
                        - 0                               # retry_id
                        - 25                              # duration (minutes)
                        - "opt e10s"                      # platform_option
                  job_property_names:
                    type: array
                    description: An array of strings describing the name and order of properties in each array within the `results`. This list is the key to interpreting the data.
                    items:
                      type: string
                    example:
                      - "failure_classification_id"
                      - "id"
                      - "job_group_name"
                      - "job_group_symbol"
                      - "job_type_name"
                      - "job_type_symbol"
                      - "last_modified"
                      - "platform"
                      - "push_id"
                      - "push_revision"
                      - "result"
                      - "signature"
                      - "state"
                      - "tier"
                      - "task_id"
                      - "retry_id"
                      - "duration"
                      - "platform_option"
                required:
                  - count
                  - next
                  - previous
                  - results
                  - job_property_names  
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according to the Accept headers.
      summary: Retrieve a paginated list of jobs.
  /api/jobs/{id}/:
    get:
      parameters:
      - name: id
        in: path
        required: true
        description: Unique identifier of the job
        schema:
          type: integer
          format: int64
          pattern: ^[^/.]+$
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: Successful retrieval of a job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobSerializerResponse'
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this object.
        '404':
          description: Not Found - Object with the given identifier does not exist.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according to the Accept headers.
      summary: Retrieve details of a specific job by its ID.
  "/api/perfcompare/results/":
    get:
      parameters:
        - description:
            The base revision for comparison. If not provided, 'interval'
            must be specified.
          in: query
          name: base_revision
          required: false
          schema:
            type: string
        - description: The new revision for comparison.
          in: query
          name: new_revision
          required: true
          schema:
            type: string
        - description: The repository name for the base revision.
          in: query
          name: base_repository
          required: true
          schema:
            type: string
        - description: The repository name for the new revision.
          in: query
          name: new_repository
          required: true
          schema:
            type: string
        - description:
            The ID of the framework to filter results. If not provided, defaults
            to None.
          in: query
          name: framework
          required: false
          schema:
            type: integer
        - description:
            The time interval for comparison in seconds. Required if 'base_revision'
            is not provided.
          in: query
          name: interval
          required: false
          schema:
            type: integer
        - description:
            A boolean flag to include or exclude subtests. Defaults to False
            if not provided.
          in: query
          name: no_subtests
          required: false
          schema:
            type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    base_app:
                      description: The application name for the base revision.
                      type: string
                    base_avg_value:
                      description: The average performance value for the base revision.
                      type: number
                    base_measurement_unit:
                      description: The measurement unit for the base revision.
                      type: string
                    base_median_value:
                      description: The median performance value for the base revision.
                      type: number
                    base_repository_name:
                      description: The name of the repository for the base revision.
                      type: string
                    base_retriggerable_job_ids:
                      description:
                        List of job IDs that can be retriggered for the
                        base revision.
                      items:
                        type: integer
                      type: array
                    base_rev:
                      description: The base revision identifier.
                      type: string
                    base_runs:
                      description: List of performance values for the base revision.
                      items:
                        type: number
                      type: array
                    base_stddev:
                      description:
                        The standard deviation of performance values for
                        the base revision.
                      type: number
                    base_stddev_pct:
                      description:
                        The percentage of standard deviation for the base
                        revision.
                      type: number
                    confidence:
                      description: The confidence value of the comparison.
                      type: number
                    confidence_text:
                      description: Textual representation of the confidence level.
                      type: string
                    delta_percentage:
                      description:
                        The percentage change in average values between
                        the new and base revisions.
                      type: number
                    delta_value:
                      description:
                        The difference in average values between the new
                        and base revisions.
                      type: number
                    graphs_link:
                      description: Link to the performance graphs for the comparison.
                      type: string
                    header_name:
                      description: The name of the performance metric.
                      type: string
                    is_complete:
                      description: Indicates if the performance data is complete.
                      type: boolean
                    is_confident:
                      description: Indicates if the comparison is statistically confident.
                      type: boolean
                    is_empty:
                      description: Indicates if there are no results to show.
                      type: boolean
                    is_improvement:
                      description: Indicates if the new revision shows improvement.
                      type: boolean
                    is_meaningful:
                      description: Indicates if the change is statistically meaningful.
                      type: boolean
                    is_regression:
                      description: Indicates if the new revision shows regression.
                      type: boolean
                    lower_is_better:
                      description: Indicates if a lower value is better for this metric.
                      type: boolean
                    magnitude:
                      description: The magnitude of the change in performance.
                      type: number
                    more_runs_are_needed:
                      description:
                        Indicates if more runs are needed for a reliable
                        comparison.
                      type: boolean
                    new_app:
                      description: The application name for the new revision.
                      type: string
                    new_avg_value:
                      description: The average performance value for the new revision.
                      type: number
                    new_is_better:
                      description:
                        Indicates if the new revision is better than the
                        base revision.
                      type: boolean
                    new_measurement_unit:
                      description: The measurement unit for the new revision.
                      type: string
                    new_median_value:
                      description: The median performance value for the new revision.
                      type: number
                    new_repository_name:
                      description: The name of the repository for the new revision.
                      type: string
                    new_retriggerable_job_ids:
                      description:
                        List of job IDs that can be retriggered for the
                        new revision.
                      items:
                        type: integer
                      type: array
                    new_rev:
                      description: The new revision identifier.
                      type: string
                    new_runs:
                      description: List of performance values for the new revision.
                      items:
                        type: number
                      type: array
                    new_stddev:
                      description:
                        The standard deviation of performance values for
                        the new revision.
                      type: number
                    new_stddev_pct:
                      description:
                        The percentage of standard deviation for the new
                        revision.
                      type: number
                    platform:
                      description: The platform on which the tests were run.
                      type: string
                  type: object
                type: array
          description: Successful response with performance comparison results.
        "400":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: No new push with revision {new_revision} from repo {new_repository}.
                    type: string
                type: object
          description:
            Bad Request - Invalid query parameters or no push with the
            specified revision from the repository.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Retrieve a list of performance comparison results between two revisions.
