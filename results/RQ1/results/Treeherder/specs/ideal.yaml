openapi: 3.0.0
info:
  title: API Documentation for treeherder
  version: 1.0.0
paths:
  "/api/auth/login/":
    get:
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  email:
                    description: The email address of the user.
                    format: email
                    readOnly: true
                    type: string
                    writeOnly: false
                  is_staff:
                    description:
                      Designates whether the user can log into this admin
                      site.
                    readOnly: true
                    type: boolean
                    writeOnly: false
                  is_superuser:
                    description:
                      Designates that this user has all permissions without
                      explicitly assigning them.
                    readOnly: true
                    type: boolean
                    writeOnly: false
                  username:
                    description: The username of the user.
                    readOnly: true
                    type: string
                    writeOnly: false
                required:
                  - username
                  - is_superuser
                  - is_staff
                  - email
                type: object
          description: User authenticated successfully
        "401":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: User not authenticated.
                    type: string
                type: object
          description: Authentication failed
      summary: Verify credentials and log in the user
  "/api/auth/logout/":
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                example: User logged out
                type: string
          description: User logged out successfully
      summary: Logs out the current user
  "/api/bugzilla-component/":
    get:
      parameters:
        - description:
            The file path to filter Bugzilla components, with 'org.mozilla.'
            prefix handled and file extension ignored.
          in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    component:
                      description: The name of the component in Bugzilla.
                      readOnly: true
                      type: string
                      writeOnly: false
                    product:
                      description: The name of the product in Bugzilla.
                      readOnly: true
                      type: string
                      writeOnly: false
                  required:
                    - product
                    - component
                  type: object
                type: array
          description: A list of Bugzilla components excluding those in the IGNORE_LIST_PRODUCT_COMPONENT
        "400":
          description: Bad Request - Invalid query parameters.
      summary: Retrieve a list of Bugzilla components
  "/api/bugzilla-component/{pk}/":
    get:
      parameters:
        - description: Primary key of the Bugzilla component to retrieve
          in: path
          name: pk
          required: true
          schema:
            type: string
        - description:
            The file path to filter Bugzilla components, with 'org.mozilla.'
            prefix handled and file extension ignored.
          in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    component:
                      description: The specific component within the product
                      type: string
                    product:
                      description: The product associated with the Bugzilla component
                      type: string
                  required:
                    - product
                    - component
                  type: object
                type: array
          description: A Bugzilla component object with the specified primary key
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "404":
          description: Not Found - Object with the given identifier does not exist.
      summary: Retrieve a specific Bugzilla component by its primary key
  "/api/bugzilla-component/{pk}/get_queryset/":
    get:
      parameters:
        - description: Primary key of the Bugzilla component
          in: path
          name: pk
          required: true
          schema:
            type: string
        - description: The path of the file to filter bug suggestions
          in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    component:
                      description: The name of the component in Bugzilla.
                      readOnly: true
                      type: string
                      writeOnly: false
                    product:
                      description: The name of the product in Bugzilla.
                      readOnly: true
                      type: string
                      writeOnly: false
                  required:
                    - product
                    - component
                  type: object
                type: array
          description: A list of bugzilla components filtered by the given path
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
      summary: Gets a set of bug suggestions for a specific job
  "/api/bugzilla/create_bug/":
    post:
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                comment:
                  description: A comment for the bug.
                  type: string
                component:
                  description: The component related to the bug.
                  type: string
                crash_signature:
                  description:
                    The crash signature of the bug, must not exceed 2048
                    characters.
                  maxLength: 2048
                  type: string
                is_security_issue:
                  description: Flag to indicate if this is a security issue.
                  type: boolean
                keywords:
                  description: Keywords associated with the bug.
                  type: string
                priority:
                  description: The priority of the bug.
                  type: string
                product:
                  description: The product related to the bug.
                  type: string
                regressed_by:
                  description: Information about what regressed this issue.
                  type: string
                see_also:
                  description: Additional references for the bug.
                  type: string
                severity:
                  description: The severity of the bug.
                  type: string
                summary:
                  description: The summary of the bug, required field.
                  type: string
                version:
                  description: The version of the product the bug is filed against.
                  type: string
                whiteboard:
                  description: Whiteboard content for the bug.
                  type: string
              type: object
              required:
                - summary
                - product
                - component
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  id:
                    description: The unique identifier of the created bug
                    example: 12345
                    type: integer
                  url:
                    description: The URL to the created bug in Bugzilla
                    example: https://bugzilla.example.com/show_bug.cgi?id=12345
                    type: string
                type: object
          description: Bug successfully created
        "400":
          content:
            application/json:
              schema:
                properties:
                  failure:
                    description: A message describing the reason for the failure
                    example: Bugzilla API key not set!
                    type: string
                type: object
          description:
            Bad Request - Invalid input, validation error, or Bugzilla
            API key not set
        "401":
          description: Unauthorized - Authentication credentials were not provided
        "403":
          description: Forbidden - User does not have permission to create the object
      summary: Create a Bugzilla bug with the provided parameters
  "/api/failureclassification/{pk}/":
    get:
      parameters:
        - description: Primary key of the failure classification to retrieve
          in: path
          name: pk
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  id:
                    description: Unique identifier for the failure classification.
                    readOnly: true
                    type: integer
                    writeOnly: false
                  name:
                    description: Name of the failure classification.
                    readOnly: true
                    type: string
                    writeOnly: false
                required:
                  - id
                  - name
                type: object
          description: A FailureClassification object retrieved successfully
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view this object.
        "404":
          description: Not Found - Object with the given identifier does not exist.
      summary: Retrieve a specific FailureClassification object by its primary key
  "/api/failurecount/":
    get:
      parameters:
        - description: The start date for querying failures.
          example: "2021-01-01"
          in: query
          name: startday
          required: true
          schema:
            format: date
            type: string
        - description: The end date for querying failures.
          example: "2021-01-31"
          in: query
          name: endday
          required: true
          schema:
            format: date
            type: string
        - description:
            The repository name to filter failures. If 'all' is not provided,
            the repository must exist in the system.
          example: mozilla-central
          in: query
          name: tree
          required: true
          schema:
            type: string
        - description:
            The bug ID to filter failures. This field is optional and can
            be null.
          example: 123456
          in: query
          name: bug
          required: false
          schema:
            nullable: true
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    date:
                      description: The date of the push.
                      format: date
                      readOnly: true
                      type: string
                      writeOnly: false
                    failure_count:
                      description: The count of failures.
                      readOnly: true
                      type: integer
                      writeOnly: false
                    test_runs:
                      description: The number of test runs.
                      readOnly: true
                      type: integer
                      writeOnly: false
                  required:
                    - date
                    - test_runs
                    - failure_count
                  type: object
                type: array
          description: A list of failure counts and test runs successfully retrieved.
        "400":
          content:
            application/json:
              schema:
                properties:
                  bug:
                    items:
                      example: Bug must be a number.
                      type: string
                    type: array
                  endday:
                    items:
                      example: End day is required.
                      type: string
                    type: array
                  startday:
                    items:
                      example: Start day is required.
                      type: string
                    type: array
                  tree:
                    items:
                      example: Tree is required.
                      type: string
                    type: array
                type: object
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
      summary: List of failures and test runs by day per date range and repo
  "/api/failures/":
    get:
      parameters:
        - description: The start date for querying intermittent failures.
          in: query
          name: startday
          required: true
          schema:
            format: date
            type: string
        - description: The end date for querying intermittent failures.
          in: query
          name: endday
          required: true
          schema:
            format: date
            type: string
        - description:
            The repository name to filter failures. Use 'all' to include
            all repositories or provide a specific repository name.
          in: query
          name: tree
          required: true
          schema:
            type: string
        - description: The bug ID to filter failures. This field is optional.
          in: query
          name: bug
          required: false
          schema:
            nullable: true
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    bug_count:
                      description: The count of jobs associated with the bug
                      type: integer
                    bug_id:
                      description: The ID of the bug
                      type: integer
                type: array
          description: Successful response with a list of failures
        "400":
          content:
            application/json:
              schema:
                properties:
                  endday:
                    description: The end date of the range in 'YYYY-MM-DD' format.
                    example: "2023-01-31"
                    format: date
                    type: string
                  startday:
                    description: The start date of the range in 'YYYY-MM-DD' format.
                    example: "2023-01-01"
                    format: date
                    type: string
                  tree:
                    description: The name of the repository which does not exist.
                    example: invalid-repo-name
                    type: string
                type: object
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: List of intermittent failures by date range and repo (project name)
  "/api/failuresbybug/":
    get:
      parameters:
        - description:
            The start date for querying intermittent failures, in 'YYYY-MM-DD'
            format.
          in: query
          name: startday
          required: true
          schema:
            format: date
            type: string
        - description:
            The end date for querying intermittent failures, in 'YYYY-MM-DD'
            format.
          in: query
          name: endday
          required: true
          schema:
            format: date
            type: string
        - description:
            The repository name to filter the failures. If the repository
            does not exist, an error is returned.
          in: query
          name: tree
          required: true
          schema:
            type: string
        - description:
            The bug ID to filter the failures. This field is required for
            this endpoint.
          in: query
          name: bug
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  properties:
                    bug_id:
                      description: The ID of the bug.
                      type: integer
                    build_type:
                      description: The type of build.
                      type: string
                    job_id:
                      description: The ID of the job.
                      type: integer
                    lines:
                      description: List of error lines associated with the job.
                      items:
                        type: string
                      type: array
                    machine_name:
                      description: The name of the machine running the job.
                      type: string
                    platform:
                      description: The platform of the machine running the job.
                      type: string
                    push_time:
                      description: The time the job was pushed.
                      format: date-time
                      type: string
                    revision:
                      description: The revision of the code at the time of the job.
                      type: string
                    test_suite:
                      description: Details of the test suite.
                      type: string
                    tree:
                      description: The repository name.
                      type: string
                  required:
                    - push_time
                    - platform
                    - revision
                    - test_suite
                    - tree
                    - build_type
                    - job_id
                    - bug_id
                    - machine_name
                    - lines
                  type: object
                type: array
          description: Successful response with a list of failure job details.
        "400":
          content:
            application/json:
              schema:
                properties:
                  bug:
                    items:
                      example: Bug ID is required when context is 'requireBug'.
                      type: string
                    type: array
                  endday:
                    items:
                      example: End day is required in format YYYY-MM-DD.
                      type: string
                    type: array
                  startday:
                    items:
                      example: Start day is required in format YYYY-MM-DD.
                      type: string
                    type: array
                  tree:
                    items:
                      example: Tree (project name) is required and must exist.
                      type: string
                    type: array
                type: object
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary:
        List of intermittent failure job details by bug, date range, and repo
        (project name)
  "/api/groupsummary/":
    get:
      parameters:
        - description:
            The start date for the summary in 'YYYY-MM-DD' format. Defaults
            to today's date if not provided or invalid.
          in: query
          name: startdate
          required: false
          schema:
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
            type: string
        - description:
            The end date for the summary in 'YYYY-MM-DD' format. Defaults
            to the day after the start date if not provided or invalid. The range between
            startdate and enddate cannot exceed one day.
          in: query
          name: enddate
          required: false
          schema:
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  job_type_names:
                    example:
                      - test-job1
                      - test-job2
                    items:
                      type: string
                    type: array
                  manifests:
                    items:
                      additionalProperties:
                        example:
                          - group1:
                              - - 0
                                - passed
                                - 1
                                - 10
                              - - 1
                                - testfailed
                                - 2
                                - 5
                      type: object
                    type: array
                type: object
          description:
            A successful response providing the job type names and manifests
            with group summaries.
        "400":
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Yields group names/status summary for the given group and day.
  /api/infracompare/:
      get:
        parameters:
        - name: project
          in: query
          required: true
          description: The name of the project/repository to query.
          schema:
            type: string
          example: mozilla-central
        - name: revision
          in: query
          required: false
          description: The 40-character revision hash. One of 'revision', 'interval', or the 'startday'/'endday' pair must be provided.
          schema:
            type: string
            minLength: 12
            maxLength: 40
          example: c4a5e6f789012345678901234567890123456789
        - name: interval
          in: query
          required: false
          description: Time interval in seconds from the present moment to fetch jobs from. One of 'revision', 'interval', or the 'startday'/'endday' pair must be provided.
          schema:
            type: integer
          example: 86400
        - name: startday
          in: query
          required: false
          description: The start datetime for the time range query in ISO 8601 format. If provided, 'endday' must also be provided. This pair is one of the three required parameter combinations.
          schema:
            type: string
            format: date-time
          example: '2023-05-20T15:00:00Z'
        - name: endday
          in: query
          required: false
          description: The end datetime for the time range query in ISO 8601 format. If provided, 'startday' must also be provided. This pair is one of the three required parameter combinations.
          schema:
            type: string
            format: date-time
          example: '2023-05-21T15:00:00Z'
        security:
        - cookieAuth: []
        - basicAuth: []
        responses:
        "200":
          content:
            application/json:
              example:
                - duration: 3600
                  id: 12345
                  job_type__name: Build
                  result: success
              schema:
                items:
                  properties:
                    duration:
                      description: Duration of the job
                      readOnly: true
                      type: integer
                      writeOnly: false
                    id:
                      description: Unique identifier of the comparison
                      readOnly: true
                      type: integer
                      writeOnly: false
                    job_type__name:
                      description: Name of the job type
                      readOnly: true
                      type: string
                      writeOnly: false
                    result:
                      description: Result of the comparison
                      readOnly: true
                      type: string
                      writeOnly: false
                  required:
                    - id
                    - duration
                    - job_type__name
                    - result
                  type: object
                type: array
          description: A list of jobs with their details is successfully retrieved.
        "400":
          content:
            application/json:
              schema:
                properties:
                  detail:
                    example: "Required: revision, startday and endday, or interval."
                    type: string
                type: object
          description: Bad Request - Invalid query parameters.
        "401":
          description: Unauthorized - Authentication credentials were not provided.
        "403":
          description: Forbidden - User does not have permission to view the list.
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary:
        Retrieve a list of jobs with their durations and results based on the
        provided query parameters.
  /api/jobs/:
    get:
      parameters:
      - name: build_architecture
        in: query
        description: Filter by build platform architecture.
        required: false
        schema:
          type: string
      - name: build_os
        in: query
        description: Filter by build platform OS name.
        required: false
        schema:
          type: string
      - name: build_platform
        in: query
        description: Filter by build platform.
        required: false
        schema:
          type: string
      - name: build_platform_id
        in: query
        description: Filter by exact build platform ID.
        required: false
        schema:
          type: integer
      - name: build_system_type
        in: query
        description: Filter by build system type.
        required: false
        schema:
          type: string
      - name: end_time
        in: query
        description: Filter by exact end time.
        required: false
        schema:
          type: string
          format: date-time
      - name: end_time__gt
        in: query
        description: Filter for end time greater than the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: end_time__gte
        in: query
        description: Filter for end time greater than or equal to the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: end_time__lt
        in: query
        description: Filter for end time less than the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: end_time__lte
        in: query
        description: Filter for end time less than or equal to the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: failure_classification_id
        in: query
        description: Filter by exact failure classification ID.
        required: false
        schema:
          type: integer
      - name: id
        in: query
        description: Filter by exact job ID.
        required: false
        schema:
          type: integer
      - name: id__gt
        in: query
        description: Filter for job ID greater than the specified value.
        required: false
        schema:
          type: integer
      - name: id__gte
        in: query
        description: Filter for job ID greater than or equal to the specified value.
        required: false
        schema:
          type: integer
      - name: id__in
        in: query
        description: A comma-separated list of job IDs to filter by.
        required: false
        schema:
          type: string
      - name: id__lt
        in: query
        description: Filter for job ID less than the specified value.
        required: false
        schema:
          type: integer
      - name: id__lte
        in: query
        description: Filter for job ID less than or equal to the specified value.
        required: false
        schema:
          type: integer
      - name: job_group_id
        in: query
        description: Filter by exact job group ID.
        required: false
        schema:
          type: integer
      - name: job_group_name
        in: query
        description: Filter by job group name.
        required: false
        schema:
          type: string
      - name: job_group_symbol
        in: query
        description: Filter by job group symbol.
        required: false
        schema:
          type: string
      - name: job_guid
        in: query
        description: Filter by job GUID.
        required: false
        schema:
          type: string
      - name: job_guid__in
        in: query
        description: A comma-separated list of job GUIDs to filter by.
        required: false
        schema:
          type: string
      - name: job_type_id
        in: query
        description: Filter by exact job type ID.
        required: false
        schema:
          type: integer
      - name: job_type_name
        in: query
        description: Filter by job type name.
        required: false
        schema:
          type: string
      - name: job_type_symbol
        in: query
        description: Filter by job type symbol.
        required: false
        schema:
          type: string
      - name: last_modified
        in: query
        description: Filter by exact last modified timestamp.
        required: false
        schema:
          type: string
          format: date-time
      - name: last_modified__gt
        in: query
        description: Filter for last modified timestamp greater than the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: last_modified__gte
        in: query
        description: Filter for last modified timestamp greater than or equal to the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: last_modified__lt
        in: query
        description: Filter for last modified timestamp less than the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: last_modified__lte
        in: query
        description: Filter for last modified timestamp less than or equal to the specified value.
        required: false
        schema:
          type: string
          format: date-time
      - name: machine_name
        in: query
        description: Filter by machine name.
        required: false
        schema:
          type: string
      - name: machine_platform_architecture
        in: query
        description: Filter by machine platform architecture.
        required: false
        schema:
          type: string
      - name: machine_platform_os
        in: query
        description: Filter by machine platform OS name.
        required: false
        schema:
          type: string
      - name: option_collection_hash
        in: query
        description: Filter by exact option collection hash.
        required: false
        schema:
          type: string
      - name: platform
        in: query
        description: Filter by machine platform.
        required: false
        schema:
          type: string
      - name: push_id
        in: query
        description: Filter by exact push ID.
        required: false
        schema:
          type: integer
      - name: push_id__gt
        in: query
        description: Filter for push ID greater than the specified value.
        required: false
        schema:
          type: integer
      - name: push_id__gte
        in: query
