                    type: string
                type: object
          description:
            No push with the given revision or no investigated test found
            with the given primary key
        "406":
          description:
            Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      summary: Retrieve a specific investigated test by its primary key
  
  "/api/project/{project}/jobs/":
    get:
      summary: Retrieve a list of jobs for a specific project
      description: |
        Returns a paginated list of jobs for the specified project with extensive filtering capabilities.
        Supports multiple lookup expressions for numeric and datetime fields, exact matching for categorical fields,
        and list-based filtering for certain parameters.
      parameters:
        # Path Parameters
        - name: project
          in: path
          required: true
          description: The name/identifier of the project
          schema:
            type: string
            pattern: '^[\w-]{0,50}$'
            example: "mozilla-central"

        # Pagination Parameters
        - name: offset
          in: query
          required: false
          description: The number of jobs to skip before starting to collect the result set
          schema:
            type: integer
            format: int32
            default: 0
            example: 0

        - name: count
          in: query
          required: false
          description: The number of jobs to return
          schema:
            type: integer
            format: int32
            maximum: 2000
            default: 10
            example: 50

        - name: return_type
          in: query
          required: false
          description: The format of the returned jobs
          schema:
            type: string
            enum: ["dict", "list"]
            default: "dict"
            example: "dict"

        # Job Identification Filters (with comparison operators)
        - name: id
          in: query
          required: false
          description: Filter jobs by exact ID
          schema:
            type: integer
            format: int64
            example: 12345

        - name: id__lt
          in: query
          required: false
          description: Filter jobs with ID less than specified value
          schema:
            type: integer
            format: int64
            example: 12345

        - name: id__lte
          in: query
          required: false
          description: Filter jobs with ID less than or equal to specified value
          schema:
            type: integer
            format: int64
            example: 12345

        - name: id__gt
          in: query
          required: false
          description: Filter jobs with ID greater than specified value
          schema:
            type: integer
            format: int64
            example: 12345

        - name: id__gte
          in: query
          required: false
          description: Filter jobs with ID greater than or equal to specified value
          schema:
            type: integer
            format: int64
            example: 12345

        - name: id__in
          in: query
          required: false
          description: Filter jobs by multiple IDs (comma-separated)
          schema:
            type: string
            example: "12345,12346,12347"

        - name: job_guid
          in: query
          required: false
          description: Filter jobs by exact GUID
          schema:
            type: string
            example: "guid-12345-abcd"

        - name: job_guid__in
          in: query
          required: false
          description: Filter jobs by multiple GUIDs (comma-separated)
          schema:
            type: string
            example: "guid-123,guid-456,guid-789"

        # Push ID Filters (with comparison operators)
        - name: push_id
          in: query
          required: false
          description: Filter jobs by exact push ID
          schema:
            type: integer
            format: int32
            example: 67890

        - name: push_id__lt
          in: query
          required: false
          description: Filter jobs with push ID less than specified value
          schema:
            type: integer
            format: int32
            example: 67890

        - name: push_id__lte
          in: query
          required: false
          description: Filter jobs with push ID less than or equal to specified value
          schema:
            type: integer
            format: int32
            example: 67890

        - name: push_id__gt
          in: query
          required: false
          description: Filter jobs with push ID greater than specified value
          schema:
            type: integer
            format: int32
            example: 67890

        - name: push_id__gte
          in: query
          required: false
          description: Filter jobs with push ID greater than or equal to specified value
          schema:
            type: integer
            format: int32
            example: 67890

        - name: push_id__in
          in: query
          required: false
          description: Filter jobs by multiple push IDs (comma-separated)
          schema:
            type: string
            example: "67890,67891,67892"

        # Legacy parameter support (mapped to push_id internally)
        - name: result_set_id
          in: query
          required: false
          description: Legacy parameter - Filter jobs by result set ID (mapped to push_id)
          deprecated: true
          schema:
            type: integer
            format: int32
            example: 67890

        - name: result_set_id__lt
          in: query
          required: false
          description: Legacy alias for `push_id__lt`.
          schema:
            type: integer
        - name: result_set_id__lte
          in: query
          required: false
          description: Legacy alias for `push_id__lte`.
          schema:
            type: integer
        - name: result_set_id__gt
          in: query
          required: false
          description: Legacy alias for `push_id__gt`.
          schema:
            type: integer
        - name: result_set_id__gte
          in: query
          required: false
          description: Legacy alias for `push_id__gte`.
          schema:
            type: integer
      

        # Build Platform Filters
        - name: build_architecture
          in: query
          required: false
          description: Filter jobs by build architecture
          schema:
            type: string
            example: "x86_64"

        - name: build_os
          in: query
          required: false
          description: Filter jobs by build operating system
          schema:
            type: string
            example: "linux"

        - name: build_platform
          in: query
          required: false
          description: Filter jobs by build platform
          schema:
            type: string
            example: "Ubuntu"

        - name: build_platform_id
          in: query
          required: false
          description: Filter jobs by exact build platform ID
          schema:
            type: integer
            format: int32
            example: 1

        - name: build_system_type
          in: query
          required: false
          description: Filter jobs by build system type
          schema:
            type: string
            example: "taskcluster"

        # Job Classification Filters
        - name: job_group_id
          in: query
          required: false
          description: Filter jobs by exact job group ID
          schema:
            type: integer
            format: int32
            example: 10

        - name: job_group_name
          in: query
          required: false
          description: Filter jobs by job group name
          schema:
            type: string
            example: "Builds"

        - name: job_group_symbol
          in: query
          required: false
          description: Filter jobs by job group symbol
          schema:
            type: string
            example: "B"

        - name: job_type_id
          in: query
          required: false
          description: Filter jobs by exact job type ID
          schema:
            type: integer
            format: int32
            example: 2

        - name: job_type_name
          in: query
          required: false
          description: Filter jobs by job type name
          schema:
            type: string
            example: "test"

        - name: job_type_symbol
          in: query
          required: false
          description: Filter jobs by job type symbol
          schema:
            type: string
            example: "T"

        # Tier Filters (with comparison operators)
        - name: tier
          in: query
          required: false
          description: Filter jobs by exact tier level
          schema:
            type: integer
            format: int32
            example: 1

        - name: tier__lt
          in: query
          required: false
          description: Filter jobs with tier less than specified value
          schema:
            type: integer
            format: int32
            example: 2

        - name: tier__lte
          in: query
          required: false
          description: Filter jobs with tier less than or equal to specified value
          schema:
            type: integer
            format: int32
            example: 2

        - name: tier__gt
          in: query
          required: false
          description: Filter jobs with tier greater than specified value
          schema:
            type: integer
            format: int32
            example: 1

        - name: tier__gte
          in: query
          required: false
          description: Filter jobs with tier greater than or equal to specified value
          schema:
            type: integer
            format: int32
            example: 1

        - name: tier__in
          in: query
          required: false
          description: Filter jobs by multiple tier levels (comma-separated)
          schema:
            type: string
            example: "1,2"

        # Job Status Filters
        - name: state
          in: query
          required: false
          description: Filter jobs by exact state
          schema:
            type: string
            example: "completed"

        - name: result
          in: query
          required: false
          description: Filter jobs by exact result status
          schema:
            type: string
            example: "success"

        - name: failure_classification_id
          in: query
          required: false
          description: Filter jobs by exact failure classification ID
          schema:
            type: integer
            format: int32
            example: 0

        # Machine and Platform Filters
        - name: machine_name
          in: query
          required: false
          description: Filter jobs by machine name
          schema:
            type: string
            example: "machine-001"

        - name: machine_platform_architecture
          in: query
          required: false
          description: Filter jobs by machine platform architecture
          schema:
            type: string
            example: "x86_64"

        - name: machine_platform_os
          in: query
          required: false
          description: Filter jobs by machine platform OS
          schema:
            type: string
            example: "linux"

        - name: platform
          in: query
          required: false
          description: Filter jobs by platform
          schema:
            type: string
            example: "linux64"

        # Additional Filters
        - name: option_collection_hash
          in: query
          required: false
          description: Filter jobs by exact option collection hash
          schema:
            type: string
            example: "hash-value"

        - name: reason
          in: query
          required: false
          description: Filter jobs by exact reason
          schema:
            type: string
            example: "scheduled"

        - name: who
          in: query
          required: false
          description: Filter jobs by exact user
          schema:
            type: string
            example: "user@example.com"

        - name: ref_data_name
          in: query
          required: false
          description: Filter jobs by reference data name
          schema:
            type: string
            example: "gecko-decision"

        - name: signature
          in: query
          required: false
          description: Filter jobs by signature
          schema:
            type: string
            example: "signature-hash"

        # TaskCluster Filters
        - name: task_id
          in: query
          required: false
          description: Filter jobs by TaskCluster task ID
          schema:
            type: string
            example: "task-123-abc"

        - name: retry_id
          in: query
          required: false
          description: Filter jobs by TaskCluster retry ID
          schema:
            type: integer
            format: int32
            example: 0

        # Time-based Filters (with comparison operators)
        - name: last_modified
          in: query
          required: false
          description: Filter jobs by exact last modified date (ISO 8601 format)
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: last_modified__lt
          in: query
          required: false
          description: Filter jobs last modified before specified date
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: last_modified__lte
          in: query
          required: false
          description: Filter jobs last modified before or on specified date
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: last_modified__gt
          in: query
          required: false
          description: Filter jobs last modified after specified date
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: last_modified__gte
          in: query
          required: false
          description: Filter jobs last modified after or on specified date
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: submit_time
          in: query
          required: false
          description: Filter jobs by exact submit time (ISO 8601 format)
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: submit_time__lt
          in: query
          required: false
          description: Filter jobs submitted before specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: submit_time__lte
          in: query
          required: false
          description: Filter jobs submitted before or at specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: submit_time__gt
          in: query
          required: false
          description: Filter jobs submitted after specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: submit_time__gte
          in: query
          required: false
          description: Filter jobs submitted after or at specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: start_time
          in: query
          required: false
          description: Filter jobs by exact start time (ISO 8601 format)
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: start_time__lt
          in: query
          required: false
          description: Filter jobs started before specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: start_time__lte
          in: query
          required: false
          description: Filter jobs started before or at specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: start_time__gt
          in: query
          required: false
          description: Filter jobs started after specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: start_time__gte
          in: query
          required: false
          description: Filter jobs started after or at specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: end_time
          in: query
          required: false
          description: Filter jobs by exact end time (ISO 8601 format)
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: end_time__lt
          in: query
          required: false
          description: Filter jobs ended before specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: end_time__lte
          in: query
          required: false
          description: Filter jobs ended before or at specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: end_time__gt
          in: query
          required: false
          description: Filter jobs ended after specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        - name: end_time__gte
          in: query
          required: false
          description: Filter jobs ended after or at specified time
          schema:
            type: string
            format: date-time
            example: "2021-10-01T12:00:00Z"

        # Legacy timestamp parameters (converted to time internally)
        - name: submit_timestamp
          in: query
          required: false
          description: Legacy parameter - Filter by submit timestamp (Unix timestamp)
          deprecated: true
          schema:
            type: number
            format: int64
            example: 1633072800

        - name: start_timestamp
          in: query
          required: false
          description: Legacy parameter - Filter by start timestamp (Unix timestamp)
          deprecated: true
          schema:
            type: number
            format: int64
            example: 1633072800

        - name: end_timestamp
          in: query
          required: false
          description: Legacy parameter - Filter by end timestamp (Unix timestamp)
          deprecated: true
          schema:
            type: number
            format: int64
            example: 1633072800

      security:
        - BasicAuth: []
        - SessionAuth: []

      responses:
        "200":
          description: Successful response with a list of jobs and metadata
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                  - meta
                properties:
                  results:
                    type: array
                    description: Array of job objects
                    items:
                      type: object
                      properties:
                        # Build Information
                        build_architecture:
                          type: string
                          example: "x86_64"
                          description: "Architecture of the build platform"
                        build_os:
                          type: string
                          example: "linux"
                          description: "Operating system of the build platform"
                        build_platform:
                          type: string
                          example: "Ubuntu"
                          description: "Build platform name"
                        build_platform_id:
                          type: integer
                          example: 1
                          description: "Unique identifier for the build platform"
                        build_system_type:
                          type: string
                          example: "taskcluster"
                          description: "Type of build system used"

                        # Job Identification
                        id:
                          type: integer
                          example: 12345
                          description: "Unique job identifier"
                        job_guid:
                          type: string
                          example: "guid-12345-abcd"
                          description: "Globally unique identifier for the job"
                        signature:
                          type: string
                          example: "signature-value"
                          description: "Job signature hash"

                        # Job Classification
                        job_group_description:
                          type: string
                          example: "Main Job Group"
                          description: "Description of the job group"
                        job_group_id:
                          type: integer
                          example: 10
                          description: "Unique identifier for the job group"
                        job_group_name:
                          type: string
                          example: "Group A"
                          description: "Name of the job group"
                        job_group_symbol:
                          type: string
                          example: "GA"
                          description: "Symbol representing the job group"
                        job_type_description:
                          type: string
                          example: "Test Job"
                          description: "Description of the job type"
                        job_type_id:
                          type: integer
                          example: 2
                          description: "Unique identifier for the job type"
                        job_type_name:
                          type: string
                          example: "Test"
                          description: "Name of the job type"
                        job_type_symbol:
                          type: string
                          example: "T"
                          description: "Symbol representing the job type"

                        # Machine Information
                        machine_name:
                          type: string
                          example: "machine-1"
                          description: "Name of the machine that ran the job"
                        machine_platform_architecture:
                          type: string
                          example: "x86_64"
                          description: "Architecture of the machine platform"
                        machine_platform_os:
                          type: string
                          example: "linux"
                          description: "Operating system of the machine platform"
                        platform:
                          type: string
                          example: "linux64"
                          description: "Platform identifier"

                        # Job Status and Results
                        state:
                          type: string
                          example: "completed"
                          description: "Current state of the job"
                        result:
                          type: string
                          example: "success"
                          description: "Result status of the job"
                        failure_classification_id:
                          type: integer
                          nullable: true
                          example: 0
                          description: "Classification ID for job failures"
                        tier:
                          type: integer
                          example: 1
                          description: "Tier level of the job"

                        # Timestamps
                        last_modified:
                          type: string
                          format: date-time
                          example: "2021-10-01T12:00:00Z"
                          description: "Last modification timestamp"
                        submit_timestamp:
                          type: integer
                          example: 1633072800
                          description: "Job submission timestamp (Unix timestamp)"
                        start_timestamp:
                          type: integer
                          example: 1633072800
                          description: "Job start timestamp (Unix timestamp)"
                        end_timestamp:
                          type: integer
                          example: 1633072800
                          description: "Job completion timestamp (Unix timestamp)"

                        # Push Information
                        push_id:
                          type: integer
                          example: 67890
                          description: "Push identifier"
                        result_set_id:
                          type: integer
                          example: 67890
                          description: "Legacy field - same as push_id"

                        # Additional Information
                        option_collection_hash:
                          type: string
                          example: "hash-value"
                          description: "Hash of the option collection"
                        platform_option:
                          type: string
                          example: "opt"
                          description: "Platform-specific options"
                        reason:
                          type: string
                          nullable: true
                          example: "Scheduled build"
                          description: "Reason for job execution"
                        ref_data_name:
                          type: string
                          example: "Reference Data"
                          description: "Reference data name"
                        who:
                          type: string
                          example: "user@example.com"
                          description: "User who triggered the job"

                        # TaskCluster Integration
                        task_id:
                          type: string
                          nullable: true
                          example: "task-123-abc"
                          description: "TaskCluster task identifier"
                        retry_id:
                          type: integer
                          nullable: true
                          example: 0
                          description: "TaskCluster retry identifier"

                  job_property_names:
                    type: array
                    items:
                      type: string
                    description: "List of job property names (only present when return_type=list)"
                    example: ["id", "job_guid", "state", "result"]

                  meta:
                    type: object
                    required:
                      - repository
                      - offset
                      - count
                    properties:
                      repository:
                        type: string
                        example: "mozilla-central"
                        description: "Project/repository name"
                      offset:
                        type: integer
                        example: 0
                        description: "Number of jobs skipped"
                      count:
                        type: integer
                        example: 10
                        description: "Number of jobs returned"

              examples:
                basic_filtering:
                  summary: "Basic filtering by state and result"
                  value:
                    results:
                      - id: 12345
                        job_guid: "guid-12345-abcd"
                        state: "completed"
                        result: "success"
                        build_platform: "Ubuntu"
                        job_type_name: "test"
                        tier: 1
                        platform_option: "opt"
                    meta:
                      repository: "mozilla-central"
                      offset: 0
                      count: 1

                range_filtering:
                  summary: "Range filtering by push_id and tier"
                  description: "Example using push_id__gte=1000&tier__in=1,2"
                  value:
                    results:
                      - id: 12345
                        push_id: 1001
                        tier: 1
                        state: "completed"
                        result: "success"
                      - id: 12346
                        push_id: 1002
                        tier: 2
                        state: "running"
                        result: null
                    meta:
                      repository: "mozilla-central"
                      offset: 0
                      count: 2

                list_format:
                  summary: "List format response"
                  description: "Response when return_type=list"
                  value:
                    results:
                      - [12345, "guid-12345-abcd", "completed", "success", "Ubuntu", "test", "opt"]
                    job_property_names: ["id", "job_guid", "state", "result", "build_platform", "job_type_name", "platform_option"]
                    meta:
                      repository: "mozilla-central"
                      offset: 0
                      count: 1

        "400":
          description: Bad Request - Invalid query parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Invalid value for offset or count"

        "404":
          description: Not Found - Project with the given name does not exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "No project with name invalid-project"

  
  "/api/project/{project}/jobs/{id}/":
    get:
      parameters:
        - description: The name of the project.
          in: path
          name: project
          required: true
          schema:
            maxLength: 50
            pattern: '[\w-]{0,50}'
            type: string
        - description: The unique identifier of the job.
          in: path
          name: id
          required: true
          schema:
            pattern: "[^/.]+"
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  build_architecture:
                    description: Architecture of the build platform
                    type: string
                  build_os:
                    description: Operating system of the build platform
                    type: string
                  build_platform:
                    description: Name of the build platform
                    type: string
                  build_platform_id:
                    description: ID of the build platform
                    type: integer
                  build_system_type:
                    description: Type of the build system
                    type: string
                  end_timestamp:
                    description: End time of the job as a timestamp
                    type: integer
                  failure_classification_id:
                    description: ID of the failure classification
                    type: integer
                  id:
                    description: Unique identifier for the job
                    type: integer
                  job_group_description:
                    description: Description of the job group
                    type: string
                  job_group_id:
                    description: ID of the job group
                    type: integer
                  job_group_name:
                    description: Name of the job group
                    type: string
                  job_group_symbol:
                    description: Symbol of the job group
                    type: string
                  job_guid:
                    description: GUID of the job
                    type: string
                  job_type_description:
                    description: Description of the job type
                    type: string
                  job_type_id:
                    description: ID of the job type
                    type: integer
                  job_type_name:
                    description: Name of the job type
                    type: string
                  job_type_symbol:
                    description: Symbol of the job type
                    type: string
                  last_modified:
