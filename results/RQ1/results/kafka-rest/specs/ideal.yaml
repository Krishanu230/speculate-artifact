openapi: 3.0.0
info:
  title: Kafka ideal
  version: '1.0'

paths:
  /:
    get:
      summary: "Get server liveness."
      description: "A simple endpoint that can be used to check for liveness of the REST proxy. This endpoint always returns an empty JSON object."
      operationId: "getRoot"
      tags:
        - "v2 Root"
      responses:
        '200':
          description: "OK. The server is running."
          content:
            application/vnd.kafka.v2+json:
              schema:
                type: object
                description: "An empty JSON object."
                additionalProperties:
                  type: string
              example: {}
    post:
      summary: "Test posting data to the server."
      description: "A simple endpoint that accepts a map of string key-value pairs and returns an empty JSON object. This can be used for basic connectivity and authentication testing."
      operationId: "postRoot"
      tags:
        - "v2 Root"
      requestBody:
        description: "A map of string key-value pairs."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              type: object
              additionalProperties:
                type: string
              example:
                config_key: "config_value"
      responses:
        '200':
          description: "OK. The server accepted the request."
          content:
            application/vnd.kafka.v2+json:
              schema:
                type: object
                description: "An empty JSON object."
                additionalProperties:
                  type: string
              example: {}

  /brokers:
    get:
      summary: "List the brokers in the Kafka cluster."
      operationId: "listBrokersV2"
      tags:
        - "v2 Brokers"
      responses:
        '200':
          description: "OK. The request was successful."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/BrokerList"
              example:
                brokers: [1, 2, 3]
        '500':
          description: "Internal Server Error. An unexpected error occurred on the server."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse" # Assuming a standard error schema

  /consumers/{group}:
    post:
      summary: "Create a consumer instance in a consumer group."
      operationId: "createGroup"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
      requestBody:
        description: "The consumer instance configuration."
        # The code handles a null request body by substituting a default prototype,
        # so the body itself is not strictly required.
        required: false
        content:
          # The @Consumes annotation lists multiple, but this is the primary one.
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/CreateConsumerInstanceRequest"
      responses:
        '200':
          description: "Consumer instance created successfully."
          content:
            # The @Produces annotation lists multiple, but this is the primary one.
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/CreateConsumerInstanceResponse"
        '422':
          description: "Unprocessable Entity. The request body contains invalid values, for example an invalid 'format' or out-of-range 'fetch.min.bytes'."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse" # Assuming a standard error schema
        '500':
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse" # Assuming a standard error schema

  /consumers/{group}/instances/{instance}:
    delete:
      summary: "Delete a consumer instance."
      operationId: "deleteGroup"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      responses:
        '204':
          description: "No Content. The consumer instance was deleted successfully."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse" # Assuming a standard error schema
        '500':
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse" # Assuming a standard error schema

  /consumers/{group}/instances/{instance}/subscription:
    get:
      summary: "Get the current subscription for a consumer instance."
      operationId: "subscription"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      responses:
        '200':
          description: "OK. The list of subscribed topics is in the response."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/ConsumerSubscriptionResponse"
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: "Subscribe a consumer instance to one or more topics."
      operationId: "subscribe"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      requestBody:
        description: "The topics or topic pattern to subscribe to. A consumer may be subscribed to either a list of topics or a topic pattern, but not both at the same time."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerSubscriptionRequest"
      responses:
        '204':
          description: "No Content. The subscription was successful."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '409':
          description: "Conflict. The consumer is already subscribed to a topic pattern and is trying to subscribe to a list of topics, or vice versa. This can be triggered by an IllegalStateException on the server."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: "Unsubscribe a consumer instance from all topics."
      operationId: "unsubscribe"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      responses:
        '204':
          description: "No Content. The unsubscribe operation was successful."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consumers/{group}/instances/{instance}/assignments:
    get:
      summary: "Get the current partition assignments for a consumer instance."
      operationId: "assignment"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      responses:
        '200':
          description: "OK. The list of assigned partitions is in the response."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/ConsumerAssignmentResponse"
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: "Manually assign a list of partitions to a consumer instance."
      operationId: "assign"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      requestBody:
        description: "The list of topic partitions to assign to the consumer."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerAssignmentRequest"
      responses:
        '204':
          description: "No Content. The assignment was successful."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '409':
          description: "Conflict. The consumer is subscribed to a topic pattern and cannot be manually assigned partitions. This can be triggered by an IllegalStateException on the server."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '422':
          description: "Unprocessable Entity. The request body is invalid, for example, a topic is an empty string or a partition is a negative number."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consumers/{group}/instances/{instance}/offsets:
    get:
      summary: "Get the last committed offsets for a set of partitions."
      operationId: "committedOffsets"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      # This GET request is non-standard as it accepts a request body.
      # This is inferred from the @Valid annotation on an un-annotated POJO parameter.
      requestBody:
        description: "A list of partitions to fetch committed offsets for."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerCommittedRequest"
      responses:
        '200':
          description: "OK. The list of committed offsets is in the response."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/ConsumerCommittedResponse"
        '404':
          description: "Not Found. The specified consumer group or instance does not exist, or the request body was empty."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: "Commit a list of offsets for a consumer instance."
      operationId: "commitOffsets"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
        - in: query
          name: async
          schema:
            type: string
            # The code uses a String, but it's functionally a boolean.
            # A more robust spec might use `type: boolean`, but `string` reflects the code literally.
            default: "false"
          description: "Whether to commit offsets asynchronously."
      requestBody:
        description: "The list of offsets to commit."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerOffsetCommitRequest"
      responses:
        '200':
          description: "OK. The offsets were committed successfully. The response contains the committed offset details."
          content:
            # The @JsonValue annotation on the response DTO means the response is not a JSON object,
            # but a raw JSON array of the 'offsets' property.
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/CommitOffsetsResponse"
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '422':
          description: "Unprocessable Entity. The request body is invalid (e.g., missing required fields, negative offsets)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /consumers/{group}/instances/{instance}/positions:
    post:
      summary: "Seek to specific offsets or offsets by timestamp for a set of partitions."
      operationId: "seekToOffset"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      requestBody:
        description: "The partitions and their target offsets or timestamps to seek to."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerSeekRequest"
      responses:
        '204':
          description: "No Content. The seek operation was successful."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
        '409':
          description: "Conflict. The consumer is subscribed to a topic pattern and cannot perform a manual seek. This can be triggered by an IllegalStateException on the server."
        '422':
          description: "Unprocessable Entity. The request body is invalid."

  /consumers/{group}/instances/{instance}/positions/beginning:
    post:
      summary: "Seek to the earliest available offset for a set of partitions."
      operationId: "seekToBeginning"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      requestBody:
        description: "The list of partitions to seek to the beginning of."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerSeekToRequest"
      responses:
        '204':
          description: "No Content. The seek operation was successful."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
        '409':
          description: "Conflict. The consumer is subscribed to a topic pattern and cannot perform a manual seek. This can be triggered by an IllegalStateException on the server."
        '422':
          description: "Unprocessable Entity. The request body is invalid."

  /consumers/{group}/instances/{instance}/positions/end:
    post:
      summary: "Seek to the latest available offset for a set of partitions."
      operationId: "seekToEnd"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
      requestBody:
        description: "The list of partitions to seek to the end of."
        required: true
        content:
          application/vnd.kafka.v2+json:
            schema:
              $ref: "#/components/schemas/ConsumerSeekToRequest"
      responses:
        '204':
          description: "No Content. The seek operation was successful."
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
        '409':
          description: "Conflict. The consumer is subscribed to a topic pattern and cannot perform a manual seek. This can be triggered by an IllegalStateException on the server."
        '422':
          description: "Unprocessable Entity. The request body is invalid."

  /consumers/{group}/instances/{instance}/records:
    get:
      summary: "Fetch records for a consumer instance."
      description: |
        Fetches a list of records from the consumer instance. The format of the data in the response is determined
        by the `Accept` header. The supported formats are binary, json, avro, jsonschema, and protobuf.
        Each format corresponds to a different content type and response schema.
      operationId: "fetchRecords"
      tags:
        - "v2 Consumers"
      parameters:
        - in: path
          name: group
          required: true
          schema:
            type: string
          description: "The consumer group name."
        - in: path
          name: instance
          required: true
          schema:
            type: string
          description: "The consumer instance ID."
        - in: query
          name: timeout
          schema:
            type: integer
            format: int64
            default: -1
          description: "The maximum number of milliseconds to wait for records if the consumer buffer is empty. A value of -1 indicates no timeout."
        - in: query
          name: max_bytes
          schema:
            type: integer
            format: int64
            default: -1
          description: "The maximum number of bytes of unencoded data to fetch. A value of -1 indicates no limit."
      responses:
        '200':
          description: "OK. A list of consumer records. The list may be empty if no records were available before the timeout."
          content:
            application/vnd.kafka.binary.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BinaryConsumerRecord"
            application/vnd.kafka.json.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JsonConsumerRecord"
            application/vnd.kafka.avro.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchemaConsumerRecord"
            application/vnd.kafka.jsonschema.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchemaConsumerRecord"
            application/vnd.kafka.protobuf.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchemaConsumerRecord"
        '404':
          description: "Not Found. The specified consumer group or instance does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /topics:
    get:
      summary: "List all available topics."
      operationId: "listTopicsV2"
      tags:
        - "v2 Topics"
      responses:
        '200':
          description: "OK. The request was successful."
          content:
            application/vnd.kafka.v2+json:
              schema:
                type: array
                items:
                  type: string
                description: "A list of topic names."
              example:
                - "topic-1"
                - "topic-2"
        '500':
          description: "Internal Server Error."

  /topics/{topic_name}:
    get:
      summary: "Get information about a specific topic."
      operationId: "getTopicV2"
      tags:
        - "v2 Topics"
      parameters:
        - in: path
          name: topic_name
          required: true
          schema:
            type: string
          description: "The name of the topic to get information about."
      responses:
        '200':
          description: "OK. The request was successful."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/GetTopicResponse"
        '404':
          description: "Not Found. The specified topic does not exist."
        '500':
          description: "Internal Server Error."
    post:
      summary: "Produce Records to Topic (v2)"
      description: |
        Produces a batch of records to the specified topic. The format of the records in the request body is determined
        by the `Content-Type` header. The supported formats are binary, json, avro, jsonschema, and protobuf.
      operationId: "produceToTopicV2"
      tags:
        - "v2 Topics"
      parameters:
        - in: path
          name: topic_name
          required: true
          schema:
            type: string
          description: "The name of the topic to produce records to."
      requestBody:
        description: "A request to produce records, with the format specified by the Content-Type header."
        required: true
        content:
          application/vnd.kafka.binary.v2+json:
            schema:
              $ref: "#/components/schemas/v2BinaryTopicProduceRequest"
          application/vnd.kafka.json.v2+json:
            schema:
              $ref: "#/components/schemas/v2JsonTopicProduceRequest"
          application/vnd.kafka.avro.v2+json:
            schema:
              $ref: "#/components/schemas/v2SchemaTopicProduceRequest"
          application/vnd.kafka.jsonschema.v2+json:
            schema:
              $ref: "#/components/schemas/v2SchemaTopicProduceRequest"
          application/vnd.kafka.protobuf.v2+json:
            schema:
              $ref: "#/components/schemas/v2SchemaTopicProduceRequest"
      responses:
        '200':
          description: "OK. The records were produced successfully. The response contains delivery reports for each record."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/v2ProduceResponse"
        '404':
          description: "Not Found. The specified topic does not exist."
        '422':
          description: "Unprocessable Entity. The request body is malformed or contains invalid data."
        '401':
          description: "Unauthorized. The request failed due to an authentication error."
        '403':
          description: "Forbidden. The request failed due to an authorization error."

  /topics/{topic_name}/partitions:
    get:
      summary: "List the partitions for a topic."
      operationId: "listPartitionsV2"
      tags:
        - "v2 Partitions"
      parameters:
        - in: path
          name: topic_name
          required: true
          schema:
            type: string
          description: "The name of the topic."
      responses:
        '200':
          description: "OK. The request was successful."
          content:
            application/vnd.kafka.v2+json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GetPartitionResponse"
        '404':
          description: "Not Found. The specified topic does not exist."
        '500':
          description: "Internal Server Error."

  /topics/{topic_name}/partitions/{partition_id}:
    get:
      summary: "Get information about a specific partition."
      operationId: "getPartitionV2"
      tags:
        - "v2 Partitions"
      parameters:
        - in: path
          name: topic_name
          required: true
          schema:
            type: string
          description: "The name of the topic."
        - in: path
          name: partition_id
          required: true
          schema:
            type: integer
            format: int32
          description: "The ID of the partition."
      responses:
        '200':
          description: "OK. The request was successful."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/GetPartitionResponse"
        '404':
          description: "Not Found. The specified topic or partition does not exist."
        '500':
          description: "Internal Server Error."
    post:
      summary: "Produce Records to a Partition (v2)"
      description: |
        Produces a batch of records to a specific partition within a topic. 
        
        The format of the records in the request body is determined by the `Content-Type` header. The supported formats are binary, json, avro, jsonschema, and protobuf. Each format has a different request body schema.
      operationId: "produceToPartitionV2"
      tags:
        - "v2 Partitions"
      parameters:
        - in: path
          name: topic_name
          required: true
          schema:
            type: string
          description: "The name of the topic."
        - in: path
          name: partition_id
          required: true
          schema:
            type: integer
            format: int32
          description: "The ID of the partition to produce records to."
      requestBody:
        description: "A request to produce records, with the format specified by the Content-Type header."
        required: true
        content:
          application/vnd.kafka.binary.v2+json:
            schema:
              $ref: "#/components/schemas/v2BinaryPartitionProduceRequest"
          application/vnd.kafka.json.v2+json:
            schema:
              $ref: "#/components/schemas/v2JsonPartitionProduceRequest"
          application/vnd.kafka.avro.v2+json:
            schema:
              $ref: "#/components/schemas/v2SchemaPartitionProduceRequest"
          application/vnd.kafka.jsonschema.v2+json:
            schema:
              $ref: "#/components/schemas/v2SchemaPartitionProduceRequest"
          application/vnd.kafka.protobuf.v2+json:
            schema:
              $ref: "#/components/schemas/v2SchemaPartitionProduceRequest"
      responses:
        '200':
          description: "OK. The records were produced successfully. The response contains a delivery report for each record."
          content:
            application/vnd.kafka.v2+json:
              schema:
                $ref: "#/components/schemas/v2ProduceResponse"
        '404':
          description: "Not Found. The specified topic or partition does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '422':
          description: "Unprocessable Entity. The request body is malformed, contains invalid data (e.g., bad base64 encoding), or includes an invalid schema."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '401':
          description: "Unauthorized. The request failed due to an authentication error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '403':
          description: "Forbidden. The request failed due to an authorization error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /topics/{topic_name}/partitions/{partition_id}/offsets:
    get:
      summary: "Get the earliest and latest offsets for a partition."
      operationId: "getOffsetsV2"
      tags:
        - "v2 Partitions"
      parameters:
        - in: path
          name: topic_name
          required: true
          schema:
            type: string
          description: "The name of the topic."
        - in: path
          name: partition_id
          required: true
          schema:
            type: integer
            format: int32
          description: "The ID of the partition."
      responses:
        '200':
          description: "OK. The request was successful."
