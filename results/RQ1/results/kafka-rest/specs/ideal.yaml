      type: object
      properties:
        name:
          type: string
          description: "The name for the consumer instance. This must be unique among all consumer instances in the same group. If omitted, the server will generate a unique name."
          nullable: true
        format:
          type: string
          description: "The format of the data in the records."
          # Derived from the EmbeddedFormat enum and the computeFormat method.
          enum: [ "binary", "json", "avro", "jsonschema", "protobuf" ]
          default: "binary"
        auto.offset.reset:
          type: string
          description: "What to do when there is no initial offset in Kafka or if the current offset does not exist any more on the server. Common values are 'earliest' and 'latest'."
          nullable: true
        auto.commit.enable:
          type: string
          description: "If true, the consumer's offset will be periodically committed in the background."
          nullable: true
        fetch.min.bytes:
          type: integer
          description: "The minimum amount of data the server should return for a fetch request."
          # Derived from KafkaRestConfig.PROXY_FETCH_MIN_BYTES_VALIDATOR
          minimum: -1
          maximum: 10000000
          nullable: true
        consumer.request.timeout.ms:
          type: integer
          description: "The maximum amount of time the server will block before answering a fetch request if there isn't sufficient data to immediately satisfy 'fetch.min.bytes'."
          nullable: true

    CreateConsumerInstanceResponse:
      type: object
      required:
        - instance_id
