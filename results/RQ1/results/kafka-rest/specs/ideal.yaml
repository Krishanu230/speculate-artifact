        '200':
          description: "OK. The list of partition replicas was retrieved successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicaDataList"
              example:
                kind: "KafkaReplicaList"
                metadata:
                  self: "http://localhost:8082/v3/clusters/cluster-1/brokers/1/partition-replicas"
                data:
                  - kind: "KafkaReplica"
                    metadata:
                      self: "http://localhost:8082/v3/clusters/cluster-1/topics/topic-1/partitions/0/replicas/1"
                      resource_name: "crn:///kafka=cluster-1/topic=topic-1/partition=0/replica=1"
                    cluster_id: "cluster-1"
                    topic_name: "topic-1"
                    partition_id: 0
                    broker_id: 1
                    is_leader: true
                    is_in_sync: true
                    broker:
                      related: "http://localhost:8082/v3/clusters/cluster-1/brokers/1"
                  - kind: "KafkaReplica"
                    metadata:
                      self: "http://localhost:8082/v3/clusters/cluster-1/topics/topic-2/partitions/1/replicas/1"
                      resource_name: "crn:///kafka=cluster-1/topic=topic-2/partition=1/replica=1"
                    cluster_id: "cluster-1"
                    topic_name: "topic-2"
                    partition_id: 1
                    broker_id: 1
                    is_leader: false
                    is_in_sync: true
                    broker:
                      related: "http://localhost:8082/v3/clusters/cluster-1/brokers/1"
        '404':
          description: "Not Found. The specified cluster or broker does not exist."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: "Internal Server Error. An unexpected error occurred on the server."
