          description: "OK. The list of consumer lags was retrieved successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsumerLagDataList"
              example:
                kind: "KafkaConsumerLagList"
                metadata:
                  self: "http://localhost:8082/v3/clusters/cluster-1/consumer-groups/consumer-group-1/lags"
                data:
                  - kind: "KafkaConsumerLag"
                    metadata:
                      self: "http://localhost:8082/v3/clusters/cluster-1/consumer-groups/consumer-group-1/lags/topic-1/partitions/0"
                      resource_name: "crn:///kafka=cluster-1/consumer-group=consumer-group-1/lag=topic-1/partition=0"
                    cluster_id: "cluster-1"
                    consumer_group_id: "consumer-group-1"
                    topic_name: "topic-1"
                    partition_id: 0
                    consumer_id: "consumer-1"
                    instance_id: "instance-1"
                    client_id: "client-1"
                    current_offset: 50
                    log_end_offset: 100
                    lag: 50
                  - kind: "KafkaConsumerLag"
                    metadata:
                      self: "http://localhost:8082/v3/clusters/cluster-1/consumer-groups/consumer-group-1/lags/topic-2/partitions/1"
                      resource_name: "crn:///kafka=cluster-1/consumer-group=consumer-group-1/lag=topic-2/partition=1"
                    cluster_id: "cluster-1"
                    consumer_group_id: "consumer-group-1"
                    topic_name: "topic-2"
                    partition_id: 1
                    consumer_id: "consumer-2"
                    instance_id: "instance-2"
                    client_id: "client-2"
                    current_offset: 100
                    log_end_offset: 100
                    lag: 0
        '404':
          description: "Not Found. The specified cluster or consumer group does not exist, or the consumer group has no committed offsets."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: "Internal Server Error. An unexpected error occurred on the server."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v3/clusters/{clusterId}/consumer-groups/{consumerGroupId}/lags/{topicName}/partitions/{partitionId}:
    get:
      summary: "Get Consumer Lag for Partition"
