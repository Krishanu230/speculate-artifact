  /v3/clusters/{clusterId}/consumer-groups/{consumerGroupId}/lags:
    get:
      summary: "List Consumer Group Lags"
      description: "Retrieves a list of consumer lags for all partitions assigned to consumers in the specified consumer group."
      operationId: "listConsumerGroupLagsV3"
