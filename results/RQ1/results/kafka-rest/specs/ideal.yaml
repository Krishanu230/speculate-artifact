              type: string
            max_lag:
              type: integer
              format: int64
              description: "The maximum lag across all partitions assigned to this consumer group."
            total_lag:
              type: integer
              format: int64
              description: "The sum of lags across all partitions assigned to this consumer group."
            max_lag_consumer_id:
              type: string
              description: "The ID of the consumer with the highest lag."
            max_lag_consumer:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the consumer with the highest lag."
            max_lag_client_id:
              type: string
              description: "The client ID of the consumer with the highest lag."
            max_lag_instance_id:
              type: string
              nullable: true
              description: "The instance ID of the consumer with the highest lag."
            max_lag_topic_name:
              type: string
              description: "The topic name for the partition with the highest lag."
            max_lag_partition_id:
              type: integer
              format: int32
              description: "The partition number with the highest lag."
            max_lag_partition:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the partition with the highest lag."

    ConsumerAssignmentData:
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          required:
            - cluster_id
            - consumer_group_id
            - consumer_id
            - topic_name
            - partition_id
            - partition
            - lag
          properties:
            kind:
              type: string
              enum: ["KafkaConsumerAssignment"]
            cluster_id:
              type: string
            consumer_group_id:
              type: string
            consumer_id:
              type: string
            topic_name:
              type: string
            partition_id:
              type: integer
              format: int32
            partition:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the assigned partition."
            lag:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the consumer lag for this partition."

    ConsumerAssignmentDataList:
      allOf:
        - $ref: "#/components/schemas/ResourceCollection"
        - type: object
          required:
            - data
          properties:
            kind:
              type: string
              enum: ["KafkaConsumerAssignmentList"]
            data:
              type: array
              items:
                $ref: "#/components/schemas/ConsumerAssignmentData"

    CreateTopicRequest:
      type: object
      required: ["topic_name"]
      properties:
        topic_name:
          type: string
        partitions_count:
          type: integer
          format: int32
          nullable: true
        replication_factor:
          type: integer
          format: int32 # OpenAPI uses int32 for short
          nullable: true
        replicas_assignments:
          type: object
          additionalProperties:
            type: array
            items:
              type: integer
              format: int32
        configs:
          type: array
          items:
            type: object
            required: ["name"]
            properties:
              name:
                type: string
              value:
                type: string
                nullable: true

    TopicData:
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          required:
            - cluster_id
            - topic_name
            - is_internal
            - replication_factor
            - partitions_count
            - partitions
            - configs
            - partition_reassignments
            - authorized_operations
          properties:
            cluster_id: { type: string }
            topic_name: { type: string }
            is_internal: { type: boolean }
            replication_factor: { type: integer, format: int32 }
            partitions_count: { type: integer, format: int32 }
            partitions: { $ref: "#/components/schemas/Relationship" }
            configs: { $ref: "#/components/schemas/Relationship" }
            partition_reassignments: { $ref: "#/components/schemas/Relationship" }
            authorized_operations:
              type: array
              items:
                $ref: "#/components/schemas/AclOperation"

    TopicDataList:
      allOf:
        - $ref: "#/components/schemas/ResourceCollection"
        - type: object
          required: ["data"]
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TopicData"

    UpdateTopicConfigRequest:
      type: object
      properties:
        value:
          type: string
          nullable: true

    TopicConfigData:
      allOf:
        - $ref: "#/components/schemas/AbstractConfigData"
        - type: object
          required: ["topic_name"]
          properties:
            topic_name:
              type: string

    TopicConfigDataList:
      allOf:
        - $ref: "#/components/schemas/ResourceCollection"
        - type: object
          required: ["data"]
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/TopicConfigData"

    ReassignmentData:
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          required:
            - cluster_id
            - topic_name
            - partition_id
            - adding_replicas
            - removing_replicas
            - replicas
          properties:
            kind:
              type: string
              enum: ["KafkaReassignment"]
            cluster_id:
              type: string
            topic_name:
              type: string
            partition_id:
              type: integer
              format: int32
            adding_replicas:
              type: array
              items:
                type: integer
                format: int32
              description: "The list of brokers that are being added to the partition's replica set."
            removing_replicas:
              type: array
              items:
                type: integer
                format: int32
              description: "The list of brokers that are being removed from the partition's replica set."
            replicas:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the partition replicas."

    ReassignmentDataList:
      allOf:
        - $ref: "#/components/schemas/ResourceCollection"
        - type: object
          required:
            - data
          properties:
            kind:
              type: string
              enum: ["KafkaReassignmentList"]
            data:
              type: array
              items:
                $ref: "#/components/schemas/ReassignmentData"

    PartitionData:
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          required:
            - cluster_id
            - topic_name
            - partition_id
            - replicas
            - reassignment
          properties:
            kind:
              type: string
              enum: ["KafkaPartition"]
            cluster_id:
              type: string
            topic_name:
              type: string
            partition_id:
              type: integer
              format: int32
            leader:
              $ref: "#/components/schemas/Relationship"
              nullable: true
              description: "A relationship to the broker that is the leader for this partition."
            replicas:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the list of brokers that are replicas for this partition."
            reassignment:
              $ref: "#/components/schemas/Relationship"
              description: "A relationship to the ongoing partition reassignment."

    PartitionDataList:
      allOf:
        - $ref: "#/components/schemas/ResourceCollection"
        - type: object
          required:
            - data
          properties:
            kind:
              type: string
              enum: ["KafkaPartitionList"]
            data:
              type: array
              items:
                $ref: "#/components/schemas/PartitionData"

    ReplicaData:
      type: object
      description: "Represents a replica of a partition."
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          required:
            - cluster_id
            - topic_name
            - partition_id
            - broker_id
            - is_leader
            - is_in_sync
            - broker
          properties:
            kind:
              type: string
              enum: ["KafkaReplica"]
            cluster_id:
              type: string
              description: "The Kafka cluster ID."
            topic_name:
              type: string
              description: "The topic name."
            partition_id:
              type: integer
              format: int32
              description: "The partition ID."
            broker_id:
              type: integer
              format: int32
              description: "The ID of the broker hosting this replica."
            is_leader:
              type: boolean
              description: "True if this replica is the leader for the partition."
            is_in_sync:
              type: boolean
              description: "True if this replica is in sync with the leader."
            broker:
              $ref: "#/components/schemas/ResourceRelationship"
              description: "A relationship to the broker that hosts this replica."

    ResourceRelationship:
      type: object
      required:
        - related
      properties:
        related:
          type: string
          format: uri
          description: "A URL that can be used to retrieve the related resource."

    ReplicaDataList:
      type: object
      description: "A list of partition replica resources."
      allOf:
        - $ref: "#/components/schemas/ResourceCollection"
        - type: object
          required:
            - data
          properties:
            kind:
              type: string
              enum: ["KafkaReplicaList"]
            data:
              type: array
              items:
                $ref: "#/components/schemas/ReplicaData"

    ProduceRequestHeader:
      type: object
      required: ["name"]
      properties:
        name:
          type: string
        value:
          type: string
          format: byte
          nullable: true
    
    EnumSubjectNameStrategy:
      type: string
      enum: ["TOPIC_NAME", "RECORD_NAME", "TOPIC_RECORD_NAME"]

    ProduceRequestData:
      type: object
      description: |
        Represents the key or value of a record to be produced.
        Constraint: Only one of 'subject_name_strategy' or 'subject' can be used.
        Constraint: Only one of 'schema_id', 'schema_version' or 'schema' can be used.
      properties:
        type:
          $ref: "#/components/schemas/EmbeddedFormat" # We defined this enum in an earlier step
        subject:
          type: string
          nullable: true
        subject_name_strategy:
          $ref: "#/components/schemas/EnumSubjectNameStrategy"
          nullable: true
        schema_id:
          type: integer
          format: int32
          nullable: true
        schema_version:
          type: integer
          format: int32
          nullable: true
        schema:
          type: string
          nullable: true
        data:
          description: "The record data, which can be any valid JSON."
          schema: {}

    ProduceRequest:
      type: object
      properties:
        partition_id:
          type: integer
          format: int32
          nullable: true
        headers:
          type: array
          items:
            $ref: "#/components/schemas/ProduceRequestHeader"
        key:
          $ref: "#/components/schemas/ProduceRequestData"
          nullable: true
        value:
          $ref: "#/components/schemas/ProduceRequestData"
          nullable: true
        timestamp:
          type: string
          format: date-time
          nullable: true
          
    ProduceResponseData:
      type: object
      required: ["size"]
      properties:
        type:
          $ref: "#/components/schemas/EmbeddedFormat"
          nullable: true
        subject:
          type: string
          nullable: true
        schema_id:
          type: integer
          format: int32
          nullable: true
        schema_version:
          type: integer
          format: int32
          nullable: true
        size:
          type: integer
          format: int32

    Error:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: integer
          description: "The error code."
        message:
          type: string
          description: "The error message."

    v2BinaryPartitionProduceRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/v2BinaryPartitionProduceRecord"

    v2BinaryPartitionProduceRecord:
      type: object
      properties:
        key:
          type: string
          format: byte
          nullable: true
          description: "The record's key, as a Base64-encoded string."
        value:
          type: string
          format: byte
          nullable: true
          description: "The record's value, as a Base64-encoded string."

    v2JsonPartitionProduceRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/v2JsonPartitionProduceRecord"

    v2JsonPartitionProduceRecord:
      type: object
      properties:
        key:
          nullable: true
          description: "The record's key, which can be any valid JSON value."
        value:
          nullable: true
          description: "The record's value, which can be any valid JSON value."

    v2SchemaPartitionProduceRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/v2SchemaPartitionProduceRecord"
        key_schema:
          type: string
          nullable: true
          description: "The Avro, JSON, or Protobuf schema for the record key, as a string."
        key_schema_id:
          type: integer
          format: int32
          nullable: true
          description: "The ID of a schema in the Schema Registry to use for the record key."
        value_schema:
          type: string
          nullable: true
          description: "The Avro, JSON, or Protobuf schema for the record value, as a string."
        value_schema_id:
          type: integer
          format: int32
          nullable: true
          description: "The ID of a schema in the Schema Registry to use for the record value."
    
    v2SchemaPartitionProduceRecord:
      type: object
      properties:
        key:
          nullable: true
          description: "The record's key, as a JSON object that matches the key schema."
        value:
          nullable: true
          description: "The record's value, as a JSON object that matches the value schema."
          
    ProduceResponse:
      type: object
      required: ["error_code", "cluster_id", "topic_name", "partition_id", "offset"]
      properties:
        error_code:
          type: integer
          format: int32
        cluster_id:
          type: string
        topic_name:
          type: string
        partition_id:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
          nullable: true
        key:
          $ref: "#/components/schemas/ProduceResponseData"
          nullable: true
        value:
          $ref: "#/components/schemas/ProduceResponseData"
          nullable: true