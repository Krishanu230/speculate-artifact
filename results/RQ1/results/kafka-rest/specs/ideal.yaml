                  resource_name: "crn:///kafka=cluster-1/consumer-group=consumer-group-1/lag=topic-1/partition=0"
                cluster_id: "cluster-1"
                consumer_group_id: "consumer-group-1"
                topic_name: "topic-1"
                partition_id: 0
                consumer_id: "consumer-1"
                instance_id: "instance-1"
                client_id: "client-1"
                current_offset: 50
                log_end_offset: 100
                lag: 50
        '404':
          description: "Not Found. The specified cluster, consumer group, topic, or partition does not exist, or the consumer has no committed offset for this partition."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '500':
          description: "Internal Server Error. An unexpected error occurred on the server."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    v2GetTopicResponse:
      type: object
      required:
        - name
        - configs
        - partitions
      properties:
        name:
          type: string
          description: "The topic name."
        configs:
          type: object
          description: "A map of topic configuration settings."
          additionalProperties:
            type: string
        partitions:
          type: array
          description: "A list of partitions for this topic."
          items:
            $ref: "#/components/schemas/v2GetPartitionResponse"

    v2GetPartitionResponse:
      type: object
      required:
        - partition
        - leader
        - replicas
      properties:
        partition:
          type: integer
          format: int32
          description: "The partition ID."
        leader:
          type: integer
          format: int32
          description: "The ID of the broker that is the leader for this partition."
        replicas:
          type: array
          description: "The set of replicas for this partition."
          items:
            $ref: "#/components/schemas/v2Replica"

    v2Replica:
      type: object
      required:
        - broker
        - leader
        - in_sync
      properties:
        broker:
          type: integer
          format: int32
          description: "The ID of the broker hosting the replica."
        leader:
          type: boolean
          description: "True if this replica is the leader for the partition."
        in_sync:
          type: boolean
          description: "True if this replica is in sync with the leader."

    v2BinaryTopicProduceRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/v2BinaryTopicProduceRecord"

    v2BinaryTopicProduceRecord:
      type: object
      properties:
        key:
          type: string
          format: byte
          nullable: true
        value:
          type: string
          format: byte
          nullable: true
        partition:
          type: integer
          format: int32
          nullable: true

    v2JsonTopicProduceRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/v2JsonTopicProduceRecord"

    v2JsonTopicProduceRecord:
      type: object
      properties:
        key:
          nullable: true
          description: "Can be any valid JSON value."
          example: "user-id-123"
        value:
          nullable: true
          description: "Can be any valid JSON value."
          example: { "field1": "value1" }
        partition:
          type: integer
          format: int32
          nullable: true

    v2SchemaTopicProduceRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/v2SchemaTopicProduceRecord"
        key_schema:
          type: string
          nullable: true
        key_schema_id:
          type: integer
          format: int32
          nullable: true
        value_schema:
          type: string
          nullable: true
        value_schema_id:
          type: integer
          format: int32
          nullable: true

    v2SchemaTopicProduceRecord:
      type: object
      properties:
        key:
          nullable: true
        value:
          nullable: true
        partition:
          type: integer
          format: int32
          nullable: true
          
    v2ProduceResponse:
      type: object
      properties:
        offsets:
          type: array
          items:
            $ref: "#/components/schemas/v2PartitionOffset"
        key_schema_id:
          type: integer
          format: int32
          nullable: true
        value_schema_id:
          type: integer
          format: int32
          nullable: true

