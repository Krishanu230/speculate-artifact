      operationId: "produceToTopicV3"
      tags:
        - "v3 Records"
      description: |
        Produce records to the given topic. This API can be used in streaming mode. 
        For each record sent to the server, the server will asynchronously send back a delivery report.
      parameters:
        - in: path
          name: clusterId
          required: true
          schema: { type: string }
        - in: path
          name: topicName
          required: true
          schema: { type: string }
      requestBody:
        description: "The record(s) to produce. For streaming, multiple JSON objects are sent concatenated."
        required: true
        content:
          application/json:
            schema:
              # In streaming mode, this would be a stream of objects. OpenAPI models this as an array.
              type: array
              items:
                $ref: "#/components/schemas/ProduceRequest"
      responses:
        '200':
          description: "OK. The response is a stream of delivery reports, one for each record produced."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProduceResponse"
