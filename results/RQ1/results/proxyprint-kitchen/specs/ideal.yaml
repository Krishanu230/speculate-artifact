---
openapi: 3.0.1
info:
  title: PrintProxy API (Complete)
  description: The complete and unified API specification for the PrintProxy application,
    covering all modules from user authentication to print shop management.
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Local development server
tags:
- name: Authentication
  description: Endpoints for user login and authentication checks.
- name: Admin
  description: Endpoints for platform administrators.
- name: Consumer Account
  description: Endpoints for managing a consumer's own account and profile.
- name: Print Requests
  description: Endpoints for creating and managing the lifecycle of print requests.
- name: Printing Schemas
  description: Endpoints for managing a consumer's saved printing preferences.
- name: Notifications
  description: Endpoints for real-time and persistent notifications.
- name: PayPal IPN
  description: Webhooks for receiving Instant Payment Notifications from PayPal.
- name: Print Shop Management
  description: Endpoints for print shop managers and employees.
- name: Print Shop - Queue Management
  description: Endpoints for managing the print queue.
- name: Print Shops
  description: Public-facing endpoints for discovering print shops.
- name: Registration Requests
  description: Endpoints for managing new print shop registration requests.
- name: Reviews
  description: Endpoints for managing customer reviews of print shops.
- name: External Integration
  description: Simplified endpoints for integration with external platforms.
paths:
  "/":
    get:
      tags:
      - Authentication
      summary: Root Endpoint
      operationId: getIndex
      responses:
        '200':
          description: Successful response with a welcome message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Olá Mundo!
  "/*":
    options:
      tags:
      - Authentication
      summary: CORS Pre-flight Handler
      operationId: handleOptions
      responses:
        '204':
          description: No Content. Standard response for a successful pre-flight request.
  "/api/secured":
    get:
      tags:
      - Authentication
      summary: Secured Test Endpoint
      operationId: getSecured
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response for an authenticated user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Se estiveres autenticado, podes ver isto!
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
  "/login":
    post:
      tags:
      - Authentication
      summary: User Login
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
              required:
              - username
              - password
      responses:
        '200':
          description: Authentication status response.
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/LoginSuccessResponse"
                - "$ref": "#/components/schemas/LoginFailureResponse"
  "/admin/printshops":
    get:
      tags:
      - Admin
      summary: Get All Print Shops
      operationId: getAdminPrintShops
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A successful response containing the list of print shops.
          content:
            application/json:
              schema:
                type: object
                properties:
                  prinshops:
                    type: string
                    description: A JSON string representation of the array of print
                      shops (implementation quirk).
                  success:
                    type: boolean
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
  "/admin/register":
    post:
      tags:
      - Admin
      summary: Register a New Administrator
      operationId: registerAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Admin"
      responses:
        '200':
          description: The administrator was successfully created.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Admin"
  "/admin/seed":
    post:
      tags:
      - Admin
      summary: Seed Database (Dev)
      operationId: seedDatabase
      responses:
        '200':
          description: Database seeding completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: seeding completed
  "/admin/useed":
    post:
      tags:
      - Admin
      summary: Seed Consumers (Dev)
      operationId: seedConsumers
      responses:
        '200':
          description: Consumer seeding completed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: consumers seeding completed
  "/consumer/register":
    post:
      tags:
      - Consumer Account
      summary: Register a New Consumer
      operationId: registerConsumer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                email:
                  type: string
                  format: email
                name:
                  type: string
                latitude:
                  type: string
                longitude:
                  type: string
              required:
              - username
              - password
              - email
              - name
      responses:
        '200':
          description: Registration success or failure response.
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/ConsumerRegistrationSuccessResponse"
                - "$ref": "#/components/schemas/ConsumerRegistrationFailureResponse"
  "/consumer/info":
    get:
      tags:
      - Consumer Account
      summary: Get Consumer Information
      operationId: getConsumerInfo
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Consumer's information.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ConsumerInfoResponse"
  "/consumer/info/update":
    put:
      tags:
      - Consumer Account
      summary: Update Consumer Information
      operationId: updateConsumerInfo
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/Consumer"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/consumer/{username}/notifications":
    delete:
      tags:
      - Consumer Account
      summary: Delete All Notifications
      operationId: deleteAllNotifications
      security:
      - bearerAuth: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
    put:
      tags:
      - Consumer Account
      summary: Mark All Notifications as Read
      operationId: readAllNotifications
      security:
      - bearerAuth: []
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/consumer/requests":
    get:
      tags:
      - Print Requests
      summary: Get Pending Print Requests
      operationId: getConsumerPendingRequests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of pending print requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  printrequests:
                    type: array
                    items:
                      "$ref": "#/components/schemas/PrintRequest"
                  success:
                    type: boolean
  "/consumer/requests/cancel/{id}":
    delete:
      tags:
      - Print Requests
      summary: Cancel a Pending Print Request
      operationId: cancelConsumerRequest
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/consumer/satisfied":
    get:
      tags:
      - Print Requests
      summary: Get Satisfied Print Requests
      operationId: getConsumerSatisfiedRequests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: History of satisfied print requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  satisfiedrequests:
                    type: array
                    items:
                      "$ref": "#/components/schemas/SatisfiedRequest"
                  success:
                    type: boolean
  "/consumer/balance":
    get:
      tags:
      - Consumer Account
      summary: Get Consumer Balance
      operationId: getConsumerBalance
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Consumer's account balance.
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    "$ref": "#/components/schemas/Money"
                  success:
                    type: boolean
  "/consumer/{consumerID}/printingschemas":
    get:
      tags:
      - Printing Schemas
      summary: Get All Printing Schemas
      operationId: getConsumerPrintingSchemas
      security:
      - bearerAuth: []
      parameters:
      - name: consumerID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: List of printing schemas.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrintingSchemaListResponse"
    post:
      tags:
      - Printing Schemas
      summary: Create Printing Schema
      operationId: createPrintingSchema
      security:
      - bearerAuth: []
      parameters:
      - name: consumerID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PrintingSchema"
      responses:
        '200':
          description: Success response with new schema ID.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateSuccessResponse"
  "/consumer/{consumerID}/printingschemas/{printingSchemaID}":
    put:
      tags:
      - Printing Schemas
      summary: Edit Printing Schema
      operationId: editPrintingSchema
      security:
      - bearerAuth: []
      parameters:
      - name: consumerID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: printingSchemaID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PrintingSchema"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
        '500':
          description: Update failed.
    delete:
      tags:
      - Printing Schemas
      summary: Delete Printing Schema
      operationId: deletePrintingSchema
      security:
      - bearerAuth: []
      parameters:
      - name: consumerID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: printingSchemaID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/consumer/budget":
    post:
      tags:
      - Print Requests
      summary: Calculate Budgets for New Request
      operationId: calculateBudget
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                printRequest:
                  "$ref": "#/components/schemas/BudgetRequest"
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Map of budgets and the new print request ID.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BudgetResponse"
  "/consumer/printrequest/{printRequestID}/submit":
    post:
      tags:
      - Print Requests
      summary: Submit Print Request
      operationId: submitPrintRequest
      security:
      - bearerAuth: []
      parameters:
      - name: printRequestID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/SubmitRequest"
      responses:
        '200':
          description: Success or failure response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SubmitResponse"
  "/printdocument":
    post:
      tags:
      - External Integration
      summary: Create Request from Document
      operationId: createRequestFromDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Success response with new request ID.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateSuccessResponse"
  "/printdocument/{id}":
    get:
      tags:
      - External Integration
      summary: Get Documents for Request
      operationId: getDocumentsForRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: List of documents for the request.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DocumentListResponse"
  "/printdocument/{id}/budget":
    post:
      tags:
      - External Integration
      summary: Calculate Budgets for Existing Request
      operationId: calculateBudgetForExistingRequest
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
      responses:
        '200':
          description: Map of budgets.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/BudgetResponse"
  "/consumer/{id}/notify":
    post:
      tags:
      - Notifications
      summary: Send Notification
      operationId: sendNotification
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                message:
                  type: string
              required:
              - message
      responses:
        '204':
          description: Notification sent.
        '500':
          description: Error sending notification.
  "/consumer/subscribe":
    get:
      tags:
      - Notifications
      summary: Subscribe to Notifications (SSE)
      operationId: subscribeToNotifications
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
      - name: password
        in: query
        required: true
        schema:
          type: string
          format: password
      responses:
        '200':
          description: SSE stream established.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Unauthorized.
        '404':
          description: Not Found.
  "/consumer/notifications":
    get:
      tags:
      - Notifications
      summary: Get All Notifications
      operationId: getConsumerNotifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List of notifications.
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/Notification"
  "/notifications/{notificationId}":
    delete:
      tags:
      - Notifications
      summary: Delete Notification
      operationId: deleteNotification
      security:
      - bearerAuth: []
      parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
    put:
      tags:
      - Notifications
      summary: Mark Notification as Read
      operationId: readNotification
      security:
      - bearerAuth: []
      parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
        '404':
          description: Not Found.
  "/paypal/ipn/{printRequestID}":
    post:
      tags:
      - PayPal IPN
      summary: IPN for Print Request Payment
      operationId: ipnPrintRequestPayment
      parameters:
      - name: printRequestID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                payer_email:
                  type: string
                mc_gross:
                  type: number
                payment_status:
                  type: string
                txn_id:
                  type: string
              required:
              - payer_email
              - mc_gross
              - payment_status
              - txn_id
      responses:
        '204':
          description: IPN received.
  "/paypal/ipn/consumer/{consumerID}":
    post:
      tags:
      - PayPal IPN
      summary: IPN for Consumer Balance Load-Up
      operationId: ipnConsumerBalanceLoadUp
      parameters:
      - name: consumerID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                payer_email:
                  type: string
                mc_gross:
                  type: number
                payment_status:
                  type: string
              required:
              - payer_email
              - mc_gross
              - payment_status
      responses:
        '204':
          description: IPN received.
  "/documents/{id}":
    get:
      tags:
      - Print Shop Management
      summary: Download a Document
      operationId: downloadDocument
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: The document file.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not Found.
  "/printshops/{id}/pricetable/papers":
    post:
      tags:
      - Price Tables
      summary: Add Paper Prices
      operationId: addPaperItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PaperTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
    put:
      tags:
      - Price Tables
      summary: Edit Paper Prices
      operationId: editPaperItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PaperTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{id}/pricetable/deletepaper":
    post:
      tags:
      - Price Tables
      summary: Delete Paper Prices
      operationId: deletePaperItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PaperTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{id}/pricetable/rings":
    post:
      tags:
      - Price Tables
      summary: Add Ring Binding Prices
      operationId: addRingItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RingTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
    put:
      tags:
      - Price Tables
      summary: Edit Ring Binding Prices
      operationId: editRingItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RingTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{id}/pricetable/deletering":
    post:
      tags:
      - Price Tables
      summary: Delete Ring Binding Prices
      operationId: deleteRingItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RingTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{id}/pricetable/covers":
    post:
      tags:
      - Price Tables
      summary: Add Cover Prices
      operationId: addCoverItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CoverTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
    put:
      tags:
      - Price Tables
      summary: Edit Cover Prices
      operationId: editCoverItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CoverTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{id}/pricetable/deletecover":
    post:
      tags:
      - Price Tables
      summary: Delete Cover Prices
      operationId: deleteCoverItem
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CoverTableItem"
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{printShopID}/pricetable/editstapling":
    put:
      tags:
      - Print Shop Management
      summary: Edit Stapling Price
      operationId: editStaplingPrice
      security:
      - bearerAuth: []
      parameters:
      - name: printShopID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: '0.02'
      responses:
        '200':
          "$ref": "#/components/responses/SuccessResponse"
  "/printshops/{printShopID}/employees":
    get:
      tags:
      - Print Shop Management
      summary: Get All Employees
      operationId: getEmployees
      security:
      - bearerAuth: []
      parameters:
      - name: printShopID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: List of employees.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EmployeeListResponse"
    post:
      tags:
      - Print Shop Management
      summary: Add New Employee
      operationId: addEmployee
      security:
      - bearerAuth: []
      parameters:
      - name: printShopID
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        description: Details for the new employee to be created.
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/NewEmployee"
      responses:
        '200':
          description: A success or failure response. On success, includes the new
            employee's ID.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EmployeeCreationResponse"
    put:
      tags:
      - Print Shop Management
      summary: Edit an Employee
      operationId: editEmployee
