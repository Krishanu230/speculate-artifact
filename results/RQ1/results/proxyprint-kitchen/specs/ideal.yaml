          description: Not Found.
  "/printshops/{printShopId}/reviews/{reviewId}":
    put:
      tags:
      - Reviews
      summary: Edit Review
      operationId: editPrintShopReview
      security:
      - bearerAuth: []
      parameters:
      - name: printShopId
        in: path
