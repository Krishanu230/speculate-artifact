        '404':
          description: Not Found.
    delete:
      tags:
      - Reviews
      summary: Delete Review
      operationId: deletePrintShopReview
      security:
      - bearerAuth: []
      parameters:
      - name: printShopId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: reviewId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: The deleted review.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Review"
        '401':
          description: Unauthorized.
        '404':
          description: Not Found.
  "/printshops":
    get:
      tags:
      - Print Shops
      summary: Get All Print Shops
      operationId: getPrintShops
      responses:
        '200':
          description: A list of all registered print shops.
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/PrintShop"
  "/printshops/nearest":
    get:
      tags:
      - Print Shops
      summary: Find Nearest Print Shops
      operationId: getNearestPrintShops
      parameters:
      - name: latitude
        in: query
        required: true
        schema:
          type: number
          format: double
      - name: longitude
        in: query
        required: true
        schema:
          type: number
          format: double
      responses:
        '200':
          description: A map of distances to print shops, sorted from nearest to farthest.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  printshops:
                    type: object
                    additionalProperties:
                      "$ref": "#/components/schemas/PrintShop"
                    description: A map where the key is the distance (as a string)
                      and the value is the PrintShop object.
  "/printshops/{id}":
    get:
      tags:
      - Print Shops
      summary: Get Print Shop by ID
      operationId: getPrintShopById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: The requested print shop.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrintShop"
        '404':
          description: Not Found. The print shop with the given ID does not exist.
  "/printshops/{id}/pricetable":
    get:
      tags:
      - Print Shops
      summary: Get Price Table
      operationId: getPrintShopPriceTable
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: A detailed price table for the specified print shop.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PriceTableResponse"
  "/printshops/requests":
    get:
      tags:
      - Print Shop - Queue Management
      summary: Get Active Requests
      description: Returns a list of PENDING and IN_PROGRESS print requests for the
        authenticated employee's print shop.
      operationId: getPrintShopActiveRequests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of active print requests.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrintRequestListResponse"
  "/printshops/history":
    get:
      tags:
      - Print Shop - Queue Management
      summary: Get History of Requests
      description: Returns a list of LIFTED (completed) print requests for the authenticated
        employee's print shop.
      operationId: getPrintShopHistoryRequests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A history of completed print requests.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrintRequestHistoryResponse"
  "/printshops/satisfied":
    get:
      tags:
      - Print Shop - Queue Management
      summary: Get Satisfied (Ready for Pickup) Requests
      description: Returns a list of FINISHED print requests for the authenticated
        employee's print shop.
      operationId: getPrintShopSatisfiedRequests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of satisfied print requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  satisfiedrequests:
                    type: array
                    items:
                      "$ref": "#/components/schemas/PrintRequest"
  "/printshops/requests/{id}":
    get:
      tags:
      - Print Shop - Queue Management
      summary: Get a Specific Print Request
      operationId: getPrintShopRequestById
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Details of a specific print request.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SinglePrintRequestResponse"
    post:
      tags:
      - Print Shop - Queue Management
      summary: Change Print Request Status
      description: Advances the status of a print request (e.g., from PENDING to IN_PROGRESS).
      operationId: changePrintRequestStatus
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: The request status was successfully updated.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChangeStatusResponse"
  "/printshops/requests/cancel/{id}":
    post:
      tags:
      - Print Shop - Queue Management
      summary: Cancel a Print Request
      operationId: cancelPrintShopRequest
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: The reason for cancelling the request.
      responses:
        '200':
          description: Success or failure response.
          content:
            application/json:
              schema:
                "$ref": "#/components/responses/SuccessResponse"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        username:
          type: string
        roles:
          type: array
          items:
            type: string
          readOnly: true
    Consumer:
      allOf:
      - "$ref": "#/components/schemas/User"
      - type: object
        properties:
          name:
            type: string
          email:
            type: string
            format: email
          latitude:
            type: string
          longitude:
            type: string
          printingSchemas:
            type: array
            items:
              "$ref": "#/components/schemas/PrintingSchema"
          notifications:
            type: array
            items:
              "$ref": "#/components/schemas/Notification"
          balance:
            "$ref": "#/components/schemas/Money"
    Admin:
      allOf:
      - "$ref": "#/components/schemas/User"
      - type: object
        properties:
          email:
            type: string
            format: email
          balance:
            "$ref": "#/components/schemas/Money"
    Manager:
      allOf:
      - "$ref": "#/components/schemas/User"
      - type: object
        properties:
          name:
            type: string
          email:
            type: string
            format: email
          printShop:
            "$ref": "#/components/schemas/PrintShop"
    Employee:
      allOf:
      - "$ref": "#/components/schemas/User"
      - type: object
        properties:
          name:
            type: string
          printShop:
            "$ref": "#/components/schemas/PrintShop"
            readOnly: true
    NewEmployee:
      type: object
      description: Schema for creating a new employee.
      properties:
        username:
          type: string
        password:
          type: string
          format: password
          writeOnly: true
        name:
          type: string
      required:
      - username
      - password
      - name
    UpdateEmployee:
      type: object
      description: Schema for updating an existing employee.
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        password:
          type: string
          format: password
          writeOnly: true
        name:
          type: string
      required:
      - id
      - username
      - password
      - name
    Money:
      type: object
      properties:
        currency:
          type: string
        integerPart:
          type: integer
        fractionalPart:
          type: integer
    PrintingSchema:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        paperSpecs:
          type: string
        bindingSpecs:
          type: string
        coverSpecs:
          type: string
        deleted:
          type: boolean
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        read:
          type: boolean
    PrintRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        cost:
          type: number
          format: double
        arrivalTimestamp:
          type: string
          format: date-time
        finishedTimestamp:
          type: string
          format: date-time
        deliveredTimestamp:
          type: string
          format: date-time
        empAttended:
          type: string
        empDelivered:
          type: string
        status:
          type: string
          enum:
          - NOT_PAYED
          - PENDING
          - IN_PROGRESS
          - FINISHED
          - LIFTED
        payPalSaleID:
          type: string
        consumer:
          "$ref": "#/components/schemas/Consumer"
        documents:
          type: array
          items:
            "$ref": "#/components/schemas/Document"
        paymentType:
          type: string
    Document:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        totalPages:
          type: integer
        specs:
          type: array
          items:
            "$ref": "#/components/schemas/DocumentSpec"
    DocumentSpec:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstPage:
          type: integer
        lastPage:
          type: integer
        printingSchema:
          "$ref": "#/components/schemas/PrintingSchema"
    PrintShop:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        nif:
          type: string
        logo:
          type: string
        avgRating:
          type: number
          format: float
        balance:
          "$ref": "#/components/schemas/Money"
    RegisterRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        managerName:
          type: string
        managerUsername:
          type: string
        managerEmail:
          type: string
          format: email
        managerPassword:
          type: string
          writeOnly: true
        pShopAddress:
          type: string
        pShopLatitude:
          type: number
          format: double
        pShopLongitude:
          type: number
          format: double
        pShopNIF:
          type: string
        pShopName:
          type: string
        pShopDateRequest:
          type: string
          readOnly: true
        pShopDateRequestAccepted:
          type: string
          readOnly: true
    Review:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        rating:
          type: integer
    PaperTableItem:
      type: object
      properties:
        infLim:
          type: integer
        supLim:
          type: integer
        colors:
          type: string
        priceA4SIMPLEX:
          type: string
        priceA4DUPLEX:
          type: string
        priceA3SIMPLEX:
          type: string
        priceA3DUPLEX:
          type: string
    RingTableItem:
      type: object
      properties:
        ringType:
          type: string
        infLim:
          type: integer
        supLim:
          type: integer
        price:
          type: string
    CoverTableItem:
      type: object
      properties:
        coverType:
          type: string
        priceA4:
          type: string
        priceA3:
          type: string
    LoginSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        externalURL:
          type: string
        user:
          oneOf:
          - "$ref": "#/components/schemas/Consumer"
          - "$ref": "#/components/schemas/Admin"
          - "$ref": "#/components/schemas/Manager"
          - "$ref": "#/components/schemas/Employee"
    LoginFailureResponse:
      type: object
      properties:
        success:
          type: boolean
    ConsumerRegistrationSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        consumer:
          "$ref": "#/components/schemas/Consumer"
    ConsumerRegistrationFailureResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
    ConsumerInfoResponse:
      type: object
      properties:
        success:
          type: boolean
        consumer:
          "$ref": "#/components/schemas/Consumer"
    PrintingSchemaListResponse:
      type: object
      properties:
        success:
          type: boolean
        pschemas:
          type: array
          items:
            "$ref": "#/components/schemas/PrintingSchema"
    CreateSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer
          format: int64
    BudgetRequest:
      type: object
      properties:
        printshops:
          type: array
          items:
            type: integer
            format: int64
        files:
          type: object
          additionalProperties:
            type: object
            properties:
              specs:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    from:
                      type: integer
                    to:
                      type: integer
    BudgetResponse:
      type: object
      properties:
        success:
          type: boolean
        budgets:
          type: object
          additionalProperties:
            type: string
        printRequestID:
          type: integer
          format: int64
    SubmitRequest:
      type: object
      properties:
        printshopID:
          type: integer
          format: int64
        budget:
          type: number
          format: double
        paymentMethod:
          type: string
    SubmitResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    DocumentListResponse:
      type: object
      properties:
        success:
          type: boolean
        documents:
          type: array
          items:
            "$ref": "#/components/schemas/Document"
    EmployeeListResponse:
      type: object
      properties:
        success:
          type: boolean
        employees:
          type: array
          items:
            "$ref": "#/components/schemas/Employee"
    EmployeeCreationResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer
          format: int64
        message:
          type: string
    EmployeeEditResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    PrintShopStatsResponse:
      type: object
      properties:
        success:
          type: boolean
        nPendingRequests:
          type: integer
        nInProgressRequests:
          type: integer
        nFinished:
          type: integer
        nEmployees:
          type: integer
        pshopProfit:
          type: string
    PrintShopResponse:
      type: object
      properties:
        success:
          type: boolean
        printshop:
          "$ref": "#/components/schemas/PrintShop"
    PrintRequestListResponse:
      type: object
      properties:
        printrequest:
          type: array
          items:
            "$ref": "#/components/schemas/PrintRequest"
        success:
          type: boolean
    PrintRequestHistoryResponse:
      type: object
      properties:
        historyrequests:
          type: array
          items:
            "$ref": "#/components/schemas/PrintRequest"
        success:
          type: boolean
    PrintRequestSatisfiedResponse:
      type: object
      properties:
        satisfiedrequests:
          type: array
          items:
            "$ref": "#/components/schemas/PrintRequest"
        success:
          type: boolean
    SinglePrintRequestResponse:
      type: object
      properties:
        printrequest:
          "$ref": "#/components/schemas/PrintRequest"
        success:
          type: boolean
    ChangeStatusResponse:
      type: object
      properties:
        newStatus:
          type: string
          enum:
          - IN_PROGRESS
          - FINISHED
          - LIFTED
        success:
          type: boolean
    PriceTableResponse:
      type: object
      properties:
        printcopy:
          "$ref": "#/components/schemas/PapersTable"
        rings:
          "$ref": "#/components/schemas/RingsTable"
        stapling:
          type: number
          format: float
        covers:
          "$ref": "#/components/schemas/CoversTable"
        success:
          type: boolean
    PapersTable:
      type: object
      additionalProperties:
        type: array
        items:
          "$ref": "#/components/schemas/PaperTableItem"
      description: A map where the key is the color type (e.g., 'BW', 'COLOR') and
        the value is a list of paper price ranges.
    RingsTable:
      type: object
      additionalProperties:
        type: array
        items:
          "$ref": "#/components/schemas/RingTableItem"
      description: A map where the key is the ring material (e.g., 'PLASTIC', 'SPIRAL')
        and the value is a list of ring price ranges.
    CoversTable:
      type: object
      additionalProperties:
        "$ref": "#/components/schemas/CoverTableItem"
      description: A map where the key is the cover material (e.g., 'CRISTAL_ACETATE')
        and the value is an object with prices for A4 and A3 formats.
    SatisfiedRequest:
      type: object
      properties:
        printrequest:
          "$ref": "#/components/schemas/PrintRequest"
        printshop:
          type: string
    PublicReview:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        rating:
          type: integer
        username:
          type: string
    NewReviewRequest:
      type: object
      properties:
        review:
          type: string
        rating:
          type: integer
  responses:
    SuccessResponse:
      description: A generic success response.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
