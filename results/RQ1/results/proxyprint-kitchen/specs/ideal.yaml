        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateEmployee"
      responses:
        '200':
          description: A success or failure response.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/EmployeeEditResponse"
  "/printshops/{printShopID}/employees/{employeeID}":
