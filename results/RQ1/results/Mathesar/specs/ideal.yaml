        columns:
          type: array
          items:
            type: integer
        referent_columns:
          type: array
          items:
            type: integer
        onupdate:
          type: string
          enum: [RESTRICT, CASCADE, 'SET NULL', 'NO ACTION', 'SET DEFAULT']
          nullable: true
        ondelete:
          type: string
          enum: [RESTRICT, CASCADE, 'SET NULL', 'NO ACTION', 'SET DEFAULT']
          nullable: true
        deferrable:
          type: boolean
          nullable: true
        match:
          type: string
          enum: [SIMPLE, PARTIAL, FULL]
