    OneToOneLinkRequest:
      type: object
      description: Schema for creating a one-to-one link.
      required:
        - link_type
        - reference_table
        - referent_table
        - reference_column_name
      properties:
        link_type:
          type: string
          description: Must be 'one-to-one'.
          # 'const' is more precise than 'enum' for this use case.
          const: 'one-to-one'
        reference_table:
          type: integer
          description: The ID of the table that will contain the new foreign key column.
        referent_table:
          type: integer
          description: The ID of the table that the new foreign key will reference.
        reference_column_name:
          type: string
          description: The name for the new foreign key column to be created in the reference table.

    OneToManyLinkRequest:
      type: object
      description: Schema for creating a one-to-many link.
      required:
        - link_type
        - reference_table
        - referent_table
        - reference_column_name
      properties:
        link_type:
          type: string
          description: Must be 'one-to-many'.
          const: 'one-to-many'
        reference_table:
          type: integer
          description: The ID of the table that will contain the new foreign key column (the 'many' side).
        referent_table:
          type: integer
          description: The ID of the table that the new foreign key will reference (the 'one' side).
        reference_column_name:
          type: string
          description: The name for the new foreign key column to be created in the reference table.

    ManyToManyLinkRequest:
      type: object
      description: Schema for creating a many-to-many link via a new mapping table.
      required:
        - link_type
        - mapping_table_name
        - referents
      properties:
        link_type:
          type: string
          description: Must be 'many-to-many'.
          const: 'many-to-many'
        mapping_table_name:
          type: string
          description: The name for the new mapping table that will be created.
        referents:
          type: array
          description: An array describing the tables to be linked.
          items:
            type: object
            required:
              - referent_table
              - column_name
            properties:
              referent_table:
                type: integer
                description: The ID of a table to be linked.
              column_name:
                type: string
                description: The name for the column in the new mapping table that will link to this referent table.
    
    OneToOneLinkResponse:
      $ref: '#/components/schemas/OneToOneLinkRequest'

    OneToManyLinkResponse:
      $ref: '#/components/schemas/OneToManyLinkRequest'

    ManyToManyLinkResponse:
      $ref: '#/components/schemas/ManyToManyLinkRequest'
