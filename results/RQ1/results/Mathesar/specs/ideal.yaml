openapi: 3.0.0
info:
  title: API Documentation for code 
  version: 1.0.0
paths:
  /api/db/v0/connections/:
    get:
      parameters:
      - description: Number of results to return per page.
        in: query
        name: limit
        required: false
        schema:
          default: 50
          type: integer
      - description: The initial index from which to return the results.
        in: query
        name: offset
        required: false
        schema:
          type: integer
      - description: Sort the results by the specified field(s). Use 'id' or 'name'
          to sort by those fields.
        in: query
        name: sort_by
        required: false
        schema:
          enum: ['id', '-id', 'name', '-name']
          type: string
      - description: Filter by the deletion status of the database. If true, only
          deleted databases will be returned.
        in: query
        name: deleted
        required: false
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  count:
                    description: The total number of database connections
                    example: 1
                    type: integer
                  results:
                    description: List of database connections
                    items:
                      $ref: '#/components/schemas/ConnectionSerializerResponse'
                    type: array
                type: object
          description: A JSON array of database connections
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Retrieve a list of database connections
    post:
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                database:
                  description: The name of the database.
                  type: string
                  maxLength: 128
                host:
                  description: The host of the database.
                  type: string
                  maxLength: 255
                nickname:
                  description: The name to identify the connection.
                  type: string
                  maxLength: 128
                password:
                  description: The password for the database connection.
                  type: string
                  writeOnly: true
                  maxLength: 255
                port:
                  description: The port number for the database connection.
                  type: integer
                username:
                  description: The username for the database connection.
                  type: string
                  maxLength: 255
              required:
              - nickname
              - database
              - username
              - password
              - host
              - port
              type: object
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSerializerResponse'
          description: Created - A new database connection has been successfully created.
        '400':
          content:
            application/json:
              schema:
                items:
                  properties:
                    field:
                      description: The field in the request that caused the validation
                        error.
                      example: username
                      type: string
                    message:
                      description: A message describing the validation error.
                      example: This field is required.
                      type: string
                  type: object
                type: array
          description: Bad Request - Bad input, validation error.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to create the object.
        '404':
          description: Not Found - URL not found.
        '406':
          description: Not Acceptable - Requested content type is not acceptable.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Create a new database connection
  /api/db/v0/connections/{pk}/:
    delete:
      parameters:
      - description: Primary key of the database connection to delete
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      - description: Boolean flag to indicate whether to delete Mathesar-specific
          schemas in the database. If 'true', Mathesar schemas will be uninstalled
          from the database.
        in: query
        name: del_msar_schemas
        required: false
        schema:
          type: boolean
      responses:
        '204':
          description: No Content - The database connection was successfully deleted.
        '400':
          description: Bad Request - Bad input parameter.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to delete this object.
        '404':
          description: Not Found - Object to be deleted does not exist.
        '405':
          description: Method Not Allowed - DELETE method not allowed on the endpoint.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Delete a database connection
    get:
      parameters:
      - description: Primary key of the database connection to retrieve
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSerializerResponse'
          description: Successfully retrieved the database connection details
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this object.
        '404':
          description: Not Found - Object with the given identifier does not exist.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Retrieve a specific database connection by its primary key (pk)
    patch:
      parameters:
      - description: Primary key of the database connection to partially update
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                database:
                  description: The name of the database
                  type: string
                  maxLength: 128
                host:
                  description: The host of the database
                  type: string
                  maxLength: 255
                nickname:
                  description: The nickname of the database connection
                  type: string
                  maxLength: 128
                password:
                  description: The password for the database connection
                  type: string
                  writeOnly: true
                  maxLength: 255
                port:
                  description: The port number of the database
                  type: integer
                username:
                  description: The username for the database connection
                  type: string
                  maxLength: 255
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSerializerResponse'
          description: Connection updated successfully
        '400':
          content:
            application/json:
              schema:
                items:
                  properties:
                    field:
                      description: The field in the connection that caused the validation
                        error.
                      example: nickname
                      type: string
                    message:
                      description: A human-readable message indicating the cause of
                        the validation error.
                      example: This field may not be blank.
                      type: string
                  type: object
                type: array
          description: Bad Request - Bad input, validation error, or partial update
            not allowed.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to edit this object.
        '404':
          description: Not Found - Object to be updated does not exist.
        '405':
          description: Method Not Allowed - PATCH method not allowed on the endpoint.
        '406':
          description: Not Acceptable - Requested content type is not acceptable.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Partially update a connection
    put:
      parameters:
      - description: Primary key of the database connection to update
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                database:
                  description: The name of the database
                  type: string
                  maxLength: 128
                host:
                  description: The host of the database
                  type: string
                  maxLength: 255
                nickname:
                  description: The nickname for the database connection
                  type: string
                  maxLength: 128
                password:
                  description: The password for the database connection
                  type: string
                  writeOnly: true
                  maxLength: 255
                port:
                  description: The port number of the database
                  type: integer
                username:
                  description: The username for the database connection
                  type: string
                  maxLength: 255
              required:
              - nickname
              - database
              - username
              - password
              - host
              - port
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSerializerResponse'
          description: Database connection updated successfully
        '400':
          description: Bad Request - Bad input, validation error.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to edit this object.
        '404':
          description: Not Found - Object to be updated does not exist.
        '405':
          description: Method Not Allowed - PUT method not allowed on the endpoint.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Update a database connection
  /api/db/v0/connections/{pk}/functions/:
    get:
      parameters:
      - description: The primary key of the database connection to retrieve functions
          from.
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DBFunctionSerializerResponse'
                type: array
          description: A list of supported database functions was successfully retrieved.
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '404':
          description: Not Found - Object with the given identifier does not exist.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Retrieve a list of supported database functions for a given connection
  /api/db/v0/connections/{pk}/types/:
    get:
      parameters:
      - description: Primary key of the database connection
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DBTypeSerializerResponse'
                type: array
          description: A list of available database types was successfully retrieved.
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this object.
        '404':
          description: Not Found - Object with the given identifier does not exist.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Retrieve a list of available database types for a specific connection
  /api/db/v0/data_files/:
    get:
      parameters:
      - description: Number of results to return per page.
        in: query
        name: limit
        required: false
        schema:
          default: 50
          type: integer
      - description: The initial index from which to return the results.
        in: query
        name: offset
        required: false
        schema:
          type: integer
      - description: The initial index from which to return the results.
        in: query
        name: database
        required: false
        schema:
          type: string
      - description: Sort the results by the specified field. Use the field name for
          ascending order and prepend '-' for descending order.
        explode: false
        in: query
        name: sort_by
        required: false
        schema:
          enum: ['id', '-id', 'name', '-name']
          type: string
      - description: Filter by the base name of the data file. Can filter by multiple
          comma-separated values.
        explode: false
        in: query
        name: name
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  count:
                    description: The total number of data files.
                    example: 100
                    type: integer
                  results:
                    description: An array of data files.
                    items:
                      $ref: '#/components/schemas/DataFileSerializerResponse'
                    type: array
                type: object
          description: A JSON array of data files
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Retrieve a list of data files
    post:
      parameters: []
      requestBody:
        content:
          # CORRECTION: Added application/json as a possible content type.
          application/json:
            schema:
              $ref: '#/components/schemas/DataFileSerializerRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DataFileSerializerRequest'
                    
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataFileSerializerResponse'
          description: Data file created successfully
        '400':
          content:
            application/json:
              schema:
                items:
                  properties:
                    code:
                      description: A code representing the type of error.
                      example: invalid_table_error
                      type: string
                    message:
                      description: A message providing more details about the error.
                      example: Invalid table error message.
                      type: string
                  type: object
                type: array
          description: Bad Request - Bad input, validation error.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to create the object.
        '404':
          description: Not Found - URL not found.
        '405':
          description: Method Not Allowed - POST method not allowed on the endpoint.
        '406':
          description: Not Acceptable - Requested content type is not acceptable.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Create a new data file
  /api/db/v0/data_files/{pk}/:
    get:
      parameters:
      - description: Primary key of the Data File to retrieve
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataFileSerializerResponse'
          description: Successfully retrieved the DataFile
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this object.
        '404':
          description: Not Found - Object with the given identifier does not exist.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Retrieve a specific DataFile
    patch:
      parameters:
      - description: Primary key of the data file to partially update
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                header:
                  description: Indicates whether the first row of the file is a header
                  type: boolean
              required:
              - header
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataFileSerializerResponse'
          description: The header of the DataFile was successfully updated.
        '400':
          content:
            application/json:
              schema:
                items:
                  properties:
                    code:
                      description: Error code indicating the type of error that occurred.
                      example: invalid_field
                      type: string
                    field:
                      description: The field in the DataFile that caused the validation
                        error.
                      example: header
                      type: string
                    message:
                      description: A message describing the error.
                      example: Invalid input for field.
                      type: string
                  type: object
                type: array
          description: Bad Request - Bad input, validation error, or partial update
            not allowed.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to edit this object.
        '404':
          description: Not Found - Object to be updated does not exist.
        '405':
          content:
            application/json:
              schema:
                items:
                  properties:
                    code:
                      description: Error code indicating that the method is not allowed.
                      example: method_not_allowed
                      type: string
                    message:
                      description: A message stating that only the header field can
                        be patched.
                      example: Method 'PATCH' allowed only for header.
                      type: string
                  type: object
                type: array
          description: Method Not Allowed - PATCH method allowed only for header.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Partially update the header of a DataFile
  /api/db/v0/links/:
    post:
      summary: Create a new link between tables
      requestBody:
        required: true
        content:
          application/json:
            schema:
              # CORRECTION: The request body must match one of the following schemas,
              # based on the value of 'link_type'.
              oneOf:
                - $ref: '#/components/schemas/OneToOneLinkRequest'
                - $ref: '#/components/schemas/OneToManyLinkRequest'
                - $ref: '#/components/schemas/ManyToManyLinkRequest'
      responses:
        '201':
          description: Link created successfully. The response body will mirror the request structure.
          content:
            application/json:
              schema:
                # CORRECTION: The response is also polymorphic.
                oneOf:
                  - $ref: '#/components/schemas/OneToOneLinkResponse'
                  - $ref: '#/components/schemas/OneToManyLinkResponse'
                  - $ref: '#/components/schemas/ManyToManyLinkResponse'

        '400':
          content:
            application/json:
              schema:
                items:
                  properties:
                    field:
                      description: The field that caused the validation error.
                      example: link_type
                      type: string
                    message:
                      description: A message describing the validation error.
                      example: This field is required.
                      type: string
                  type: object
                type: array
          description: Bad Request - Bad input, validation error.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to create the object.
        '404':
          description: Not Found - URL not found.
        '405':
          description: Method Not Allowed - POST method not allowed on the endpoint.
        '406':
          description: Not Acceptable - Requested content type is not acceptable.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuth: []
      - SessionAuth: []
  /api/db/v0/queries/:
    get:
      parameters:
      - in: query
        name: database
        required: false
        schema:
          type: string
        description: Filter by database name(s), comma-separated for multiple values.
      - in: query
        name: name
        required: false
        schema:
          type: string
        description: Filter by query name(s), comma-separated for multiple values.
      - in: query
        name: sort_by
        required: false
        schema:
          type: string
          enum: [id, -id, name, -name]
        description: Sort results by 'id' or 'name'.
      - description: The ID of the schema to filter queries by.
        in: query
        name: schema
        required: false
        schema:
          type: integer
      - description: Number of results to return per page.
        in: query
        name: limit
        required: false
        schema:
          default: 50
          type: integer
      - description: The initial index from which to return the results.
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  count:
                    description: The total number of queries available
                    example: 100
                    type: integer
                  results:
                    description: An array of queries, each with details about the
                      query
                    items:
                      $ref: '#/components/schemas/QuerySerializerResponse'
                    type: array
                type: object
          description: A JSON array of queries
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view the list.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuth: []
      - SessionAuth: []
      summary: Retrieve a list of queries
    post:
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuerySerializerRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySerializerResponse'
          description: Query created successfully
        '400':
          description: Bad Request - Bad input, validation error.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to create the object.
        '404':
          description: Not Found - URL not found.
        '405':
          description: Method Not Allowed - POST method not allowed on the endpoint.
        '406':
          description: Not Acceptable - Requested content type is not acceptable.
        '415':
          description: Unsupported Media Type - Unsupported media type in request.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Create a new query
  /api/db/v0/queries/run/:
    post:
      summary: Execute a query without saving it
      # This endpoint has no path or query parameters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # CORRECTION: Added required fields based on model validators
              # and serializer definitions.
              required:
                - base_table
                - initial_columns
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                base_table:
                  type: integer
                initial_columns:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                transformations:
                  type: array
                  nullable: true
                  items:
                    type: object
                    additionalProperties: true
                display_options:
                  type: object
                  nullable: true
                  additionalProperties: true
                display_names:
                  type: object
                  nullable: true
                  additionalProperties:
                    type: string
                # CORRECTION: This is the correct way to model the execution parameters.
                # They are part of the request body, not query parameters.
                parameters:
                  type: object
                  description: "Execution-time parameters for the ad-hoc query."
                  properties:
                    limit:
                      type: integer
                    offset:
                      type: integer
                    filter:
                      type: object
                      additionalProperties: true
                    order_by:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
                    grouping:
                      type: object
                      additionalProperties: true
                    duplicate_only:
                      type: object
                      additionalProperties: true
                    search_fuzzy:
                      type: array
                      items:
                        type: object
                        additionalProperties: true
      responses:
        '200':
          description: Query executed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryRunResponse'

  /api/db/v0/queries/{pk}/:
    delete:
      parameters:
      - description: Primary key of the query to delete
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      responses:
        '204':
          description: No Content - The query was successfully deleted.
        '400':
          description: Bad Request - Bad input parameter.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to delete this object.
        '404':
          description: Not Found - Object to be deleted does not exist.
        '429':
          description: Too Many Requests - Too many requests; rate limit exceeded.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Delete a specific query
    get:
      parameters:
      - description: The primary key of the query to retrieve.
        in: path
        name: pk
        required: true
        schema:
          pattern: ^[^/.]+$
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuerySerializerResponse'
          description: A query object was successfully retrieved
        '400':
          description: Bad Request - Invalid query parameters.
        '401':
          description: Unauthorized - Authentication credentials were not provided.
        '403':
          description: Forbidden - User does not have permission to view this object.
        '404':
          description: Not Found - Object with the given identifier does not exist.
        '406':
          description: Not Acceptable - Requested content type is not acceptable according
            to the Accept headers.
      security:
      - TokenAuthentication: []
      - SessionAuthentication: []
      summary: Retrieve a specific query by its primary key
    patch:
      parameters:
      - description: Primary key of the query to partially update
        in: path
        name: pk
